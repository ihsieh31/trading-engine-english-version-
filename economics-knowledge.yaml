- **市場原教旨主義 (Market Fundamentalism)** (real-world economics review, issue no. 75)
  - 相信自我調節市場能自動優化資源配置且無需政府干預的信條，Polanyi認為這是一種烏托邦式的幻想，忽視了社會保護機制。
- **被追趕經濟體 (Pursued Economy)** (real-world economics review, issue no. 75)
  - 處於工業化第三階段的發達國家，面臨來自新興經濟體的競爭，導致國內投資機會減少、製造業就業流失及工資停滯。
- **Uneconomic Growth** (real-world economics review, issue no. 76)
  - A condition where the social and environmental costs of additional economic growth outweigh the benefits, often occurring when natural resource limits are reached.
