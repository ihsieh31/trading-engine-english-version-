  - Instantaneous output rate where h_p is the fraction of labor in production, a is the rate of technical progress in tool-making, and eta(t) is the cumu
- **Output-Capital Ratio Limit** (real-world_economics_review_issue_81.pdf)
  - Formula: lim(t->inf) (y/k) = 0.5 * (a+m)^2 / (a-m)
  - The long-term stable output-to-capital ratio in Salter's transient model, dependent on technical progress (a) and maintenance costs (m).
- **Capitalized Power Index** (real-world_economics_review_issue_85.pdf)
  - Formula: Capitalized Power = S&P 500 Price Index / Average Wage Rate
  - A metric used to quantify the relative power of equity owners compared to the general workforce. Higher values indicate greater power concentration an
- **Systemic Fear Index** (real-world_economics_review_issue_85.pdf)
  - Formula: Systemic Fear Index = 10-Year Trailing Average of 12-Month Correlation (Stock Prices, Earnings Per Share)
  - A measure of how much stock prices rely on past/current earnings rather than future expectations. A higher index indicates greater fear and denial amo
- **能源-組織成長方程** (real-world economics review, issue no. 86)
  - Formula: W(t) = η[T(t), S(t), I(t)] * E(t)
  - 產出（W）是能源輸入（E）與熱力學第二定律效率（η）的函數，其中η取決於組織輸入：工具（T）、監督（S）和資訊（I）。該公式強調只有能源具有物理生產力，其他為組織性因素。
- **階層權力指標** (real-world economics review, issue no. 86)
  - Formula: Power = 1 + Number of Subordinates
  - 一個人的階層權力定義為1（自我控制）加上其直接間接控制的下屬總數，用於解釋企業內部收入隨職級指數增長的現象。
- **Optimal Scale Condition** (Real-World Economics Review, Issue no. 87: Economics and the Ecosystem (2019))
  - Formula: Marginal Benefit of Growth = Marginal Cost of Growth (including ecosystem service loss)
  - Defines the point beyond which economic growth becomes 'uneconomic,' where the costs of resource depletion and pollution outweigh the benefits of addi
- **4 Per 1000 Initiative Target** (Real-World Economics Review, Issue no. 87: Economics and the Ecosystem (2019))
  - Formula: Annual Soil Carbon Stock Increase ≥ 0.4%
  - A proposed global target to halt the increase in atmospheric CO2 by increasing soil organic carbon by 0.4% annually, leveraging agricultural lands for
- **名義GDP計算** (real-world economics review, issue no. 88)
  - Formula: Nominal GDP = Σ (Qi × Pi)
  - 名義國內生產總值等於所有商品數量（Qi）乘以其當前價格（Pi）的總和。
- **實際GDP計算（固定基期）** (real-world economics review, issue no. 88)
  - Formula: Real GDP = Σ (Qi × P_base_i)
  - 實際國內生產總值使用基期價格（P_base）計算當前數量（Qi）的價值，旨在剔除價格變動影響，但受基期選擇影響巨大。
- **宏觀會計恆等式（儲蓄-投資平衡）** (real-world economics review, issue no. 88)
  - Formula: Private Excess Saving = Public Financial Deficit + Net External Lending
  - 私人部門的超額儲蓄等於公共部門的財政赤字加上淨外貸。這表明若私人部門想增加儲蓄而投資不變，政府必須增加赤字。
- **部門餘額恆等式 (Sectoral Balances Identity)** (real-world economics review, issue no. 89)
  - Formula: (G - T) + (I - S) = (X - M)
  - 其中 G=政府支出, T=稅收, I=私人投資, S=私人儲蓄, X=出口, M=進口。該公式表明，如果私人部門淨儲蓄增加 (S > I)，則政府必須出現赤字 (G > T) 或貿易順差 (X > M) 來維持總需求平衡。
- **Domar 債務穩定條件 (Domar Debt Sustainability Condition)** (real-world economics review, issue no. 89)
  - Formula: gδ = b + [rD - g]δ
  - 用於分析債務/GDP比率 (δ) 的動態。若實際利率 (rD) 低於實際經濟增長率 (g)，則債務比率可趨於穩定。批評者指出MMT忽視了市場對不可持續債務動態的反饋機制。
- **儲蓄-投資恒等式 (Saving-Investment Identity)** (real-world economics review, issue no. 90)
  - Formula: (S_d - I_d)_p - (G - T) = K = X - M
  - 國內私人儲蓄減去私人投資，再減去政府赤字，等於資本淨流出(K)，也就等於淨出口(X-M)。這表明國際收支失衡必須由國內儲蓄投資失衡或外部資本流動來融資。
- **階層權力計數 (Hierarchical Power Metric)** (real-world economics review, issue no. 90)
  - Formula: Hierarchical Power = Number of Subordinates + 1
  - 在等級組織中，個人的階層權力定義為其直接和間接下屬的總數加一（代表自身）。數據顯示收入與此指標高度相關。
- **淨利潤計算 (Net Profit Calculation in Datastream)** (real-world economics review, issue no. 90)
  - Formula: Net Profit = Market Value / Price-Earnings Ratio
  - 在缺乏完整全國帳戶數據時，利用上市公司的市值與本益比的比值來估算淨利潤，作為衡量資本權力的代理變量。
- **生態足跡與生物承載力差值** (real-world economics review, issue no. 91)
  - Formula: Ecological Deficit = Biocapacity (BC) - Ecological Footprint (EF)
  - 用於衡量國家或全球資源消耗是否超過生態系統的再生能力。負值表示生態赤字，表明不可持續。
- **碳鍵交換計量** (real-world economics review, issue no. 91)
  - Formula: Work = Number of C-H bonds broken * Energy released per bond
- **德國賠款支付能力估算** (The_Economic_Consequences_of_the_Peace.txt)
  - Formula: 最大支付能力 ≈ (預戰出口剩餘價值 + 潛在貿易順差調整) / (1 + 利息率)
  - 凱恩斯通過分析德國的進出口數據，推導出德國每年能產生的最大貿易順差約為5億美元。考慮到本金償還和利息，他得出德國總支付能力上限約為100億美元。
- **通貨膨脹對財富的侵蝕** (The_Economic_Consequences_of_the_Peace.txt)
  - Formula: 實際財富變化 = 名義財富 × (1 - 通貨膨脹率)^t
  - 用於說明政府透過印鈔導致通貨膨脹，如何在不經立法程序的情況下，系統性地削減公民持有的貨幣資產的購買力，從而實現財富再分配。
- **Definition of Wealth Components** (The Crown of Wild Olive and Munera Pulveris)
  - Formula: Wealth = Intrinsic Value (Life-giving power) + Effectual Capacity (Ability to use)
  - Wealth only exists when an object has inherent value for sustaining life AND the possessor has the capacity to utilize it.
- **Distinction of Economic Terms** (The Crown of Wild Olive and Munera Pulveris)
  - Formula: Value ≠ Cost ≠ Price
  - Value is the power to sustain life; Cost is the labour/suffering required to produce it; Price is the labour exchanged for it.
- **保證金交易槓桿效應說明** (Successful Stock Speculation)
  - Formula: 利潤率 = (總投資回報 / 自付保證金) * 100%
  - 文中提到，若以10%保證金交易，利潤和損失都會被放大十倍。例如，$1000保證金可控制$10,000的股票，若股票上漲10%，獲利$1,000，相對於保證金的收益率為100%。
- **複利增長示例** (Successful Stock Speculation)
  - Formula: 最終金額 = 本金 * (1 + 年報酬率)^年數
  - 文中舉例，若每年獲得50%的保守利潤並再投資，20年後$1,000的本錢可增長至超過300萬美元。
- **貨幣數量論公式** (Principles of Political Economy - John Stuart Mill)
  - Formula: V = 1 / (Q × R)
  - 貨幣價值 (V) 與貨幣數量 (Q) 和貨幣流通速度 (R) 成反比。這解釋了為何增加貨幣供應會導致物價上漲。
- **工資決定公式** (Principles of Political Economy - John Stuart Mill)
  - Formula: 平均工資 = 工資基金總額 / 勞工總人數
  - 在工資基金理論框架下，整體工資水平取決於用於支付工資的資本存量與競爭就業的勞工數量之比。
- **Rent of Land/Instrument** (Essentials of Economic Theory)
  - Formula: Rent = Total Product of (Labor + Capital + Land) - Product of (Marginal Labor + Marginal Capital)
  - Rent is the differential surplus generated by superior land or instruments compared to what the same units of labor and capital would produce on the m
- **Wage Determination** (Essentials of Economic Theory)
  - Formula: Wage = Marginal Product of Labor
  - Under perfect competition in a static state, the wage rate equals the value of the additional output produced by the last unit of labor employed.
- **Interest Determination** (Essentials of Economic Theory)
  - Formula: Interest Rate = Marginal Product of Capital
  - Similarly, the rate of interest is determined by the additional output generated by the last unit of capital added to a fixed amount of labor.
- **財富分配公式** (Political Economy by William Stanley Jevons)
  - Formula: 產出 = 工資 + 地租 + 利息 + 稅收
  - 描述了社會總產出在不同生產要素提供者（勞工、地主、資本家）和政府之間的分配方式。
- **利潤構成公式** (Political Economy by William Stanley Jevons)
  - Formula: 利潤 = 監督工資 + 利息 + 風險補償
  - 資本家所獲的「利潤」並非單一概念，而是包含了管理勞動的報酬、資本的時間價值以及承擔不確定性的補償。
- **基礎收益率計算邏輯** (How to Invest Money)
  - Formula: 淨回報 = (票面利息 - (溢價 / 剩餘年限)) 或 (票面利息 + (折價 / 剩餘年限))
  - 用於確定債券購買者實際獲得的年收益率。若債券以溢價購買，本金損失需攤銷以減少利息收入；若以折價購買，本金收益則增加利息收入。
- **工業公司流動性測試** (How to Invest Money)
  - Formula: 流動資產 / 流動負債 ≥ 2
  - 評估工業公司財務健康的基準。流動資產應至少是流動負債的兩倍，以確保公司具備足夠的短期償債能力。
- **鐵路債券安全邊際估算** (How to Invest Money)
  - Formula: 債券債務佔總市場價值比例 = 債券面值 / (股票市值 + 債券面值)
  - 用於衡量鐵路債券相對於整體財產價值的槓桿程度。文中指出，標準鐵路的債券債務通常低於總市場價值的60%，表明股票提供了充足的安全緩衝。
- **Fisher's Equation of Exchange (Critiqued)** (The Value of Money)
  - Formula: MV + M'V' = PT
  - Irving Fisher's formula where M is money, V is velocity, M' is deposits, V' is deposit velocity, P is price level, and T is volume of trade. Anderson 
- **Capitalization Formula (Static)** (The Value of Money)
  - Formula: Capital Value = Annual Income / Discount Rate
  - Anderson notes that while this applies to most assets, it is inapplicable to money because the income (money rate) and discount rate tend to vary toge
- **Equation of Exchange** (Readings in Money and Banking)
  - Formula: MV + M'V' = PT
  - M is the quantity of money, V is the velocity of money, M' is the quantity of deposit currency, V' is the velocity of deposits, P is the price level, 
- **資本化公式** (The Principles of Economics, with Applications to Practical Problems)
  - Formula: Capital Value = Sum of Discounted Future Rents
  - 資產的資本價值等於其預期未來租金流按市場利率貼現後的總和。
- **年購買力 (Years' Purchase)** (The Principles of Economics, with Applications to Practical Problems)
  - Formula: Price = Annual Rent × Years' Purchase
  - 土地或房地產的價格通常表示為年租金的倍數，該倍數與利率成反比（例如，20年購買力對應5%的利率）。
- **人口與資源增長模型** (An Essay on the Principle of Population)
  - Formula: Population Growth ~ Geometric Progression (1, 2, 4, 8, 16...) vs. Subsistence Growth ~ Arithmetic Progression (1, 2, 3, 4, 5...)
  - 馬爾薩斯的核心數學假設，指出兩者在長期趨勢上必然脫節，導致人口超過資源承載力。
- **人口倍增時間估算** (An Essay on the Principle of Population)
  - Formula: Doubling Time ≈ 25 Years (based on US colonial data)
  - 基於美國殖民地的觀察數據，馬爾薩斯推斷在無阻礙情況下，人口大約每25年翻一番。
- **分批買入平均成本法** (Profitable Stock Exchange Investments)
  - Formula: 總投資額 = Σ (每次買入股數 × 當時股價)
  - 在股價下跌過程中，以小批量連續買入，使得整體平均買入價格低於初始價格，從而在價格反彈時獲得更大利潤空間。
- **波動率乘數效應** (Profitable Stock Exchange Investments)
  - Formula: 潛在利潤 ≈ (年價格波動倍數 × 資本週轉次數) - 初始投資
  - 利用高波動性股票（如西方聯合電報），通過反覆買賣捕捉價格差異，即使持有股票本身未漲，僅靠波段操作即可獲得遠超股息的回報。
- **流通中所需貨幣量公式** (A Contribution to the Critique of Political Economy)
  - Formula: 執行流通手段職能的貨幣量 = 待實現的商品價格總和 / 同名貨幣的流通次數
  - 貨幣流通速度越快，單位貨幣能支撐的交易額越大，因此所需的實際貨幣量越少。
- **紙幣貶值與物價關係** (A Contribution to the Critique of Political Economy)
  - Formula: 紙幣購買力 ∝ 1 / 紙幣發行超額量
  - 當紙幣發行量超過流通所需金屬貨幣量時，每單位紙幣代表的價值下降，導致以紙幣計價的商品價格上漲。
- **財富分配恆等式** (Progress and Poverty, Volumes I and II)
  - Formula: 總產出 (Produce) = 地租 (Rent) + 工資 (Wages) + 利息 (Interest)
  - 這表明地租、工資和利息之間存在此消彼長的關係。如果地租佔比增加，剩餘給工資和利息的比例必然減少。
- **地租決定法則** (Progress and Poverty, Volumes I and II)
  - Formula: 地租 = 較優土地的產出 - 邊際土地（無地租土地）的產出
  - 地租是由土地生產力的差異決定的。任何高於最劣等在用土地生產力的部分，都會作為地租被土地所有者拿走。
- **工資決定法則** (Progress and Poverty, Volumes I and II)
  - Formula: 工資 ≈ 邊際生產點的產出
  - 在競爭均衡下，工資水平趨近於勞動者在無需支付地租的情況下所能獲得的產出（即邊際生產率）。
- **數學期望值計算 (De Morgan's Rule)** (The Theory of Stock Exchange Speculation)
  - Formula: 數学期望 = (獲利金額 × 獲利概率) - (損失金額 × 損失概率)
  - 用於評估一次投機操作是否值得進行。如果結果為負，則長期來看該操作必虧無疑。書中強調，除非勝率與賠率能覆蓋成本（佣金、延期費），否則不應參與。
- **金幣平價計算** (The Money Market)
  - Formula: Mint Par = (Pure Gold in Domestic Currency Unit) / (Pure Gold in Foreign Currency Unit)
  - 根據法律規定的貨幣含金量，計算兩種貨幣之間的理論交換比率。例如，英鎊與法郎的金幣平價約為 25.22。
- **黃金輸出/輸入點** (The Money Market)
  - Formula: Gold Point = Mint Par ± Transportation & Insurance Costs
  - 匯率波動超過此點時，實體黃金輸送比使用匯票更便宜，從而觸發黃金流動。例如，對巴黎的出口黃金點約為 25.125。
- **長期匯率計算 (Long Exchange)** (The Money Market)
  - Formula: Long Rate ≈ Short Rate + (Foreign Interest + Stamp Duty + Risk Allowance)
  - 計算遠期匯率時，需在即期匯率基礎上加上外國市場的利息成本、印花稅及風險溢價。
- **貨幣數量方程式 (修訂版)** (A Tract on Monetary Reform)
  - Formula: n = p(k + rk')
  - 其中 n 為流通中的現金量，p 為價格指數，k 為公眾希望持有的現金購買力（消費單位），k' 為銀行存款對應的購買力，r 為銀行準備金率。該公式表明，要穩定價格 p，當公眾持幣習慣 k 和 k' 變化時，必須相應調整貨幣供應 n。
- **Calculation of Coinage Percentage** (An Inquiry into the Principles of Political Oeconomy (Vol. 2 of 2))
  - Formula: Percentage = (Value of Coin / Value of Bullion) * 100
  - Used to determine the premium added to coin due to minting fees, e.g., in France, the mint price was set such that coinage was approximately 8.2%.
- **Par of Exchange Calculation** (An Inquiry into the Principles of Political Oeconomy (Vol. 2 of 2))
  - Formula: Par = (Weight of Fine Metal in Currency A) / (Weight of Fine Metal in Currency B)
  - Determines the theoretical exchange rate based on the intrinsic metallic content of the coins of two different nations.
- **權利價值計算 (Value of Rights)** (The Cycles of Speculation)
  - Formula: 權利價值 = 市場報價 - [(原持股市值 + 認購新股成本) / (原股數 + 新股數)]
  - 用於計算配股權（Rights）的理論價值。首先計算包含新股在內的加權平均成本，然後用當前市場價格減去該平均成本。
- **安全係數檢查 (Fixed Charges Ratio)** (The Cycles of Speculation)
  - Formula: 固定費用佔淨收入比例 = (固定費用 / 總淨收入) * 100%
  - 作者建議該比例不應超過50%（除極少數例外如紐約中央鐵路），以確保公司在收入波動時仍有足夠的安全緩衝來支付股息。
- **投機機械百分比 (Mechanical Percentage Against Player)** (The Cycles of Speculation)
  - Formula: 虧損百分比 = (佣金 / 總投資金額) * 100%
  - 用於計算僅考慮佣金時的投機成本。例如，100美元股票支付0.25%佣金，則機械虧損為0.25%；若使用保證金交易，該百分比會根據保證金比例放大。
- **支出法 GDP** (Principles of Macroeconomics)
  - Formula: GDP = C + I + G + (X - IM)
  - 國內生產總值等於消費 (C)、投資 (I)、政府支出 (G) 和淨出口 (X-IM) 的總和。
- **通脹率計算** (Principles of Macroeconomics)
  - Formula: Inflation Rate = [(CPI_t - CPI_{t-12}) / CPI_{t-12}] * 100
  - 計算年度通脹率，即當前消費者物價指數 (CPI) 與一年前 CPI 的百分比變化。
- **實際利率** (Principles of Macroeconomics)
  - Formula: r = i - π^e
  - 實際利率 (r) 等於名義利率 (i) 減去預期通脹率 (π^e)。
- **產出缺口** (Principles of Macroeconomics)
  - Formula: Output Gap (%) = [(Y - Yp) / Yp] * 100
  - 衡量實際產出 (Y) 相對於潛在產出 (Yp) 的偏差百分比。
- **泰勒規則 (簡化版)** (Principles of Macroeconomics)
  - Formula: r = r* + α(π - π*) + β(Y - Yp)
  - 中央銀行設定的實際利率 (r) 等於長期均衡利率 (r*) 加上對通脹偏差 (π - π*) 和產出偏差 (Y - Yp) 的反應係數。

