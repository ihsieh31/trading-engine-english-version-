- "「在囚徒困境中，如果兩個囚犯都能合作保持沉默，他們總共只會被判刑四年；但如果他們都追求個人利益而供認，他們總共將被判刑十年。」" — OpenStax_Economics_3e_chunk002 (chunk 2/10)
