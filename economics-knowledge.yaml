- "「民主政府應該是『民有、民治、民享』的。」然而，民主系統也可能犯錯，因為政治行動者遵循的是自身利益，而不一定是公共利益。" — OpenStax_Economics_3e_chunk004 (chunk 4/10)
- "「股票價格會隨著對未來利潤預期的不可預測新聞而變動，因此它們傾向於遵循數學上的『帶趨勢的隨機漫步』。」" — OpenStax_Economics_3e_chunk004 (chunk 4/10)
- "「即使每年經濟增長率只有微小的差異，只要持續並複利計算，經過長時間後也會對生活標準產生巨大的影響。」" — OpenStax_Economics_3e_chunk004 (chunk 4/10)
- "「供給創造其自身的總需求」（薩伊定律）與「需求創造其自身的總供給」（凱恩斯定律）代表了宏觀經濟學中兩種截然不同的視角，前者適用於長期，後者適用於短期。" — OpenStax_Economics_3e_chunk005 (chunk 5/10)
- "自然失業率並非像水在32華氏度結冰那樣的物理法則，而是由當時存在的經濟、社會和政治因素組合所決定的失業率，假設經濟既沒有繁榮也沒有衰退。" — OpenStax_Economics_3e_chunk005 (chunk 5/10)
- "在凱恩斯區間，總需求的變動主要影響產出水平；而在新古典區間，總需求的變動主要影響物價水平。" — OpenStax_Economics_3e_chunk005 (chunk 5/10)
