  - Formula: 資本份額 = ΔL × (D_L - S_L)
  - 在拐點前，勞動力供給曲線 (S_L) 平坦，勞動力需求曲線 (D_L) 右移導致資本份額（三角形面積）快速擴大，而勞動份額（矩形面積）線性增長。
