  - Formula: (S - I) = DEF + NLA
  - 其中S為私人儲蓄，I為私人投資，DEF為公共部門淨借貸（赤字），NLA為對外國的淨貸出（經常帳餘額）。此公式用於證明若私人部門儲蓄大於投資，公共部門必須運行赤字。
- **通縮係數估算公式** (real-world economics review, issue no. 70)
  - Formula: dc_i = (I_M3 - IP) + (I_i - IP)
  - 用於計算價值增值負稅（VANT）的係數。I_M3為廣義貨幣供給增長率，IP為總體通膨率，I_i為特定價值類別的通膨率。該公式旨在量化生產活動對貨幣購買力的通縮影響。
