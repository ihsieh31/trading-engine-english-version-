  - Proponents: Nicolas Bouleau
- **資產負債表衰退 (Balance Sheet Recession)** (real-world economics review, issue no. 58)
  - 當私人部門在資產泡沫破裂後轉向債務最小化而非利潤最大化時，即使利率為零，私人部門仍會持續去槓桿，導致總需求萎縮和通縮螺旋。貨幣政策在此期間無效，必須依靠財政刺激來填補需求缺口。
  - Proponents: Richard C. Koo
- **明斯基金融不穩定假說 (Minskyan Financial Instability Hypothesis)** (real-world economics review, issue no. 58)
  - 資本主義經濟具有內在的不穩定性，隨著時間推移，經濟結構會從對沖融資轉向投機性融資和龐氏融資，最終導致金融危機。金融化、影子銀行和監管放鬆加劇了這種脆弱性。
  - Proponents: Hyman P. Minsky, Randall Wray
- **多元主義經濟學教學法 (Pluralist Economics Pedagogy)** (real-world economics review, issue no. 58)
  - 主張以「更廣泛的問題和更大的工具箱」為核心，將經濟學定義為涵蓋資源維持、分配和不確定性的廣泛供給活動，而非僅限於稀缺資源配置。強調現實世界問題導向，並視各種理論為有限且易錯的工具，而非絕對真理。
  - Proponents: Julie A. Nelson
- **國際貨幣體系改革與凱恩斯清算聯盟** (real-world economics review, issue no. 58)
  - 批評現行以美元為中心的布雷頓森林體系遺產（特里芬難題），主張建立新的國際清算機制（如凱恩斯的Bancor或Davidson的IMCU），要求順差國和逆差國共同承擔調整責任，以防止全球有效需求不足和保護主義。
  - Proponents: Jorge Rojas, Bill Lucarelli, Jorge Buzaglo
- **批判性债务临界点理论** (real-world economics review, issue no. 59)
  - 指出主流公共债务研究忽视了汇率变动引发的金融动荡风险，以及私人部门（特别是金融和制药业）的浪费性泡沫对增长的负面影响。
  - Proponents: Robin Pope, Reinhard Selten
- **支持-金钱议价理论 (Support-Money Bargaining)** (real-world economics review, issue no. 59)
  - 认为经济学范式的维持并非基于科学真理，而是基于学术机构内的智力支持博弈、资源控制和职业利益，新古典主义通过制度化力量维持其主导地位。
  - Proponents: Patrick Spread
- **非遍历性假设与流动性理论** (real-world economics review, issue no. 59)
  - 批评主流经济学依赖错误的遍历性公理（假设未来可预测），主张凯恩斯式的非遍历性观点，强调根本不确定性下流动性持有和货币合同的重要性。
  - Proponents: Paul Davidson
- **内生危机与经济范式** (real-world economics review, issue no. 59)
  - 认为全球金融危机是新古典经济范式内在缺陷的结果，该范式假设市场均衡且不稳定是外生的，忽视了金融自由化和监管俘获导致的内生失衡。
  - Proponents: Wilson Sy
- **后凯恩斯主义欧元区不平衡理论** (real-world economics review, issue no. 59)
  - 解释欧洲债务危机源于核心国家与外围国家之间的结构性失衡，由货币统一和金融自由化驱动，导致外围国家竞争力丧失和债务累积。
  - Proponents: Matías Vernengo, Esteban Pérez-Caldentey
- **边际生产力理论批判** (real-world economics review, issue no. 59)
  - 从马克思主义视角批判资本的价格决定理论，指出边际生产力概念在逻辑上自相矛盾，无法解释利润来源，掩盖了剥削本质。
  - Proponents: Fred Moseley
- **富豪统治论 (Plutonomy)** (real-world economics review, issue no. 59)
  - 分析美国和英国政治结构的变化，指出金融精英通过游说和竞选资金控制政策，导致收入向上再分配并催生金融泡沫。
  - Proponents: Edward Fullbrook
- **新古典經濟學的破壞性理論** (real-world_economics_review_issue_60.pdf)
  - 該文論證自1970年代以來，新古典經濟學通過忽視生產活動的異質性（如製造業與原材料的區別）和規模報酬遞增，導致了全球範圍內的去工業化、實際工資下降和金融部門對實體經濟的掠奪。
  - Proponents: Erik S. Reinert
- **資本即權力理論 (Capital as Power)** (real-world_economics_review_issue_60.pdf)
  - 將資本視為一種社會權力的量化指標，而非單純的生產要素。該理論認為金融危機是系統性的，源於資本權力接近其「漸近線」（極限），導致資本家對系統存續產生系統性恐懼。
  - Proponents: Shimshon Bichler, Jonathan Nitzan
- **發展型國家與產業政策** (real-world_economics_review_issue_60.pdf)
  - 強調製造業和先進服務業具有規模報酬遞增和動態不完全競爭的特徵，主張通過保護幼稚產業和戰略性工業目標來促進經濟發展，反對無條件的自由貿易。
  - Proponents: Nikolaos Karagiannis, Alexander G. Kondeas, Erik S. Reinert
- **開放同行評審 (Open Peer Review)** (real-world_economics_review_issue_60.pdf)
  - 批判傳統同行評審系統扼殺創新並強化正統觀點，主張利用數字技術實施公開身份且包容多元範式的開放評審，以促進學術多樣性和民主化。
  - Proponents: Grazia Ietto-Gillies
- **隨機過程與增長極限** (real-world_economics_review_issue_60.pdf)
  - 運用隨機過程理論分析環境與經濟限制，指出市場價格的波動性（隨機性）會掩蓋資源枯竭的確定性趨勢，導致短視行為和環境退化。
  - Proponents: Nicolas Bouleau
- **可持續發展的民主與多元主義** (real-world_economics_review_issue_60.pdf)
  - 批評新古典經濟學的單一範式壟斷，主張在經濟學中引入多元主義，區分貨幣與非貨幣影響，並將民主原則置於市場機制之上，以應對可持續發展的複雜挑戰。
  - Proponents: Peter Söderbaum
- **後凱恩斯宏觀經濟學與明斯基時刻** (real-world_economics_review_issue_60.pdf)
  - 回顧凱恩斯的原始思想（強調總量、非自願失業和投資的不穩定性）及海曼·明斯基的金融不穩定假說，批判新古典宏觀經濟學過度依賴微觀基礎和均衡模型。
  - Proponents: Víctor A. Beker
- **對邊際生產力理論的歷史批判** (real-world_economics_review_issue_60.pdf)
  - 從歷史角度剖析新古典邊際生產力理論的邏輯缺陷，指出其在處理異質性資本品和剩餘分配時的循環論證問題，主張回歸古典政治經濟學的權力分配視角。
  - Proponents: Roy H. Grieve
- **經濟充足性理論 (Economics of Sufficiency)** (Real-World Economics Review, Issue 61)
  - 基於收入與幸福感的相關性在滿足基本需求後減弱的證據，主張發達國家應從追求增長轉向「足夠」的狀態，通過減少消費和縮減生產來提升福祉並解決生態危機。
  - Proponents: Samuel Alexander, Tim Jackson, Herman Daly
- **稀缺性的規範基礎批判 (Normative Foundations of Scarcity Critique)** (Real-World Economics Review, Issue 61)
  - 論證主流經濟學將「稀缺性」視為核心問題並非客觀事實，而是基於私有財產制、不探討偏好形成以及將福利等同於偏好滿足等隱含的規範性和政治性假設。
  - Proponents: Asad Zaman, Lionel Robbins, John Locke
- **支持性討價還價理論 (Support-Bargaining Theory)** (Real-World Economics Review, Issue 61)
  - 提出經濟理論和貨幣制度是人類為應對不確定性和不安全尋求群體支持的產物；新古典經濟學的統治地位源於其機構化和對既得利益的支持，而非科學真理性。
  - Proponents: Patrick Spread
- **馬克思主義邊際生產力批判 (Critique of Marginal Productivity Theory)** (Real-World Economics Review, Issue 61)
  - 指出邊際生產力分配理論存在邏輯缺陷，如總生產函數的加總問題、忽略原材料投入、以及將資本回報作為外生給定而非解釋對象，並用馬克思剩餘價值理論取而代之。
  - Proponents: Fred Moseley, Karl Marx, Piero Sraffa
- **經濟多元主義與互補性** (real-world economics review, issue no. 62)
  - 主張經濟學應接納多種理論框架，特別是像物理學中的「互補性多元主義」，即不同且可能矛盾的理論（如相對論與量子力學）能從不同角度揭示現實的多個面向，而非僅視為競爭關係。
  - Proponents: Edward Fullbrook, Jack Reardon
- **非遍歷性與理性預期批判** (real-world economics review, issue no. 62)
  - 認為真實世界經濟是非遍歷的（歷史時間不可逆，未來本質上不可知），因此基於概率分佈和理性預期的宏觀模型是錯誤的基礎，無法處理真正的不確定性。
  - Proponents: Lars Pålsson Syll, John Maynard Keynes
- **債務驅動總需求理論** (real-world economics review, issue no. 62)
  - 主張在貨幣經濟中，總需求等於所得加上債務變動；私人部門債務的崩潰會導致總需求劇烈下降，而政府債務的增加可以緩衝這種衝擊，緊縮政策可能引發衰退。
  - Proponents: Steve Keen
- **馬克思主義利潤率動態** (real-world economics review, issue no. 62)
  - 運用馬克思的利潤率概念分析金融資本主義，指出虛假資本（fictitious capital）的膨脹使得維持傳統工業利潤率變得不可能，導致系統轉向掠奪性再分配和資源掠奪，並與民主制度產生衝突。
  - Proponents: Wolfram Elsner
- **集體行動能力崩潰論** (real-world economics review, issue no. 62)
  - 認為新自由主義時代削弱了國家實施集體行動以管理公共池資源和外部性的能力，導致市場力量凌駕於社會福祉之上，形成協調失敗和系統性風險。
  - Proponents: Korkut Alp Ertürk
- **現代貨幣理論 (Modern Monetary Theory, MMT)** (real-world economics review, issue no. 63)
  - 認為主權貨幣政府不受預算約束，稅收的主要目的是控制通膨而非籌措資金，且央行與財政部應視為一體以實現充分就業。
  - Proponents: L. Randall Wray, Stephanie Kelton, James Galbraith, Trond Andresen
- **銀行創造貨幣論 (Endogenous Money / Credit Creation)** (real-world economics review, issue no. 63)
  - 駁斥傳統「貨幣乘數」理論，主張商業銀行透過貸款創造存款貨幣，而非僅是儲蓄的中介；央行主要透過利率目標來配合市場對基礎貨幣的需求。
  - Proponents: Norbert Häring, Merijn Knibbe, Egmont Kakarot-Handtke
- **奧地利學派商業週期理論與宏觀审慎觀點** (real-world economics review, issue no. 63)
  - 強調超寬鬆貨幣政策會導致資源錯置（惡性投資）和資產泡沫，長期來看會損害金融穩定並產生意想不到的負面後果。
  - Proponents: William White, Ludwig von Mises, Friedrich Hayek
- **制度經濟學與演化經濟學** (real-world economics review, issue no. 63)
  - 區分「良性貪婪」（創造財富）與「惡性貪婪」（掠奪財富），主張經濟學應回歸歷史實證與社會制度分析，而非抽象的形式主義模型。
  - Proponents: Erik Reinert, Thorstein Veblen, Gustav Schmoller
- **債務貨幣理論與資產泡沫因果論 (Debt-Money Theory & Asset Bubble Causality)** (real-world economics review, issue no. 64)
  - 史蒂夫·基恩提出總需求等於GDP加上債務變化，認為資產價格（如股市）的波動主要由保證金債務水平的變化驅動，而非傳統認為的財富效應。
  - Proponents: Steve Keen
- **複雜系統經濟學 (Complexity Economics)** (real-world economics review, issue no. 64)
  - 赫爾賓和基爾曼主張經濟系統是非線性的複雜動力系統，而非均衡系統；強調代理人之間的互動、羊群效應和系統性風險，批評標準宏觀模型無法預測危機。
  - Proponents: Dirk Helbing, Alan Kirman
- **部門金融餘額方法 (Sectoral Financial Balance Approach)** (real-world economics review, issue no. 64)
  - 列維經濟研究所使用的宏觀預測工具，通過私人、政府和外國三個部門的金融餘額恆等式，分析總需求構成及債務可持續性，預警信貸危機。
  - Proponents: Wynne Godley, Levy Economics Institute
- **生態社會主義與去增長 (Ecosocialism & Degrowth)** (real-world economics review, issue no. 64)
  - 理查德·史密斯論證資本主義的無限增長邏輯與地球有限資源相悖，主張必須通過民主規劃和社會化生產來遏制過度消費和生態崩潰。
  - Proponents: Richard Smith
- **現代因果推論與結構方程模型 (Modern Causal Inference & SEM)** (real-world_economics_review_issue_65.pdf)
  - 主張經濟計量學應區分統計相關性與因果關係，強調使用圖形模型和反事實框架（如do運算符）來精確定義結構參數，而非僅將其視為聯合分佈的壓縮表示。
  - Proponents: Bryant Chen, Judea Pearl
- **名目GDP成長率目標制 (NGDPRT)** (real-world_economics_review_issue_65.pdf)
  - 一種貨幣政策框架，中央銀行承諾將名目GDP增長率穩定在特定目標（如5%），並在零利率下限時通過承諾未來更寬鬆的政策來管理預期，以抵消總需求衝擊。
  - Proponents: Thomas Oechsle, Paul Krugman
- **新範式經濟學 (New Paradigm Economics, NPE)** (real-world_economics_review_issue_65.pdf)
  - 批判傳統經濟學的數學演繹主義和均衡假設，主張採用多元論、非均衡動態、社會主體性以及將經濟視為生態系統子集的觀點，強調經驗實證而非先驗假設。
  - Proponents: Edward Fullbrook
- **工資主導型增長理論 (Wage-led Growth Theory)** (real-world_economics_review_issue_65.pdf)
  - 基於收入分配理論，認為投資不僅取決於利潤率，還取決於產能利用率；若工資份額上升能顯著提高產能利用率，則全球增長可能由工資驅動而非利潤驅動。
  - Proponents: Leon Podkaminer, A. Bhaduri, S. Marglin
- **Secular Stagnation and Endogenous Money** (real-world economics review, issue no. 66)
  - Proposes that persistent economic downturns are caused by inadequate private sector demand masked by debt bubbles, requiring permanent government stimulus. It argues that bank lending creates money an
  - Proponents: Steve Keen, Larry Summers, Paul Krugman
- **Critique of Microfoundations** (real-world economics review, issue no. 66)
  - Argues against reducing macroeconomics to microeconomic models based on representative agents and rational expectations, asserting that such models fail to capture uncertainty, heterogeneity, and emer
  - Proponents: Lars Pålsson Syll, Robert Lucas (criticized), John King
- **Fact-Value Entanglement** (real-world economics review, issue no. 66)
  - Challenges the positivist dichotomy between facts and values, arguing that facts are conceptually constructed through values and that values possess an objective dimension subject to rational critique
  - Proponents: Joseph Noko, David Hume (historical context)
- **New Currency Theory (NCT)** (real-world economics review, issue no. 66)
  - Advocates for separating money creation from private bank credit, arguing that fractional reserve banking is dysfunctional and that sovereign money should be issued debt-free by the state.
  - Proponents: Joseph Huber, Georg Friedrich Knapp
- **Capital as Power** (real-world economics review, issue no. 66)
  - Views capital accumulation not as utility maximization but as a struggle for differential power, where capitalists benefit from stagnation and unemployment to increase their relative income share.
  - Proponents: Shimshon Bichler, Jonathan Nitzan
- **Critical Realism in Competition** (real-world economics review, issue no. 66)
  - Analyzes competition as a multi-dimensional social relation affecting structures, practices, subjectivity, and the environment, rather than just a market mechanism for efficiency.
  - Proponents: Hubert Buch-Hansen, Roy Bhaskar
- **New Paradigm Economics (NPE)** (real-world economics review, issue no. 66)
  - Advocates for epistemological pluralism, rejecting the Newtonian equilibrium-based 'Old Paradigm' in favor of models that accommodate uncertainty, non-equilibrium, and social complexity.
  - Proponents: Edward Fullbrook
- **結構公理化經濟學 (Structural Axiomatic Economics)** (real-world economics review, issue no. 67)
  - 由Egmont Kakarot-Handtke提出，主張以客觀的結構公理（如收入、產出、支出的恆等式）取代新古典的主觀行為公理，以此重新定義利潤法則並解決可貸資金與內生貨幣之爭。
  - Proponents: Egmont Kakarot-Handtke
- **協調條件與貨幣預算理論 (Coordination Conditions & Monetary Budget Theory)** (real-world economics review, issue no. 67)
  - 批評DSGE模型無法準確模擬金融與實體部門的互動，主張宏觀貨幣理論應基於「瞬間交換」和「貨幣預算優先於資源預算」的原則，強調貨幣作為市場知識協調工具的功能。
  - Proponents: Piet-Hein van Eeghen
- **擴展身分認同理論 (Extended Identity Theory)** (real-world economics review, issue no. 67)
  - 結合生物進化與社會科學，提出人類自我並非純粹原子化個體，而是透過信任與社會互動形成的「擴展身分」，這解釋了利他主義與複雜社會合作的演化基礎。
  - Proponents: Taddese Mezgebo
- **資本權力與差異化資本化 (Capital Power & Differential Capitalization)** (real-world economics review, issue no. 67)
  - 解讀《恐懼指數》，認為現代資本主義的本質是透過算法和恐懼驅動來實現「差異化資本化」（超越平均回報），將社會關係簡化為金融化的權力等級。
  - Proponents: Jonathan Nitzan, Shimshon Bichler
- **資產基礎準備金要求 (Asset Based Reserve Requirements, ABRR)** (real-world economics review, issue no. 68)
  - 一種替代量化寬鬆退場策略的貨幣政策工具，要求金融機構對其持有的各類資產（而非僅限負債）持有準備金。此機制可作為自動穩定器，針對特定資產泡沫進行干預，並減少對銀行支付利息的成本。
  - Proponents: Thomas I. Palley
- **驗證理性 (Validating Rationality)** (real-world economics review, issue no. 68)
  - 相對於新古典經濟學的先驗理性，此概念強調在充滿不確定性的開放過程中，行動者會採取事後行動來改變現實環境，以驗證或實現其先前的決策，將理性視為一種實踐和後驗的過程。
  - Proponents: Gustavo Marqués
- **生物物理限制與熱力學視角** (real-world economics review, issue no. 68)
  - 從系統動力學和熱力學角度分析循環經濟，指出技術效率提升往往導致總資源消耗增加（傑文斯悖論），且由於熵增定律，完全閉合的材料循環在增長型經濟中不可行。
  - Proponents: Crelis F. Rammelt, Phillip Crisp
- **凱恩斯主義與古典宏觀經濟學的迴歸批判** (real-world economics review, issue no. 68)
  - 批評當代主流宏觀經濟學教材透過AD/AS模型重新引入前凱恩斯主義的勞動力市場觀點，忽視了「非自願失業」和總需求決定產出的核心凱恩斯洞見，導致理論倒退。
  - Proponents: Roy H Grieve
- **行為經濟學與情境經濟學** (real-world economics review, issue no. 68)
  - 挑戰新古典經濟學的「理性經濟人」假設，主張經濟行為應置於社會和倫理脈絡中理解，納入bounded rationality（有限理性）、社會偏好及道德目標，以反映真實人類行為。
  - Proponents: Neva Goodwin
- **資本主義基本法則 (r > g)** (real-world economics review, issue no. 69)
  - 皮凱提提出，當資本回報率 (r) 大於經濟增長率 (g) 時，財富會傾向於集中，導致不平等加劇。
  - Proponents: Thomas Piketty
- **劉易斯拐點理論 (Lewis Turning Points)** (real-world economics review, issue no. 69)
  - 解釋工業化過程中勞動力從農村向城市轉移如何影響收入分配；存在本地與全球兩個拐點，跨越拐點後勞動份額上升，不平等下降。
  - Proponents: Richard C. Koo
- **先配給 vs. 再分配 (Predistribution vs. Redistribution)** (real-world economics review, issue no. 69)
  - 主張通過改變市場前的制度、權力關係和財產權結構來影響收入分配，而非僅依賴稅收進行事後再分配。
  - Proponents: David Colander, Robert H. Wade
- **古典政治經濟學與租金理論** (real-world economics review, issue no. 69)
  - 區分生產性利潤與非生產性的地租、金融租金和壟斷租金，認為現代不平等源於租金提取而非純粹的生產力貢獻。
  - Proponents: Michael Hudson, Lars Pålsson Syll
- **後凱因主義的長期停滯理論 (Post-Keynesian Secular Stagnation)** (real-world economics review, issue no. 70)
  - 歐元區的長期經濟停滯源於總需求的長期疲軟，這是由於自1970年代中期以來工資份額下降、財政政策收縮以及對出口導向增長的依賴所致，而非單純的外部衝擊。
  - Proponents: Leon Podkaminer
- **資本即權力與差異性累積 (Capital as Power & Differential Accumulation)** (real-world economics review, issue no. 70)
  - 資本不是生產性實體，而是組織權力的量化指標；企業追求相對於平均水平的「差異性利潤」，中東能源衝突往往與石油公司差異性利潤的下降（差異性去累積）相關，衝突後利潤則回升。
  - Proponents: Shimshon Bichler, Jonathan Nitzan
- **支持-貨幣 Bargaining 理論 (Support-Money Bargaining Theory)** (real-world economics review, issue no. 70)
  - 經濟交換基於個體尋求社會支持（支持 Bargaining）並使用貨幣作為計量工具（貨幣 Bargaining）；資訊不對稱問題源於對「完美資訊」的錯誤假設，現實中資訊是建立議價地位的關鍵。
  - Proponents: Patrick Spread
- **新自由主義全球化與不平等 (Neoliberal Globalization & Inequality)** (real-world economics review, issue no. 70)
  - 全球化本身並非不平等的根源，而是伴隨全球化的新自由主義政策（如放鬆管制、私有化、削弱工會）導致了收入不平等加劇，特別是英語系OECD國家及實施結構調整的發展中國家。
  - Proponents: Mohammad Muaz Jalil
- **穩態經濟的人口視角 (Population Perspective on Steady State Economy)** (real-world economics review, issue no. 70)
  - 經濟活動應視為維持人類及人工製品（耗散結構）人口所需的代謝過程；在有限世界裡，應從追求增長轉向追求足夠性，以最大化長期生命數量。
  - Proponents: Herman Daly
- **補充貨幣理論 (Complementary Currency Theory)** (real-world economics review, issue no. 71)
  - 提出在危機期間引入電子補充貨幣（如TAN或GREC），利用稅收接受度賦予其價值，以激活閒置產能、穩定宏觀經濟，並在不脫離歐元區的情況下增強談判籌碼。
  - Proponents: Trond Andresen, Robert W. Parenteau, Alan Harvey
- **現代貨幣理論視角下的銀行創幣 (Modern Monetary Theory / Bank Money Creation)** (real-world economics review, issue no. 71)
  - 駁斥傳統信貸乘數模型，指出商業銀行通過貸款創造存款貨幣，貨幣供應是內生的，且與實體資產脫鉤時會導致泡沫和危機。
  - Proponents: Ib Ravn, Bank of England (McLeay, Radia & Thomas)
- **官僚集體主義與生態崩潰分析 (Bureaucratic Collectivism & Ecological Collapse)** (real-world economics review, issue no. 71)
  - 分析中國「共產主義-資本主義」混合體系的矛盾，指出國家主導的增長、腐敗和資源掠奪導致了不可持續的環境災難和社會不公。
  - Proponents: Richard Smith
- **方法論制度主義與真實計量經濟學 (Methodological Institutionalism & Realist Econometrics)** (real-world economics review, issue no. 71)
  - 批評新古典理性經濟人假設，主張計量經濟學應基於歷史特定的機構和制度結構，承認開放系統中的準規律性，而非追求普適的封閉系統模型。
  - Proponents: Edward J. Nell, Karim Errouaki, Jamie Morgan
- **地緣政治金融學 (Geopolitical Finance)** (real-world economics review, issue no. 71)
  - 論證國家並非被動受市場支配，而是主動維護金融部門以獲取地緣政治權力，導致國家利益（Staatsvolk）讓位於全球市場利益（Marktvolk）。
  - Proponents: Tijo Salverda, Leo Panitch, Sam Gindin, Wolfgang Streeck
- **政治維度與收入不平等** (real-world economics review, issue no. 72)
  - 美國的收入不平等主要由政治制度和政策（如削弱工會、削減高額所得稅和公司稅）驅動，導致勞動份額下降和財富向上轉移。
  - Proponents: Holger Apel
- **資本積累的虛構與現實** (real-world economics review, issue no. 72)
  - 批評新古典和馬克思主義對「真實資本」與「金融資本」的二元劃分，指出真實資本無法獨立測量，且金融積累與真實積累往往呈反向運動，而非鏡像關係。
  - Proponents: Shimshon Bichler, Jonathan Nitzan
- **有效需求與債務的批判性視角** (real-world economics review, issue no. 72)
  - 質疑史蒂夫·基恩（Steve Keen）關於「有效需求等於收入加債務變化」的恆等式，認為在總體層面上，債務變化與有效需求之間不存在必然的會計關係，且其引入的「債務速度」缺乏理論基礎。
  - Proponents: Severin Reissl
- **薩拉法生產價格理論的批判** (real-world economics review, issue no. 72)
  - 指出薩拉法體系中將固定資本視為中間產品並假設其價值轉移至產品的邏輯矛盾，認為商品本身不生產商品，而是勞動在資本協助下生產商品。
  - Proponents: Christian Flamant
- **全球生產重組與金融化** (real-world economics review, issue no. 72)
  - 解釋拉丁美洲在2000年代的表現是由跨國公司的全球生產鏈重組（以中國為樞紐）以及大宗商品作為金融資產和抵押品的趨勢所驅動的。
  - Proponents: Esteban Pérez Caldentey
- **公共工程與充分就業** (real-world economics review, issue no. 72)
  - 主張重新設計公共工程項目，結合技能培訓與社會包容性，通過乘數效應刺激有效需求，從而對抗失業和貧困，而非僅依賴市場調節。
  - Proponents: Amit Bhaduri, Kaustav Banerjee, Zahra Karimi Moughari
- **Stock-Flow Consistent (SFC) Modeling** (real-world economics review, issue no. 73)
  - A macroeconomic framework emphasizing that every financial asset held by one sector must correspond to a liability in another, ensuring that accounting identities (like savings equals investment) are 
  - Proponents: David R. Richardson, W. Godley, M. Lavoie
- **Neoclassical Economics as Ideology/Religion** (real-world economics review, issue no. 73)
  - The view that neoclassical economics functions as a 'divine belief' or 'technology of power' that legitimizes elite interests, promotes infinite growth, and obscures social and environmental realities
  - Proponents: Emil Urhammer, Michel Gueldry
- **Accumulation and Legitimation Dilemma** (real-world economics review, issue no. 73)
  - A political economy framework suggesting that capitalist states must balance capital accumulation with social legitimation, where institutions like minimum wage in developing contexts serve to maintai
  - Proponents: Rüya Gökhan Koçer, James O'Connor
- **Post-Capitalism via Digital Economy** (real-world economics review, issue no. 73)
  - The theory that the digital economy, characterized by zero marginal cost and collaborative production (e.g., Wikipedia), undermines capitalist profit mechanisms and necessitates a transition to a netw
  - Proponents: Paul Mason (analyzed by Donald Gillies)
- **Keynesian Liquidity Preference Theory** (real-world economics review, issue no. 73)
  - An interpretation of interest rates as a monetary phenomenon determined by policy and liquidity preference, rather than real factors like savings and investment, arguing that high interest rates are t
  - Proponents: John Maynard Keynes (analyzed by Geoff Tily)
- **結構性凱因斯主義 (Structural Keynesianism)** (real-world economics review, issue no. 74)
  - 認為收入不平等導致總需求不足，進而引發金融危機後的停滯；主張以工資為導向的增長模式，並強調金融部門對實體經濟的寄生性影響。
  - Proponents: Thomas I. Palley
- **推論最佳解釋 (Inference to the Best Explanation / Abduction)** (real-world economics review, issue no. 74)
  - 批評主流經濟學過度依賴演繹法與公理化模型，主張科學推理應基於「最佳解釋」，以應對現實世界的不確定性與複雜性，而非追求形式邏輯的一致性。
  - Proponents: Lars Pålsson Syll
- **政治經濟學 (Political Economy)** (real-world economics review, issue no. 74)
  - 主張挑戰新古典主義壟斷，強調經濟學 inherently 具有政治性與價值觀，建議以跨學科的政治經濟學框架取代狹義的異端經濟學，以增強公共影響力。
  - Proponents: Frank Stilwell
- **自然資本隱喻批判 (Critique of Natural Capital Metaphor)** (real-world economics review, issue no. 74)
  - 指出將自然資源視為「資本」並納入新古典生產函數在理論上是錯誤的，因為資本衡量受分配影響（重新開關現象），且一般均衡理論無法保證穩定性。
  - Proponents: Alejandro Nadal

### === KEY CONCEPTS ===
- **Speculation vs. Investment** (The Art of Speculation by Philip L. Carret)
  - Speculation is defined as buying or selling securities in expectation of profiting from price fluctuations, whereas investment focuses on income and principal preservation. However, the text argues th
- **Pyramiding** (The Art of Speculation by Philip L. Carret)
  - A strategy of using borrowed money to buy more stock as prices rise, increasing equity exposure. While it amplifies profits in bull markets, it exposes traders to catastrophic losses during correction
- **Short Selling** (The Art of Speculation by Philip L. Carret)
  - Selling borrowed securities with the intent to buy them back later at a lower price. The text argues this is essential for market liquidity and stability, preventing bubbles and providing exit mechani
- **Current Ratio** (The Art of Speculation by Philip L. Carret)
  - The ratio of current assets to current liabilities. A standard benchmark is 2:1, though the text notes this varies by industry and that the composition of current assets (e.g., quality of receivables)
- **Trading on the Equity** (The Art of Speculation by Philip L. Carret)
  - Using a capital structure with significant debt or preferred stock relative to common equity. This magnifies the percentage return (and risk) on common stock when earnings change slightly.
- **Money Capital (M)** (Capital Vol. II (Marx))
  - Capital in the form of money, advanced to purchase means of production and labor power.
- **Productive Capital (P)** (Capital Vol. II (Marx))
  - Capital engaged in the production process, combining labor power and means of production to create surplus value.
- **Commodity Capital (C')** (Capital Vol. II (Marx))
  - The finished product containing both the advanced capital value and surplus value, awaiting sale.
- **Surplus Value (s/m)** (Capital Vol. II (Marx))
  - The value created by workers in excess of the value of their labor power, appropriated by the capitalist.
- **Wear and Tear** (Capital Vol. II (Marx))
  - The gradual transfer of the value of fixed capital (machinery, buildings) to the product over time.
- **停損單 (Stop Orders)** (How I trade and invest in stocks and bonds)
  - 一種預設的賣出指令，當價格跌至特定水平時自動執行，旨在限制投資者的潛在虧損。Wyckoff強調每筆交易都應配備兩到三個點的停損。
- **攤平成本 (Averaging Down)** (How I trade and invest in stocks and bonds)
  - 在價格下跌時繼續買入以降低平均成本。Wyckoff認為這通常是危險的，因為如果基本面惡化，這會導致更大的虧損；他建議只在確認內在價值增加且市場超賣時才考慮此策略。
- **技術性位置 (Technical Position)** (How I trade and invest in stocks and bonds)
  - 指股票在市場中的供需狀態。強技術性位置意味著買盤強勁、賣壓輕微（如籌碼被內部人持有）；弱技術性位置則意味著買盤枯竭或拋售壓力大。
- **設備信託債券 (Equipment Trust Bonds)** (How I trade and invest in stocks and bonds)
  - 由鐵路公司等發行，以機車或車輛等具體設備作為擔保的債券。隨著償還進行，擔保物價值相對於未償債務的比例增加，因此被視為極其安全的投資工具。
- **複利再投資 (Reinvestment of Income)** (How I trade and invest in stocks and bonds)
  - 將股息、紅股或權利不取出消費，而是立即重新投資於同一類證券中，以實現本金和收益的指數級增長。
- **Time Element** (howtotradeinstoc0000live.html)
  - The duration or timing aspect of a market move, considered equally important as price in Livermore's strategy.
- **Price** (howtotradeinstoc0000live.html)
  - The monetary value at which a stock trades, analyzed in conjunction with time to identify trends.
- **Intrinsic Value** (Security Analysis (1940))
  - The value of a security justified by its underlying facts, such as assets, earnings, dividends, and definite prospects, as distinct from market quotations which may be distorted by manipulation or psy
- **Fixed-Value Investment** (Security Analysis (1940))
  - Investments where prospective change in value holds minor importance, and the owner's dominant interest is in safety of principal and steady income (e.g., high-grade bonds and preferred stocks).
- **Earnings Coverage** (Security Analysis (1940))
  - The ratio of earnings to interest charges, used as a primary test of safety. The text recommends using the 'total-deductions' or 'over-all' method, including all fixed charges, rather than deducting p
- **Stock-Value Ratio** (Security Analysis (1940))
  - The ratio of the market value of stock issues to the total funded debt, used as a supplemental quantitative test of safety, especially for industrial bonds, to ensure a substantial margin of going-con
- **Prior-Deductions Method** (Security Analysis (1940))
  - A misleading method of calculating interest coverage where prior charges are deducted from earnings before calculating the coverage for junior issues, falsely implying junior issues are better protect
- **Accumulation Zone** (Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)
  - A period where institutional investors or 'smart money' buy large quantities of stock, typically characterized by narrow price ranges and low volume, signaling a potential upward trend.
- **Distribution Zone** (Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)
  - A period where insiders sell their holdings to the public, often characterized by high volume, wide fluctuations, and optimistic news, signaling a potential downward trend.
- **Stop Loss Order** (Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)
  - An order placed with a broker to sell a security if it reaches a specific price, designed to limit an investor's loss on a position.
- **Pyramiding** (Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)
  - A strategy of adding to a winning position by buying more as the price moves in the trader's favor, while simultaneously raising stop-loss orders to protect profits.
- **Resistance Levels** (Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)
  - Specific price points where a stock has historically faced selling pressure, preventing it from rising further. Breaking above these levels often signals strong upward momentum.
- **Floating Supply** (Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)
  - The number of shares available for trading in the market. Stocks with low floating supply are easier to manipulate and can move more dramatically with less volume.
- **診斷性預期 (DE)** (WP/24/132)
  - 預期形成的一種偏差，代理人基於代表性啟發法，過度權重與當前新聞最相似的過去狀態，導致對衝擊的過度反應。
- **金融加速器 (FA)** (WP/24/132)
  - 透過抵押品價值（如房價）與借貸能力之間的聯繫，將貨幣或需求衝擊放大並傳導至實體經濟的機制。
- **債務通縮通道 (Debt Deflation Channel)** (WP/24/132)
  - 在供給衝擊下，物價上漲降低實際債務負擔，緩解借款人壓力，從而緩衝經濟衝擊的機制；在DE下此通道更強。
- **診斷性參數 (Diagnosticity Parameter, θ)** (WP/24/132)
  - 衡量預期對「驚喜」（surprise）過度反應程度的參數，θ=0為理性預期，θ>0表示存在診斷性預期偏差。
- **政策邊際替代率惡化** (WP/24/132)
  - 引入DE後，央行面臨的通貨膨脹與產出波動之間的權衡關係變差，即在相同通脹波動下，產出波動更大。
- **有限狀態馬可夫鏈 (Finite State Markov Chains)** (WP/24/229)
  - 用於建模國家在不同收入或生產率類別之間遷移概率的統計方法，假設下一狀態僅取決於當前狀態，可用於計算穩態分佈和預期退出時間。
- **相對TFP (Relative TFP)** (WP/24/229)
  - 以美國為基準的全要素生產率指標，被識別為導致低收入國家無法追趕發達國家的主要瓶頸。
- **穩態分佈 (Stationary Distribution)** (WP/24/229)
  - 在馬可夫過程中，當時間趨於無窮時，系統在各個狀態間的概率分佈達到平衡的狀態，用於預測長期經濟結構。
- **平均退出時間 (Mean Time to Exit, MET)** (WP/24/229)
  - 一個國家從某個特定收入或生產率類別（特別是最低類別）遷移到其他類別所需的預期年數，用於量化「陷阱」的深度。
- **常數增長閾值 (Constant Growth Thresholds)** (WP/24/229)
  - 定義收入類別邊界的標準，確保以恆定相對增長率增長的國家在 traversing 各個類別時所花費的時間相同，從而避免分類偏差。
- **內生固有指數化 (Endogenous Intrinsic Indexation)** (WP/24/260)
  - 價格和工資設定中向過去通膨指數化的比例並非固定，而是隨著通膨持續高於目標水平而增加，從而導致通膨持久性在通膨高企時自我強化。
- **未觀察成分表示法 (Unobserved Components Representation)** (WP/24/260)
  - 將成本推動衝擊分解為暫時性成分和持久性成分，但決策者只能觀察到兩者的總和，需透過統計方法進行分離估計。
- **忽視政策 (Looking Through)** (WP/24/260)
  - 貨幣政策策略，指中央銀行在面對暫時性供給衝擊時，不立即調整利率以對抗通膨，因為預期通膨壓力會迅速消散。
- **最後一哩路 (Going the Last Mile)** (WP/24/260)
  - 指中央銀行採取緊縮立場以將通膨快速帶回目標水平的過程；模型顯示此過程在非線性框架下具有高昂的經濟產出代價。
- **狀態依賴放大 (State-Dependent Amplification)** (WP/24/260)
  - 當經濟活動強勁且初始通膨較高時，相同規模的成本推動衝擊會引發更大幅度的通膨上升。
- **供給側衝擊 (Supply-side Shocks)** (WP/25/95)
  - 天氣相關衝擊（如乾旱、洪水）主要影響農業產出和食品價格，導致物價上漲同時產出下降，形成滯脹風險。
- **二階效應 (Second-round Effects)** (WP/25/95)
  - 初始的食品價格衝擊透過相對價格溢出或通膨預期脫鉤，擴散至非食品（核心）通膨，迫使央行介入。
- **政策前線 (Policy Frontiers)** (WP/25/95)
  - 描繪中央銀行在控制通膨波動與穩定產出/匯率波動之間所面臨的權衡取捨集合。
- **貨幣政策可信度渠道 (Monetary Policy Credibility Channel)** (WP/25/95)
  - 一個機制，其中通膨預期不僅基於理性預期，還受到過去通膨偏離目標程度的累積影響，反映央行信譽。
- **連接國 (Connector Countries)** (WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)
  - 被認為能通過橋接中美貿易裂痕而受益的國家，通常表現為對美出口增加且同時從中國進口增加。
- **國外吸收附加值 (Abroad-Absorbed Value Added)** (WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)
  - 指中國生產的附加值被其他國家國內最終需求（消費和投資）所吸收的部分，用於衡量該國國內市場規模對中國出口的吸引力。
- **合成控制法 (Synthetic Control Approach)** (WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)
  - 一種計量經濟方法，通過構建一個由樣本中其他單位加權平均而成的「合成」反事實基準，來評估干預措施（如貿易戰）的因果效應。
- **戰略部門 (Strategic Sectors)** (WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)
  - 受中美貿易戰影響最大的行業，本文主要關注電氣機械業以及石油、化學和非金屬礦物製品業。
- **運營強度指數 (OSI)** (WP/25/219)
  - 衡量稅務行政實踐、制度框架和結構基礎整體強度的綜合指標，基於國際稅收行政調查（ISORA）數據及專家權重構建。
- **國際稅收行政調查 (ISORA)** (WP/25/219)
  - 由國際組織合作進行的自評調查，涵蓋稅務行政的多個實踐和結構基礎指標，用於構建OSI。
- **Delphi方法** (WP/25/219)
  - 一種結構化溝通技術，通過多輪專家問卷徵集意見，用於確定稅務行政各子指標在增加稅收方面的相對重要性權重。
- **全職當量 (FTE)** (WP/25/219)
  - 用於量化國際貨幣基金組織（IMF）財政事務部在稅務行政領域的能力發展項目強度的指標，作為工具變數。
- **非正式經濟 (Informality)** (WP/25/219)
  - 指未納入正規稅收體系的经济活動比例，高非正式經濟會削弱稅務行政強化帶來的稅收增益。
- **財政衝擊識別 (Narrative Approach)** (IMF_WP_25_231.pdf)
  - 通過分析預算文件來識別出旨在減少預算赤字而非回應經濟週期變化的財政政策變動，以排除被動變化。
- **經週期調整後的基本餘額 (Cyclically-Adjusted Primary Balance)** (IMF_WP_25_231.pdf)
  - 用於更精確衡量財政政策轉向的指標，排除了商品價格波動和週期性條件變化對財政狀況的影響。
- **主權風險溢價 (Sovereign Risk Premium)** (IMF_WP_25_231.pdf)
  - 市場對國家違約風險的感知，通常以主權利差（如EMBI）衡量，會影響財政政策向通膨預期傳導的力度。
- **匯率彈性 (Exchange Rate Flexibility)** (IMF_WP_25_231.pdf)
  - 固定或較低彈性的匯率制度下，財政緊縮對通膨預期的影響通常大於完全浮動的匯率制度。
- **無謂損失 (Excess Burden)** (WP/25/255)
  - 因稅收導致的經濟效率損失，即社會為獲取稅收收入所付出的額外成本，文中量化為稅收收入的約35%。
- **替代效應 (Substitution Effect)** (WP/25/255)
  - 用戶在稅收增加後，從被課稅的移動貨幣轉向未課稅的銀行轉賬或現金的行為。
- **平均成本效應 (Average-Cost Effect)** (WP/25/255)
  - 稅收提高了整體交易成本，導致部分用戶放棄進行轉移交易（廣泛邊際反應），這對無銀行帳戶用戶的影響更大。
- **非正式經濟 (Informality)** (WP/25/255)
  - 由於移動貨幣稅促使用戶回歸現金交易，導致經濟活動脫離電子追蹤，增加了稅務徵管的難度。
- **價格彈性 (Price Elasticity)** (WP/25/255)
  - 衡量移動貨幣交易量對稅收引發的價格變動的敏感程度，文中估算喀麥隆的短期價格彈性約為-2.1。
- **実質中立金利** (OECD Economic Outlook, May 2024, No. 115)
  - 金融政策の立場が景気に対して緩やかでも厳しくもないとされる実質短期金利の長期的均衡値。現在の推定範囲は先進国で-1%から2%程度とばらつきが大きい。
- **単位労働コスト（Unit Labour Costs）** (OECD Economic Outlook, May 2024, No. 115)
  - 生産量1単位あたりの労働コスト。インフレが持続的に2%に収束するためには、この上昇率が許容範囲内におさまる必要がある。
- **超過家計貯蓄（Excess Household Savings）** (OECD Economic Outlook, May 2024, No. 115)
  - パンデミック期間中に蓄積された、通常水準を超えた家計の貯蓄残高。これが消費を後押しするか、あるいは減少すればインフレ圧力になるか不確実性が高い。
- **量的緊縮（Quantitative Tightening, QT）** (OECD Economic Outlook, May 2024, No. 115)
  - 中央銀行が保有する債券資産を償却または売却し、バランスシートを縮小させる政策。金融条件を引き締め、長期金利に上昇圧力をかける可能性がある。
- **投資缺口 (Investment Gap)** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - 指實際商業投資相對於基於產出增長預測的投資水平的 shortfall（不足）。OECD估計，自全球金融危機以來，平均投資缺口約為預測投資水平的17%，在部分國家超過30%。
- **使用者資本成本 (User Cost of Capital, UCC)** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - 衡量持有和使用資本的成本，考慮了借貸成本、相對價格、稅收和折舊。儘管UCC在過去幾十年呈下降趨勢，但投資並未相應增加，顯示其他因素起主導作用。
- **托賓Q (Tobin's Q)** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - 公司市場估值與資產重置成本的比率。當Q大於1時，市場預期新投資的回報高於成本。儘管美國和部分斯堪的納維亞國家的托賓Q持續高於1，但實體投資依然疲軟。
- **門檻率 (Hurdle Rates)** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - 企業在進行投資決策時要求的最低預期回報率。報告指出，門檻率與資本成本之間的差距擴大，反映了企業對不確定性和風險的擔憂，以及市場集中度提高導致的競爭壓力減弱。
- **被動投資 (Passive Investing)** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - 追蹤市場基準回報的投資策略。被動投資的增長導致市場集中度提高，增加了股價的同步性，可能在負面衝擊下放大系統性風險。
- **Economic Dynamism** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - Encompasses firm entry rates, job reallocation, and worker mobility; a decline in dynamism is linked to lower productivity growth and reduced wage bargaining power.
- **Regulatory Compliance Costs** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - Resources (labor and capital) diverted from productive activities to ensure adherence to regulations; estimated to consume ~4% of the US wage bill.
- **Non-Bank Financial Intermediaries (NBFIs)** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - Financial entities like hedge funds and private credit firms that have grown rapidly and are increasingly interconnected with traditional banks, posing systemic stability risks.
- **Neutral Real Interest Rate (r*)** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - The real interest rate consistent with full employment and stable inflation; projected to converge to this level as monetary policy normalizes.
- **Front-loading** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - The phenomenon where firms accelerate imports or production ahead of anticipated tariff increases, temporarily boosting trade volumes before a subsequent decline.
- **現值折現 (Discounting)** (post-autistic economics review, issue no. 44)
  - 將未來成本與效益轉換為當前價值的計算方法；在氣候變遷議題中，高折現率會嚴重低估未來災難的損失。
- **外部性 (Externalities)** (post-autistic economics review, issue no. 44)
  - 市場交易對第三方產生的未定價影響；傳統經濟學將其視為可內部化的個別問題，但氣候變遷被視為系統性、混沌且難以貨幣化的整體危機。
- **華盛頓共識 (Washington Consensus)** (post-autistic economics review, issue no. 44)
  - 一組強調自由市場、私有化、貿易自由化與財政紀律的政策包，被批評為忽視發展中國家具體情境的意識形態工具。
- **次級房貸與衍生性金融商品** (post-autistic economics review, issue no. 44)
  - 包括RMBS（住房抵押支持證券）與CDO（擔保債務憑證），透過層級化（Tranching）分散風險，卻因基礎資產質量惡化與評級機構利益衝突而導致系統性崩潰。
- **投入產出模型 (Input-Output Model)** (post-autistic economics review, issue no. 44)
  - 用於分析產業間相互依賴關係的經濟模型，此處用於比較軍事支出與國內公共支出對就業數量與品質的不同影響。
- **能力自由 (Freedom-as-Capability)** (real-world economics review, issue no. 45)
  - 指個人實際上擁有實現各種生活狀態的自由，強調社會應確保弱勢群體具備應對風險（如氣候災害）的實質資源和能力。
- **貧困天氣風險稅 (Poverty Weather Risk Tax)** (real-world economics review, issue no. 45)
  - 一種政策建議，要求保險費率反映弱勢群體對氣候風險的脆弱性，並將收益用於改善貧困社區的基礎設施安全。
- **碳定價與紅利回收 (Carbon Pricing and Dividend Recycling)** (real-world economics review, issue no. 45)
  - 對溫室氣體排放定價，並將徵收的收入以人均或家庭為單位重新分配給公眾，以抵消對低收入家庭的負面影響並減少政治阻力。
- **同行評審的局限性 (Limitations of Peer Review)** (real-world economics review, issue no. 45)
  - 現行的「事前頂層向下」同行評審系統被批評為效率低下、延誤創新發表，且容易產生偏見，建議轉向「事後底層向上」的開放獲取評論系統。
- **專業服務貿易壁壘 (Barriers to Professional Services Trade)** (real-world economics review, issue no. 45)
  - 指保護醫生、律師等高收入職業免受國際競爭的法律和實務障礙，消除這些壁壘可降低服務價格並減少不平等。
- **次級房貸 (Subprime Mortgages)** (real-world economics review, issue no. 46)
  - 發放給信用歷史較差、收入不穩定或資產證明不全的借款人的貸款，通常利率較高，在危機前佔比急劇上升。
- **可調整利率抵押貸款 (ARMs)** (real-world economics review, issue no. 46)
  - 初期利率極低但隨後會重置為較高水平（如「2-28」貸款），是引發違約潮的主要工具之一。
- **擔保債務憑證 (CDOs)** (real-world economics review, issue no. 46)
  - 將多種債務資產（如MBS）打包並分层（Tranches）發行的複雜金融衍生品，通過模型賦予高評級，掩蓋了底層資產的高風險。
- **艾斯林悖論 (Easterlin Paradox)** (real-world economics review, issue no. 46)
  - 指國家整體財富增長並未帶來國民平均幸福感相應提升的現象，但在本文中被批評為統計方法不當所致。
- **碳權交易 (Carbon Cap and Trade)** (real-world economics review, issue no. 46)
  - 一種環境經濟政策，通過設定排放上限並允許許可證交易，旨在以市場機制減少溫室氣體排放，同時為發展中國家提供資金轉移。
- **第一類錯誤 (Type I Error)** (real-world economics review, issue no. 47)
  - 統計學概念，指錯誤地接受一個虛假命題。在科學經濟學中，強調最小化此錯誤以避免基於錯誤前提的理論積累。
- **因果機制 (Causal Mechanisms)** (real-world economics review, issue no. 47)
  - 解釋觀察結果如何產生的具體過程或機制，相較於靜態的均衡狀態分析，更受推崇為科學研究的對象。
- **能力 (Capabilities)** (real-world economics review, issue no. 47)
  - Sen提出的概念，指個人實現各種功能（functionings）的實質自由，是評估福祉和發展的核心指標，而非僅看收入或效用。
- **脆弱性 (Vulnerability)** (real-world economics review, issue no. 47)
  - 個體或家庭陷入貧困或貧困加劇的可能性（下行風險），由對壓力的暴露程度和應對能力決定。
- **LIBOR (倫敦銀行間同業拆借利率)** (real-world economics review, issue no. 47)
  - 全球金融市場的基準利率，約300萬億美元的合約依賴此數值，其計算基於銀行報價而非實際交易，對金融穩定至關重要。
- **消極自由 vs. 積極自由 (Negative vs. Positive Liberty)** (real-world economics review, issue no. 47)
  - 消極自由指免受干涉的狀態（如市場交易自由）；積極自由指擁有實現特定目標的能力或資源（如受教育、就業權）。
- **市場原教旨主義 (Market Fundamentalism)** (real-world_economics_review_issue_48.pdf)
  - 一種意識形態信念，認為追求自身利益應不受限制，市場應自由化且無需監管，忽視了市場失靈和系統性風險。
- **預警原則 (Precautionary Principle)** (real-world_economics_review_issue_48.pdf)
  - 在面對極端、不可逆轉且發生概率難以精確測量的災難性風險時，政策制定應優先考慮風險減免，而非僅依賴成本效益分析。
- **有限理性 (Bounded Rationality)** (real-world_economics_review_issue_48.pdf)
  - 個人在決策時受信息不完全、認知能力和時間的限制，無法達到新古典經濟學假設的完美理性狀態。
- **道德風險 (Moral Hazard)** (real-world_economics_review_issue_48.pdf)
  - 當個體或機構知道如果出現問題將獲得救助時，他們更有可能採取高風險行為的現象。
- **一般均衡理論缺陷** (real-world_economics_review_issue_48.pdf)
  - 傳統理論假設完全競爭、完全信息和帕累托最優，但現實中存在信息不對稱、巨頭壟斷權力以及公共物品無法通過市場有效配置的問題。
- **大緩和 (The Great Moderation)** (real-world economics review, issue no. 49)
  - 指1980年代中期至2007年間宏觀經濟波動性降低的時期，作者們認為這只是通過增加債務和忽視金融不穩定性所創造的人為平靜。
- **金融化 (Financialization)** (real-world economics review, issue no. 49)
  - 指金融市場和金融機構對經濟政策和國內商業運營的影響日益增強，導致利潤追求優先於生產性投資，並加劇了收入不平等。
- **非正式經濟 (Non-formal Economy)** (real-world economics review, issue no. 49)
  - 包括非正規、非法及額外國家控制的經濟活動，這些活動雖未被GDP等指標捕捉，但與正式經濟緊密相連並產生重大影響。
- **結構性無責任 (Structural Irresponsibility)** (real-world economics review, issue no. 49)
  - 指當前金融積累模式內部的特徵，即為了短期利潤最大化而剝削制度基礎和信任，導致系統性不穩定。
- **主觀幸福感 (Subjective Well-being/Happiness)** (real-world economics review, issue no. 49)
  - 用於衡量經濟福祉的指標，關於其時間序列數據是否包含有意義的信號還是僅為採樣誤差存在學術爭議。
- **明斯基時刻 (Minsky Moment)** (real-world economics review, issue no. 50)
  - 當債務水平達到不可持續點，資產價格崩盤導致流動性枯竭，迫使投資者拋售資產以償還債務，從而引發系統性危機的時刻。
- **順週期信貸 (Procyclical Credit)** (real-world economics review, issue no. 50)
  - 信貸供給隨經濟擴張而增加、隨收縮而減少的現象。在新自由主義時代，這主要通過資產價格與銀行資本充足率的互動來實現。
- **槓桿率管理 (Leverage Ratio Management)** (real-world economics review, issue no. 50)
  - 投資銀行為了維持固定的槓桿比率（資產/權益），在資產價格上漲時增加借貸購買更多資產，在價格下跌時被迫拋售資產償債，從而放大市場波動。
- **影子銀行體系 (Shadow Banking System)** (real-world economics review, issue no. 50)
  - 不受傳統銀行監管約束但執行類似銀行功能（如期限轉換、信貸創造）的金融機構和市場活動總稱，包括對沖基金、特殊目的載體 (SPVs) 和貨幣市場基金。
- **遍歷性 vs. 非遍歷性 (Ergodic vs. Non-ergodic)** (real-world economics review, issue no. 50)
  - 遍歷性指時間平均等於集合平均，可用歷史數據預測未來；非遍歷性指系統結構隨時間變化，歷史數據無法可靠預測未來不確定性，這是凱恩斯主義與新古典主義的根本分歧。
- **三重出血 (Triple Hemorrhage)** (real-world economics review, issue no. 50)
  - 指美國新自由主義全球化模式導致的三種資源流失：進口支出導致的需求漏出、製造業工作崗位外移、以及國內投資和工業能力的流失。
- **技能偏向型技術變遷 (Skills-Biased Technical Change)** (real-world economics review, issue no. 51)
  - 主流解釋認為技術進步增加了對高技能勞動力的需求從而導致不平等，本文作者認為此觀點忽視了政治權力和政策的作用。
- **僱傭任意制 (Employment at Will)** (real-world economics review, issue no. 51)
  - 美國勞工法律原則，允許僱主無理由解僱員工，削弱了勞工的保障和談判籌碼，是導致不平等的重要制度因素。
- **管理會計相關性喪失 (Relevance Lost)** (real-world economics review, issue no. 51)
  - H. Thomas Johnson提出的概念，指傳統管理會計過於關注財務結果和標準成本差異，忽視了生產過程中的實際效率和質量改進。
- **管理手段 vs. 管理結果 (Management by Means vs. Results)** (real-world economics review, issue no. 51)
  - 對比美國企業的「結果導向」（關注財務指標）與豐田的「手段導向」（關注流程優化），後者被認為能帶來更持久的競爭力。
- **金融化 (Financialization)** (real-world economics review, issue no. 51)
  - 經濟活動日益由金融部門、金融市場和金融精英主導的過程，特徵是資產價格膨脹、債務增加和股東價值最大化優先於實體投資。
- **指數投機 (Index Speculation)** (real-world economics review, issue no. 51)
  - 機構投資者通過期貨市場複製商品指數表現，這種「買入並持有」策略被認為扭曲了大宗商品價格，使其脫離供需基本面。
- **順週期政策 (Procyclical Policy)** (real-world economics review, issue no. 51)
  - 在經濟衰退期間實施緊縮財政或貨幣政策的行為，IMF被批評在危機期間對借款國採取了此類加劇衰退的政策。
- **代表性個體 (Representative Agent)** (real-world economics review, issue no. 51)
  - 宏觀經濟模型中假設所有個體行為一致的代表性代理人，Alan Kirman批評此假設忽略了異質性和互動效應，導致模型失效。
- **Shock Therapy** (real-world_economics_review_issue_52.pdf)
  - A rapid, comprehensive transition to market institutions (e.g., voucher privatization, price liberalization) advocated for post-socialist countries, criticized here for ignoring local realities and de
- **De Facto Property Rights** (real-world_economics_review_issue_52.pdf)
  - Rights established through actual use and social recognition (e.g., squatter's rights, worker self-management) that exist independently of formal legal titles; pragmatic reform should formalize these 
- **Cargo Cult Legal Reforms** (real-world_economics_review_issue_52.pdf)
  - The superficial adoption of advanced legal and institutional frameworks from developed nations without the underlying social capital, expertise, or evolutionary history to support them.
- **Parallel Experimentation** (real-world_economics_review_issue_52.pdf)
  - A pragmatic strategy where multiple decentralized trials are conducted simultaneously to learn under conditions of uncertainty, allowing successful models to diffuse horizontally.
- **Performative Economics** (real-world_economics_review_issue_52.pdf)
  - The idea that economic theories do not just describe reality but actively shape it; in finance, theories like Black-Scholes were used to create markets that conformed to their assumptions.
- **Minsky Moment vs. Keynes Moment** (real-world_economics_review_issue_52.pdf)
  - While a Minsky moment refers to the collapse of Ponzi finance, a Keynes moment refers to the sudden reversal of conventional expectations and animal spirits that drives the panic.
- **Hyper-connectivity** (real-world economics review, issue no. 53)
  - A state where decentralized sub-systems (like electronic trading venues) are highly interconnected technologically but lack synchronized governance, leading to potential systemic fragility.
- **Liquidity Refreshment Points (LRPs)** (real-world economics review, issue no. 53)
  - Mechanisms on the NYSE that slow trading in individual stocks to dampen volatility, which can inadvertently route orders to less liquid satellite exchanges during a crash.
- **Social Cost of Carbon (SCC)** (real-world economics review, issue no. 53)
  - The estimated economic damage caused by emitting one additional ton of carbon dioxide, used to guide climate policy and regulation.
- **Sovereign Currency Issuer** (real-world economics review, issue no. 53)
  - A government that issues its own non-convertible fiat currency, which theoretically cannot run out of money or be forced into involuntary default on debt denominated in its own currency.
- **Atomism** (real-world economics review, issue no. 53)
  - The neoclassical assumption that individual firms do not react strategically to the actions of other firms, which critics argue is mathematically incompatible with downward-sloping market demand curve
- **自由市場信奉者 (Believers in Laissez-Faire, BLF)** (real-world economics review, issue no. 54)
  - 指那些堅信市場效率、反對政府干預的新古典、實際商業週期理論家及部分新凱恩斯主義者。文章認為他們在危機後表現出認知失調症狀。
- **社區再投資法案 (CRA)** (real-world economics review, issue no. 54)
  - 1977年美國通過的法律，旨在消除歧視性貸款。BLF常將其視為次貸危機的主因，但實證數據顯示CRA相關貸款在危機中佔比極小，此誤解被視為認知失調的證據。
- **信貸衝動 (Credit Impulse)** (real-world economics review, issue no. 54)
  - 定義為債務變化量除以GDP。用於衡量債務動態對總需求和就業的影響，特別是用於解釋去槓桿過程中經濟動能的變化。
- **HILFOs (High-Impact, Low-Frequency Outcomes)** (real-world economics review, issue no. 54)
  - 高影響、低頻率事件。指那些發生概率極低但一旦發生影響巨大的事件（如黑天鵝事件），傳統概率模型難以預測。
- **內生貨幣 vs. 外生貨幣** (real-world economics review, issue no. 54)
  - 內生貨幣認為貨幣供應由銀行信貸需求和經濟活動決定；外生貨幣認為可由中央銀行或國家主權控制。文章主張後者對於實現社會目標更有意義。
- **充足經濟 (Sufficiency Economy)** (real-world economics review, issue no. 54)
  - 一種以滿足人類基本生活質量需求為目標，而非追求無限增長或利潤最大化的經濟模式，強調生態可持續性和社會正義。
- **代表性代理人模型 (Representative-Agent Model)** (real-world_economics_review_issue_55.pdf)
  - 宏观经济学中简化分析的假设，将整个经济体视为由一个具有相同偏好和行为的个体组成，忽略了异质性和分配效应。
- **债务负担 (Debt Overhead)** (real-world_economics_review_issue_55.pdf)
  - 指经济体中未偿还债务的总量及其利息支付义务，当债务增长超过收入增长时，会导致资源从生产性投资转向偿债，引发经济收缩。
- **开放系统与封闭系统** (real-world_economics_review_issue_55.pdf)
  - 开放系统指受历史、制度和不确定的影响，因果关系复杂且非线性的社会现实；封闭系统是模型假设的理想化状态，变量间关系稳定可预测。
- **基数货币与影子货币** (real-world_economics_review_issue_55.pdf)
  - 在量化宽松背景下，央行创造的基础货币并未主要流入实体经济信贷，而是转化为金融资产价格膨胀或跨境套利资金。
- **机会成本 (Opportunity Cost)** (real-world_economics_review_issue_55.pdf)
  - 为了生产某种商品而放弃的其他最有价值的替代品的价值，是比较优势理论的核心计算基础。
- **買辦資產階級 (Comprador Bourgeoisie)** (real-world economics review, issue no. 56)
  - 指阿拉伯世界中與美國帝國主義利益勾結的統治精英，他們通過控制國家資源和壓迫工人階級來獲取租金，阻礙了真正的經濟發展和社會革命。
- **聯合假說問題 (Joint Hypothesis Problem)** (real-world economics review, issue no. 56)
  - 在測試市場效率時，任何實證檢驗都同時檢驗了市場效率假說和資產定價模型（均衡模型）；如果結果不符，無法區分是市場無效還是模型錯誤，導致假說難以被證偽。
- **監管俘獲 (Regulatory Capture)** (real-world economics review, issue no. 56)
  - 監管機構被其旨在監管的行業所控制或影響，導致政策偏向行業利益而非公共利益，冰島金融危機中即出現此現象，監管人員與銀行界人員流動頻繁且利益一致。
- **有界理性 (Bounded Rationality)** (real-world economics review, issue no. 56)
  - 赫伯特·西蒙提出的概念，指出經濟代理人的認知能力、信息和時間有限，因此他們尋求「滿意」而非「最優」解，挑戰了新古典經濟學中完全理性的假設。
- **U-3 與 U-5 失業率** (real-world economics review, issue no. 56)
  - U-3為官方標準失業率；U-5則包含U-3加上喪失信心不再尋找工作的人。在歐盟國家，U-5與U-3的差距較大，更能反映真實的勞動力閒置狀況。
- **金融投機稅 (Financial Speculation Tax, FST)** (real-world economics review, issue no. 56)
  - 對股票、期權、信用違約互換等金融工具的交易徵收稅賦，旨在減少投機性交易、降低金融部門租金、增加政府收入並促進社會平等。
- **Credit Accelerator** (Real-World Economics Review, Issue 57 (2011))
  - The second derivative of private debt with respect to time (change in the change in debt), normalized by GDP. It predicts changes in asset prices and unemployment with a lead time.
- **FIRE Sector** (Real-World Economics Review, Issue 57 (2011))
  - Finance, Insurance, and Real Estate. Described as a parasitic class that extracts wealth through interest and rent without contributing to productive capacity, often influencing policy to favor debt p
- **Secrecy Jurisdictions** (Real-World Economics Review, Issue 57 (2011))
  - Legal domains (tax havens) that provide anonymity and regulatory arbitrage, undermining national tax bases and facilitating capital flight and illicit financial flows.
- **Debt Deflation** (Real-World Economics Review, Issue 57 (2011))
  - A process where high debt burdens force asset sales to repay loans, depressing prices, which in turn increases the real value of debt, creating a vicious cycle of contraction.
- **Methodological Fallacies** (Real-World Economics Review, Issue 57 (2011))
  - Errors in econometrics including measurement ambiguity (e.g., how inequality is defined), data mining (p-hacking), publication bias (ignoring null results), and the Duhem-Quine problem (testing hypoth
- **資產負債表衰退 (Balance Sheet Recession)** (real-world economics review, issue no. 58)
  - 一種特殊的衰退類型，特徵是私人部門集體進行債務償還和去槓桿，導致信貸需求消失，貨幣政策失效，經濟陷入通縮螺旋。
- **特里芬難題 (Triffin Dilemma)** (real-world economics review, issue no. 58)
  - 作為國際儲備貨幣發行國，美國必須通過經常賬戶赤字向世界提供流動性，但這長期下來會削弱對該貨幣的信心，導致體系不穩定。
- **金融化 (Financialization)** (real-world economics review, issue no. 58)
  - 金融部門在經濟中相對重要性的增加，伴隨著衍生品擴張、證券化和槓桿率上升，導致經濟結構變得更加脆弱和不穩定。
- **方法論個人主義 (Methodological Individualism)** (real-world economics review, issue no. 58)
  - 主流經濟學的核心假設，認為所有社會現象都應還原為個體行為。批評者認為這忽略了宏觀結構、制度和歷史背景，導致經濟學脫離現實。
- **最後貸款人 (Lender of Last Resort)** (real-world economics review, issue no. 58)
  - 中央銀行在金融危機期間向市場提供流動性的角色。在歐元區危機中，批評者認為歐洲央行未能充分履行此職責，因為其成員國並非貨幣發行主權實體。
- **雇主最後選擇 (Employer of Last Resort, ELR)** (real-world economics review, issue no. 58)
  - 由明斯基派提出的政策建議，政府承諾為所有願意且能夠工作的人提供就業機會，以實現充分就業並作為自動穩定器。
- **遍历性公理 (Ergodic Axiom)** (real-world economics review, issue no. 59)
  - 主流经济学假设经济系统遵循稳定的统计规律，过去的历史数据可以可靠地预测未来，Davidson等人认为这在充满根本不确定性的现实世界中是错误的。
- **支持-议价 (Support-Bargaining)** (real-world economics review, issue no. 59)
  - Spread提出的概念，指个体和团体为了获得安全感和社会认同而调整观点和行为的过程，经济学的范式更迭被视为一种智力层面的支持博弈。
- **监管俘获 (Regulatory Capture)** (real-world economics review, issue no. 59)
  - Sy指出监管机构被其监管的行业（如银行业）所影响或控制，导致政策偏向放松管制，从而助长了系统性风险和危机。
- **富豪统治 (Plutonomy)** (real-world economics review, issue no. 59)
  - Fullbrook引用的术语，描述一种由少数富裕阶层主导经济增长和消费的经济政治体系，政策制定服务于顶层1%的利益。
- **核心-外围失衡 (Core-Periphery Imbalance)** (real-world economics review, issue no. 59)
  - Vernengo和Pérez-Caldentey用来描述欧元区内核心国家（如德国）保持竞争力和贸易顺差，而外围国家（如希腊、西班牙）失去竞争力并积累巨额私人债务的现象。
- **平行货币系统 (Parallel Monetary Systems)** (real-world economics review, issue no. 59)
  - Andresen提出的应急方案，利用高科技手段建立非政府或半官方的替代性交换媒介，以帮助受债务危机打击的国家激活闲置资源和就业。
- **舒姆彼特式活動 (Schumpeterian activities)** (real-world_economics_review_issue_60.pdf)
  - 具有規模報酬遞增、動態不完全競爭、創造租金並推動經濟增長的活動（如製造業）。
- **馬爾薩斯式活動 (Malthusian activities)** (real-world_economics_review_issue_60.pdf)
  - 具有規模報酬遞減、完全競爭、價格波動劇烈且難以創造持久財富的活動（如單純的原材料開採）。
- **資本的漸近線 (Asymptotes of Power)** (real-world_economics_review_issue_60.pdf)
  - 指資本權力擴張的極限點；當權力接近此極限時，社會阻力增大，資本家預期未來權力將萎縮，從而引發系統性危機。
- **系統性恐懼 (Systemic Fear)** (real-world_economics_review_issue_60.pdf)
  - 資本家對其權力結構本身可能崩潰的深層恐懼，這種恐懼驅動了資產價格的下跌和經濟動盪。
- **強/弱可持續性 (Strong/Weak Sustainability)** (real-world_economics_review_issue_60.pdf)
  - 弱可持續性允許環境資本與人造資本之間的貨幣替代；強可持續性則認為某些生態影響是不可逆的，不能僅用貨幣衡量。
- **明斯基時刻 (Minsky Moment)** (real-world_economics_review_issue_60.pdf)
  - 在長期繁榮後，由於債務累積和金融結構脆弱，資產價格突然崩盤以滿足流動性需求的時刻。
- **開放同行評審 (Open Peer Review)** (real-world_economics_review_issue_60.pdf)
  - 一種學術評審制度，其中作者和評審者的身份公開，且歡迎來自不同範式和社區的多樣化反饋。
- **收入-幸福感悖論 (Income-Happiness Paradox)** (Real-World Economics Review, Issue 61)
  - 指當人們的基本物質需求得到滿足後，收入增加與主觀幸福感之間的相關性顯著減弱甚至消失的現象。
- **去增長 (Degrowth)** (Real-World Economics Review, Issue 61)
  - 一種主張發達國家應計劃性地縮減生產和消費規模，以實現生態可持續性、社會正義及提升生活質量（而非僅是物質標準）的經濟政策方向。
- **資本化 (Capitalization)** (Real-World Economics Review, Issue 61)
  - 將預期未來收益貼現為當前價值的過程；在「資本即權力」理論中，這是將社會權力關係轉化為金融數量的機制。
- **差異化積累 (Differential Accumulation)** (Real-World Economics Review, Issue 61)
  - 資本家追求相對於其他競爭者（如行業平均或標杆企業）更快的積累速度，而非絕對利潤最大化，這驅動了併購、戰爭和市場壟斷行為。
- **真實淨指標 (Genuine Progress Indicator, GPI) / 可持續經濟福利指數 (ISEW)** (Real-World Economics Review, Issue 61)
  - 替代GDP的福利指標，扣除資源耗竭、污染和不平等成本，並加入非市場勞動和公共基礎設施貢獻，以更準確衡量社會福祉。
- **重新切換現象 (Reswitching)** (Real-World Economics Review, Issue 61)
  - 在斯拉法模型中出現的現象，證明同一種生產技術可能在不同的利潤率下被選擇，從而駁斥了新古典經濟學中資本密集度與利率之間單調關係的假設。
- **支持性討價還價 (Support-Bargaining)** (Real-World Economics Review, Issue 61)
  - 人類為了應對不確定性和尋求安全感而形成的群體結盟過程，經濟理論和制度被視為這種社會支持博弈的產物。
- **互補性多元主義 (Complementary Pluralism)** (real-world economics review, issue no. 62)
  - 源自現代物理學的方法論，承認不同且可能不相容的概念框架對於理解複雜現實都是必要的，每個框架揭示現實的不同側面。
- **非遍歷性 (Non-ergodicity)** (real-world economics review, issue no. 62)
  - 指經濟過程具有歷史依賴性和不可逆性，未來的概率分佈並非已知或穩定，因此不能簡單地用過去的平均值來預測未來。
- **虛假資本 (Fictitious Capital)** (real-world economics review, issue no. 62)
  - 指脫離實際生產活動、主要用於投機和金融衍生品的貨幣資本，其膨脹導致了對實體經濟剩餘價值的過度索取。
- **集體行動能力 (Capacity for Collective Agency)** (real-world economics review, issue no. 62)
  - 國家或社會透過政治機制對市場力量施加約束、管理共同資源並解決外部性的能力，新自由主義導致了這種能力的退化。
- **統計顯著性謬誤 (Fallacy of Statistical Significance)** (real-world economics review, issue no. 62)
  - 將變數的統計顯著性直接等同於政策重要性或因果關係，忽略了效應大小、變異性、成本效益及替代方案等關鍵政策考量。
- **影子銀行體系 (Shadow Banking)** (real-world economics review, issue no. 63)
  - 指傳統銀行監管範圍之外，依賴短期批發融資進行長期資產投資的金融機構與市場活動，具有高度順週期性和系統性風險。
- **資金流量模型 (Flow-of-Funds Models)** (real-world economics review, issue no. 63)
  - 基於會計恆等式（四欄式記帳）的宏觀經濟模型，追蹤各部門間的資金流動與負債關係，能更準確反映債務累積與金融脆弱性。
- **貨幣流通速度 (Money Velocity)** (real-world economics review, issue no. 63)
  - 單位貨幣在經濟中轉手的頻率，被視為影響總需求（Y=Mv）的關鍵變數，尤其在電子貨幣時代可作為政策调控工具。
- **理性預期 (Rational Expectations)** (real-world economics review, issue no. 63)
  - 主流宏觀經濟學假設，認為經濟個體會利用所有可用資訊形成對未來的預期，從而使系統性政策失效；本文批評此假設導致央行忽視金融不穩定。
- **規則八 (Rule of Eight)** (real-world economics review, issue no. 63)
  - 經驗法則，指出失業率與生產力變化呈反向關係：失業率每下降8個百分點，生產力增長約上升，因為勞動力稀缺促使企業優化配置。
- **保證金債務 (Margin Debt)** (real-world economics review, issue no. 64)
  - 投資者向經紀人借款購買證券的債務。文章指出保證金債務水平與道瓊斯工業平均指數高度相關（相關係數0.945），是驅動資產泡沫的關鍵因素。
- **財富效應 vs. 槓桿效應 (Wealth Effect vs. Leverage Effect)** (real-world economics review, issue no. 64)
  - 財富效應指資產增值刺激消費；作者認為股市上漲主要驅動力是槓桿效應（債務增加），而非財富效應對實體經濟的貢獻。
- **部門金融餘額 (Sectoral Financial Balances)** (real-world economics review, issue no. 64)
  - 宏觀會計恆等式，表明私人部門、公共部門和外國部門的淨儲蓄/借貸之和必須為零。用於分析哪個部門在驅動總需求或累積債務。
- **有效需求 (Effective Demand)** (real-world economics review, issue no. 64)
  - 凱恩斯主義核心概念，指有支付能力的總需求。文章強調政府應在蕭條時期通過赤字支出來維持有效需求，防止經濟陷入長期失業均衡。
- **系統性風險 (Systemic Risk)** (real-world economics review, issue no. 64)
  - 由於金融機構高度互聯和槓桿化，單一機構的失敗可能通過連鎖反應導致整個系統崩潰。複雜理論認為這是系統內生的，而非外部衝擊所致。
- **法幣作為水 (Money as Water)** (real-world economics review, issue no. 64)
  - 托馬斯·科利納圖斯提出的比喻，指法定貨幣具有流動性和可創造性，不像黃金那樣稀缺；批評歐元區規則使其退化為「黃金標準」，導致緊縮政策。
- **結構方程模型 (Structural Equation Model, SEM)** (real-world_economics_review_issue_65.pdf)
  - 一種數學模型，用於描述變量之間的因果關係，其中參數代表在干預下變量的預期變化，而非僅僅是條件期望。
- **do(x) 運算符** (real-world_economics_review_issue_65.pdf)
  - 因果推論中的干預算子，表示人為將變量X設置為值x，從而切斷X與其前因變量的因果鏈，用於計算因果效應 E[Y|do(x)]。
- **可處理性假設 (Tractability Assumptions)** (real-world_economics_review_issue_65.pdf)
  - 為了使模型在數學上可解而引入的極端理想化或簡化假設，這些假設往往脫離現實，導致模型內部有效性高但外部效度低。
- **影子銀行體系 (Shadow Banking System)** (real-world_economics_review_issue_65.pdf)
  - 指從事信貸中介但不受傳統銀行監管約束的非銀行金融機構和活動，如資產支持商業票據和抵押貸款證券化，易引發系統性風險。
- **最佳貨幣區理論 (Optimum Currency Area Theory)** (real-world_economics_review_issue_65.pdf)
  - 探討在缺乏獨立貨幣政策和勞動力流動受限的情況下，貨幣聯盟（如歐元區）維持穩定的條件與成本。
- **Secular Stagnation** (real-world economics review, issue no. 66)
  - A condition of persistently low or negative growth rates and inadequate demand, potentially requiring permanent fiscal deficits or asset bubbles to maintain full employment.
- **Endogenous Money** (real-world economics review, issue no. 66)
  - The theory that the money supply is created by banks through lending in response to demand, rather than being exogenously controlled by the central bank.
- **Representative Agent** (real-world economics review, issue no. 66)
  - A hypothetical single agent used in macroeconomic models to represent the entire population, criticized for ignoring heterogeneity and aggregation problems.
- **Chartalism / State Theory of Money** (real-world economics review, issue no. 66)
  - The view that money derives its value from state authority, particularly its acceptance for tax payments, rather than from intrinsic commodity value.
- **Capital as Power** (real-world economics review, issue no. 66)
  - A framework where the value of capital is seen as the capitalized expectation of future surplus value extraction, driven by the relative power of capitalists against labor.
- **The Social Cube** (real-world economics review, issue no. 66)
  - A critical realist framework analyzing social phenomena across four dimensions: social relations/structures, social interactions, subjectivity, and material transactions with nature.
- **Ergodic Axiom** (real-world economics review, issue no. 66)
  - The assumption that the future is statistically similar to the past, allowing for risk calculation; rejected by heterodox economists in favor of acknowledging fundamental uncertainty.
- **內生貨幣 (Endogenous Money)** (real-world economics review, issue no. 67)
  - 貨幣供應量由經濟體系內的信貸需求和銀行創造行為決定，而非由中央銀行外生控制；貸款同時創造存款。
- **利潤法則 (Profit Law)** (real-world economics review, issue no. 67)
  - 在結構公理化框架下，總貨幣利潤等於消費支出與總收入之差加上分配利潤；若消費等於收入且無利潤分配，則總利潤為零。
- **協調條件 (Coordination Conditions)** (real-world economics review, issue no. 67)
  - 定義市場交換中供給與需求計劃如何匹配，以及資金籌措中可用資金與desired資金如何匹配的數學或邏輯條件。
- **擴展現象 (Extended Phenotype)** (real-world economics review, issue no. 67)
  - 源自生物學，指基因不僅影響生物體本身，還通過環境和社會互動（如築巢、社會結構）表達其影響力；在此用於解釋人類社會身份的擴展。
- **差異化資本化 (Differential Capitalization)** (real-world economics review, issue no. 67)
  - 資本主義的核心動力，即不斷追求相對於他人的資產增長和回報率超越平均水平，導致社會關係的金融化和自動化。
- **卡爾·波拉尼的雙向運動 (Polanyi's Double Movement)** (real-world economics review, issue no. 67)
  - 市場自由化（商品化）引發社會保護的反向運動；文中指出碳交易市場是金融化對生態危機的一種「反反運動」。
- **資產基礎準備金要求 (ABRR)** (real-world economics review, issue no. 68)
  - 中央銀行對金融機構持有的不同類別資產設定調整性準備金要求，旨在吸收流動性、抑制資產泡沫，並作為貨幣政策的額外工具。
- **量化寬鬆 (QE) 退場策略** (real-world economics review, issue no. 68)
  - 央行在結束大規模資產購買後，為防止通膨和金融動盪而收回過度流動性的政策過程，傳統上依賴提高準備金利率。
- **非自願失業 (Involuntary Unemployment)** (real-world economics review, issue no. 68)
  - 凱恩斯定義的失業類型，指工人願意接受當前實際工資但仍找不到工作，根源在於總需求不足，而非勞動力市場失靈或工資剛性。
- **相對脫鉤 vs. 絕對脫鉤** (real-world economics review, issue no. 68)
  - 相對脫鉤指環境影響增速低於GDP增速；絕對脫鉤指在GDP增長的同時，環境影響的絕對量下降。文章認為目前僅實現了相對脫鉤。
- **金融化 (Financialization)** (real-world economics review, issue no. 68)
  - 金融市場、動機、機構和精英在經濟運作及治理中重要性日益增加的過程，通常伴隨收入分配不均擴大和實體經濟部門利潤轉移至金融部門。
- **驗證理性 (Validating Rationality)** (real-world economics review, issue no. 68)
  - 一種後驗的理性概念，指行動者在做出決策後，通過干預環境和制度來確保結果符合預期，而非僅基於事前計算的最優化。
- **遺產資本主義 (Patrimonial Capitalism)** (real-world economics review, issue no. 69)
  - 一種由繼承財富主導收入分配的社會形態，類似於18-19世紀的模式，與現代Meritocracy（優才主義）相對立。
- **資本/收入比率 (β)** (real-world economics review, issue no. 69)
  - 國家總財富與年國民收入的比率，皮凱提用其衡量財富在經濟中的相對規模。
- **邊際生產力理論 (Marginal Productivity Theory)** (real-world economics review, issue no. 69)
  - 主流經濟學認為要素報酬等於其邊際產量的理論，文中多位作者批評該理論無法解釋頂層收入的不平等。
- **布林頓森林體系 (Bretton Woods System)** (real-world economics review, issue no. 69)
  - 二戰後的國際貨幣體系，通過資本管制和固定匯率促進了低不平等和高增長時期。
- **全球財富稅 (Global Wealth Tax)** (real-world economics review, issue no. 69)
  - 皮凱提提出的政策建議，旨在通過對淨財富徵收累進稅來遏制財富集中。
- **長期停滯 (Secular Stagnation)** (real-world economics review, issue no. 70)
  - 指經濟體在長時期內面臨持續的低增長或零增長，本文認為這是歐元區結構性需求不足的結果。
- **差異性累積 (Differential Accumulation)** (real-world economics review, issue no. 70)
  - 資本家追求相對於競爭對手或平均水平的利潤增長，而非絕對利潤最大化；這是驅動資本行為的核心動力。
- **能源衝突 (Energy Conflicts)** (real-world economics review, issue no. 70)
  - 特指中東地區的軍事衝突，作者認為這些衝突並非為了確保廉價石油，而是為了推高油價以增加石油公司的差異性利潤。
- **資訊介面 (Information Interface)** (real-world economics review, issue no. 70)
  - 經濟和政治交易發生的場所，個體在此提供或隱瞞資訊以建立議價地位；資訊不對稱是常態，而非市場失靈的例外。
- **價值增值負稅 (Value-Added Negative Tax, VANT)** (real-world economics review, issue no. 70)
  - 一種貨幣改革提案，認為生產者創造價值會產生通縮效應，因此應獲得基於其貢獻的「負稅」（補貼），以糾正貨幣系統對生產者的隱性掠奪。
- **薩伊定律 (Say's Law)** (real-world economics review, issue no. 70)
