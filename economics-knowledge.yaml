- ""There is always a temporary trade-off between inflation and unemployment; there is no permanent trade-off." - Milton Friedman (summarizing the Neoclassical view of the long-run Phillips curve)." — OpenStax_Economics_3e_chunk006 (chunk 6/10)
- ""The first and most important lesson that history teaches about what monetary policy can do... is that monetary policy can prevent money itself from being a major source of economic disturbance." - Milton Friedman." — OpenStax_Economics_3e_chunk006 (chunk 6/10)
- "「一国は貿易によって破滅したことはない。」（ベンジャミン・フランクリン）" — OpenStax_Economics_3e_chunk007 (chunk 7/10)
- "「比較優位とは、ある財を生産するために他財をどれくらい放棄するかという『機会費用』に基づいて決まる。」" — OpenStax_Economics_3e_chunk007 (chunk 7/10)
- "「貿易の利益は、一国がすべての財において絶対的に優れていなくても、比較優位のある財に特化することで実現する。」" — OpenStax_Economics_3e_chunk007 (chunk 7/10)
- "保護主義只是一種要求消費者補貼生產者的方法。這種補貼是間接的，因為消費者通過更高的價格來為其買單，而不是由納稅人直接支付政府補貼。" — OpenStax_Economics_3e_chunk008 (chunk 8/10)
- "用保護主義來拯救一份工作的成本通常遠高於該工人實際的薪水。" — OpenStax_Economics_3e_chunk008 (chunk 8/10)
- "國際貿易確實具有收入分配效應... 最好的公共政策解決方案通常不涉及保護主義，而是涉及尋找方法讓公共政策解決這些干擾、成本和權衡所產生的特定問題，同時仍允許國際貿易的好處發生。" — OpenStax_Economics_3e_chunk008 (chunk 8/10)
- "「許多將收入再分配以實現更大平等視為從富人手中拿走支付給窮人，或視為一場『零和』遊戲。」" — OpenStax_Economics_3e_chunk009 (chunk 9/10)
- "「理性預期可以視為新古典經濟學的一種形式，因為它論證潛在國內生產總值和失業率是由市場力量塑造的，工資和價格調整得非常快。」" — OpenStax_Economics_3e_chunk009 (chunk 9/10)
- "「如果國內儲蓄增加且其他條件不變，貿易赤字將會下降。換句話說，經濟體將更多地依賴國內資本，而不是外國資本。」" — OpenStax_Economics_3e_chunk009 (chunk 9/10)
- ""The cost of one item is the lost opportunity to do or consume something else. In short, opportunity cost is the value of the next best alternative."" — OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7)
- "價格存在於商品、服務、勞動力和金融資本的市場中。在所有這些市場中，價格作為一種非凡的社會機制，用於收集、結合和傳遞與市場相關的資訊——即供需關係——並作為信使將這些資訊傳達給買方和賣方。" — OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7)
- "那些尋求價格管制的人試圖殺死信使——或者至少壓制價格帶來的關於均衡價格和數量的不歡迎訊息。然而，價格管制對影響供需的根本力量沒有任何作用，這可能會產生嚴重的後果。" — OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7)
- "即使年增長率只有幾個百分點的微小差異，如果持續並複利計算幾十年，也會使人均 GDP 產生巨大的差異。" — OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7)
- "The remedy for unemployment will depend on the diagnosis. Cyclical unemployment is a short-term problem... Dealing with the natural rate of unemployment is trickier." — OpenStax Principles of Macroeconomics, Chapters 8 and 9 (chunk 0/1)
- "Inflation is a general and ongoing rise in the level of prices in an entire economy." — OpenStax Principles of Macroeconomics, Chapters 8 and 9 (chunk 0/1)
- "Too many dollars chasing too few goods." — OpenStax Principles of Macroeconomics, Chapters 8 and 9 (chunk 0/1)
- "Prices are the messengers in a market economy, conveying information about conditions of demand and supply. Inflation blurs those price signals." — OpenStax Principles of Macroeconomics, Chapters 8 and 9 (chunk 0/1)
- "「在長期中，我們都死了。」（In the long run we are all dead.）—— 這句話常被引用來強調凱因斯主義者對短期經濟痛苦的关注，而新古典主義者則反駁說，即使調整需要十年，長期觀點對於理解經濟本質仍至關重要。" — OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7)
- "「總是存在著通貨膨脹與失業之間的暫時性權衡；但不存在永久性的權衡。」（[T]here is always a temporary trade-off between inflation and unemployment; there is no permanent trade-off.）—— 米爾頓·傅利曼總結了新古典主義對長期菲利普斯曲線的觀點。" — OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7)
- "「歷史教給我們的第一个也是最重要的教訓是，貨幣政策能做什麼——而且這是一個極其重要的教訓——就是貨幣政策可以防止貨幣本身成為經濟擾亂的主要來源。」—— 米爾頓·傅利曼關於穩定貨幣政策的論述。" — OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7)
- ""即使一個國家在所有商品的生產上都具有絕對優勢，只要各國專注於生產其機會成本較低的商品並進行貿易，雙方仍能從中獲利。"" — OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7)
- ""當政府為了彌補預算赤字而大量借款時，會推高金融資本市場的需求和利率，從而減少私人部門用於實體資本投資的资金和意願。我們稱之為『擠出效應』。"" — OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7)
- ""貿易的基礎不在於誰生產得更快（絕對優勢），而在於誰放棄的東西更少（比較優勢）。"" — OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7)
- "保護主義只是一種要求消費者補貼生產者的方法。這種補貼是間接的，因為消費者通過更高的價格為其買單，而不是通過收集納稅人資金的直接政府補貼。" — OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7)
- "保護主義確實拯救了受保護行業的工作崗位，但出於兩個原因，它也會在其他不受保護的行業造成工作崗位的流失。" — OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7)
- "大多數人認為，阻礙新技術的發展是不明智的，同樣地，為了避免國際貿易帶來的干擾而限制貿易也是不明智的。" — OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7)
- "「在長期，我們都死了。」——這句話常被歸因於凱因斯，用以強調在短期內解決失業和經濟波動的重要性，因為長期調整過程可能太漫長且痛苦。" — OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7)
- "「供給創造其自身的需求。」——薩伊法則的核心思想，反映了古典經濟學對市場自我調節機制的信心。" — OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7)
- "「物價粘性和工資粘性是凱因斯主義解釋短期經濟波動關鍵。」——這解釋了為何市場機制在短期內可能無法迅速恢復充分就業。" — OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7)
- ""By pursuing his own interest he frequently promotes that of the society more effectually than when he really intends to promote it." — Adam Smith (on the Invisible Hand)" — OpenStax_Microeconomics_3e_chunk000 (chunk 0/6)
- "「價格在市場中扮演著令人驚嘆的社會機制角色，用於收集、結合和傳遞與市場相關的資訊——即供需關係——並作為信使將這些資訊傳達給買家和賣家。」" — OpenStax_Microeconomics_3e_chunk001 (chunk 1/6)
- "「不要殺死信使。」（Don’t kill the messenger.）價格管制試圖扼殺信使，或者至少壓制那些關於價格趨向均衡的不受歡迎訊息，但這並未改變供需的基本力量，反而會帶來嚴重的後果。" — OpenStax_Microeconomics_3e_chunk001 (chunk 1/6)
- "「如果需求比供給更具彈性，消費者承擔較少的稅務負擔；如果供給比需求更具彈性，生產者承擔較少的稅務負擔。稅務負擔傾向於落在市場中較不具彈性的一側。」" — OpenStax_Microeconomics_3e_chunk001 (chunk 1/6)
- ""The best of all monopoly profits is a quiet life." — John Hicks" — OpenStax_Microeconomics_3e_chunk002 (chunk 2/6)
- ""People of the same trade seldom meet together, even for merriment and diversion, but the conversation ends in a conspiracy against the public, or in some contrivance to raise prices." — Adam Smith" — OpenStax_Microeconomics_3e_chunk002 (chunk 2/6)
- ""Our competitors are our friends. Our customers are the enemy." — Archer Daniels Midland (ADM) slogan cited in lysine cartel case"" — OpenStax_Microeconomics_3e_chunk002 (chunk 2/6)
- ""If the firm is forced to pay its additional external costs, then production of trumpet songs becomes more costly, and the supply curve will shift up."" — OpenStax_Microeconomics_3e_chunk002 (chunk 2/6)
- "「利潤最大化的雇主永遠不會為工人支付的工資（含福利）超過該工人在企業中的邊際生產力價值。」" — OpenStax_Microeconomics_3e_chunk003 (chunk 3/6)
- "「貧困陷阱是指政府補助金隨著受助者收入增加而大幅減少，導致他們工作所獲得的淨收益微乎其微，甚至為零。」" — OpenStax_Microeconomics_3e_chunk003 (chunk 3/6)
- "「逆向選擇是指保險購買者比保險公司更清楚自己的風險狀況，導致高風險人群更積極地購買保險，從而推高整體成本。」" — OpenStax_Microeconomics_3e_chunk003 (chunk 3/6)
- ""It seems probable that for a great many citizens in a democracy, rational behavior excludes any investment whatever in political information per se."" — OpenStax_Microeconomics_3e_chunk004 (chunk 4/6)
- ""No nation was ever ruined by trade." — Benjamin Franklin" — OpenStax_Microeconomics_3e_chunk004 (chunk 4/6)
- ""Democracy is the worst form of government except for all of the other forms which have been tried from time to time." — Winston Churchill" — OpenStax_Microeconomics_3e_chunk004 (chunk 4/6)
- "「任何圖表都是對主題的單一視覺視角。它所留下的印象將基於許多選擇，例如包含哪些數據或時間範圍、如何劃分數據或群體、垂直和水平軸的相對大小，以及垂直軸的刻度是否從零開始。」" — OpenStax_Microeconomics_3e_chunk005 (chunk 5/6)
- "「替代效應是指當一種商品變得更貴時，人們尋求替代品……所得效應是指一種商品價格的變化如何改變一個人收入的實際購買力。」" — OpenStax_Microeconomics_3e_chunk005 (chunk 5/6)
- "「現值折現的概念定義為：你現在應該願意為一系列預期的未來支付金額多少錢，可以用來計算股票和債券的適當價格。」" — OpenStax_Microeconomics_3e_chunk005 (chunk 5/6)