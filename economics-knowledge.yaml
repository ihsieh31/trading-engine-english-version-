name: economics-knowledge
description: >
  Comprehensive economics knowledge base distilled from 100+ classic texts,
  IMF working papers, OECD outlooks, Real-World Economics Review journals,
  and university textbooks. Covers classical economics, Keynesian & Post-Keynesian
  theory, Marxian economics, behavioral finance, technical analysis, monetary theory,
  and portfolio management. Suitable as a reference for trading strategy agents.

on_instructions:
  - Use this skill when the agent needs economic theory context, historical financial
    precedents, or analytical frameworks for market/economic analysis.
  - Prioritize actionable insights and practical formulas over pure theory.
  - When referencing a theory, cite the source category (classic_book / imf_paper / journal).

source_count: 1457

### === CORE THEORIES & PRINCIPLES ===
- **Speculation as Value Adjustment** (The Art of Speculation by Philip L. Carret)
  - Speculators act as advance agents for investors by discovering undervalued securities and driving prices toward their intrinsic values, while also warning investors of overvalued or deteriorating asse
  - Proponents: Philip L. Carret
- **The Dow Theory** (The Art of Speculation by Philip L. Carret)
  - A technical analysis framework asserting that stock market averages discount everything, that trends consist of primary, secondary, and minor movements, and that confirmation between industrial and ra
  - Proponents: Charles H. Dow, William P. Hamilton
- **Business Cycle Correlation** (The Art of Speculation by Philip L. Carret)
  - Stock market trends are closely linked to business cycles, with market turns often preceding business turns. Prosperity contains the seeds of its own destruction, leading to panics and depressions.
  - Proponents: Roger W. Babson, Col. Leonard P. Ayres
- **Metamorphosis of Capital** (Capital Vol. II (Marx))
  - Capital undergoes a cyclic process of transformation through three forms: Money Capital (M-C), Productive Capital (P), and Commodity Capital (C'-M').
  - Proponents: Karl Marx
- **Turnover of Capital** (Capital Vol. II (Marx))
  - The time required for capital to complete one full cycle of production and circulation, determining the frequency of value reproduction.
  - Proponents: Karl Marx
- **Fixed vs. Circulating Capital** (Capital Vol. II (Marx))
  - A distinction based on the mode of value transfer: Fixed capital transfers value gradually over multiple production cycles, while circulating capital transfers its entire value in a single cycle.
  - Proponents: Karl Marx
- **市場趨勢順應理論 (Trend Following)** (How I trade and invest in stocks and bonds)
  - 交易成功的關鍵在於順應市場的大趨勢。在牛市做多，在熊市做空或持現，逆勢操作會大幅增加虧損風險。
  - Proponents: Richard D. Wyckoff, Charles H. Dow
- **積累-拉抬-分發週期 (Accumulation-Manipulation-Distribution Cycle)** (How I trade and invest in stocks and bonds)
  - 大型操盤手（主力）的操作通常分為三個階段：首先在低位積累籌碼，然後利用利好消息或積極買盤拉抬價格，最後在高位將籌碼分發給散戶。
  - Proponents: Richard D. Wyckoff
- **風險與報酬不對稱原則 (Asymmetric Risk/Reward)** (How I trade and invest in stocks and bonds)
  - 預期利潤應至少是風險的三到四倍。通過嚴格設置停損單來限制虧損，並讓利潤奔跑，從而實現長期盈利。
  - Proponents: Richard D. Wyckoff, Jesse L. Livermore
- **技術面與基本面的結合分析** (How I trade and invest in stocks and bonds)
  - 投資決策應基於長線市場趨勢、行業前景、公司財務狀況以及股票的技術面位置（供需關係）。技術面反映了市場參與者的集體心理和資金流向。
  - Proponents: Richard D. Wyckoff
- **Livermore Formula (Price-Time Combination)** (howtotradeinstoc0000live.html)
  - A trading methodology that integrates price movement with the time element to determine optimal entry and exit points.
  - Proponents: Jesse Livermore
- **Investment vs. Speculation Distinction** (Security Analysis (1940))
  - Investment is defined as an operation that, upon thorough analysis, promises safety of principal and a satisfactory return. Operations not meeting these requirements are speculative. Price is an essen
  - Proponents: Benjamin Graham, David L. Dodd
- **Intrinsic Value and Market Price Discrepancy** (Security Analysis (1940))
  - Intrinsic value is an elusive concept justified by facts (assets, earnings, dividends), distinct from market price which is influenced by psychology. The analyst's goal is not to determine exact intri
  - Proponents: Benjamin Graham, David L. Dodd
- **Depression Basis for Bond Selection** (Security Analysis (1940))
  - Bonds should be selected based on their ability to withstand depression conditions rather than prosperity. Safety is measured by the issuer's ability to meet obligations, not merely by specific liens 
  - Proponents: Benjamin Graham, David L. Dodd
- **Incommensurability of Risk and Yield** (Security Analysis (1940))
  - Acknowledged risks of losing principal should not be offset merely by a high coupon rate. High yield does not compensate for risk in fixed-value investment; risk should only be accepted for a correspo
  - Proponents: Benjamin Graham, David L. Dodd
- **Supply and Demand Theory** (Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)
  - Price movements are driven by the balance of supply and demand, which is reflected in volume and price fluctuations. Accumulation occurs when supply is absorbed, and distribution occurs when supply ex
  - Proponents: William D. Gann
- **Market Cycles and History Repeats** (Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)
  - The stock market moves in predictable cycles (accumulation, markup, distribution, markdown) that repeat over time. Past price and time patterns provide the best guide for future movements.
  - Proponents: William D. Gann
- **Trend Following Principle** (Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)
  - Traders should identify the dominant trend (bull or bear) and trade in that direction, avoiding attempts to predict tops or bottoms. 'The trend is your friend.'
  - Proponents: William D. Gann, Jesse Livermore
- **診斷性金融加速器 (Diagnostic Financial Accelerator)** (WP/24/132)
  - 結合新凱因斯主義模型中的金融摩擦（擔保約束）與診斷性預期，解釋需求衝擊如何透過資產價格通道產生相互強化的放大效應，而供給衝擊則透過債務通縮通道被緩和。
  - Proponents: Lahcen Bounader, Selim Elekdag
- **診斷性預期 (Diagnostic Expectations, DE)** (WP/24/132)
  - 一種非理性預期形成機制，代理人會過度反應近期新聞，導致在好消息後過度樂觀、壞消息後過度悲觀，從而增加宏觀經濟波動性。
  - Proponents: Bordalo, Gennaioli, Shleifer (2018)
- **金融加速器理論 (Financial Accelerator)** (WP/24/132)
  - 認為金融摩擦（如抵押品約束）會放大外部衝擊對實體經濟的影響，惡化金融條件不僅是經濟衰退的結果，也是其原因。
  - Proponents: Bernanke, Gertler (1989); Kiyotaki, Moore (1997)
- **動態發展會計 (Dynamic Development Accounting)** (WP/24/229)
  - 一種結合馬可夫鏈與發展會計框架的方法，用於分析人均GDP近端決定因素（如資本產出比、人力資本和TFP）隨時間的遷移動力學，而非僅關注單一時間點的快照。
  - Proponents: Patrick A. Imam, Jonathan R.W. Temple, James Feyrer
- **相對收入陷阱 (Relative Income Traps)** (WP/24/229)
  - 儘管絕對貧困陷阱在數據中罕見，但低收入國家極難改善其相對於美國的收入地位；這種滯後主要源於全要素生產率（TFP）的持續性低下，而非資本或人力資本的差異。
  - Proponents: Patrick A. Imam, Jonathan R.W. Temple
- **人力資本與技術擴散理論** (WP/24/229)
  - 基於Nelson和Phelps的觀點，認為絕對水平的人力資本有助於技術吸收和TFP的收斂，但本文發現這種效應雖然存在卻相當有限。
  - Proponents: Richard Nelson, Edward Phelps, Moritz Schularick
- **非線性菲利普斯曲線與內生指數化模型** (WP/24/260)
  - 結合Kimball準彎曲需求調和器與狀態依賴的價格/工資指數化機制，解釋為何在通膨高企時，成本推動型衝擊會產生更大的通膨效應及持久性。
  - Proponents: Christopher Erceg, Jesper Lindé, Mathias Trabandt (基於Harding, Lindé and Trabandt)
- **不完全資訊下的成本推動衝擊學習機制** (WP/24/260)
  - 經濟主體無法直接觀察到成本推動衝擊是暫時性的還是持久性的，必須透過信號提取問題（Kalman濾波）來估計，導致初期誤判為暫時性衝擊而延遲政策反應。
  - Proponents: Erceg, Lindé, Trabandt (參考Erceg and Levin, Edge et al.)
- **基於預測的貨幣政策規則** (WP/24/260)
  - 中央銀行根據中期通膨預測制定利率政策，旨在「忽略」暫時性的供給衝擊，但在面對大型且被誤判為暫時的持久性衝擊時，可能導致政策滯後。
  - Proponents: Ashley et al., 本文作者
- **季度預測模型 (Quarterly Projection Model, QPM)** (WP/25/95)
  - 一種半結構化的宏觀經濟框架，用於模擬商業週期成分（缺口與趨勢），並結合內生的前瞻性貨幣政策反應，以評估衝擊傳播及政策權衡。
  - Proponents: Berg et al. (2006)
- **新凱恩斯主義菲利普斯曲線 (New-Keynesian Phillips Curve)** (WP/25/95)
  - 描述通膨與實際邊際成本、預期通膨及產出缺口之間的關係，本文將其擴展以包含農業部門對食品價格的供給側影響。
  - Proponents: 文中引用 Gallic et al. (2020), McKibbin et al. (2020)
- **貨幣政策可信度與預期錨定理論** (WP/25/95)
  - 強調中央銀行的歷史表現會影響通膨預期的形成；在發展中國家，若預期未充分錨定，供給衝擊易引發二階效應，迫使央行採取緊縮政策。
  - Proponents: Chansriniyom et al. (2020), Unsal et al. (2022)
- **貿易重新配置 (Trade Reallocation)** (WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)
  - 指連接國增加國內生產，以替代美國從中國進口減少的需求，從而提升出口中的國內附加值。
  - Proponents: Tatjana Schulze, Weining Xin
- **貿易繞道 (Trade Rerouting)** (WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)
  - 指連接國作為轉運站，將中國出口產品以極少或無國內附加值的方式重新出口到美國，以規避關稅。
  - Proponents: Tatjana Schulze, Weining Xin
- **地緣經濟碎片化 (Geoeconomic Fragmentation)** (WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)
  - 全球貿易體系因政治緊張關係而分裂為不同陣營，導致供應鏈重組和貿易模式改變。
  - Proponents: Fajgelbaum et al., Alfaro and Chor, Freund et al.
- **稅務行政能力與財政收入因果關係理論** (WP/25/219)
  - 強化稅務行政管理能力（OSI）能顯著提升稅收佔GDP比重，尤其在新興市場和發展中經濟體中效果更為明顯。
  - Proponents: Jean-Marc Atsebi, Nikolay Gueorguiev, Manabu Nose
- **同時性偏差與工具變數識別策略** (WP/25/219)
  - 稅務改革與稅收水平存在雙向因果關係（同時性偏差），需使用外部工具變數（如IMF能力發展項目強度）來識別稅務行政對稅收的純淨因果效應。
  - Proponents: Jean-Marc Atsebi, Nikolay Gueorguiev, Manabu Nose
- **財政主導 (Fiscal Dominance)** (IMF_WP_25_231.pdf)
  - 當政府債務規模過大，央行被迫採取擴張性立場以配合政府融資需求或應對債務可持續性問題，最終導致通膨上升。
  - Proponents: Sargent and Wallace (1981)
- **價格水平的財政理論 (Fiscal Theory of the Price Level, FTPL)** (IMF_WP_25_231.pdf)
  - 總體物價水平由未來政府預算盈餘的現值決定；若政府負債的實際價值超過預期未來盈餘，則需透過通膨來恢復均衡。
  - Proponents: Woodford (1994), Cochrane (2005, 2023), Benigno (2020)
- **新凱恩斯主義框架 (New Keynesian Framework)** (IMF_WP_25_231.pdf)
  - 在名目剛性下，財政擴張（如增加支出或減稅）會推升總需求並對物價產生上行壓力，理性消費者會因此調整通膨預期。
  - Proponents: 文中提及之一般理論框架
- **移動貨幣稅收行為模型** (WP/25/255)
  - 該理論框架將移動貨幣置於現金和銀行轉賬的替代組合中，分析稅收如何通過改變交易成本來影響用戶的選擇。模型預測稅收會減少移動貨幣使用，並根據用戶是否擁有銀行帳戶產生不同的彈性反應。
  - Proponents: Michael Barczay, Shafik Hebous, Fayçal Sawadogo, Jean-François Wen
- **效率損失與無謂損失理論** (WP/25/255)
  - 基於邊際分析，該理論指出當稅收導致用戶轉向其他支付方式或減少交易總量時，產生的交易成本增加超過了稅收收入，從而造成經濟效率損失（無謂損失）。
  - Proponents: Michael Barczay, Shafik Hebous, Fayçal Sawadogo, Jean-François Wen
- **累退性與分配效應理論** (WP/25/255)
  - 該理論認為由於無銀行帳戶用戶缺乏替代方案，他們對稅收的價格彈性較低，因此承擔了更高的有效稅率，使得移動貨幣稅具有顯著的累退性質。
  - Proponents: Michael Barczay, Shafik Hebous, Fayçal Sawadogo, Jean-François Wen
- **供給主導型デフレインフレ（Supply-driven Disinflation）** (OECD Economic Outlook, May 2024, No. 115)
  - 過去1年間のインフレ低下の大部分は、エネルギー価格やサプライチェーンの改善といった供給要因によるものであり、需要圧力の低下（金融引き締めの効果）はまだ完全に現れていない可能性がある。
  - Proponents: OECD経済部、Shapiro (2022)
- **中立実質金利（Neutral Real Interest Rate, r*）への収束** (OECD Economic Outlook, May 2024, No. 115)
  - 金融政策は、インフレが目標に達した後も、実質政策金利が中立水準（景気刺激にも抑制にもならない水準）に戻るまで、ある期間制限的スタンスを維持する必要があるという理論。
  - Proponents: Holston-Laubach-Williams (HLW) モデル、Lubik-Matthes (LM) モデル
- **財政持続可能性と一次黒字** (OECD Economic Outlook, May 2024, No. 115)
  - 公債務対GDP比率を持続的に削減するには、政府が長期間にわたり実質経済成長率を上回る利子率で債務を抱えている場合でも、実質経済成長率を上回る一次黒字を達成し、支出抑制を行う必要がある。
  - Proponents: OECD (2023a)
- **投資乘數理論 (Investment Accelerator Model)** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - 該模型將企業實質投資增長與其滯後值及當前實質產出增長聯繫起來，用於評估總需求波動對投資的影響。分析指出，總需求疲軟僅能解釋全球金融危機後投資缺口的一半左右，其餘部分歸因於結構性因素。
  - Proponents: OECD經濟部門
- **政策不確定性與投資抑制理論** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - 經濟政策不確定性的上升會增加企業的風險溢價，從而提高投資的「 hurdle rates」（最低預期回報率），導致企業推遲或減少資本支出，即使融資成本處於歷史低位。
  - Proponents: Baker, Bloom and Davis (2016); OECD
- **無形資產融資摩擦理論** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - 隨著經濟轉向數位化和知識密集型生產，企業越來越多地投資於軟體、研發等無形資產。由於這些資產難以作為擔保品，傳統銀行貸款受限，導致企業傾向於累積現金和財務資產，而非進行實體固定資本投資。
  - Proponents: Demmou, Stefanescu, and Arqvie (2019); OECD
- **Regulatory Reset Theory** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - Proposes that rising regulatory compliance costs act as fixed costs that disproportionately burden young firms, thereby suppressing business dynamism, innovation, and long-term productivity growth.
  - Proponents: OECD Economics Department (Dan Andrews, Joana Duran-Franch, Sébastien Turban)
- **Creative Destruction & Economic Dynamism** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - Emphasizes that economic growth relies on the continuous entry of new firms and exit of inefficient ones; declines in firm entry and job reallocation hinder productivity.
  - Proponents: Aghion and Howitt (cited in text)
- **Trade Policy Uncertainty (TPU) Impact** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - Suggests that heightened uncertainty regarding trade barriers inhibits investment and trade growth by increasing the 'option value of waiting' and causing front-loading effects.
  - Proponents: OECD Analysis (Costantinescu, Handley and Limão, Sampognaro)
- **氣候經濟學的新假設框架** (post-autistic economics review, issue no. 44)
  - 針對氣候變遷的長期性、不可逆性及不確定性，傳統新古典均衡理論失效，需引入預防原則與非市場價值評估。
  - Proponents: Frank Ackerman
- **全球經濟美元機制 (GEDM)** (post-autistic economics review, issue no. 44)
  - 解釋美元作為世界貨幣如何透過金融資產貿易取代商品貿易，導致資產泡沫與經常帳赤字並存的非均衡狀態。
  - Proponents: Ian Fletcher
- **明斯基時刻與金融不穩定性** (post-autistic economics review, issue no. 44)
  - 金融自由化導致投機性融資擴張，證券化分散風險的錯覺引發結構性脆弱，最終導致流動性枯竭與危機。
  - Proponents: Frédéric Lordon, Hyman Minsky
- **異議發展經濟學** (post-autistic economics review, issue no. 44)
  - 批判正統發展經濟學的意識形態偏見與單一模式，主張基於當地文化、歷史條件的實驗性、漸進式減貧策略。
  - Proponents: James Angresano, Amartya Sen, Muhammad Yunus
- **能力方法 (Capability Approach)** (real-world economics review, issue no. 45)
  - 由阿馬蒂亞·森提出，主張正義與自由應關注人們實際行使權利的實質能力（如生存、逃離災難的能力），而非僅是形式上的權利或市場結果。
  - Proponents: Amartya Sen
- **市場原教旨主義批判 (Critique of Market Fundamentalism)** (real-world economics review, issue no. 45)
  - 批評哈耶克和弗里德曼的觀點，認為忽視再分配和權力結構會導致將風險轉嫁給弱勢群體，並掩蓋了財富創造背後的暴力與不平等。
  - Proponents: Marcellus Andrews, Riccardo Baldissone
- **經濟學的表演性 (Performativity of Economics)** (real-world economics review, issue no. 45)
  - 認為經濟理論不僅描述現實，還通過政策實踐塑造現實；新自由主義理論通過自我實現的預言，將市場邏輯強加於社會關係中。
  - Proponents: Riccardo Baldissone, Michel Callon
- **公共領域與政治本質 (Public Realm and Political Nature)** (real-world economics review, issue no. 45)
  - 基於漢娜·鄂蘭的思想，區分私人領域（經濟必要性）與公共領域（政治自由），批評現代社會將政治工具化為服務經濟目的的手段。
  - Proponents: Hannah Arendt, Kevin Quinn
- **投機性泡沫與自我實現預期理論** (real-world economics review, issue no. 46)
  - 房地產價格上漲並非基於基本面，而是由投機性泡沫驅動。當價格上漲時，市場預期會繼續上漲，這種預期促使買家支付更高價格，從而使預期自我實現，直到供給過剩或信貸收緊導致崩盤。
  - Proponents: Dean Baker, Robert Shiller
- **道德風險與激勵錯置理論** (real-world economics review, issue no. 46)
  - 金融危機源於整個貸款鏈（評估師、發起機構、證券化銀行、評級機構）的激勵機制錯置。由於貸款發起後即被出售，發起人無需承擔違約風險，因此有強烈動機發放高風險貸款以獲取短期費用利潤。
  - Proponents: Dean Baker, Jacques Sapir
- **新自由主義去監管批判** (real-world economics review, issue no. 46)
  - 認為當前危機是新自由主義意識形態和去監管政策的直接結果，特別是對金融衍生品的放任自流，導致系統性風險積累和市場透明度喪失。
  - Proponents: Jacques Sapir, Jayati Ghosh
- **幸福經濟學的統計無效性** (real-world economics review, issue no. 46)
  - 批評主流幸福經濟學使用離散類別的平均值來衡量社會福祉，指出該指標缺乏敏感性且易受抽樣誤差影響，無法有效反映長期福利變化或作為政策依據。
  - Proponents: Helen Johns, Paul Ormerod
- **科學經濟學框架 (Scientific Economics Framework)** (real-world economics review, issue no. 47)
  - 主張經濟學應像地質學或生物學一樣，專注於識別可測量的因果機制而非僅關注均衡狀態，並嚴格控制第一類錯誤（假陽性），以建立累積性的可靠知識體系。
  - Proponents: Peter Dorman
- **能力方法與道德科學 (Capabilities Approach & Moral Science)** (real-world economics review, issue no. 47)
  - 認為經濟學應回歸為道德科學，以擴展人的自由和能力為發展的核心目標，批判傳統效用主義、自由主義及羅爾斯主義的不足，強調消除「不自由」來源。
  - Proponents: Amartya Sen, L. A. Duhs
- **多元資本貧困理論 (Multi-Capital Poverty Theory)** (real-world economics review, issue no. 47)
  - 將貧困原因從單純的經濟資本擴展至社會、政治、文化、強制性和自然資本，並區分貧困的存量（長期）與流量（暫時性/脆弱性），強調社會保護策略需針對不同風險類型。
  - Proponents: Paul Shaffer
- **負自由與經濟自由指數 (Negative Liberty & Economic Freedom Index)** (real-world economics review, issue no. 47)
  - 定義經濟自由為「消極自由」，即個體免受外部干涉從事市場活動的權利，反對將積極權利（如就業權）納入此定義，並主張該指標與社會進步呈正相關。
  - Proponents: Joshua C. Hall, Robert A. Lawson, Will Luther
- **金融不穩定假說 (Financial Instability Hypothesis)** (real-world_economics_review_issue_48.pdf)
  - 資本主義具有內在的不穩定性和危機傾向，其關鍵的破壞機制是隨著債務增長而進行的投機行為。
  - Proponents: Hyman Minsky
- **反身性理論 (Reflexivity)** (real-world_economics_review_issue_48.pdf)
  - 金融市場不僅反映現狀，參與者的偏見會改變基本面；這種雙向循環連接會導致自我強制的泡沫和崩潰，而非趨向均衡。
  - Proponents: George Soros
- **複雜系統與非正態分佈模型** (real-world_economics_review_issue_48.pdf)
  - 經濟系統類似物理學中的複雜系統，小擾動可能導致巨大後果；傳統的高斯分佈模型低估了極端事件的概率，需要基於數據而非教條公理的科學方法。
  - Proponents: JP Bouchaud
- **凱恩斯國際清算聯盟提案** (real-world_economics_review_issue_48.pdf)
  - 改革國際貨幣體系，建立超國家清算機構，要求順差國承擔調整國際收支失衡的主要責任，以促進全球充分就業並防止通縮壓力輸出。
  - Proponents: Paul Davidson, John Maynard Keynes
- **後凱因主義經濟學 (Post-Keynesian Economics)** (real-world economics review, issue no. 49)
  - 認為金融危機是新自由主義範式的必然結果，強調債務、貨幣生產經濟以及有效需求的重要性，批評主流經濟學未能預測危機。
  - Proponents: Steve Keen, Thomas I. Palley, James K. Galbraith
- **批判實在論與社會本體論 (Critical Realism & Social Ontology)** (real-world economics review, issue no. 49)
  - 主張經濟學方法應符合研究對象的本體論性質（開放系統、湧現特性），批評新古典經濟學錯誤地將封閉系統的物理學方法應用於社會科學。
  - Proponents: Tony Lawson, Edward Fullbrook
- **可持續發展經濟學 (Sustainability Economics)** (real-world economics review, issue no. 49)
  - 挑戰新古典經濟學的單一貨幣視角，強調自然資本、社會資本與物質資本的不可完全替代性，主張以多元維度評估福利與效率。
  - Proponents: Peter Söderbaum, Robert Costanza
- **明斯基金融不穩定假說 (Minsky Financial Instability Hypothesis)** (real-world economics review, issue no. 50)
  - 在金融資本主義經濟中，信貸具有順週期性，導致系統性風險在擴張期內生性地增加，最終引發債務通縮和危機。在新自由主義時代，資產價格而非銀行風險厭惡度成為信貸供給的主要調節器。
  - Proponents: Hyman P. Minsky, Korkut Ertürk, Gökcer Özgür
- **凱恩斯流動性偏好與低利率政策 (Keynesian Liquidity Preference & Cheap Money)** (real-world economics review, issue no. 50)
  - 長期低利率是實現充分就業和穩定的關鍵，資本管制是為了維持國內貨幣自主權的必要手段。主流經濟學誤讀了凱恩斯，忽視了其對債務管理和長期利率結構的重視。
  - Proponents: John Maynard Keynes, Geoff Tily
- **生態宏觀經濟學 (Ecological Macroeconomics)** (real-world economics review, issue no. 50)
  - 承認物理資源和環境的增長限制，主張將宏觀經濟政策從單純的材料消費增長轉向人力資本、自然資本和能源節約型基礎設施的投資，以解決氣候變化和人口老齡化的困境。
  - Proponents: Jonathan M. Harris, Herman Daly
- **新華爾街體系與影子銀行 (New Wall Street System & Shadow Banking)** (real-world economics review, issue no. 50)
  - 金融系統從傳統的「發起並持有」轉變為「發起並分銷」，通過高槓桿、衍生品和影子銀行體系進行投機性套利，導致系統性脆弱性和信貸緊縮。
  - Proponents: Peter Gowan, Hyman P. Minsky
- **非遍历性與有效市場假說的批判 (Critique of Efficient Market Hypothesis via Non-ergodicity)** (real-world economics review, issue no. 50)
  - 主流經濟學基於「遍歷性」假設（未來可由過去統計推導），而現實世界是非遍歷的（充滿根本性不確定性）。凱恩斯的流動性理論強調契約和流動性在應對不確定性中的作用，而非依賴無摩擦的有效市場。
  - Proponents: Paul Davidson, John Maynard Keynes
- **不平等作為政策理論 (Inequality as Policy)** (real-world economics review, issue no. 51)
  - 美國自1979年以來的經濟不平等並非技術進步或全球化的自然結果，而是旨在削弱勞工談判權力、增強資本權力的有意識政策選擇。
  - Proponents: John Schmitt
- **全球公地與共同常識 (Global Commons and Common Sense)** (real-world economics review, issue no. 51)
  - 將大氣層、金融流動性、海洋漁業和自然資源視為「全球公地」，主張基於平等權利原則進行全球監管和收益分配，以解決市場失靈和結構性失衡。
  - Proponents: Jorge Buzaglo
- **經理主義批判 (Critique of Managerialism)** (real-world economics review, issue no. 51)
  - 美國汽車業的衰落源於「經理主義」過度依賴財務結果導向的管理會計和科層結構，導致無法有效吸收日本精益生產系統（JMS）和豐田生產系統（TPS）。
  - Proponents: Robert R. Locke, H. Thomas Johnson
- **金融化與新自由主義危機 (Financialization and Neoliberal Crisis)** (real-world economics review, issue no. 51)
  - 新自由主義通過金融化轉移利潤，導致實體投資不足和資產價格泡沫；金融脫鉤監管最終引發系統性崩潰，標誌著該模式的終結。
  - Proponents: Bill Lucarelli
- **貨幣經理資本主義 (Money Manager Capitalism)** (real-world economics review, issue no. 51)
  - 基於海曼·明斯基的金融不穩定假說，指出由對沖基金和養老金等機構主導的、高度槓桿化的「貨幣經理資本主義」系統性地低估風險，導致金融危機。
  - Proponents: L. Randall Wray, Hyman Minsky
- **複雜適應系統經濟學 (Complex Adaptive Systems Economics)** (real-world economics review, issue no. 51)
  - 批評主流宏觀經濟模型（如DSGE）基於理性代表個體和均衡假設，主張經濟應被視為由互動個體組成的複雜適應系統，需引入網絡分析和非均衡動態。
  - Proponents: Alan Kirman
- **Pragmatism vs. Social Engineering** (real-world_economics_review_issue_52.pdf)
  - Contrasts the 'social engineering' view (seeking optimal, one-size-fits-all institutional solutions) with Pragmatism (viewing social problems as incomplete and requiring active, decentralized social l
  - Proponents: David Ellerman, John Dewey, Charles Sabel
- **Debt-Deflation Theory** (real-world_economics_review_issue_52.pdf)
  - Argues that when private debt growth stabilizes or declines, aggregate demand falls sharply, causing recessions or depressions, even if GDP is growing.
  - Proponents: Steve Keen, Irving Fisher, Hyman Minsky
- **Modern Finance Critique** (real-world_economics_review_issue_52.pdf)
  - Posits that modern finance theories (EMH, CAPM, M&M, Black-Scholes) are methodologically flawed because they were designed to shape reality rather than predict it, leading to increased systemic fragil
  - Proponents: Esteban Pérez Caldentey, Matías Vernengo
- **Keynes Moment / Behavioral Expectations** (real-world_economics_review_issue_52.pdf)
  - Identifies a 'Keynes moment' within the Minsky moment, emphasizing that conventional, non-rational expectations and herd behavior drove the crisis, rather than just structural financial flaws.
  - Proponents: Thodoris Koutsobinas
- **Tragedy of Law and Finance** (real-world_economics_review_issue_52.pdf)
  - Frames financial regulation as a tragic conflict between two incompatible virtues: Transparency (disclosure) and Portfolio Management (diversification/hedging), neither of which can fully succeed alon
  - Proponents: David A. Westbrook
- **Socio-Technical Governance and Hyper-Connectivity** (real-world economics review, issue no. 53)
  - Analyzes the May 6, 2010 flash crash as an emergent property of 'hyper-connected' electronic trading networks lacking symmetric regulatory governance. It argues that technical connectivity often outpa
  - Proponents: Paul A. David
- **Steady-State Economy Critique** (real-world economics review, issue no. 53)
  - Argues that 'steady-state capitalism' is a contradiction because growth is structurally embedded in capitalist reproduction via competition and shareholder pressure. It posits that ecological sustaina
  - Proponents: Richard Smith, Herman Daly (critiqued)
- **Modern Monetary Theory (MMT) / Sovereign Currency Framework** (real-world economics review, issue no. 53)
  - Asserts that a sovereign government issuing its own fiat currency cannot face financial insolvency or be forced to default. Deficits are not 'financed' by taxes or bonds but are net injections of priv
  - Proponents: Yeva Nersisyan, L. Randall Wray
- **Post-Keynesian Uncertainty and Animal Spirits** (real-world economics review, issue no. 53)
  - Highlights the failure of mainstream economics to account for fundamental uncertainty and 'animal spirits,' arguing that rational expectations and efficient market hypotheses are flawed. It advocates 
  - Proponents: Jonathan Kirshner, Paul Davidson, Robert Skidelsky, Peter Clarke
- **Critique of Neoclassical Theory of the Firm** (real-world economics review, issue no. 53)
  - Demonstrates mathematical and empirical flaws in the neoclassical model of perfect competition, specifically arguing that profit maximization via equating marginal cost and revenue is inconsistent wit
  - Proponents: Steve Keen, Russell Standish
- **認知失調理論在經濟學中的应用** (real-world economics review, issue no. 54)
  - 該理論認為當現實事件與堅定的信念（如自由市場意識形態）相衝突時，經濟學家會產生心理不適，從而通過扭曲事實和否認來維護原有信念，而非像科學家那樣根據事實改變觀點。
  - Proponents: Adam Kessler, Leon Festinger
- **去槓桿化與總需求理論** (real-world economics review, issue no. 54)
  - 強調私人部門債務水平對總需求的影響。當債務水平過高時，經濟面臨去槓桿化壓力，即使債務下降速度放緩，只要債務仍在減少，就會從總需求中扣除，導致經濟衰退或復甦乏力。
  - Proponents: Steve Keen, John Maynard Keynes
- **異端宏觀經濟學：資產價格泡沫與全球失衡** (real-world economics review, issue no. 54)
  - 主張在利潤導向的宏觀經濟體系中，資產價格泡沫扮演關鍵角色；並建議從資本帳戶角度理解全球失衡，而非僅關注經常帳戶，強調美國金融系統在全球資金迴圈中的核心作用。
  - Proponents: Korkut Alp Ertürk, Hyman Minsky
- **經濟決策的認識論：不確定性與HILFOs** (real-world economics review, issue no. 54)
  - 區分了確定性、風險、不確定性和高影響低頻率事件（HILFOs）。指出隨著規劃時間軸延長，預測能力急劇下降，傳統優化模型失效，強調韌性、情景規劃和股權融資的重要性。
  - Proponents: Lewis L. Smith
- **比較優勢的虛幻性批判** (real-world economics review, issue no. 54)
  - 通過邏輯推導證明李嘉圖比較優勢模型存在內在矛盾，指出其忽視了系統內部的生產率差異，實際上揭示了貿易利益分配中的階級偏向，而非普遍互利的幻象。
  - Proponents: John Duffield, David Ricardo
- **充足經濟與貨幣社會建構論** (real-world economics review, issue no. 54)
  - 認為貨幣是社會建構而非自然商品，當前基於債務的銀行創造貨幣體系驅動增長且忽視環境與無酬勞動。主張將貨幣系統民主化，轉向滿足基本需求的「充足經濟」。
  - Proponents: Mary Mellor, Geoffrey Ingham, L. Randall Wray
- **批判性现实主义经济学方法论** (real-world_economics_review_issue_55.pdf)
  - 主张经济学应关注深层因果机制而非表面相关性，反对新古典经济学的封闭系统假设和方法论个人主义，强调社会结构的独立性和不可还原性。
  - Proponents: Tony Lawson, Lars Pålsson Syll, John Maynard Keynes
- **债务通缩与金融不稳定性理论** (real-world_economics_review_issue_55.pdf)
  - 认为债务具有自我扩张的复利特性，最终会超过经济体的偿付能力，导致结构性危机；主流均衡模型忽视了债务过剩带来的政治和社会后果。
  - Proponents: Michael Hudson, Hyman Minsky (隐含)
- **比较优势的批判性重构** (real-world_economics_review_issue_55.pdf)
  - 指出传统比较优势理论基于七个有问题的假设（如资本完全不可流动、无外部性等），在现实世界中可能导致收入不平等加剧和长期增长停滞。
  - Proponents: Ian Fletcher, David Ricardo (被批判对象)
- **全球金融中介与货币改革理论** (real-world_economics_review_issue_55.pdf)
  - 分析以美元为核心的国际货币体系如何导致全球失衡和金融脆弱性，主张通过特别提款权（SDR）或国际清算联盟进行货币体系改革。
  - Proponents: Jane D’Arista, Korkut Erturk, John Maynard Keynes
- **發展作為人權 (Development as a Human Right)** (real-world economics review, issue no. 56)
  - 主張發展不應僅視為經濟增長，而是解放人類潛能、擴大選擇權的過程，包含食物、住所、醫療及政治參與等基本權利，強調長期社會議程優先於短期財務回報。
  - Proponents: Ali Kadri, Amartya Sen
- **公理學方法與經濟理論基礎 (Axiomatic Method in Economic Theory)** (real-world economics review, issue no. 56)
  - 論證經濟危機本質上是理論危機，主張不能因為新古典或凱因斯主義的公理有缺陷就放棄公理學方法，而應重建符合現實內容的新公理體系，而非依賴直覺或經驗法則。
  - Proponents: Egmont Kakarot-Handtke, John Maynard Keynes
- **有效市場假說的解構 (Deconstruction of Efficient Market Hypothesis)** (real-world economics review, issue no. 56)
  - 指出EMH存在「公平遊戲」（價格不可預測）與「價格正確」（反映基本面價值）兩種混淆解釋，認為後者依賴無法驗證的均衡模型，且該假說深受芝加哥學派意識形態影響，缺乏實證基礎。
  - Proponents: Bernard Guerrien, Ozgur Gun, Eugene Fama, Robert Shiller
- **極大化極大決策規則 (Maxi-Max Decision Rule)** (real-world economics review, issue no. 56)
  - 批評經濟學家在政策制定中採用「極大化極大」的烏托邦式決策規則（追求最大可能收益而無視失敗風險），這在倫理上是不正當的，並導致了對發展中國家和轉型經濟體的破壞性結構調整。
  - Proponents: George DeMartino, Robert Nozick
- **綠色資本主義的失敗 (Failure of Green Capitalism)** (real-world economics review, issue no. 56)
  - 論證在資本主義利潤最大化邏輯下，無法將環境保護與商業利益系統性對齊；市場機制（如碳稅、碳排放交易）無法解決生態崩潰，必須透過民主計劃和社會主義來取代資本主義。
  - Proponents: Richard Smith, Paul Hawken (批判對象)
- **勞動需求目標財政政策 (Labor Demand Targeting Fiscal Policy)** (real-world economics review, issue no. 56)
  - 主張傳統總需求管理無法實現充分就業，建議政府應直接針對勞動需求缺口進行干預，通過永久性的公共部門就業計畫（最後僱主機制）來穩定經濟和維持充分就業。
  - Proponents: Pavlina R. Tcherneva, John Maynard Keynes
