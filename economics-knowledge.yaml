- **政府報銷交換信用額 (Government Reimbursement Exchange Credits, GREC)** (real-world economics review, issue no. 71)
  - Alan Harvey提出的另一種補充貨幣形式，可為實體紙幣或數字形式，用於支付稅款、公用事業費用和政府服務，旨在刺激流動性而不依賴歐元。
- **可擴展的面紗 (Expandable Veil)** (real-world economics review, issue no. 71)
  - Ib Ravn提出的類比概念，將貨幣視為覆蓋實體資產的「面紗」或拼布被子；貨幣供應過度擴張會形成泡沫，緊縮則導致經濟窒息。
- **大而不能倒 (Too Big To Fail, TBTF)** (real-world economics review, issue no. 71)
  - 指大型金融機構因系統性重要性而獲得隱性政府擔保，導致道德風險，使國家必須在危機時用納稅人資金救助銀行。
- **Staatsvolk vs. Marktvolk** (real-world economics review, issue no. 71)
  - Wolfgang Streeck提出的概念，分別指「國家公民」（國內選民）和「市場人民」（國際債權人/投資者），論述國家政策如何傾向於後者以維持債務融資能力。
- **官僚資本主義 (Bureaucratic Capitalism)** (real-world economics review, issue no. 71)
  - Richard Smith描述的中國經濟特徵，即共產黨精英通過控制國有企業和市場機制進行財富積累，同時伴隨嚴重的環境破壞和腐敗。
- **功能性收入分配 (FID)** (real-world economics review, issue no. 72)
