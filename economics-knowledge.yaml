  - Formula: p = (1 + r) * A * p + w * l
  - 基於斯拉法（Sraffa）模型的簡化形式，顯示商品價格（p）取決於投入係數矩陣（A）、利潤率（r）、工資率（w）和勞動係數（l），證明價格內生於分配關係，而非單純由技術決定。
- **資本/收入比率基本法則** (real-world economics review, issue no. 75)
  - Formula: β = K/Y = s/g
