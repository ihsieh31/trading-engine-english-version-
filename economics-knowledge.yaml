- **演繹主義 (Deductivism)** (real-world economics review, issue no. 74)
- **債務最小化 (Debt Minimization)** (real-world economics review, issue no. 75)
  - 在資產負債表衰退期間，家庭和企業優先償還債務而非借貸投資的行為模式，導致總需求不足。
- **最後借款人 (Borrower of Last Resort)** (real-world economics review, issue no. 75)
  - 當私人部門停止借貸時，政府必須通過財政政策進行借貸和支出，以吸收私人部門的剩餘儲蓄，防止經濟陷入通縮螺旋。
