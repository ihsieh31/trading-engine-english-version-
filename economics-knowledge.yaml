  - Capitalists' apprehension that the current mode of power might crumble, manifested empirically by a shift from forward-looking capitalization to reliance on current earnings (high correlation between 
- **滯脹/長期停滯 (Secular Stagnation)** (real-world economics review, issue no. 78)
  - 由勞倫斯·薩默斯等人推廣的概念，指由於結構性因素導致真實中性利率極低，貨幣政策失效，需要財政擴張來維持增長；但文章作者多反對此觀點，認為這是對央行控制力的誤解。
- **合成移民 (Synthetic Immigration)** (real-world economics review, issue no. 78)
  - 馬歇爾·奧弗貝克提出，指通過外包和全球供應鏈將生產轉移到低工資國家，其對國內就業和工資的壓制效果等同於開放邊界的大規模移民。
- **福利國家破壞 (Welfare State Sabotage)** (real-world economics review, issue no. 78)
  - 帕芙琳娜·切爾涅娃提出的概念，指特朗普政府通過任命敵視公共機構的人選從內部瓦解新政以來的社會安全網和宏觀穩定機制，同時用短期就業承諾作為掩護。
- **社區福祉 (Community Well-being)** (real-world economics review, issue no. 78)
  - 安妮·梅休強調，投票行為不僅基於個人經濟利益，還基於對社區身份、歸屬感和對精英統治的怨恨，標準經濟指標無法解釋這種憤怒。
- **增長主義 (Growthism)** (real-world economics review, issue no. 78)
  - 赫曼·戴利描述的意識形態，盲目追求GDP增長而忽視環境代價和分配不公，是新古典經濟學的基礎錯誤，也是特朗普政策的根源。
- **Labor Underutilization (U-6)** (real-world economics review, issue no. 79)
  - A broader measure of unemployment that includes the officially unemployed plus marginally attached workers and those employed part-time for economic reasons, revealing the true extent of joblessness.
- **Separative Self** (real-world economics review, issue no. 79)
  - A concept in feminist economics describing the neoclassical assumption of individuals as autonomous, self-sufficient agents, ignoring human interdependence and relational needs.
- **Financialization** (real-world economics review, issue no. 79)
  - The increasing role of financial motives, financial markets, financial actors, and financial institutions in the operation of the domestic and international economies.
- **Developmental State** (real-world economics review, issue no. 79)
  - A state that actively intervenes in the economy to guide industrial policy, protect infant industries, and promote export-led growth, contrasting with laissez-faire approaches.
- **Cobweb Theorem** (real-world economics review, issue no. 79)
  - A model demonstrating how supply and demand dynamics can lead to cyclical instability in markets, particularly when production decisions are based on past prices.
- **Endogenous Preferences** (real-world economics review, issue no. 80)
  - The idea that individual tastes and political preferences are shaped by market structures and social institutions, rather than being fixed or exogenous.
- **Pareto Optimality** (real-world economics review, issue no. 80)
  - A state where no one can be made better off without making someone else worse off; criticized in the text as a normative, value-laden concept that ignores equity.
- **Rebound Effect** (real-world economics review, issue no. 80)
  - The phenomenon where improvements in resource efficiency lead to increased consumption or production, thereby offsetting potential environmental gains.
- **Credit Creation Theory** (real-world economics review, issue no. 80)
  - The theory that banks create money ex nihilo when they issue loans, contrasting with the loanable funds or money multiplier models.
- **Positional Analysis (PA)** (real-world economics review, issue no. 80)
  - An alternative to Cost-Benefit Analysis that evaluates policies based on multidimensional impacts and varying ideological orientations, rather than reducing everything to monetary terms.
- **Fundamental Microeconomic Assumption (FMA)** (real-world economics review, issue no. 80)
  - The proposition that nominal prices display downward rigidity, which is central to explaining involuntary unemployment in Keynesian models.
- **Familial Market** (real-world economics review, issue no. 80)
  - A market structure based on family units and moral principles, as opposed to the liberal 'free market' based on atomistic individuals and price signals.
- **Involuntary Unemployment** (real-world_economics_review_issue_81.pdf)
  - A situation where workers willing to work at current wages cannot find jobs due to insufficient aggregate demand for the goods they produce, not due to wage rigidity.
- **Derived Demand for Labor** (real-world_economics_review_issue_81.pdf)
  - The concept that the demand for labor is not independent but is derived from the demand for the final output produced by that labor.
- **Natural Rate of Unemployment** (real-world_economics_review_issue_81.pdf)
  - The New Classical concept that the economy gravitates to a specific level of unemployment determined by labor market frictions, regardless of monetary policy.
- **Public Non-Market Economy** (real-world_economics_review_issue_81.pdf)
  - The sector of the economy where production is financed collectively (taxes) and decided collectively (voting) to meet societal needs, distinct from the profit-driven market economy.
- **Lucas Paradox** (real-world_economics_review_issue_81.pdf)
  - The empirical observation that capital flows from poorer to richer countries, contradicting the neoclassical prediction of capital flowing from capital-abundant to capital-scarce regions.
- **Economic Complexity Index (ECI)** (real-world_economics_review_issue_81.pdf)
  - A metric measuring the productive knowledge of a country based on the diversity and ubiquity of its exports. High complexity correlates with high income and growth.
- **Phishing for Phools** (real-world_economics_review_issue_81.pdf)
  - A term describing market failures where businesses exploit consumer psychological biases and informational asymmetries to extract profits, harming consumer welfare.
- **Transient Development** (real-world_economics_review_issue_81.pdf)
  - A production model focusing on the time-bound process of creating tools (capital) to produce output, emphasizing the division of labor between tool-makers and producers.
- **奈特氏不確定性 (Knightian Uncertainty)** (real-world economics review, issue no. 83)
  - 指無法用機率分佈量化的不確定性，與可計算風險不同，是企業存在和經理人發揮想像力的基礎。
- **帕累托最適性 (Pareto Optimality)** (real-world economics review, issue no. 83)
  - 一種狀態，在這種狀態下無法使任何人的狀況變好而不使其他人的狀況變壞；文中指出此概念被用來合理化現狀並忽視分配不公。
- **邊際生產力理論 (Marginal Productivity Theory)** (real-world economics review, issue no. 83)
  - 主張生產要素（如勞動）的報酬等於其邊際產出，文中批評此理論被用來證明資本主義分配的天然正當性。
- **無知之幕 (Veil of Ignorance)** (real-world economics review, issue no. 83)
  - 羅爾斯的思想實驗，假設人們在不知道自己在社會中位置的情況下設計社會制度，以此來定義正義。
- **技術與知識文化 (Technik Culture)** (real-world economics review, issue no. 83)
  - 德國商業經濟學（BWL）傳統，強調實務導向和管理技能，與美國偏向數理模型的新古典經濟學形成對比。
- **儲蓄率修復 (Saving Rate Repair)** (real-world economics review, issue no. 83)
  - Philip George提出的概念，指家庭在資產泡沫破裂後，必須通過降低消費來提高儲蓄率，以恢復受損的淨值，這解釋了為何財政刺激效果有限。
- **核心經濟 (Core Economy)** (real-world economics review, issue no. 84)
  - 指家庭和社區內部的生產、分配和消費活動，旨在維持成員的生存和福祉，通常不涉及金錢交易，而是基於親密關係、互惠和情感交換。
- **公共目的經濟 (Public Purpose Economy)** (real-world economics review, issue no. 84)
  - 由政府和非營利組織組成，旨在實現超越利潤的最大化目標（如公共健康、國防、教育），其資金來源為集體支付（稅收或捐贈）。
- **集體選擇與集體融資 (Collective Choice and Financing)** (real-world economics review, issue no. 84)
  - 公共經濟系統的兩個基本驅動力。集體選擇通過政治過程（如選舉）確定社會需求，集體融資則通過稅收等機制為生產提供資金，兩者共同決定公共產品的供給。
- **結構性無責任 (Structured Unaccountability)** (real-world economics review, issue no. 84)
  - 現代官僚體系和企業中出現的現象，員工僅對其特定職能部門負責，而無需對最終結果或客戶負責，導致整體系統缺乏真正的問責制。
- **雙峰經濟 (Bimodal Economy)** (real-world economics review, issue no. 84)
  - 由Galbraith提出，區分為競爭性的「市場部門」（低附加值、規模報酬遞減）和壟斷性的「規劃部門」（高附加值、規模報酬遞增），後者是現代工業經濟的主導力量。
- **生物物理限制 (Biophysical Imperatives)** (real-world economics review, issue no. 84)
  - 經濟生產必須遵循熱力學定律和生態限制，主流經濟學忽視了能源投入和廢物產出的物理現實，導致對可持續性的誤判。
- **Barge Economics** (real-world_economics_review_issue_85.pdf)
  - A metaphor for global capital mobility where factories float like barges to exploit arbitrage opportunities in labor, regulation, and taxes, prioritizing profit redistribution over productivity gains.
- **Systemic Fear Index** (real-world_economics_review_issue_85.pdf)
  - A metric measuring the correlation between stock prices and past earnings; higher correlation indicates greater fear among capitalists regarding the future viability of the system.
- **Capitalized Power** (real-world_economics_review_issue_85.pdf)
  - Defined as the ratio of the S&P 500 price index to the average wage rate, representing the relative power of equity owners over the underlying population.
- **Elite Appropriation** (real-world_economics_review_issue_85.pdf)
  - The strategic process by which political elites co-opt, distort, or utilize neoliberal ideas to achieve neoconservative goals, such as suppressing labor and consolidating corporate power.
- **Money Multiplier vs. Endogenous Money** (real-world_economics_review_issue_85.pdf)
  - The contrast between the mainstream view that banks lend existing deposits (money multiplier) and the Post-Keynesian view that banks create new money through lending (endogenous money).
- **Pareto Optimality Critique** (real-world_economics_review_issue_85.pdf)
  - The argument that neoliberal globalization violates Pareto optimality because the losses suffered by labor often exceed the gains to capital, resulting in a net social loss.
- **按需付費世界 (Pay-as-you-go world)** (real-world economics review, issue no. 86)
  - 一種經濟模式，人們不再擁有資產，而是為使用服務付費，這依賴於全面的監控和數據收集，導致個人對控制金融帳簿和訪問權限的實體產生依賴。
- **行為市場失靈 (Behavioral market failure)** (real-world economics review, issue no. 86)
  - 當消費者因認知偏差、缺乏資訊或被企業操縱（如「釣魚」行為）而做出損害自身福祉的選擇時發生的市場失效，傳統經濟學未充分涵蓋此類問題。
- **階層權力 (Hierarchical Power)** (real-world economics review, issue no. 86)
  - 在組織中，由控制下屬數量所定義的權力，作者認為這是解釋企業內部收入差異的主要社會因素，而非個人生產力。
- **軟基礎設施 (Soft Infrastructure)** (real-world economics review, issue no. 86)
  - 指由助推措施形成的選擇架構和社會規範，雖無形但對經濟產能和個人福祉具有類似硬基礎設施的重要作用。
- **政治等級制度 (Political Hierarchy)** (real-world economics review, issue no. 86)
  - 在非資本主義經濟體中，資源分配和福利獲取往往取決於個人在政治體系中的地位，而非貨幣收入，導致隱性的嚴重不平等。
- **互聯網化 (Internetization)** (real-world economics review, issue no. 86)
  - 作者提出的概念，結合全球化與電子連接性，強調數位技術對經濟治理透明度和公民參與的影響。
- **Growthism** (Real-World Economics Review, Issue no. 87: Economics and the Ecosystem (2019))
  - The ideological belief that economic growth is the costless, win-win solution to all social and environmental problems, which Daly argues now creates more problems than it solves.
- **Uneconomic Growth** (Real-World Economics Review, Issue no. 87: Economics and the Ecosystem (2019))
  - Growth where the costs of environmental degradation and resource depletion (illth) exceed the benefits of additional production, making society poorer in an inclusive sense.
- **Meta-externalities** (Real-World Economics Review, Issue no. 87: Economics and the Ecosystem (2019))
  - Unwanted side-effects of the entire economic system upon its physical and social contexts, such as the degradation of political culture by individualism or the collapse of ecosystem services, which ar
- **Lauderdale Paradox** (Real-World Economics Review, Issue no. 87: Economics and the Ecosystem (2019))
  - The inverse correlation between 'public wealth' (abundant natural resources and commons) and 'private riches' (scarcity-driven market value), where capitalism creates artificial scarcity to generate p
- **Entropic Flow** (Real-World Economics Review, Issue no. 87: Economics and the Ecosystem (2019))
  - The linear, irreversible process of converting low-entropy natural resources into high-entropy waste, contrasting with the circular flow models of mainstream economics.
- **Positional Analysis** (Real-World Economics Review, Issue no. 87: Economics and the Ecosystem (2019))
  - A democracy-oriented economic assessment method that evaluates non-monetary impacts and ideological orientations, contrasting with the technocratic Cost-Benefit Analysis of neoclassical economics.
- **計量經濟學作為騙術 (Con Art)** (real-world economics review, issue no. 88)
  - 指計量經濟學被用作證明任何預設信念的工具，通過數據挖掘、靈活的模型設定和意義水準選擇來產生符合意識形態需求的結果，而非發現真理。
- **均衡數據 (Equilibrium Data)** (real-world economics review, issue no. 88)
  - 理論上用於驗證經濟均衡預測的數據；作者認為由於市場調整緩慢和非均衡狀態普遍，現實中幾乎不存在純粹的均衡數據。
- **抽象化 (Abstractification)** (real-world economics review, issue no. 88)
  - 遊戲理論和作業研究中將複雜的社會政治關係剝離，簡化為純數學模型（如支付矩陣）的過程，導致模型脫離現實應用。
- **基期問題 (Base-year Problem)** (real-world economics review, issue no. 88)
  - 計算實際GDP時，不同基期的選擇會導致不同的增長率結果，因為相對價格隨時間變化，使得實際GDP的測量具有內在的不確定性。
- **耗散結構 (Dissipative Structures)** (real-world economics review, issue no. 88)
  - 來自熱力學的概念，指開放系統通過不斷消耗能量和增加熵來維持有序狀態；應用於經濟學時，強調經濟活動對能源的依賴及其環境後果。
- **私人部門 excess saving (私人部門超額儲蓄)** (real-world economics review, issue no. 88)
  - 當私人部門的儲蓄超過投資時產生的餘額；根據宏觀會計恆等式，這必須由公共部門赤字或外部盈餘來吸收。
- **人類之手 (Humanistic Hand)** (real-world economics review, issue no. 88)
  - 繼「看不見的手」、「看得見的手」和「消失的手」之後提出的第四個經濟階段隱喻，強調經濟組織應基於信任、合作和共同目的，以改善人類福祉為核心。
- **主權貨幣 (Sovereign Currency)** (real-world economics review, issue no. 89)
  - 指一個國家政府能夠自主決定貨幣帳戶、強制徵收以該貨幣計價的稅收、發行該貨幣債務，且匯率浮動、無外幣債務的貨幣狀態。
- **預算約束 (Budget Constraint)** (real-world economics review, issue no. 89)
  - 主流觀點認為政府像家庭一樣受預算限制。MMT認為主權貨幣政府沒有傳統意義上的預算約束，因為它永遠不會「沒錢」或違約（除非自我設限）。
- **功能性財政 (Functional Finance)** (real-world economics review, issue no. 89)
  - 由Abba Lerner提出，主張財政政策應根據宏觀經濟目標（如充分就業和價格穩定）來調整，而不是為了平衡預算。
- **工作保證 (Job Guarantee / Employer of Last Resort)** (real-world economics review, issue no. 89)
  - MMT建議的政策工具，由政府作為最後僱主，以固定工資提供就業機會給所有願意工作者，以此作為自動穩定器並錨定物價。
- **實質資源約束 (Real Resource Constraints)** (real-world economics review, issue no. 89)
  - MMT承認政府支出受限於實體經濟中的可用資源（如勞動力、資本、原材料）。過度支出會導致通貨膨脹，而非資金短缺。
- **貨幣主權光譜 (Spectrum of Monetary Sovereignty)** (real-world economics review, issue no. 89)
  - 批評者指出，貨幣主權並非二元對立，而是一個連續體。發展中國家因依賴外幣債務或進口必需品，其實際政策空間遠小於美國等核心國家。
- **差異性利潤 (Differential Profit)** (real-world economics review, issue no. 90)
  - 指特定企業或國家資本家相對於其他競爭對手所獲取的利潤比例，被視為衡量資本權力和國家「偉大」程度的指標。
- **全球儲蓄過剩 (Global Savings Glut)** (real-world economics review, issue no. 90)
  - 指非美國國家的儲蓄超過其國內投資機會，導致資本流向美國，從而強加給美國貿易赤字和資產泡沫，而非美國國內儲蓄不足所致。
- **吞吐量 (Throughput)** (real-world economics review, issue no. 90)
  - 生態經濟學概念，指從環境中提取低熵資源並向環境排放高熵廢物的物質能量流動過程，是經濟活動的物理基礎。
- **權力倫理 (Power Ethos)** (real-world economics review, issue no. 90)
  - 在等級組織中，資源分配遵循「按其社會影響力分配」的原則，即職位越高、控制的下屬越多，收入越高。
- **稅收驅動貨幣 (Tax-Driven Money)** (real-world economics review, issue no. 90)
  - 貨幣價值來源於國家強制徵收稅款的規定，私人部門必須獲取該貨幣以履行稅務義務，從而賦予貨幣需求。
- **自然利率 (Natural Interest Rate)** (real-world economics review, issue no. 90)
  - 主流宏觀經濟學中的理論變量，指使經濟處於充分就業且物價穩定的利率水平，作者質疑其可測量性及與實際資本回報率的脫節。
- **封閉系統與開放系統 (Closed vs. Open Systems)** (real-world economics review, issue no. 91)
  - 封閉系統假設變量孤立且行為一致（均衡視角）；開放系統承認外部影響、路徑依賴和歷史過程（複雜性視角）。
- **合成謬誤 (Fallacy of Composition)** (real-world economics review, issue no. 91)
  - 指對個體成立的邏輯不一定適用於整體，在複雜性視角中，宏觀結果不能簡單從微觀理性推導出來。
- **數據科學方法 (Data Science Approach)** (real-world economics review, issue no. 91)
  - 相對於結構計量經濟學，強調「數據優先」，通過探索數據模式來理解經濟，而非強加先驗的均衡理論框架。
- **穩態經濟 (Steady-State Economy, SSE)** (real-world economics review, issue no. 91)
  - 一種經濟模型，主張保持人口和資本存量恆定，物質吞吐量在生態系統再生和吸收能力範圍內，以實現可持續發展。
- **國家會計單位 (National Unit of Account, Nua)** (real-world economics review, issue no. 91)
  - 在單一貨幣區（如歐元區）內，保留統一法定貨幣的同時，引入國家層面的會計單位，以便通過價格指數調整來恢復各國的競爭力，避免競爭性通縮。
- **匯票 (Bill of Exchange)** (International Finance)
  - 一種支付命令，用於國際貿易融資，允許出口商在貨物運送期間獲得即時資金，並由倫敦的承兑行或銀行進行貼現。
- **償還基金 (Sinking Fund)** (International Finance)
  - 借款人（通常是政府）每年撥款用於贖回債券或減少債務本金的基金，確保債券最終能以面值贖回，增強投資者信心。
- **承銷 (Underwriting)** (International Finance)
  - 金融機構承諾購買未售出的證券，以保證貸款或發行的成功，作為回報收取佣金，並承擔證券滯銷的風險。
- **生殖性債務 vs. 死重債務 (Reproductive vs. Dead-weight Debt)** (International Finance)
  - 生殖性債務用於能產生收入基礎設施建設（如鐵路），而死重債務（如軍費）則不直接增加生產能力，僅為當前支出融資。
- **Thrift** (Thrift by Samuel Smiles)
  - Private economy and domestic management; the habit of saving and using resources wisely to provide for the future, distinct from avarice.
- **Improvidence** (Thrift by Samuel Smiles)
  - The vice of spending all earnings without saving, leading to dependency, misery, and social degradation, often exacerbated by intemperance.
- **Moral Independence** (Thrift by Samuel Smiles)
  - The state of self-reliance achieved through savings, allowing an individual to resist coercion, avoid poverty, and maintain dignity.
- **Sanitary Idea** (Thrift by Samuel Smiles)
  - The concept that clean housing, ventilation, and hygiene are prerequisites for health and moral well-being, linking physical environment to economic productivity.
- **迦太基式和平 (Carthaginian Peace)** (The_Economic_Consequences_of_the_Peace.txt)
  - 指勝利者對戰敗者施加極端苛刻、旨在徹底摧毀其經濟和軍事力量的和平條款，而非尋求長期穩定與和解。
- **賠償委員會 (Reparation Commission)** (The_Economic_Consequences_of_the_Peace.txt)
  - 《凡爾賽條約》設立的機構，擁有決定德國賠款金額、支付方式及監督德國經濟生活的廣泛權力，被凱恩斯批評為缺乏民主且權力過大。
- **國際收支平衡 (Balance of Payments)** (The_Economic_Consequences_of_the_Peace.txt)
  - 一國對外貿易中出口與進口的關係。凱恩斯指出，德國必須通過增加出口和減少進口來產生順差以支付賠款，但條約卻削弱了其出口能力。
- **購買力平價與匯率脫節** (The_Economic_Consequences_of_the_Peace.txt)
  - 國內物價水平與國際匯率之間的不匹配，導致進口商品過於昂貴而出口缺乏競爭力，進一步加劇經濟混亂。
- **看得見與看不見的 (The Seen and The Unseen)** (Essays on Political Economy)
  - 分析政策或行為時的兩種視角。「看得見」是立即的、顯性的結果；「看不見的」是延遲的、隱性的機會成本或次生影響。
- **合法掠奪 (Legal Plunder)** (Essays on Political Economy)
  - 當法律違反其保護財產的初衷，轉而從一部分人手中取走財富並轉移給另一部分人時，這種制度化的行為即為合法掠奪。
- **資本 (Capital)** (Essays on Political Economy)
  - 由材料、工具和供品組成，這些都是經過人類勞動賦予價值的物品，用於提高未來生產的效率。
- **中間人 (Intermediates)** (Essays on Political Economy)
  - 指商人、銀行家等連接生產與消費的角色。社會主義者常視其為寄生蟲，但巴斯蒂亞認為他們提供了必要的服務，其報酬由市場競爭決定。
- **破窗謬誤 (The Broken Window Fallacy)** (Essays on Political Economy)
  - 錯誤地認為破壞能刺激經濟。雖然修補破窗給玻璃匠帶來收入（看得見），但店主無法將同樣的資金用於其他消費（看不見），因此社會整體財富並未增加。
- **Bubble Companies** (Memoirs of Extraordinary Popular Delusions and the Madness of Crowds)
  - Joint-stock companies formed during the South Sea Bubble era with extravagant, often nonsensical, business plans designed solely to speculate on rising stock prices.
- **Animal Magnetism** (Memoirs of Extraordinary Popular Delusions and the Madness of Crowds)
  - A theory proposed by Franz Mesmer suggesting a magnetic fluid flows through all bodies, which can be manipulated to cure diseases, later proven to be largely psychological suggestion.
- **Tulip Mania** (Memoirs of Extraordinary Popular Delusions and the Madness of Crowds)
  - A period in the Dutch Golden Age during which tulip futures were traded at exorbitant prices, representing one of the first recorded speculative bubbles.
- **Specie vs. Paper Money** (Memoirs of Extraordinary Popular Delusions and the Madness of Crowds)
  - The distinction between hard currency (gold/silver) and fiat currency (paper notes), central to the failures of John Law's system when confidence in paper waned.
- **Wealth** (The Crown of Wild Olive and Munera Pulveris)
  - Things in themselves valuable that sustain healthy and happy life; distinct from money (claims) and riches (relative possession).
- **Effectual Value** (The Crown of Wild Olive and Munera Pulveris)
  - The combination of intrinsic value in an object and the capacity in the possessor to use it; wealth only exists when both are present.
- **Illth** (The Crown of Wild Olive and Munera Pulveris)
  - Anything that does not serve to sustain or comfort the body or exercise the affections/intelligence; harmful or useless accumulation.
- **Cost vs. Price** (The Crown of Wild Olive and Munera Pulveris)
  - Cost is the quantity of labour (suffering/life lapse) necessary to obtain a thing; Price is the quantity of labour the possessor is willing to take in exchange.
- **Goddess of Getting-on** (The Crown of Wild Olive and Munera Pulveris)
  - Ruskin's critique of modern capitalism, personifying the worship of accumulation and profit for its own sake, devoid of purpose or spending.
- **投機 (Speculation)** (Successful Stock Speculation)
  - 針對不確定事物進行理論推測，在此書中特指為了獲取價差利潤而非股息收入所進行的股票買賣行為。
- **內在價值 (Intrinsic Value)** (Successful Stock Speculation)
  - 由公司的資產、當前盈利能力及未來預期盈利能力所決定的股票真實價值。
- **浮動供應量 (Floating Supply)** (Successful Stock Speculation)
  - 掌握在公眾手中且可能隨時出售的股票數量，影響市場的供需平衡。
- **桶店 (Bucket Shop)** (Successful Stock Speculation)
  - 一種非法或半合法的經紀機構，客戶的交易並未真正進入交易所，而是與經紀人對賭，經紀人從客戶虧損中獲利。
- **停損單 (Stop Loss Order)** (Successful Stock Speculation)
  - 指示經紀人在股價跌至特定價位時自動賣出的訂單，作者認為這通常會幫助操縱者或短線交易者，而不建議長期投機者使用。
- **High Finance (高層金融)** (High Finance)
  - 指代最受人尊敬、最可信賴的金融機構及其活動，其核心在於建設性、誠信及對公共利益的服務，而非單純的投機或財富積累。
- **Syndicate (辛迪加/財團)** (High Finance)
  - 為滿足龐大資金需求（如鐵路建設），由多家金融機構聯合組成的臨時合作團體，用於分擔風險和募集資本。
- **Confidence (信任/信心)** (High Finance)
  - 金融業生存的根基。它無法被強制或繼承，只能通過誠信、能力和對公眾負責的態度自願獲得。一旦喪失，金融機構將無法運作。
- **Service (服務)** (High Finance)
  - 成功人士應具備的自我約束態度，認識到其財富和地位是基於對社會的服務，因此需保持謙遜，避免與大眾脫節。
- **資本 (Capital)** (Principles of Political Economy - John Stuart Mill)
  - 被積蓄起來並用於再生產的財富。它不僅僅是金錢，而是用於維持勞動者、提供工具和材料的儲備。資本來源於節儉（延遲消費）。
- **地租 (Rent)** (Principles of Political Economy - John Stuart Mill)
  - 土地所有者因擁有稀缺且品質優異的自然資源而獲得的收入。地租是產出超過最劣等耕種土地利潤的部分，不進入農產品的生產成本。
- **生產性勞動 vs. 非生產性勞動** (Principles of Political Economy - John Stuart Mill)
  - 生產性勞動創造物質財富（可積累的資本）；非生產性勞動雖然可能有用，但不直接創造可積累的物質產品，其消耗由生產性勞動的剩餘產品支付。
- **信用的本質** (Principles of Political Economy - John Stuart Mill)
  - 信用不是創造資本，而是將現有資本從不擅長使用的人轉移給擅長使用的人，或將閒置資本轉為活躍資本。信用擴張會暫時推高價格，但長期價值仍由生產成本決定。
- **Economic Statics** (Essentials of Economic Theory)
  - A hypothetical state of industrial society where population, capital, methods, organization, and consumer wants are constant, allowing for the determination of 'natural' or standard prices, wages, and
- **Economic Friction** (Essentials of Economic Theory)
  - Obstacles that prevent labor and capital from moving instantly between industries, causing actual wages and interest to lag behind or deviate from their static standards.
- **Entrepreneur's Profit** (Essentials of Economic Theory)
  - In a static state, pure profit is zero. In a dynamic state, profit is a residual income arising from changes (like innovation or monopoly) that allow the entrepreneur to pay labor and capital less tha
- **Capital vs. Capital Goods** (Essentials of Economic Theory)
  - Capital goods are individual, perishable instruments. Capital is the permanent, enduring fund of productive wealth, maintained by the constant replacement of perishable goods.
- **Consumer's Surplus** (Essentials of Economic Theory)
  - The difference between the total utility a consumer derives from a good and the total amount they pay for it, resulting from the fact that all units are sold at the price of the marginal (least valuab
- **Final Productivity** (Essentials of Economic Theory)
  - The additional output produced by the last unit of labor or capital added to a fixed amount of the other factor, which determines the wage rate or interest rate under perfect competition.
- **自然價格 (Natural Price)** (An Inquiry into the Nature and Causes of the Wealth of Nations)
  - 足以支付地租、工資和利潤（按其自然率）的價格，被視為商品的中心價格。
- **有效需求 (Effectual Demand)** (An Inquiry into the Nature and Causes of the Wealth of Nations)
  - 願意支付自然價格以購買商品的買家需求，而非僅僅是絕對的慾望。
- **固定資本與循環資本 (Fixed and Circulating Capital)** (An Inquiry into the Nature and Causes of the Wealth of Nations)
  - 固定資本指不需改變所有者即可產生收益的資本（如機器、建築）；循環資本指通過流通或改變所有者來產生收益的資本（如貨幣、庫存）。
- **真實價格與名義價格 (Real and Nominal Price)** (An Inquiry into the Nature and Causes of the Wealth of Nations)
  - 真實價格由勞動量決定，名義價格由貨幣數量決定。勞動是唯一普遍且準確的價值衡量標準。
- **紙幣替代 (Substitution of Paper Money)** (An Inquiry into the Nature and Causes of the Wealth of Nations)
  - 用紙幣替代貴金屬貨幣可以節省維持硬幣的成本，將原本閒置的資本轉化為生產性資本，從而增加國家總收入。
- **商品 (Commodity)** (Political Economy by William Stanley Jevons)
  - 財富的任何一部分，即任何有用、可轉移且供給有限的物品。
- **固定資本 vs. 流動資本** (Political Economy by William Stanley Jevons)
  - 固定資本指長期使用並輔助生產的物品（如機器、廠房）；流動資本指用於維持勞工在生產期間生活的物資（如食物、衣物），會隨生產過程被消耗或轉化。
- **真實工資 vs. 貨幣工資** (Political Economy by William Stanley Jevons)
  - 貨幣工資是以金錢支付的數額；真實工資是這些金錢實際能購買的商品和服務數量，取決於物價水平。
- **地租 (Rent)** (Political Economy by William Stanley Jevons)
  - 土地所有者因提供自然資源而獲得的份額，源於不同土地肥力或位置的差異，是優越土地產出超過最劣等土地成本後的剩餘。
- **工會壟斷 (Trades-Union Monopolies)** (Political Economy by William Stanley Jevons)
  - 工會通過限制勞動力供給或生產量來人為抬高工資，實質上是向消費者和其他行業徵收稅收，最終損害整體勞動階級的利益。
- **自然價格 (Natural Price)** (On The Principles of Political Economy, and Taxation)
  - 商品在長期內趨向的價格，由生產所需的勞動量（包括資本形成中的勞動）決定，並提供一般利潤率。
- **市場價格 (Market Price)** (On The Principles of Political Economy, and Taxation)
  - 受短期供需波動影響的實際交易價格，會圍繞自然價格上下波動，並引導資本在不同部門間流動以恢復均衡。
- **固定資本與流動資本 (Fixed and Circulating Capital)** (On The Principles of Political Economy, and Taxation)
  - 固定資本指耐久性的工具、機械和建築；流動資本主要用於支付工資和購買原材料。兩者比例不同會影響工資變動對商品相對價值的影響。
- **穀物法 (Corn Laws)** (On The Principles of Political Economy, and Taxation)
  - 限制穀物進口的法律。李嘉圖認為這些法律人為提高了國內糧食價格，增加了地租，壓低了利潤率，損害了整體經濟利益。
- **基礎收益率 (Basis)** (How to Invest Money)
  - 扣除溢價或折價後，債券實際給投資者的淨回報率。它消除了票面利率和到期時間等偶然因素的影響，是用來比較不同債券真實價值的科學標準。
- **流動性 (Convertibility)** (How to Invest Money)
  - 投資標的迅速轉換為現金而不顯著損失價值的的能力。對於企業剩餘資金而言，高流動性是絕對必要的；對於長期私人投資則較不重要。
- **市場價格穩定性 (Stability of Market Price)** (How to Invest Money)
  - 投資標的在市場報價上保持不變的能力。這與本金安全性不同，即使本金安全，若市場利率上升，債券市價仍可能下跌。實物房地產抵押貸款因無市場報價，故具備極高的價格穩定性。
- **設備債券 (Equipment Bonds)** (How to Invest Money)
  - 鐵路公司為購買機車車輛發行的債券。由於其擔保品是可移動資產且在破產清算中享有優先於一般抵押債權人的地位，因此被視為極其安全的投資工具。
- **淨快速資產 (Net Quick Assets)** (How to Invest Money)
  - 工業公司的流動資產減去流動負債。這是評估工業債券安全性的重要指標，用於確保公司有足夠的短期資產覆蓋債務。
- **Absolute Value vs. Relative Value** (The Value of Money)
  - Absolute value is the inherent psychological worth of a good or money unit, while relative value is the ratio of exchange (price). The text argues that price levels can change due to changes in the ab
- **Saleability** (The Value of Money)
  - The degree to which a good can be easily exchanged for other goods. Money emerges as the commodity with the highest saleability, which further enhances its value through its monetary functions.
- **Bearer of Options** (The Value of Money)
  - A dynamic function of money where holding liquid assets allows individuals to capitalize on future market opportunities or hedge against uncertainty, contributing to the value of money beyond simple m
- **Speculation as Trade** (The Value of Money)
  - The argument that the vast majority of modern trade volume consists of speculative transactions and dynamic readjustments rather than the simple exchange of goods for consumption, driven by changes in
- **Static vs. Dynamic Economics** (The Value of Money)
  - Static economics deals with equilibrium and fixed values, while dynamic economics addresses change, readjustment, and the role of money/credit in facilitating these transitions. Anderson argues money 
- **Velocity of Circulation** (Readings in Money and Banking)
  - The average number of times a unit of money is used to purchase final goods and services within a given time period.
- **Clearing House Loan Certificates** (Readings in Money and Banking)
  - Temporary instruments issued by bank associations during panics to settle interbank balances, effectively expanding the money supply without issuing new currency.
- **Greenbacks** (Readings in Money and Banking)
  - United States paper currency issued during the Civil War, not redeemable in gold, which fluctuated in value relative to gold.
- **Bimetallism** (Readings in Money and Banking)
  - A monetary system in which the standard of value is based on two metals, typically gold and silver, at a fixed ratio.
- **Acceptance Market** (Readings in Money and Banking)
  - A market for bank acceptances, which are short-term credit instruments used to finance international trade, emerging in the US post-Federal Reserve Act.
- **工業封建主義 (Industrial Feudalism)** (Socialism by John Stuart Mill)
  - 傅立葉提出的概念，指在自由競爭下，財富集中於少數大資本家手中，而大多數人淪為依賴資本家施捨的無產階級，形成新的依附關係。
- **產業夥伴關係 (Industrial Partnership)** (Socialism by John Stuart Mill)
  - 一種允許勞工參與企業利潤分配的機制，旨在將工人的個人利益與企業整體利益掛鉤，提高生產效率和公平性。
- **共產主義的動機缺陷** (Socialism by John Stuart Mill)
  - 密爾認為，在缺乏個人財產激勵的情況下，管理者缺乏追求卓越管理的動力，普通工人也可能因「搭便車」心理而降低勞動效率。
- **剩餘價值與資本回報** (Socialism by John Stuart Mill)
  - 密爾指出，資本家的利潤並非完全來自資本本身，很大一部分是對其承擔風險、提供技能和監督勞動的報酬，因此不應簡單地將其視為剝削。
- **心理收入 (Psychic Income)** (The Principles of Economics, with Applications to Practical Problems)
  - 經濟活動的最終目的，指商品或服務帶來的愉悅感或滿足感。所有財富和價值的根源都在於此。
- **邊際效用 (Marginal Utility)** (The Principles of Economics, with Applications to Practical Problems)
  - 消費者對額外一單位商品所賦予的重要性，決定了該商品的市場價值。
- **資本化 (Capitalization)** (The Principles of Economics, with Applications to Practical Problems)
  - 將預期未來收入流轉換為當前一次性貨幣價值的過程，用於確定耐久資產的價格。
- **時間折扣 (Time-Discount)** (The Principles of Economics, with Applications to Practical Problems)
  - 未來財相對於現在財的價值折讓，是解釋利息來源的核心概念。
- **租金 (Rent)** (The Principles of Economics, with Applications to Practical Problems)
  - 在此書中廣義定義為任何耐久資產因其稀缺性和生產力而產生的淨收益，不僅限於土地。
- **Valuables** (Principles of Political Economy by Arthur Latham Perry)
  - The sole subject matter of political economy, encompassing anything bought and sold, categorized into commodities, services, and credits.
- **Utility vs. Value** (Principles of Political Economy by Arthur Latham Perry)
  - Utility is the capacity of a thing to satisfy a desire (often a free gift of nature), while Value is the result of exchange between two services; utility does not necessarily imply value.
- **Capital** (Principles of Political Economy by Arthur Latham Perry)
  - Any valuable (commodity or credit) outside of man himself that is reserved to assist in the production of further valuables, derived from the effort of abstinence.
- **Rent** (Principles of Political Economy by Arthur Latham Perry)
  - The rendering for the present use of a valuable (land) made such by past labor and capital; it is not payment for the 'original and indestructible powers of the soil' but for human-improved value.
- **Money** (Principles of Political Economy by Arthur Latham Perry)
  - A current and legal measure of services; it is a specialized valuable that serves as a common denominator for comparing and exchanging all other services.
- **Credit** (Principles of Political Economy by Arthur Latham Perry)
  - A right to demand something of somebody, involving elements of future time and personal trust; it is a form of capital that creates new purchasing power.
- **幾何級數增長 (Geometrical Ratio)** (An Essay on the Principle of Population)
  - 人口增長的模式，即每代人口數量翻倍（例如：1, 2, 4, 8, 16...），在無阻礙條件下呈現指數級擴張。
- **算術級數增長 (Arithmetical Ratio)** (An Essay on the Principle of Population)
  - 生活資料（食物）增長的模式，即每單位時間增加固定的數量（例如：1, 2, 3, 4, 5...），受土地生產力限制。
- **預防性檢查 (Preventive Check)** (An Essay on the Principle of Population)
  - 降低出生率以抑制人口增長的因素，主要源於人類對未來貧困的預期和恐懼，導致婚姻延遲或禁慾。
- **積極性檢查 (Positive Check)** (An Essay on the Principle of Population)
  - 提高死亡率以強制人口與資源平衡的因素，包括飢荒、疾病、瘟疫和戰爭，通常影響底層階級。
- **有效勞動維持基金 (Effectual Funds for the Maintenance of Labour)** (An Essay on the Principle of Population)
  - 指用於支持勞動者的實際生活資料（特別是食物），而非僅僅是貨幣財富或製造業產值。馬爾薩斯認為只有農業產出的增加才能真正改善窮人處境。
- **銀行儲備 (Banking Reserve)** (Lombard Street: A Description of the Money Market)
  - 銀行持有的用於滿足提款需求和應對突發危機的現金或高流動性資產，是維持信用體系的基礎。
- **貼現率 (Rate of Discount)** (Lombard Street: A Description of the Money Market)
  - 銀行向商業票據持有人提供貸款時的利率，中央銀行通過調整此利率來控制資金流動性和黃金外流。
- **匯兌機制 (Mechanism of Exchanges)** (Lombard Street: A Description of the Money Market)
  - 當一國出現國際收支逆差導致黃金外流時，提高利率可吸引外國資本流入並抑制進口，從而恢復平衡。
- **皮爾條例 (Peel's Act / Act of 1844)** (Lombard Street: A Description of the Money Market)
  - 英國1844年銀行法，將英格兰銀行分為發行部和銀行部，嚴格限制紙幣發行，Bagehot認為其在恐慌時期應被暫停以允許流動性注入。
- **票據經紀人 (Bill Brokers)** (Lombard Street: A Description of the Money Market)
  - 在倫敦金融市場中扮演關鍵中介角色的機構，他們依賴中央銀行的儲備進行再貼現，在恐慌時會加劇對最終儲備的擠兌。
- **Investment Speculators (投資投機者)** (Profitable Stock Exchange Investments)
  - 指那些謹慎選擇已知價值的優質證券，在價格低迷時買入，在獲得足夠利潤時賣出，並反覆進行此操作的投資者。
- **Marginal Gamblers (保證金賭徒)** (Profitable Stock Exchange Investments)
  - 指使用保證金進行快速投機的人，他們是非生產性的賭徒，由於機率對他們不利，最終會輸掉所有資金。
- **Round Turn (完整交易)** (Profitable Stock Exchange Investments)
  - 指完成一筆買賣循環的交易，例如先買後賣或先賣後買，通常用於計算經紀人佣金。
- **Corner (逼空/壟斷)** (Profitable Stock Exchange Investments)
  - 當一個集團或个人靜悄悄地買入某項財產的股權以絕對控制它，使得做空者無法以合理價格回補頭寸的情況。
- **使用價值 (Use-Value)** (A Contribution to the Critique of Political Economy)
  - 商品滿足人類某種需要的屬性，由其物理性質決定，與社會形式無關。
- **交換價值 (Exchange-Value)** (A Contribution to the Critique of Political Economy)
  - 一種使用價值與另一種使用價值相交換的數量比例，實質上是無差別的人类勞動（抽象勞動）的凝結。
- **抽象勞動 (Abstract Labor)** (A Contribution to the Critique of Political Economy)
  - 撇開勞動具體形式的、純生理意義上的人類勞動力的耗費，它是價值的唯一源泉。
- **貨幣 (Money)** (A Contribution to the Critique of Political Economy)
  - 從商品世界中分離出來固定地充当一般等价物的特殊商品，是價值形式的完成形態。
- **價值尺度 (Measure of Value)** (A Contribution to the Critique of Political Economy)
  - 貨幣表現商品價值大小的功能，此時貨幣僅是想像的或觀念上的。
- **流通手段 (Medium of Circulation)** (A Contribution to the Critique of Political Economy)
  - 貨幣在商品交換中起中介作用的功能，公式為 C-M-C（商品-貨幣-商品）。
- **支付手段 (Means of Payment)** (A Contribution to the Critique of Political Economy)
  - 貨幣用於償還債務、繳納稅款或支付工資的功能，導致買賣在時間和空間上分離。
- **世界貨幣 (World Money)** (A Contribution to the Critique of Political Economy)
  - 貨幣越出國內流通領域，在世界市場上發揮一般購買手段、一般支付手段和社會財富物質代表的作用。
- **積蓄 (Hoarding)** (A Contribution to the Critique of Political Economy)
  - 貨幣退出流通領域被儲存起來，作為社會財富的絕對形態保存。
- **地租 (Rent)** (Progress and Poverty, Volumes I and II)
  - 在經濟學意義上，指因擁有自然機會（土地）的排他性權利而獲得的收益。它不是勞動或資本的回報，而是社會進步和人口增長的結果，是壟斷的價格。
- **邊際生產 (Margin of Cultivation/Production)** (Progress and Poverty, Volumes I and II)
  - 指生產中回報最低的點，即無須支付地租即可使用的最劣等土地或生產點。工資和利息的水平由這一邊際點的產出決定。
- **資本 (Capital)** (Progress and Poverty, Volumes I and II)
  - 定義為「用於交換或生產更多財富的財富」。喬治強調資本是儲存的勞動，其功能是輔助勞動提高生產效率，而非僱傭勞動的來源。
- **投機性土地增值 (Speculative Land Value)** (Progress and Poverty, Volumes I and II)
  - 由於預期未來土地價值上漲而持有土地不用的行為。這會人為抬高地租，迫使生產邊際外移，導致工業蕭條和失業。
- **馬爾薩斯人口論 (Malthusian Theory)** (Progress and Poverty, Volumes I and II)
  - 喬治強烈反駁的理論，該理論認為人口增長速度快於食物供應，導致貧困。喬治認為貧困源於土地私有制導致的分配不公，而非資源匱乏。
- **交錯董事制度 (Interlocking Directorates)** (Other People's Money, and How the Bankers Use It)
  - 同一人擔任多家相互競爭或業務相關公司的董事職位，這被視為金錢信託鞏固權力和壓制競爭的主要工具。
- **其他人民的錢 (Other People's Money)** (Other People's Money, and How the Bankers Use It)
  - 指投資銀行家並非主要使用自有資本，而是通過控制銀行存款、保險公司準備金等公眾資金來擴大其影響力和利潤，這種動態財富是其權力來源。
- **新自由 (New Freedom)** (Other People's Money, and How the Bankers Use It)
  - 布蘭代斯提出的政治與經濟理念，旨在打破壟斷、恢復市場競爭、保護小企業和工人權益，並限制金融寡頭的權力。
- **銀行家管理失敗 (Failure of Banker-Management)** (Other People's Money, and How the Bankers Use It)
  - 指出銀行家同時擔任企業管理者時，因利益衝突、缺乏專業知識及時間不足，往往導致短視近利、過度擴張和管理失當。
- **Contango (延期費/正向市場)** (The Theory of Stock Exchange Speculation)
  - 當買方希望將交易結算日期推遲時，需向做市商支付的費用或利息，反映了資金成本與市場供需關係。
- **Backwardation (貼水/反向市場)** (The Theory of Stock Exchange Speculation)
  - 當賣方（看跌者）希望推遲交割時需支付的費用，通常發生在市場供過於求或急需現金時。
- **Jobber (做市商/經紀商)** (The Theory of Stock Exchange Speculation)
  - 在證券交易所內以自身名義進行買賣，通過賺取買賣價差（Turn）獲利的主要市場參與者。
- **The Turn (價差/利潤)** (The Theory of Stock Exchange Speculation)
  - 做市商在買入和賣出同一證券時所獲得的利潤部分，是投機者的固定成本之一。
- **Options (期權)** (The Theory of Stock Exchange Speculation)
  - 賦予持有者在未來特定時間以特定價格購買或出售資產的權利，書中視其為控制風險的重要工具。
- **投機 vs. 投資** (The Stock Exchange from Within)
  - 作者認為兩者界限模糊，本質上都是基於對未來的預期進行資金配置。投資往往隱含了投機成分，因為投資者同樣期望資產增值；合法的投機有助於市場流動性和價格穩定。
- **保證金交易 (Margin Trading)** (The Stock Exchange from Within)
  - 投資者僅支付部分價款（保證金），其餘由經紀人墊資購買證券。這是一種合法的信用擴張工具，但若保證金過低，會誘導無知大眾進行過度投機，增加系統性風險。
- **對沖 (Hedging)** (The Stock Exchange from Within)
  - 生產者或企業家通過在期貨市場進行相反方向的交易（如賣空），以鎖定成本或利潤，規避價格波動風險。這被視為一種商業保險。
- **桶店 (Bucket Shops)** (The Stock Exchange from Within)
  - 非法的賭博場所，客戶並未真正買賣證券，而是與店家對賭價格漲跌。這類機構利用交易所報價進行詐騙，與正規證券交易所的真實交易有本質區別。
- **每日結算 (Daily Settlement)** (The Stock Exchange from Within)
  - 紐約證券交易所的制度，要求交易次日完成資金和證券交割。這比倫敦交易所的雙週結算更能限制投機槓桿，降低違約風險。
- **盤帶閱讀 (Tape Reading)** (Reminiscences of a Stock Operator)
  - 通過觀察即時報價和成交量的變化來解讀市場情緒和價格動能，而非依賴基本面消息或內部消息。
- **直覺/預感 (Hunch)** (Reminiscences of a Stock Operator)
  - 基於多年經驗積累的潛意識信號，當交易者感到不安或覺得市場行為與先例不符時，應果斷離場。
- **桶店 (Bucket Shop)** (Reminiscences of a Stock Operator)
  - 早期對賭行，客戶僅對價格波動下注而不實際持有股票。這種環境培養了快速反應和嚴格止損的習慣，但無法容納大資金操作。
- **坐得住 (Sitting Tight)** (Reminiscences of a Stock Operator)
  - 在正確判斷市場趨勢後，保持耐心並堅守部位，不因小幅回調或市場噪音而輕易離場，這是獲取大利潤的關鍵。
- **群體行為 (Group Behavior)** (Reminiscences of a Stock Operator)
  - 同一行業或板塊的股票往往同步運動。若某支股票未跟隨同業龍頭表現，通常暗示內部存在問題，應避免買入或考慮做空。
- **貨幣市場 (Money Market)** (The Money Market)
  - 並非實體場所，而是指由銀行、票據經紀商等資金交易者組成的網絡，他們透過相互交易決定短期資金的價格（利率）。
- **活期與短期資金 (Call and Short Money)** (The Money Market)
  - 銀行借給票據經紀商的資金，通常要求隨時償還或僅需幾天通知，是貨幣市場流動性的核心來源。
- **金幣平價 (Mint Par)** (The Money Market)
  - 基於兩國貨幣所含純金量的固定比率計算出的理論匯率。
- **黃金點 (Specie Points)** (The Money Market)
  - 包含黃金運輸與保險成本的匯率極限。當匯率超過出口黃金點時，黃金會流出；低於進口黃金點時，黃金會流入。
- **窗口裝飾 (Window Dressing)** (The Money Market)
  - 銀行在發布財務報表前調整資產負債表項目，以呈現更強健的流動性或資本狀況的行為。
- **清算所 (Clearing House)** (The Money Market)
  - 銀行間每日結算相互支票與匯票差額的機構，大幅減少實體現金的需求並提高效率。
- **實質利率 vs. 名目利率** (A Tract on Monetary Reform)
  - 名目利率是借貸合約上標明的利率；實質利率則扣除通貨膨脹或緊縮的影響。在通脹期間，若名目利率未能完全反映預期物價上漲，實質利率可能為負，使借款人受益而損害貸方。
- **通貨膨脹稅 (Inflationary Taxation)** (A Tract on Monetary Reform)
  - 政府透過發行過多貨幣導致貨幣貶值，從而減少公眾持有的貨幣購買力，以此作為一種隱性稅收來籌措資金。這種稅收難以逃避，但會扭曲經濟行為。
- **真實餘額 (Real Balances)** (A Tract on Monetary Reform)
  - 指公眾希望持有的貨幣購買力總額。在經濟繁榮期，公眾傾向減少持幣（真實餘額下降），而在蕭條期則傾向增加持幣（真實餘額上升），這會影響貨幣政策的效果。
- **資本徵稅 (Capital Levy)** (A Tract on Monetary Reform)
  - 一種針對現有財富一次性課稅的政策，被凱恩斯視為減輕戰後高額公債負擔、避免通貨膨脹或緊縮所帶來巨大社會成本的更公平替代方案。
- **管理貨幣 (Managed Currency)** (A Tract on Monetary Reform)
  - 由中央銀行或貨幣當局根據內部物價穩定和就業目標，主動調節貨幣供應量和匯率，而非被動跟隨黃金流動或市場自動調節的貨幣制度。
- **Grand Balance** (An Inquiry into the Principles of Political Oeconomy (Vol. 2 of 2))
  - The total balance of payments a nation owes to the rest of the world, including the trade balance, expenses of natives abroad, debt payments to foreigners, and loans to other nations.
- **Real Par of Exchange** (An Inquiry into the Principles of Political Oeconomy (Vol. 2 of 2))
  - The true value of exchange between two currencies, calculated based on the fluctuating value of coin relative to bullion in each country, rather than just the intrinsic metal content.
- **Mercantile vs. Private Credit** (An Inquiry into the Principles of Political Oeconomy (Vol. 2 of 2))
  - Private credit is secured by tangible assets (land/personal estate), while mercantile credit relies on the integrity and success of trade, making it more precarious.
- **Coinage Duty (Seigniorage)** (An Inquiry into the Principles of Political Oeconomy (Vol. 2 of 2))
  - A fee charged by the mint for converting bullion into coin, which increases the value of the coin above the metal it contains.
- **Agio** (An Inquiry into the Principles of Political Oeconomy (Vol. 2 of 2))
  - The premium or difference in value between bank money (credit) and current coin, often caused by the superior quality or stability of the bank money.
- **Sympathy** (The Theory of Moral Sentiments)
  - Not merely pity, but the faculty of entering into the feelings of another by imagining oneself in their situation.
- **Propriety** (The Theory of Moral Sentiments)
  - The suitability or proportionality of an emotion to the object or cause that excites it.
- **Merit and Demerit** (The Theory of Moral Sentiments)
  - The qualities of deserving reward or punishment, arising from the intention to benefit or harm others.
- **Impartial Spectator** (The Theory of Moral Sentiments)
  - The imagined neutral observer within us that judges our own conduct and the conduct of others based on shared human sentiments.
- **Self-Command** (The Theory of Moral Sentiments)
  - The virtue of moderating one's passions to align with what an impartial spectator can sympathize with; considered the most impressive virtue.
- **Utility** (The Theory of Moral Sentiments)
  - The appearance of fitness in means to achieve an end, which pleases the spectator through sympathy with the agent's satisfaction, though it is not the primary source of moral virtue.
- **高利貸 (Usury)** (Religion and the rise of capitalism)
  - 在中世紀及宗教改革早期，不僅指收取過高利息，更泛指一切利用他人急需進行剝削性的商業行為，包括壟斷定價、投機和不正當獲利。
- **社會有機體 (Social Organism)** (Religion and the rise of capitalism)
  - 一種社會哲學觀點，認為社會像生物體一樣，各階層分工合作以維持整體健康，反對極端個人主義和破壞社會紐帶的行為。
- **清教主義 (Puritanism)** (Religion and the rise of capitalism)
  - 一種強調嚴格的道德紀律、個人責任和世俗工作神聖性的宗教運動，被認為在心理和文化上促進了資本主義精神的興起。
- **圈地運動 (Enclosure)** (Religion and the rise of capitalism)
  - 將公共土地或耕地轉為私人牧場或大農場的過程，導致農民流離失所，象徵著從傳統社區義務向私有財產權和市場邏輯的轉變。
- **政治算術 (Political Arithmetic)** (Religion and the rise of capitalism)
  - 17世紀興起的經濟分析方法，試圖用數量、重量和測量來分析社會現象，標誌著經濟學開始脫離道德哲學成為一門獨立科學。
- **投機 (Speculation)** (The Cycles of Speculation)
  - 購買任何被認為廉價的證券或商品，最終意圖以利潤為目的處置該財產。與投資（主要關注利息回報）不同，投機預期價格上漲和本金增值。
- **保證金交易 (Marginal Trading)** (The Cycles of Speculation)
  - 僅支付部分價格購買證券的交易方式。作者認為使用不足額保證金是投機界最大的惡習之一，會放大風險。
- **銀行報表 (Bank Statement)** (The Cycles of Speculation)
  - 紐約清算所每週發布的銀行狀況摘要，用於監測貨幣條件。關鍵指標包括貸款與存款的比例，以及準備金（特別是現貨/硬通貨）與貸款的比例。
- **看跌/看漲期權 (Puts and Calls)** (The Cycles of Speculation)
  - 一種權利合約。買入看漲期權賦予持有者在到期日前以特定價格購買股票的權利；買入看跌期權賦予以特定價格出售的權利。作者視其為保險，但指出賣方通常獲利更多。
- **安全係數 (Factor of Safety)** (The Cycles of Speculation)
  - 評估鐵路公司財務穩健性的指標，特別是指固定費用佔淨收入的比例。作者建議固定費用不應超過淨收入的50%，以確保在收入下滑時仍能維持股息。
- **有閒階級 (Leisure Class)** (The Theory of the Leisure Class)
  - 社會中免除生產性勞動的階層，其特徵是非工業性的職業（如戰爭、宗教、體育），並通過展示閒暇來標榜身份。
- **贓物獲取 (Pecuniary Emulation)** (The Theory of the Leisure Class)
  - 基於惡意比較（invidious comparison）的競爭動機，個體試圖通過積累財富來在社區中獲得優越感和聲望，而非為了滿足基本生存需求。
- **間接閒暇 (Vicarious Leisure)** (The Theory of the Leisure Class)
  - 由家庭成員（如妻子）或僕人代為執行的非生產性活動，以顯示家主有足夠的財富養活不事生產的人，從而間接彰顯家主的地位。
- **工作本能 (Instinct of Workmanship)** (The Theory of the Leisure Class)
  - 人類天生追求有效工作和反對無效努力的傾向，這與有閒階級推崇的浪費行為形成內在張力，常導致人們為浪費行為尋找看似有用的藉口。
- **野蠻遺存 (Archaic Survivals)** (The Theory of the Leisure Class)
  - 從早期掠奪性文化遺留下來的心智習慣，如對武力的崇拜、迷信運氣、以及將個人關係置於因果邏輯之上的思維模式，這些在現代工業社會中往往降低經濟效率。
- **潛在產出 (Potential Output)** (Principles of Macroeconomics)
  - 經濟體在當前勞動力、資本存量和技術水平下，能夠持續生產而不產生通脹壓力的最大產出水平。
- **產出缺口 (Output Gap)** (Principles of Macroeconomics)
  - 實際 GDP 與潛在 GDP 之間的差異，用於衡量經濟是處於衰退性缺口還是通脹性缺口。
- **自動穩定器 (Automatic Stabilizers)** (Principles of Macroeconomics)
  - 稅收和轉移支付計劃，它們能自動使總需求對自主支出的變化敏感度降低，從而減輕經濟波動。
- **索洛殘餘 (Solow Residual)** (Principles of Macroeconomics)
  - 無法由勞動力和資本投入增長解釋的產出增長部分，通常被歸因於技術進步或全要素生產率 (TFP) 的提高。
- **零利率下限 (Zero Lower Bound)** (Principles of Macroeconomics)
  - 名義利率無法顯著低於零的限制，當達到此界限時，傳統貨幣政策可能失效，導致流動性陷阱。
- **貨幣傳導機制 (Monetary Transmission Mechanism)** (Principles of Macroeconomics)
  - 描述貨幣供應量或利率變化如何通過財富效應、信貸成本和匯率等渠道影響消費、投資和淨出口，進而影響總需求和產出的過程。

### === ACTIONABLE INSIGHTS ===
- Avoid short-term 'ripple' trading; focus on long-term 'wave' movements as commissions and taxes make frequent trading mathematically disadvantageous. _(source: The Art of Speculation by Philip L. Carret)_
- Diversify holdings across at least ten different securities in five different industries to minimize chance and unknown factors. _(source: The Art of Speculation by Philip L. Carret)_
- Reappraise every security held at least once every six months, ignoring the original purchase price and asking if you would buy it today. _(source: The Art of Speculation by Philip L. Carret)_
- Keep at least half of the speculative fund in income-producing securities to provide a safety buffer during market storms. _(source: The Art of Speculation by Philip L. Carret)_
- Ignore dividend yield as a primary factor for speculation; focus on capital appreciation potential and management quality. _(source: The Art of Speculation by Philip L. Carret)_
- Use borrowed money sparingly, preferably when stocks are low and money rates are high but falling. _(source: The Art of Speculation by Philip L. Carret)_
- Seek facts diligently but avoid seeking advice; successful speculation requires independent judgment. _(source: The Art of Speculation by Philip L. Carret)_
- Analyze balance sheets for hidden assets (e.g., undervalued inventory) and excessive depreciation reserves which may indicate undervaluation. _(source: The Art of Speculation by Philip L. Carret)_
- Minimize the time of circulation (sales and purchases) to accelerate capital turnover and increase annual surplus value. _(source: Capital Vol. II (Marx))_
- Distinguish between fixed and circulating capital to manage liquidity; fixed capital ties up value for long periods, requiring careful reserve fund planning for replacement. _(source: Capital Vol. II (Marx))_
- Recognize that expenses of circulation (buying, selling, bookkeeping) do not add value to commodities but are necessary deductions from surplus value. _(source: Capital Vol. II (Marx))_
- Understand that transportation is a productive process within circulation that adds value to commodities by changing their location. _(source: Capital Vol. II (Marx))_
- Plan for the 'hoarding' of surplus value until it reaches a minimum threshold necessary for expansion or replacement of fixed capital. _(source: Capital Vol. II (Marx))_
- 在開始實盤交易前，應進行數年的紙上交易（Paper Trading）或小額實盤練習，以培養市場直覺並驗證策略，避免用真金白銀為新手錯誤買單。 _(source: How I trade and invest in stocks and bonds)_
- 每筆投機性交易必須設置停損單（建議兩至三個點），嚴格控制虧損上限，確保單一虧損不會對總資本造成重大打擊。 _(source: How I trade and invest in stocks and bonds)_
- 只交易活躍股（Active Stocks），避免陷入流動性差、波動小的股票，因為價格必須移動才能獲利。 _(source: How I trade and invest in stocks and bonds)_
- 利用股票分割或紅股政策（如American Graphophone案例），計算總回報率（現金股息+紅股價值），識別被低估的高成長潛力股。 _(source: How I trade and invest in stocks and bonds)_
- 分散投資：將資金分配到至少十種不同行業和性質的證券中，以對沖單一行業或公司的特定風險。 _(source: How I trade and invest in stocks and bonds)_
- 當內部人士（Insiders）開始大量賣出時，散戶應隨之賣出；內部人士的行為往往預示著價格頂部或基本面轉折。 _(source: How I trade and invest in stocks and bonds)_
- 將投機賺取的利潤轉化為長期投資本金，採用「交易是為了投資」的策略，逐步建立穩固的收入型資產組合。 _(source: How I trade and invest in stocks and bonds)_
- Apply minimum quantitative standards for bond selection: Public utilities (1.5x coverage), Railroads (2x coverage), Industrials (3x coverage). _(source: Security Analysis (1940))_
- Use the 'total-deductions' method for calculating earnings coverage, ensuring all fixed charges are included in the denominator. _(source: Security Analysis (1940))_
- For industrial bonds, require a stock-value ratio of at least $1 of stock market value for every $1 of bonded debt. _(source: Security Analysis (1940))_
- Avoid buying high-grade bonds at prices that imply a permanent low-interest-rate environment unless the earnings coverage is sufficient to handle a rise in rates. _(source: Security Analysis (1940))_
- Do not rely on specific liens for safety; focus on the overall financial strength and ability of the enterprise to meet all obligations. _(source: Security Analysis (1940))_
- Scrutinize real estate bonds for artificial appraisals; require actual cost to exceed bond issue by at least 50% and income to cover interest by 100% after depreciation. _(source: Security Analysis (1940))_
- Treat income bonds and preferred stocks with the same stringent standards as bonds, requiring higher earnings coverage to offset their contractual disadvantages. _(source: Security Analysis (1940))_
- Always use stop-loss orders to protect capital; never trade without a predefined exit point for losses. _(source: Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)_
- Trade only in active, leading stocks within strong groups; avoid lagging or inactive stocks. _(source: Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)_
- Buy stocks when they break out of accumulation zones (crossing old resistance levels) and sell when they break down from distribution zones. _(source: Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)_
- Do not average down on losing positions; if a trade goes against you, exit immediately. _(source: Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)_
- Monitor volume closely: high volume at tops suggests distribution, while low volume at bottoms suggests accumulation. _(source: Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)_
- Wait for confirmation of trend changes before entering; do not try to catch the exact top or bottom. _(source: Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)_
- Divide capital into equal parts and never risk more than a small percentage (e.g., 10%) on a single trade. _(source: Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)_
- Study the history of individual stocks to identify their habitual patterns, support/resistance levels, and typical reaction sizes. _(source: Truth Of The Stock Tape & Wall Street Stock Selector by William D. Gann)_
- 央行貨幣政策規則不應針對資產價格的「水平」，因為一旦考慮通脹和產出缺口，針對資產價格水平的調節並無福利增益。 _(source: WP/24/132)_
- 在存在診斷性預期和金融摩擦的環境下，針對「房價增長率」進行目標設定（Targeting House Price Growth）能帶來顯著的福利增益（約達穩態消費的3%）。 _(source: WP/24/132)_
- 針對房價增長率的規則能平衡抑制資產價格通道（緩解需求衝擊）和利用債務通縮通道（緩解供給衝擊）的效果。 _(source: WP/24/132)_
- 政策制定者應意識到，行為偏差（DE）會使宏觀經濟波動加劇，因此需要更積極的政策回應來穩定經濟。 _(source: WP/24/132)_
- 政策制定者應意識到，單純增加物質資本投資已不足以解決貧困問題，因為資本產出比已在全球範圍內收斂。 _(source: WP/24/229)_
- 提升相對TFP是打破低收入陷阱的關鍵，這需要超越基礎教育投入，著重於制度質量、基礎設施和技術採用障礙的结构性改革。 _(source: WP/24/229)_
- 雖然提高絕對人力資本有助於TFP收斂，但其效果有限且緩慢，因此不能單獨依賴教育擴張來實現快速經濟躍升。 _(source: WP/24/229)_
- 評估發展進展時，應關注相對於前沿國家（如美國）的相對位置變化，而非僅看絕對增長率，因為相對滯後會導致長期生活水平差距擴大。 _(source: WP/24/229)_
- 在通膨接近目標且衝擊較小時，採用基於預測的政策規則（忽視暫時性衝擊）是有效的，有助於避免產出過度波動。 _(source: WP/24/260)_
- 當經濟過熱且面臨大型成本推動衝擊時，單純依賴中期通膨預測風險極大；若誤將持久性衝擊視為暫時性，將導致通膨失控。 _(source: WP/24/260)_
- 中央銀行應謹慎對待高權重的通膨點預測，特別是在內生通膨持久性已升高時；適度納入對已實現通膨的關注可能有助於改善通膨結果。 _(source: WP/24/260)_
- 試圖快速將通膨壓回目標（「最後一哩路」）在通膨已高企時會產生巨大的產出損失，因為非線性菲利普斯曲線使得降溫成本隨通膨水平遞增。 _(source: WP/24/260)_
- 政策制定者應意識到，在供給衝擊下，產出與通膨的正相關移動可能並非僅由需求衝擊引起，這挑戰了傳統的結構向量自迴歸識別假設。 _(source: WP/24/260)_
- 對於食品支出佔比高且農業依賴度高的發展中經濟體，央行應預期到天氣衝擊會產生更強烈的通膨壓力，並需準備更嚴峻的政策權衡。 _(source: WP/25/95)_
- 建立強大的中央銀行可信度和錨定的通膨預期，可以顯著減輕天氣衝擊帶來的二階效應，從而緩解「通膨-產出」的權衡困境。 _(source: WP/25/95)_
- 在設計貨幣政策框架時，若央行缺乏公信力，應避免單純針對核心通膨進行目標管理，因為這可能導致公眾預期混亂並損害政策有效性；反之，若具備高度公信力，可考慮「透過」（look through）暫時性的食品價格波動。 _(source: WP/25/95)_
- 維持匯率靈活性有助於吸收外部衝擊，相比於固定或管理匯率制度，浮動匯率能提供更平緩的利率路徑並促進通膨回歸目標。 _(source: WP/25/95)_
- 當國內農業產量受損時，若需依賴進口替代，央行需額外關注經常帳惡化、外匯儲備流失及主權風險溢價上升對匯率和通膨的加劇影響。 _(source: WP/25/95)_
- 在評估「連接國」是否真正受益時，應區分貿易重新配置與貿易繞道；只有增加國內附加值的重新配置才帶來實質性的國內生產擴張和短期經濟利益。 _(source: WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)_
- 投資者應關注外國直接投資（FDI），特別是綠色場投資，因為中國企業通過FDI遷移生產線是推動連接國國內附加值增長的重要驅動因素。 _(source: WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)_
- 雖然連接國可能在短期內從貿易戰中獲益，但長期來看，地緣經濟碎片化會增加這些依賴出口導向型經濟體的脆弱性，並對所有國家造成損失。 _(source: WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)_
- 分析貿易數據時，不能僅看總額相關性，需深入價值鏈環節，因為進口增加可能源於國內市場擴大或供應鏈重組，而非單純的轉運行為。 _(source: WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)_
- 政府應將加強稅務行政視為國家建設的核心部分，並與稅收政策、法律和機構改革協調推進。 _(source: WP/25/219)_
- 發展中經濟體應持續獲得國際組織（如IMF）的能力發展支持，因為歷史上的援助強度是未來稅務行政改善的有效預測因子。 _(source: WP/25/219)_
- 在制定稅務改革策略時，需考慮國家的具體背景：在金融發展水平較高、非正式經濟較低、治理質量較好的國家，稅務行政改革的稅收回報更大。 _(source: WP/25/219)_
- 稅務行政強化對間接稅（如增值稅）的增收效果最為顯著，對直接稅和非稅收入的影響相對較小。 _(source: WP/25/219)_
- 新興市場（EMs）應實施審慎的財政政策，因為在這些經濟體中，財政調整對通膨預期的影響顯著且具統計意義，而在先進經濟體（AEs）中則較微弱。 _(source: IMF_WP_25_231.pdf)_
- 在通膨高企或財政狀況薄弱（高債務/GDP比率）的環境下，財政緊縮措施對降低通膨預期的效果最為明顯，政策制定者應特別關注此類情境下的財政協調。 _(source: IMF_WP_25_231.pdf)_
- 基於支出的財政緊縮（削減政府開支）比基於稅收的緊縮更能有效降低通膨預期，因為前者直接壓縮總需求，而稅收增加可能直接推高物價。 _(source: IMF_WP_25_231.pdf)_
- 中央銀行獨立性較弱或匯率彈性較低的環境中，財政政策對通膨預期的傳導效應更強，政策制定者需意識到制度框架對政策效果的調節作用。 _(source: IMF_WP_25_231.pdf)_
- 政策制定者應意識到，對移動貨幣徵稅不僅會減少數字金融的使用，還會導致大量交易回流至現金，削弱金融包容性和稅收徵管基礎。 _(source: WP/25/255)_
- 在評估移動貨幣稅收時，必須考慮其高昂的效率成本（無謂損失約佔稅收收入的35%）以及對低收入和農村群體的不成比例的負面影響。 _(source: WP/25/255)_
- 對於擁有銀行帳戶的用戶，稅收會顯著促使其轉向傳統銀行服務；而對於無銀行帳戶用戶，稅收則主要抑制交易總量，顯示出政策效果的異質性。 _(source: WP/25/255)_
- 金融政策当局者は、インフレが目標に近づいても、実質金利が中立水準を下回るまで政策を緩和すべきではなく、制限的スタンスを維持する必要がある。 _(source: OECD Economic Outlook, May 2024, No. 115)_
- 政府は、人口高齢化、気候変動対策、防衛費増大による支出圧力に対処するため、早期から財政再建（支出抑制と税収確保）を開始すべきである。 _(source: OECD Economic Outlook, May 2024, No. 115)_
- 投資家は、商業不動産（特にオフィスビル）や、低格付けの企業債務を持つ企業の財務健全性に注意を払うべきであり、金利再交渉時のデフォルトリスクを監視する必要がある。 _(source: OECD Economic Outlook, May 2024, No. 115)_
- 新興市場国は、先進国との利子率差の縮小による資本流出や通貨安のリスクを管理するため、慎重な金融政策と財政改革の両立が求められる。 _(source: OECD Economic Outlook, May 2024, No. 115)_
- 降低貿易壁壘並解決貿易緊張局勢是首要政策優先事項，因為保護主義不僅壓低增長，還通過提高進口成本加劇通脹壓力。 _(source: OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)_
- 實施結構性改革以促進競爭和商業活力，包括降低市場進入門檻、簡化監管程序以及加強反壟斷執法，特別是在數位經濟和服務業領域。 _(source: OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)_
- 改善無形資產的融資環境，例如發展資本市場、調整養老金投資限制、支持風險投資以及減少金融科技貸款的行政要求，以緩解企業對現金積累的依賴。 _(source: OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)_
- 放鬆土地使用規劃限制和租賃市場法規，以增加住房供應，改善住房可負擔性，並刺激住宅投資。 _(source: OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)_
- 提高公共投資質量，特別是在能源安全、綠色和數位基礎設施、研發、健康和教育領域，以產生長期生產力溢出效應並擠入私人投資。 _(source: OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)_
- 建立可信的中期財政計劃，通過削減非必要支出、擴大稅基和改革稅制來確保債務可持續性，同時保留應對未來衝擊的緩衝空間。 _(source: OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)_
- Implement 'Regulatory Resets' by conducting systematic ex-post evaluations of existing regulations to remove redundant or overly burdensome rules. _(source: OECD Economic Outlook, Volume 2025/2, No. 118)_
- Reduce barriers to entry in professional services and retail sectors to enhance competition and productivity. _(source: OECD Economic Outlook, Volume 2025/2, No. 118)_
- Strengthen oversight of Non-Bank Financial Intermediaries (NBFIs) and crypto-assets to mitigate financial stability risks arising from interconnectedness with traditional banks. _(source: OECD Economic Outlook, Volume 2025/2, No. 118)_
- Prioritize fiscal consolidation through expenditure-based corrections rather than revenue-based measures to ensure debt sustainability. _(source: OECD Economic Outlook, Volume 2025/2, No. 118)_
- Simplify housing regulations and zoning laws to increase housing supply, improve affordability, and enhance labor mobility. _(source: OECD Economic Outlook, Volume 2025/2, No. 118)_
- 採用遞減折現率或極低純時間偏好率來評估氣候政策，以正確反映對後代的倫理責任。 _(source: post-autistic economics review, issue no. 44)_
- 實施基於人口均等的全球排放權交易制度，並設立全球氣候信託基金以確保公平與反腐敗。 _(source: post-autistic economics review, issue no. 44)_
- 將預算從軍事支出轉向教育、醫療、大眾運輸與基礎設施建設，以創造更多總薪資額與就業機會。 _(source: post-autistic economics review, issue no. 44)_
- 發展政策應避免「一刀切」的標準化模式，轉而採取因地制宜、實驗性的漸進改革策略。 _(source: post-autistic economics review, issue no. 44)_
- 在金融監管上，應警惕證券化帶來的風險分散錯覺，加強對評級機構獨立性與系統性流動性風險的監控。 _(source: post-autistic economics review, issue no. 44)_
- 在氣候保險定價中納入對貧困群體脆弱性的考量，並設立專項基金用於提升其抗災基礎設施。 _(source: real-world economics review, issue no. 45)_
- 實施碳稅或碳排放交易體系時，必須將收入以「人均紅利」形式全額返還給公民，以確保政策具有累進性並獲得公眾支持。 _(source: real-world economics review, issue no. 45)_
- 學術界應推動從封閉的同行評審轉向開放獲取平台上的公開同行評論，以提高研究傳播速度和質量評估的多元性。 _(source: real-world economics review, issue no. 45)_
- 貿易談判應擴展至專業服務領域，消除限制外國高技能人才進入的壁壘，以降低醫療、法律等高昂服務的費用。 _(source: real-world economics review, issue no. 45)_
- 政策制定者應避免僅依賴總體效率指標，而需評估貿易自由化對國內工資不平等和失業的具體分配效應。 _(source: real-world economics review, issue no. 45)_
- 投資者應警惕房價與租金脫節以及貸款標準放寬（如低文件要求、高貸款價值比）等泡沫早期信號。 _(source: real-world economics review, issue no. 46)_
- 監管機構應解決評級機構的利益衝突（由發行方付費），並對結構化金融產品（如CDO）實施更嚴格的透明度和資本要求。 _(source: real-world economics review, issue no. 46)_
- 政策制定者應考慮實施碳稅或拍賣碳許可證，並將收入用於補償低收入家庭能源成本增加及投資綠色技術。 _(source: real-world economics review, issue no. 46)_
- 企業應從單純追求股東利潤最大化轉向考慮三重底線（社會、經濟、環境），以避免外部性成本帶來的長期風險。 _(source: real-world economics review, issue no. 46)_
- 個人應認識到物質消費的增加對幸福感的邊際效應遞減，重視休閒、社區連結和健康等非市場因素對福祉的影響。 _(source: real-world economics review, issue no. 46)_
- 政策制定者應區分「慢性貧困」與「暫時性貧困」，針對脆弱性高的群體實施風險減免（如保險、緩衝庫存）和風險應對措施，而非僅關注長期資產積累。 _(source: real-world economics review, issue no. 47)_
- 在設計公共工程或轉移支付時，應採用自我選擇機制（self-targeting）以降低行政成本和漏損，並確保低勞動需求確實存在於目標群體中。 _(source: real-world economics review, issue no. 47)_
- 金融監管應要求信用違約互換（CDS）等衍生工具在交易所進行標準化交易，以提高透明度並減少監管盲區。 _(source: real-world economics review, issue no. 47)_
- 央行應將遏制資產泡沫納入其核心職責，利用公開警告和 Margin requirement（保證金要求）等工具，而不僅僅是依賴利率調整。 _(source: real-world economics review, issue no. 47)_
- 學術研究應重視原始數據收集和實驗方法，並嚴格審查模型中的潛在混淆變量，以減少第一類錯誤的風險。 _(source: real-world economics review, issue no. 47)_
- 恢復並加強金融監管，特別是對複雜衍生產品（如CDO、CDS）進行獨立審查和註冊，禁止未經測試的金融創新進入市場。 _(source: real-world_economics_review_issue_48.pdf)_
- 重建銀行準備金制度，提高投資銀行的資本充足率要求，並限制過度槓桿操作，以增強系統應對衝擊的能力。 _(source: real-world_economics_review_issue_48.pdf)_
- 國際貨幣體系改革應賦予順差國調整責任，避免全球流動性短缺和通縮壓力由赤字國獨自承擔。 _(source: real-world_economics_review_issue_48.pdf)_
- 政策制定應採用「預警原則」，針對低概率但高破壞性的尾部風險建立緩衝機制（如戰略儲備、保險基金），而非僅關注平均情況。 _(source: real-world_economics_review_issue_48.pdf)_
- 政府應積極干預基礎設施、綠色能源和社會福利領域的投資，以填補私人部門需求不足，並引導資本流向社會有益用途。 _(source: real-world_economics_review_issue_48.pdf)_
- 提高金融市場的透明度，強制披露資產負債表細節，並建立獨立的公共信息來源以糾正信息不對稱。 _(source: real-world_economics_review_issue_48.pdf)_
- 經濟學教育必須改革，引入行為經濟學、多智能體建模和網絡理論，取代新古典微觀經濟學的基礎。 _(source: real-world economics review, issue no. 49)_
- 政策制定應從單純關注通脹轉向關注充分就業和收入分配，實施「進步凱因主義」政策框架。 _(source: real-world economics review, issue no. 49)_
- 建立新的國民帳戶體系，將自然資本和社會資本納入考量，以反映真實的經濟效率和可持續性。 _(source: real-world economics review, issue no. 49)_
- 加強對影子銀行和非正式經濟活動的監管與分析，因為它們是金融危機的重要來源。 _(source: real-world economics review, issue no. 49)_
- 在宏觀模型中明確納入債務動態和貨幣生產過程，而非假設市場自動出清。 _(source: real-world economics review, issue no. 49)_
- 監管應關注資產價格與信貸創建的聯繫，而非僅關注消費者物價指數 (CPI)。中央銀行應將金融穩定納入核心目標，監控信貸/GDP缺口和資產價格偏差。 _(source: real-world economics review, issue no. 50)_
- 實施資本管制或嚴格的國際金融架構改革，以維護國家貨幣政策的獨立性並防止熱錢流動造成的不穩定。 _(source: real-world economics review, issue no. 50)_
- 宏觀經濟政策應引導投資從能源密集型製造業轉向人力資本、自然資本和能源節約型基礎設施，以在限制物質消耗的同時維持就業和增長。 _(source: real-world economics review, issue no. 50)_
- 金融監管應強制要求公開市場中的資產具備「做市商」機制或明確披露流動性風險，禁止將缺乏二級市場的高風險私人貸款證券化為看似流動的產品。 _(source: real-world economics review, issue no. 50)_
- 政策制定者應避免過度依賴數學模型進行預測，而應採用多種方法論（包括歷史分析、制度分析和行為科學）來理解複雜的社會經濟系統。 _(source: real-world economics review, issue no. 50)_
- 政策制定者應意識到收入不平等往往是權力關係變化的結果，而非單純的市場現象，因此需要通過加強工會權利、提高最低工資和改革勞動法來重新平衡勞資力量。 _(source: real-world economics review, issue no. 51)_
- 企業管理應從「結果導向」轉向「手段導向」，重視生產流程的持續改進和員工參與，而非僅依賴財務報表進行控制，以學習豐田生產系統的經驗。 _(source: real-world economics review, issue no. 51)_
- 全球氣候治理應採用基於人口均等的碳排放配額交易機制，並將收益作為紅利分配給全球公民，以實現公平與效率兼顧。 _(source: real-world economics review, issue no. 51)_
- 應設立世界金融管理局（World Financial Authority），實施托賓稅（Tobin Tax）以抑制投機性資本流動，並擴大特別提款權（SDR）以提供全球流動性。 _(source: real-world economics review, issue no. 51)_
- 監管機構應限制養老金和共同基金對大宗商品期貨指數的投機性持倉，防止金融資本扭曲實體商品價格。 _(source: real-world economics review, issue no. 51)_
- IMF在提供貸款條件時，應避免在經濟衰退期強制要求緊縮政策，而應支持逆週期的財政擴張以穩定全球需求。 _(source: real-world economics review, issue no. 51)_
- 經濟學研究應放棄單一均衡模型，轉而採用基於代理的建模（ABM）和網絡分析，以捕捉經濟系統中的互動、不確定性和系統性風險。 _(source: real-world economics review, issue no. 51)_
- Avoid 'shock therapy' in institutional transitions; instead, build incrementally on existing de facto rights and local knowledge (as seen in China's pragmatic approach vs. Russia's shock therapy). _(source: real-world_economics_review_issue_52.pdf)_
- Monitor private debt levels relative to GDP; a stabilization or decline in debt growth is a leading indicator of recession, even if GDP is growing. _(source: real-world_economics_review_issue_52.pdf)_
- Recognize that financial models are performative; regulators should account for how theories shape market behavior and create systemic fragility. _(source: real-world_economics_review_issue_52.pdf)_
- Support decentralized, parallel experimentation in policy and development rather than top-down, uniform mandates. _(source: real-world_economics_review_issue_52.pdf)_
- Acknowledge the inherent conflict between transparency and risk management in financial regulation; design systems that mitigate the harms of inevitable failures rather than assuming perfect prevention. _(source: real-world_economics_review_issue_52.pdf)_
- Implement symmetric regulatory mechanisms across all electronic trading venues to prevent volatility from spilling over from major exchanges to thinner satellite markets. _(source: real-world economics review, issue no. 53)_
- Recognize that government budget deficits in a sovereign currency system do not pose a solvency risk; focus instead on real resource constraints and inflation. _(source: real-world economics review, issue no. 53)_
- Re-evaluate climate policies using higher Social Cost of Carbon estimates that account for catastrophic risks and ethical valuations of future generations, rather than relying solely on low-damage models like FUND. _(source: real-world economics review, issue no. 53)_
- Abandon the analogy of government budgeting to household budgeting, as sovereign governments are currency issuers, not users. _(source: real-world economics review, issue no. 53)_
- Support sentencing reforms that reduce incarceration of non-violent offenders to achieve significant budgetary savings without compromising public safety. _(source: real-world economics review, issue no. 53)_
- 投資者應警惕「自由市場信奉者」基於意識形態而非實證數據的政策建議，特別是關於災難責任歸因（如CRA）的錯誤敘事。 _(source: real-world economics review, issue no. 54)_
- 在分析經濟復甦時，不僅要看GDP增長，更要監測私人部門債務水平的變化率（去槓桿速度），因為債務下降即使放緩仍會從總需求中扣除。 _(source: real-world economics review, issue no. 54)_
- 企業和個人應認識到長期預測的局限性，採用情景規劃而非單一最佳估計，並確保足夠的股權融資以應對不確定性和HILFOs。 _(source: real-world economics review, issue no. 54)_
- 政策制定者應考慮將貨幣發行權從私人銀行部分收回至公共領域，通過公民收入或公共投資來滿足社會需求，而非依賴債務驅動的增长。 _(source: real-world economics review, issue no. 54)_
- 經濟學教育應加強對歷史事實、數據測量方法和非主流經濟思想的重視，打破新古典範式的壟斷，培養學生的實證觀察能力。 _(source: real-world economics review, issue no. 54)_
- 投资者和政策制定者应警惕资产价格通胀与实体经济增长脱钩的现象，避免过度依赖基于均衡假设的金融模型。 _(source: real-world_economics_review_issue_55.pdf)_
- 在评估国际贸易政策时，需考虑资本流动性和技能转换成本，不能仅依据静态比较优势理论，应关注长期产业升级和技术溢出效应。 _(source: real-world_economics_review_issue_55.pdf)_
- 对于持有大量外汇储备的国家，应考虑多元化储备资产（如SDR），以减少对单一主权货币（如美元）贬值的依赖。 _(source: real-world_economics_review_issue_55.pdf)_
- 在分析房地产市场时，除价格收入比外，还应监测抵押贷款流动性、杠杆率及家庭资产负债表的健康状况，以识别泡沫风险。 _(source: real-world_economics_review_issue_55.pdf)_
- 政策制定者应认识到数学模型的工具局限性，避免将内部逻辑一致性等同于现实解释力，需结合历史制度和政治背景进行分析。 _(source: real-world_economics_review_issue_55.pdf)_
- 在評估阿拉伯世界或其他發展中國家的經濟表現時，應採用U-5等更廣泛的失業指標，而非僅依賴官方的U-3數據，以準確識別潛在的勞動力閒置和社會不穩定因素。 _(source: real-world economics review, issue no. 56)_
- 財政政策應從單純的總需求管理轉向直接的勞動需求目標，實施永久性的公共就業計畫作為最後僱主，以確保充分就業並穩定宏觀經濟週期。 _(source: real-world economics review, issue no. 56)_
- 政策制定者應警惕「極大化極大」的烏托邦式改革思維，在推行結構調整時必須考慮失敗風險和社會成本，避免強加未經充分測試的市場自由化方案。 _(source: real-world economics review, issue no. 56)_
- 投資者和分析師應區分有效市場假說的兩種含義：價格不可預測性（公平遊戲）與價格反映基本面（正確定價），後者在實證上難以成立，不應作為投資決策的唯一依據。 _(source: real-world economics review, issue no. 56)_
- 考慮徵收金融投機稅（FST），這不僅能為削減赤字提供大量收入（估計可達GDP的1%以上），還能抑制有害的短線投機行為並減少金融業的不平等薪資。 _(source: real-world economics review, issue no. 56)_
- 在環境政策上，不應依賴市場機制（如碳稅或排放交易）來解決氣候危機，因為資本主義的增長邏輯與生態可持續性根本衝突；需轉向集體民主控制和經濟計劃。 _(source: real-world economics review, issue no. 56)_
- Investors should monitor the 'Credit Accelerator' (change in the rate of private debt growth) as a leading indicator for asset price bubbles and crashes, rather than relying on static debt-to-GDP ratios. _(source: Real-World Economics Review, Issue 57 (2011))_
- Policy makers should recognize that boosting bank reserves (quantitative easing) is ineffective if credit demand is weak; direct stimulus to household consumption is more potent in restoring monetary circulation. _(source: Real-World Economics Review, Issue 57 (2011))_
- Economists and analysts must account for the non-neutrality of money and debt; ignoring the aggregate level of private debt leads to flawed macroeconomic forecasts. _(source: Real-World Economics Review, Issue 57 (2011))_
- Regulatory frameworks should address the 'secrecy space' by enforcing transparency in corporate ownership to prevent tax base erosion and illicit financial activities. _(source: Real-World Economics Review, Issue 57 (2011))_
- Academic research should embrace pluralistic modeling approaches that combine quantitative rigor with qualitative interpretation, acknowledging that mathematical perfection does not equate to economic reality. _(source: Real-World Economics Review, Issue 57 (2011))_
- 在資產負債表衰退期間，應避免財政緊縮，因為私人部門正在去槓桿；政府必須進行財政刺激以彌補私人需求的不足，防止通縮螺旋。 _(source: real-world economics review, issue no. 58)_
- 歐元區政策制定者應允許歐洲央行發揮最後貸款人作用，購買受困國家的債券以確保候選國的主權償債能力，從而降低融資成本並恢復信心。 _(source: real-world economics review, issue no. 58)_
- 經濟學教育應轉向多元主義，引入制度、歷史、倫理和生態視角，並教授學生如何評估不同理論工具的適用範圍和局限性，而非僅教授新古典模型。 _(source: real-world economics review, issue no. 58)_
- 國際貨幣體系改革應包括對短期投機性資本流動徵收托賓稅（Tobin Tax），並建立強制順差國調整的國際清算機制，以減少全球失衡。 _(source: real-world economics review, issue no. 58)_
- 金融監管應從「法無禁止即可為」的消極自由範式，轉向「未經許可不得為」的積極審批範式，要求新金融產品和實踐在推出前必須經過嚴格審查。 _(source: real-world economics review, issue no. 58)_
- 政策制定应关注汇率波动带来的流动性冲击风险，而非仅关注债务占GDP比率，需警惕单一世界货币缺失带来的系统性崩溃风险。 _(source: real-world economics review, issue no. 59)_
- 改革经济教育，摒弃基于错误公理（如遍历性）的主流模型，引入对根本不确定性和非均衡状态的分析。 _(source: real-world economics review, issue no. 59)_
- 加强金融和制药行业的监管，遏制私人部门的浪费性泡沫，将资源重新引导至生产性领域。 _(source: real-world economics review, issue no. 59)_
- 对于陷入债务危机的国家，可考虑实施激进的财政刺激以创造就业，或通过结构性改革解决税收逃避问题，而非单纯实施紧缩政策。 _(source: real-world economics review, issue no. 59)_
- 建立新的经济范式，将理解内生危机作为核心目标，承认市场失灵和不稳定性是系统固有的，而非外部冲击的结果。 _(source: real-world economics review, issue no. 59)_
- 在欧元区框架内，需建立机制以平衡核心国与外围国的经常账户失衡，避免让债务国独自承担调整成本。 _(source: real-world economics review, issue no. 59)_
- 實施戰略性的產業政策，特別是用於保護和發展具有規模報酬遞增特徵的製造業和高科技產業，避免過早的自由貿易衝擊。 _(source: real-world_economics_review_issue_60.pdf)_
- 在應對金融危機時，應重視實體經濟的穩定而非僅僅關注貨幣穩定，並承認金融部門必須服從於生產部門。 _(source: real-world_economics_review_issue_60.pdf)_
- 政策制定者應區分不同類型的經濟活動，針對「舒姆彼特式」活動提供支持，而非對所有行業採取無差別的市場自由化措施。 _(source: real-world_economics_review_issue_60.pdf)_
- 學術界應推動開放獲取（Open Access）和開放同行評審，以打破出版巨頭的壟斷，促進經濟學理論的多樣性和創新。 _(source: real-world_economics_review_issue_60.pdf)_
- 在環境政策中，應採用非貨幣指標來評估生態影響，避免僅依靠成本效益分析，因為市場價格的波動性會扭曲長期環境價值的判斷。 _(source: real-world_economics_review_issue_60.pdf)_
- 宏觀經濟模型應重新納入總量變量、價格剛性和金融不穩定因素，而不是過度依賴代表個體的最優化均衡模型。 _(source: real-world_economics_review_issue_60.pdf)_
- 政府應建立跨部門的協調機制，將可持續發展目標整合到預算和政策制定中，並鼓勵公民社會和非市場組織參與經濟治理。 _(source: real-world_economics_review_issue_60.pdf)_
- 對於政策制定者：在發達國家，應將政策目標從單純的GDP增長轉向衡量真實福祉的指標（如ISEW或GPI），並考慮實施縮減工作時間以分享生產力紅利。 _(source: Real-World Economics Review, Issue 61)_
- 對於投資者：理解資本積累的動力來自於「差異化」競爭而非絕對效率，因此地緣政治風險和市場壟斷行為可能比基本面數據更能影響資產價格。 _(source: Real-World Economics Review, Issue 61)_
- 對於個人：認識到超過一定閾值後的物質消費對幸福感貢獻有限，可通過實踐「自願簡樸生活」和減少過度消費來提升個人福祉並降低生態足跡。 _(source: Real-World Economics Review, Issue 61)_
- 對於學術研究：應摒棄新古典經濟學中將事實與價值完全分離的假設，承認經濟理論背後的規範性前提，並納入對權力結構、歷史背景和制度演化的分析。 _(source: Real-World Economics Review, Issue 61)_
- 對於企業管理：鑑於醫療和金融領域因「買方自負」原則導致的道德風險和系統性失敗，應強化專業服務的「注意義務」（Duty of Care）和信託責任，而非單純依賴市場競爭。 _(source: Real-World Economics Review, Issue 61)_
- 改革經濟教育課程，在大一階段引入世界文學、資本主義歷史、智力思想史、量子物理和哲學等先修課程，以培養學生的批判性思維和多樣化視角，對抗新古典經濟學的單一分歧。 _(source: real-world economics review, issue no. 62)_
- 在制定宏觀經濟政策時，應關注私人部門債務的變動對總需求的影響，避免在私人部門去槓桿期間實施財政緊縮，以防經濟陷入深度衰退。 _(source: real-world economics review, issue no. 62)_
- 政策制定者不應僅依賴統計顯著性來指導政策，必須進一步評估效應的大小、變異性、實施成本以及是否存在其他更有效的政策選項。 _(source: real-world economics review, issue no. 62)_
- 面對高風險的技術進步或環境問題，應採取預防原則（Precautionary Principle），重視極端負面結果的概率分布，而非僅關注平均預期收益。 _(source: real-world economics review, issue no. 62)_
- 建立包容多種經濟範式（包括異議經濟學）的學術和研究機構，打破主流經濟學在期刊發表和資金分配上的壟斷。 _(source: real-world economics review, issue no. 62)_
- 政策制定者應重視資金流量數據與債務存量變化，而非僅關注消費者物價指數（CPI），以提前識別金融泡沫。 _(source: real-world economics review, issue no. 63)_
- 在經濟衰退時，政府應大膽運用財政赤字支出，因為主權貨幣國家不會因發行本幣而破產，關鍵在於後續通膨期的稅收回收機制。 _(source: real-world economics review, issue no. 63)_
- 推動電子貨幣系統並引入帳戶轉移稅或負利率（貶值費），可有效調節貨幣流通速度，從而更精準地控制總需求與通膨。 _(source: real-world economics review, issue no. 63)_
- 企業與投資者應意識到，低失業率環境下生產力提升可能抑制通膨壓力，這挑戰了傳統的菲利普斯曲線預測。 _(source: real-world economics review, issue no. 63)_
- 監管機構應限制金融部門從實體經濟中獲取過度租金（惡性貪婪），確保金融活動服務於真實生產而非單純的價格投機。 _(source: real-world economics review, issue no. 63)_
- 投資者應關注保證金債務與GDP的比例及其變化率，這比市盈率更能預測股市泡沫的破裂時機。 _(source: real-world economics review, issue no. 64)_
- 政策制定者應避免在經濟衰退期間實施財政緊縮，而應利用財政赤字來填補私人部門儲蓄意願上升造成的需求缺口。 _(source: real-world economics review, issue no. 64)_
- 監管機構應將焦點從單個銀行的穩健性轉向金融網絡的互聯性和系統性風險，建立類似電網斷路器的機制以阻止危機蔓延。 _(source: real-world economics review, issue no. 64)_
- 企業管理應從單純的財務指標控制轉向重視生產過程中的技術知識和員工參與（如德國的Technik模式），以實現長期可持續發展。 _(source: real-world economics review, issue no. 64)_
- 對於歐元區國家，應改革貨幣聯盟規則，允許更靈活的貨幣政策以應對非對稱衝擊，避免將貨幣視為固定供應的「黃金」。 _(source: real-world economics review, issue no. 64)_
- 經濟計量教學與實踐應嚴格區分預測模型（回歸線）與結構因果模型（結構方程），並使用不同的符號系統以避免混淆。 _(source: real-world_economics_review_issue_65.pdf)_
- 歐元區成員國應實施「價格水平目標制」財政政策，即各國財政預算需調整以確保其國內物價水平與歐元區整體物價水平同步變動，以解決非對稱衝擊。 _(source: real-world_economics_review_issue_65.pdf)_
- 中央銀行在面對零利率下限時，應明確承諾未來的名目GDP增長路徑，以管理市場預期並降低實際利率，從而刺激當前總需求。 _(source: real-world_economics_review_issue_65.pdf)_
- 金融監管應關注系統性風險和機構間的相互關聯性，而非僅限於單一機構的安全性，並考慮對系統性風險徵收費用。 _(source: real-world_economics_review_issue_65.pdf)_
- 投資者與政策制定者應警惕信用評級機構的利益衝突，並認識到主權債務危機在貨幣聯盟中發生的概率高於單一貨幣國家。 _(source: real-world_economics_review_issue_65.pdf)_

### === PRACTICAL FORMULAS ===
- **Book Value Calculation** (The Art of Speculation by Philip L. Carret)
  - Formula: Book Value per Share = (Total Assets - Total Liabilities - Preferred Stock Claims) / Number of Common Shares Outstanding
  - Used to determine the theoretical liquidation value of common stock, though market value often diverges due to goodwill, management quality, and futur
- **Current Ratio** (The Art of Speculation by Philip L. Carret)
  - Formula: Current Ratio = Current Assets / Current Liabilities
  - A liquidity metric used to assess a company's ability to pay short-term obligations. A ratio of 2:1 was traditionally considered safe, but the quality
- **Dividend Yield Index (Times Line)** (The Art of Speculation by Philip L. Carret)
  - Formula: Times Line = Total Price of Stocks / Total Dividends Paid
  - An indicator where a high multiple (e.g., above 20) suggests overvaluation, and a low multiple (e.g., below 17) suggests undervaluation, based on hist
- **General Circuit of Money Capital** (Capital Vol. II (Marx))
  - Formula: M - C ... P ... C' - M'
  - Money is advanced (M) to buy commodities (C: labor and means of production), which enter production (P) to create new commodities (C') with surplus va
- **Number of Turnovers** (Capital Vol. II (Marx))
  - Formula: n = T / t
  - Where 'n' is the number of turnovers per year, 'T' is the unit of time (usually one year), and 't' is the duration of one turnover period.
- **風險報酬比 (Risk-Reward Ratio)** (How I trade and invest in stocks and bonds)
  - Formula: 預期利潤 / 最大風險 >= 3 或 4
  - 在進入交易前，確保潛在利潤至少是潛在虧損（風險）的三倍至四倍，以抵消必然發生的虧損交易並實現淨盈利。
- **綜合股息回報計算 (Total Dividend Yield Calculation)** (How I trade and invest in stocks and bonds)
  - Formula: 年化現金股息 + (每股紅股數量 × 當前股價)
  - 用於評估像American Graphophone這樣提供紅股的股票，將紅股的市場價值納入總回報計算，以揭示真實的投資吸引力。
- **成本基礎攤薄 (Cost Basis Reduction via Profit Taking)** (How I trade and invest in stocks and bonds)
  - Formula: 新成本基礎 = (原始總成本 - 已實現利潤部分) / 剩餘股數
  - 通過在高點賣出部分持倉實現利潤，不僅獲得了現金，還降低了剩餘持倉的平均成本，甚至可使剩餘持倉成本變為負數（即無本獲利）。
- **Earnings Coverage (Total-Deductions Method)** (Security Analysis (1940))
  - Formula: Times Fixed Charges Earned = Gross Income / (Gross Income - Net Income)
  - Calculates the margin of safety by dividing gross income by the fixed charges (the difference between gross and net income). This ensures all fixed ob
- **Stock-Value Ratio** (Security Analysis (1940))
  - Formula: Stock-Value Ratio = Market Value of Stock Issues / Total Funded Debt
  - Used as a supplemental test to ensure the equity cushion is sufficient to protect bondholders, particularly for industrial companies.
- **Effective Debt Capitalization** (Security Analysis (1940))
  - Formula: Effective Debt = Fixed Charges × 22.5
  - A method to estimate the true debt burden of railroads and utilities by capitalizing fixed charges at an assumed rate of 4.44%.
- **診斷性預期公式** (WP/24/132)
  - Formula: E_θ_t[z_{t+1}] = E_t[z_{t+1}] + θ(E_t[z_{t+1}] - E_{t-1}[z_{t+1}])
  - 其中 E_θ 為診斷性預期算子，E 為理性預期，θ 為診斷性參數，括號內項為「驚喜」（surprise），即當前預期與上一期預期的差異。
- **企業家抵押品約束** (WP/24/132)
  - Formula: B_t ≤ m E_θ_t [ (Q_{t+1} H_t) / R_t ]
  - B為借款，m為貸款價值比（LTV），Q為房價，H為房地產存量，R為名義利率。預期基於診斷性預期 E_θ。
- **政策損失函數** (WP/24/132)
  - Formula: W = E_0 Σ β^t (π_t^2 + Λ_y Ŷ_t^2 + Λ_h π̇_{h,t}^2)
  - 用於評估不同貨幣政策規則的福利成本，包含通脹平方、產出缺口平方及房價增長率平方的加權和。
- **收斂速度度量 (Convergence Speed Metric)** (WP/24/229)
  - Formula: γ = 1 / ln(|λ₂|)
  - 其中λ₂是轉移矩陣的第二大特徵值（在1之後）。該指標表示使當前分佈與穩態分佈之間的距離縮半所需的週期數。
- **預期退出時間 (Mean Time to Exit)** (WP/24/229)
  - Formula: MET_i = E[inf(n > 0 : X_n ≠ i | X_0 = i)]
  - 計算從狀態i首次遷移至其他任何狀態所需的預期時間步數，通常通過bootstrap方法估算其置信區間。
- **柯布-道格拉斯生產函數 (Cobb-Douglas Production Function)** (WP/24/229)
  - Formula: Y = A K^β (hL)^{1-β}
  - 用於分解產出的基本公式，其中Y為產出，A為TFP，K為資本，h為人力資本指數，L為勞動人口，β為資本產出彈性。
- **人力資本指數 (Human Capital Index)** (WP/24/229)
  - Formula: h = exp(φ(s))
  - 其中s為平均受教育年限，φ(s)是分段線性函數，根據受教育年限的不同階段賦予不同的回報率（例如：s≤4時斜率為0.134，4<s≤8時為0.101等）。
- **基於預測的泰勒規則 (Forecast-Based Taylor Rule)** (WP/24/260)
  - Formula: R_not_t / R_bar = [(R_not_{t-1} / R_bar)^rho] * [(E_t[epsilon_{t+4}] / epsilon_bar)^((1-rho)*pi)] * [(Y_t / Y_pot_t)^((1-rho)*x)] * exp(epsilon_R_t)
  - 中央銀行的名目利率規則，其中反應函數包含對未來4期（一年）預期通膨的加權，以及產出缺口的加權，並帶有利率平滑係數rho。
- **內生指數化因子 (Endogenous Indexation Factor)** (WP/24/260)
  - Formula: ~epsilon_t = ~epsilon_w_t = epsilon_bar^(1-{_t}) * epsilon_{t-1}^{ {_t} }
  - 非優化廠商的工資和價格指數化因子，其中{_t}是狀態依賴參數，取決於過去幾期幾何平均通膨偏差，體現了通膨高企時指數化程度自動上升的非線性特徵。
- **成本推動衝擊分解 (Cost-Push Shock Decomposition)** (WP/24/260)
  - Formula: a_t = a^P_t + a^T_t
  - 觀察到的成本推動衝擊總和(a_t)等於持久性成分(a^P_t)與暫時性成分(a^T_t)之和，決策者需透過Kalman濾波估計這兩個未觀察成分。
- **總產出缺口分解** (WP/25/95)
  - Formula: ŷ_t = ω_a ŷ^a_t + (1 - ω_a) ŷ^n_a_t
  - 將總產出缺口分解為農業部門缺口 (ŷ^a_t) 和非農業部門缺口 (ŷ^n_a_t)，其中 ω_a 為農業增加值在 GDP 中的比重。
- **食品通膨菲利普斯曲線** (WP/25/95)
  - Formula: π^f_t = b^f_1 π^f_{t-1} + (1 - b^f_1) π^{e,f}_t + b^f_2 rmct^f_t - b_a ŷ^a_t + ε^π_f_t
  - 描述食品通膨 (π^f_t) 如何受過去通膨、預期通膨、實際邊際成本以及農業產出缺口 (ŷ^a_t) 的影響；負號表示農業產出下降會推升食品通膨。
- **貨幣政策可信度累積** (WP/25/95)
  - Formula: incredt = β_1 incredt_{t-1} + (1 - β_1) β_2 (π^{yoy}_{t-1} - π̄) + ε^incr_t
  - 定義可信度指標 (incrd_t) 為過去通膨偏離目標的折現累積值，用於調整通膨預期形成機制。
- **泰勒規則 (貨幣政策反應函數)** (WP/25/95)
  - Formula: i_t = g_1 i_{t-1} + (1 - g_1)[i^n_t + g_2(E_t π^{yoy}_{t+3} - π̄) + g_3 ŷ_t] + ε^i_t
  - 決定政策利率 (i_t) 的路徑，基於利率平滑、預期通膨偏差及產出缺口的加權組合。
- **國內附加值佔比** (WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)
  - Formula: Domestic Value Added_t / Total Exports to US_t
  - 用於衡量一國對美出口中嵌入的國內生產價值比例，比值上升支持貿易重新配置假說。
- **中國附加值佔比** (WP/25/129_Demystifying_Trade_Patterns_In_A_Fragmenting_World.pdf)
  - Formula: Chinese Value Added_t / Total Exports to US_t
  - 用於衡量一國對美出口中嵌入的中國生產價值比例，若該比例未顯著高於合成控制組的反事實預期，則表明沒有發生大規模貿易繞道。
- **稅務行政運營強度指數 (OSI) 構建邏輯** (WP/25/219)
  - Formula: OSI = Σ (w_i * x_i)
  - 其中 w_i 是通過Delphi方法確定的第i個稅務行政實踐或結構基礎指標的專家權重，x_i 是該指標的標準化得分。OSI彙總了九個子指數（如合規風險管理、第三方數據使用、數字化程度等）的加權表現。
- **工具變數兩階段最小二乘法 (2SLS) 模型** (WP/25/219)
  - Formula: Stage 1: OSI_it = α + δ1 * FTE_RA_it + β1 * X_it + τ_t + μ_i + ξ_it
Stage 2: Tax_it = α + δ2 * ŌSI_it + β2 * X_it + τ_t + μ_i + ε_it
  - 第一階段用過去IMF稅務行政能力發展項目的全職當量強度（FTE_RA）預測OSI；第二階段用預測的OSI（ŌSI）解釋稅收佔GDP比率（Tax）。X為控制變量，τ為時間固定效應，μ為國家固定效應。
- **局部投影模型 (Local Projection Specification)** (IMF_WP_25_231.pdf)
  - Formula: π_{i,t+h}^e = α_h π_{i,t-1}^e + [I_{em} β_{em,h}^e + (1 - I_{em}) β_{ae,h}^e] FiscalShock_{i,t} + γ_h X_{it} + λ_t^h + μ_i^h + ε_{it}^h
  - 用於估計不同預期時距(h)下，財政衝擊對通膨預期的影響，並區分新興市場(EM)與先進經濟體(AE)的係數差異。
- **重大財政緊縮定義 (Quantitative Threshold)** (IMF_WP_25_231.pdf)
  - Formula: Primary Balance Improvement > 1% to 1.5% of GDP
  - 用於識別顯著財政調整事件的定量閾值，分別對應基本餘額改善的第75和第80百分位數。
- **無謂損失計算公式** (WP/25/255)
  - Formula: EB = τ × ΔB
  - 其中EB為無謂損失，τ為稅率，ΔB為因稅收導致的應稅基數（交易價值）的減少量。
- **有效稅率定義** (WP/25/255)
  - Formula: τ_eff = τ_statutory × (MM_volume / Household_Expenditure)
  - 有效稅率等於法定稅率乘以移動貨幣交易總額與家庭支出的比率，用於衡量稅收負擔相對於用戶經濟能力的比例。
- **実質政策金利** (OECD Economic Outlook, May 2024, No. 115)
  - Formula: 実質政策金利 = 名目政策金利 - 予想インフレ率
  - 金融政策の実際の引き締め効果を測る指標。OECDは、多くの国で先行きの実質金利が依然として高い状態にあると分析している。
- **債務対GDP比率の変化** (OECD Economic Outlook, May 2024, No. 115)
  - Formula: Δ(債務/GDP) ≈ (実質利子率 - 実質経済成長率) × 前期の債務/GDP比率 - 一次黒字/GDP
  - 債務比率を持続的に減らすためには、実質経済成長率が実質利子率を上回るか、または大きな一次黒字を達成する必要があることを示す恒等式。
- **淨投資佔GDP比率** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - Formula: 淨投資/GDP = (固定資本形成總額 - 固定資本消耗) / 名義GDP
  - 用於衡量扣除折舊後的實際資本存量增長。報告指出，經合組織國家的平均淨投資率自全球金融危機以來下降了0.9個百分點。
- **使用者資本成本 (UCC) 代理變量** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - Formula: UCC ≈ 相對投資品價格 × (實際利率 + 折舊率)
  - 在擴展的加速器模型中，使用log(1+UCC)作為解釋變量，反映融資成本和維護資本的綜合費用。
- **托賓Q (Tobin's Q)** (OECD Economic Outlook, Volume 2025 Issue 1: Tackling Uncertainty, Reviving Growth, No. 117)
  - Formula: 托賓Q = (市值 + 負債 - 普通股權益) / 總資產
  - 用於評估公司市場估值相對於其資產重置成本的水平，作為投資動機的指標。
- **Trade Policy Uncertainty (TPU) Impact Estimate** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - Formula: 1 SD increase in TPU index -> ~4.2 pp reduction in global real merchandise import growth (peak impact after 1 year)
  - Estimated using a panel vector autoregression (VAR) model, indicating that uncertainty shocks significantly inhibit trade volumes.
- **Regulatory Compliance Cost Metric** (OECD Economic Outlook, Volume 2025/2, No. 118)
  - Formula: Share of aggregate wages devoted to regulation-related tasks
  - Calculated using a task-based approach mapping O*NET database descriptions to occupations, estimating that ~4.2% of US wages were spent on regulatory 
- **現值計算公式** (post-autistic economics review, issue no. 44)
  - Formula: PV = FV / (1 + r)^t
  - 其中PV為現值，FV為未來價值，r為折現率，t為時間。文章指出傳統固定折現率會導致未來損失的現值趨近於零，從而合理化不作为。
- **投入產出就業乘數** (post-autistic economics review, issue no. 44)
  - Formula: 總就業影響 = 直接就業 + 間接就業 + 誘導就業
  - 用於量化不同政府支出項目（如軍費vs教育）對整體經濟就業的連鎖效應，顯示公共服務通常比軍事工業具有更高的勞動密集度。
- **社會時間偏好率閾值 (Social Rate of Time Preference Threshold)** (real-world economics review, issue no. 45)
  - Formula: Mitigation is economically justified if Social Discount Rate < 8.5%
  - 根據肯尼斯·阿羅的分析，只要社會時間偏好率低於8.5%，減緩溫室氣體排放的成本效益分析就顯示其優於不採取行動，這遠高於大多數合理估計的純時間偏好率。
- **理查森軍備競賽模型 (Richardson Arms Race Model)** (real-world economics review, issue no. 46)
  - Formula: dm_i/dt = a_i + b_i*m_j - c_i*m_i
  - 其中 dm_i/dt 是國家 i 的軍費變化率，a_i 是固有敵意項，b_i 是對對手 j 軍費 (m_j) 的反应係數，-c_i 是內部財政疲勞或限制項。用於模擬兩國間的軍備競賽動態。
- **艾斯林悖論相關概念 (非公式，指代關係)** (real-world economics review, issue no. 46)
  - Formula: GNP_per_capita ↑ ≠ Happiness_avg ↑
  - 描述宏觀經濟指標（人均GNP）增長與主觀幸福感時間序列數據之間缺乏長期正相關的現象。
- **宏觀經濟平衡方程 (生態調整版)** (real-world economics review, issue no. 50)
  - Formula: Y = [Cg + Ime + Gg + Gme] + [Cs + Cm + Imc + In + Ih + Gs + Gn + Gmc + Gh] + (X – M)
  - 將總產出(Y)分解為需限制的材料/能源密集型消費和投資（第一組括號），以及可擴展的人力/自然資本投資和服務消費（第二組括號），以指導綠色宏觀政策。
- **槓桿率調整機制** (real-world economics review, issue no. 50)
  - Formula: Leverage Ratio = Assets / Equity
  - 描述投資銀行如何通過維持固定槓桿比率來驅動順週期行為：當資產價格上漲時，權益增加，槓桿率下降，銀行借入更多資金購買資產以恢復目標槓桿率，從而推高價格。
- **托賓稅收入估算** (real-world economics review, issue no. 51)
  - Formula: Revenue = Tax Rate * Volume of Foreign Exchange Transactions
  - 根據L. Randall Wray引用的James Tobin建議，對外匯交易徵收0.1%-0.25%的稅。文中提到，按0.1%稅率和2007年的交易量計算，年收入可達2000-2500億美元，可用於全球公共產品或減貧。
- **結構性財政餘額概念** (real-world economics review, issue no. 51)
  - Formula: Structural Balance = Actual Balance - Automatic Stabilizer Effects
  - Mark Weisbrot指出，僅看實際赤字擴大不能證明政策是逆週期的。必須扣除自動穩定器（如失業救濟）的影響，才能判斷政府是否主動採取了緊縮（順週期）或擴張（逆週期）立場。
- **Aggregate Demand in Debt-Based Economy** (real-world_economics_review_issue_52.pdf)
  - Formula: AD_t = GDP_t + ΔDebt_t
  - Total spending in the economy is the sum of current income (GDP) and the change in private debt. If debt growth stops (ΔDebt = 0), AD falls by the amo
- **Debt-Financed Demand Share** (real-world_economics_review_issue_52.pdf)
  - Formula: Share = ΔDebt_t / (GDP_t + ΔDebt_t)
  - The proportion of aggregate demand financed by new debt. A decline in this share correlates negatively with unemployment.
- **總需求定義 (Steve Keen)** (real-world economics review, issue no. 54)
  - Formula: Aggregate Demand = GDP + Change in Debt
  - 總需求不僅包括當前的產出(GDP)，還包括債務變動對支出的影響。當債務下降時，即使GDP增長，總需求也可能萎縮。
- **信貸衝動 (Credit Impulse)** (real-world economics review, issue no. 54)
  - Formula: Credit Impulse = (Change in Change in Debt) / GDP
  - 衡量債務變化率的變化對經濟的影響，可用於預測就業和產出的短期動能。
- **帕氏物價指數 (Paasche Price Index) 變體** (real-world economics review, issue no. 54)
  - Formula: PI = (Current Price * Current Quantity) / (Base Price * Current Quantity)
  - 用於計算不同系統間相對價值和生產率差異的工具，John Duffield用此證明比較優勢模型的邏輯缺陷。
- **比较优势机会成本计算** (real-world_economics_review_issue_55.pdf)
  - Formula: Opportunity Cost of Good A = (Quantity of Good B forgone) / (Quantity of Good A gained)
  - 用于确定一国在生产特定商品时的相对效率，若一国的机会成本低于贸易伙伴，则在该商品上具有比较优势。
- **房价收入比/租金比** (real-world_economics_review_issue_55.pdf)
  - Formula: Price-to-Income Ratio = Median House Price / Median Annual Household Income
  - 衡量住房市场估值是否脱离基本面的指标，比率过高通常预示泡沫风险。
- **金融投機稅收入估算** (real-world economics review, issue no. 56)
  - Formula: Revenue = Tax Rate * Transaction Volume
  - 根據Dean Baker的分析，若對金融交易徵收適度稅率，即使交易量下降，由於需求彈性，總收入仍可達到GDP的1%左右（約1500億美元/年），足以覆蓋社會保障缺口或失業救濟費用。
- **奧肯定律 (Okun's Law) 的批評性應用** (real-world economics review, issue no. 56)
  - Formula: ΔUnemployment ≈ -0.3 * (GDP Growth - Potential Growth)
  - 文中指出傳統奧肯定律（失業率與GDP增長的反向關係）在解釋現代勞動力市場時失效，因為企業在復甦期傾向於提高生產率而非僱用員工，導致「無就業增長」。
- **Credit Accelerator** (Real-World Economics Review, Issue 57 (2011))
  - Formula: CA_t = (ΔD_t - ΔD_{t-1}) / GDP_t
  - Where ΔD is the change in private debt. This metric measures the acceleration of debt growth relative to the size of the economy, used by Keen to pred
- **Aggregate Demand in a Credit Economy** (Real-World Economics Review, Issue 57 (2011))
  - Formula: Income + Change in Debt = Output + Net Asset Sales
  - A fundamental identity proposed by Keen, challenging Walras' Law by including the change in debt as a source of monetary demand, linking finance direc
- **Coupled Differential Equations for Financial-Real Interaction** (Real-World Economics Review, Issue 57 (2011))
  - Formula: dY/dt = b0 + p_Y(t)Y(t) - p_n(t)K(t) ; dK/dt = a0 + p_K(t)K(t) + p_n(t)Y(t)
  - Proposed by Peetz and Genreith to model the dynamic interaction between GDP (Y) and Financial Assets (K), where p_n represents the net business invest
- **银行股本回报率分解 (Du Pont Identity)** (real-world economics review, issue no. 59)
  - Formula: ROE = (Earnings/Assets) * (Assets/Equity)
  - 用于解释在资产回报率下降的情况下，银行如何通过提高杠杆率（资产负债率）来维持股本回报率，特别是在欧元区金融一体化背景下。
- **資本化公式 (Capitalization Formula)** (real-world_economics_review_issue_60.pdf)
  - Formula: Price = Expected EPS / Discount Rate
  - 用於計算資產價格，其中預期每股收益（EPS）受未來預期和投機熱情係數影響，貼現率受正常回報率和風險係數影響。
- **市盈率分解 (P/E Ratio Decomposition)** (real-world_economics_review_issue_60.pdf)
  - Formula: P/E = (Hype * m) / (Normal Return * Risk)
  - 將市盈率分解為投機熱情係數（Hype）、時間標量（m）、正常回報率和風險係數，用以分析股價波動的非基本面因素。
- **就業決定函數 (Keynesian Employment Function)** (real-world_economics_review_issue_60.pdf)
  - Formula: N = g(I, K₀)
  - 在凱恩斯框架下，就業水平（N）由投資（I）和現有資本存量（K₀）決定，而非由實際工資決定。
- **差異化回報率 (Differential Return on Equity)** (Real-World Economics Review, Issue 61)
  - Formula: Differential ROE = (ROE of Firm - ROE of Benchmark) / ROE of Benchmark
  - 用於衡量特定公司相對於行業標杆（如財富500強）的積累績效，用以分析其進行戰略破壞（如戰爭或壟斷）的動機。
- **真實淨指標/ISEW調整公式 (Conceptual)** (Real-World Economics Review, Issue 61)
  - Formula: GPI/ISEW = Private Consumption - Resource Depletion - Pollution Costs + Non-market Work + Infrastructure
  - 對傳統國民收入賬戶進行調整，扣除環境破壞和不平等成本，加上非市場勞動貢獻，以更準確反映經濟福利。
- **總需求構成公式 (Keen)** (real-world economics review, issue no. 62)
  - Formula: Aggregate Demand = Income + Change in Debt
  - 強調在貨幣經濟中，債務的增長或減少直接影響總需求水平，私人部門債務的急劇下降會導致總需求萎縮。
- **利潤率公式 (Marxian)** (real-world economics review, issue no. 62)
  - Formula: Rate of Profit (PR) = m / (c + v)
  - 其中 m 為剩餘價值，c 為不變資本，v 為可变資本。該公式用於分析資本積累過程中，由於技術變革和勞動剝削率變化導致的利潤率長期趨勢。
- **財富基尼係數估算 (Guerrero de Lizardi)** (real-world economics review, issue no. 62)
  - Formula: Wealth Gini ≈ Function(Durable Goods Ownership Distribution)
  - 利用家庭調查中耐用消費品（如汽車、電腦）的擁有量分佈作為財富分佈的代理變數，來估算缺乏直接財富數據國家的財富不平等程度。
- **貨幣數量方程式 (Quantity Equation)** (real-world economics review, issue no. 63)
  - Formula: Y = M * v
  - Y代表名目國內生產總值（總支出），M代表貨幣供給量（存量），v代表貨幣流通速度。本文強調在電子貨幣時代，政策制定者應同時關注M和v的控制，特別是透過轉移稅來調節v。
- **規則八 (Rule of Eight)** (real-world economics review, issue no. 63)
  - Formula: ΔProductivity ≈ 8 - Unemployment Rate
  - 這是一個經驗觀察公式，指出在中期和長期內，生產率的變化率大約等於8減去失業率。意味著當勞動力稀缺（失業率低）時，企業會更有效率地使用勞動，從而提高生產率。
- **部門金融餘額恆等式** (real-world economics review, issue no. 64)
  - Formula: (Private Sector Balance) + (Government Sector Balance) + (Foreign Sector Balance) = 0
  - 宏觀會計恆等式，表明一個部門的淨儲蓄必然對應另一個部門的淨負債。例如，如果私人部門和外國部門處於盈餘，則政府部門必須處於赤字。
- **費雪方程式 (Equation of Exchange)** (real-world economics review, issue no. 64)
  - Formula: P * Y = M * V
  - 價格水平(P)乘以實際產出(Y)等於貨幣供應量(M)乘以貨幣流通速度(V)。用於分析貨幣供應變化對價格和產出的影響。
- **總需求定義 (Keen's Definition)** (real-world economics review, issue no. 64)
  - Formula: AD = GDP + ΔDebt
  - 基恩提出的總需求公式，強調債務變化是總需求的重要組成部分，特別是在資產市場交易中。
- **平均因果效應 (Average Causal Effect)** (real-world_economics_review_issue_65.pdf)
  - Formula: ACE = E[Y|do(X=x1)] - E[Y|do(X=x0)]
  - 衡量變量X從狀態x0改變為x1時，結果變量Y的預期變化量，通過干預算子do()來隔離因果影響。
- **名目GDP目標制邏輯** (real-world_economics_review_issue_65.pdf)
  - Formula: Target NGDP Growth = Target Inflation + Target Real GDP Growth
  - 中央銀行設定名目GDP增長目標，通常等於預期通脹目標加上潛在產出增長率，以此作為貨幣政策的錨。
- **Sector Balances Identity** (real-world economics review, issue no. 66)
  - Formula: (G - T) = (S - I) + (M - X)
  - The government deficit (G-T) equals the private sector surplus (S-I) plus the current account balance (M-X). In the text, Romar Correa simplifies this
- **Capability Matrix Eigenvalue Equation** (real-world economics review, issue no. 66)
  - Formula: ℵ x = λ x
- **利潤法則 (Profit Law)** (real-world economics review, issue no. 67)
  - Formula: Q_m = C - WY + D 或 Q_m/Y = (1 - ρ_E) * (D/Y)
  - 貨幣利潤(Q_m)等於消費支出(C)減去工資收入(WY)加上分配利潤(D)。若支出比率(ρ_E)為1且分配利潤比率為0，則總利潤為零。
