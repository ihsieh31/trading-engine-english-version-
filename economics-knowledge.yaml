### === CORE THEORIES & PRINCIPLES (TEXTBOOKS) ===
- **勞動價值論** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - 商品具有價值，因為它們是抽象人類勞動的凝結。價值量由生產該商品所需的社會必要勞動時間決定，而非個別勞動時間。勞動生產力越高，單位商品價值越低。
  - Proponents: 卡爾·馬克思、大衛·李嘉圖、亞當·斯密
- **商品的拜物教性質及其秘密** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - 在商品生產社會中，人與人之間的社會關係表現為物與物之間的關係。商品的價值形式掩蓋了勞動的社會本性，使商品看起來具有獨立於生產者意志之外的神秘力量。
  - Proponents: 卡爾·馬克思
- **價值形式的發展理論** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - 價值形式經歷了從簡單的偶然價值形式，到擴大的價值形式，再到一般價值形式，最後發展為貨幣形式的歷史邏輯過程。貨幣是固定充当一般等价物的特殊商品。
  - Proponents: 卡爾·馬克思
- **貨幣的形態與世界貨幣 (Forms of Money and World Money)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 貨幣在國內流通中作為價值尺度、流通手段和支付手段；當離開國內流通領域進入世界市場時，貨幣脫去地方形式，回歸其原來的金屬塊（貴金屬）形式，成為世界貨幣。世界貨幣執行普遍購買手段、普遍支付手段和社會財富物質化代表的職能。
  - Proponents: 亞里斯多德 (Aristotle), 威廉·配第 (William Petty), 約翰·富拉頓 (John Fullarton)
- **資本的一般公式與循環 (General Formula of Capital and Circulation)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 資本的最初表現形式是貨幣，但其本質區別於普通貨幣在於其循環形式。簡單商品流通是 C-M-C（商品-貨幣-商品），目的是獲取使用價值；資本流通是 M-C-M'（貨幣-商品-更多貨幣），目的是交換價值的增殖。其中 M' = M + ΔM（剩餘價值）。
  - Proponents: 卡爾·馬克思 (Karl Marx)
- **剩餘價值的來源矛盾 (Contradiction in the Origin of Surplus Value)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 剩餘價值不能產生於流通領域（因為等價交換不產生增值，不等價交換如賤買貴賣僅改變價值分配而不增加總價值），也不能完全脫離流通領域（因為生產者獨自無法實現價值增殖）。因此，剩餘價值的產生必須既在流通領域中進行（購買勞動力），又不在流通領域中進行（在生產過程中消費勞動力）。
  - Proponents: 卡爾·馬克思 (Karl Marx)
- **勞動力的買賣與商品屬性 (Buying and Selling of Labour-Power)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 勞動力成為商品需要兩個條件：勞動者是人自由人，擁有自己的勞動力；勞動者沒有其他商品可賣，僅有勞動力出賣以維持生計。勞動力的價值由生產和復制勞動力所需的社會必要勞動時間決定（即維持勞動者生存及繁衍所需的生活資料價值）。
  - Proponents: 卡爾·馬克思 (Karl Marx)
- **資本主義生產關係的本質與勞動日鬥爭** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 資本的本性是無止境地榨取剩餘勞動。在市場交換中，工人看似自由地出賣勞動力，但一旦進入生產過程，資本就像吸血鬼一樣，只要還有一塊肌肉、一根神經、一滴血可以被榨取，就不會放過。勞動日的長度不是由契約決定的，而是由階級之間長期、隱蔽或公開的戰爭決定的。
  - Proponents: 馬克思
- **絕對剩餘價值與相對剩餘價值的區別** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 剩餘價值的生產有兩種基本方法：一是通過延長工作日來增加剩餘勞動時間（絕對剩餘價值）；二是通過提高勞動生產率來縮短必要勞動時間，從而相對延長剩餘勞動時間（相對剩餘價值）。前者依賴於工作日的極限延長，後者依賴於技術和社會生產方式的革命。
  - Proponents: 馬克思
- **協作與製造業中的勞動分工** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 協作（Co-operation）是資本主義生產的起點，它創造了集體勞動力量。製造業（Manufacture）基於勞動分工，將手工藝分解為細節操作，使工人成為局部勞動的載體。這提高了生產力，但也導致了工人的片面化和智力退化，並確立了資本對勞動的專制統治。
  - Proponents: 馬克思
- **機器大工業對勞動力的重新配置** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 機器的應用使資本能夠剝奪男性工人對勞動的控制權，轉而大量雇用婦女和兒童，從而將整個工人家庭納入資本的直接統治之下。這不僅降低了勞動力價值，還打破了工人階級的抵抗能力，並成為延長工作日和加強剝削的工具。
  - Proponents: 馬克思
- **機械的搾取と労働時間延長の矛盾** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - 資本主義における機械の使用は、固定資本（機械）の価値をより早く回収し、道徳的減価償却を防ぐために、労働日の極端な延長を促す。しかし、機械は労働者を削減するため、相対的剰余価値を増加させる一方で、同時に搾取される労働者数を減少させるという内在的な矛盾を生む。この矛盾を補填するために、資本家は労働日をさらに延長せざるを得なくなる。
  - Proponents: カール・マルクス
- **労働の強化（Intensification of Labour）** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - 工場法による労働時間の短縮後、資本家は機械の速度向上や一人当たりの担当機械数増加を通じて、単位時間あたりの労働強度を高めることで剰余価値を生み出す。これにより、短い労働日の中に凝縮されたより大量の労働が生産される。
  - Proponents: カール・マルクス
- **補償理論への批判** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - 古典派経済学者（ジェームズ・ミルら）が主張する「機械によって職を失った労働者は、解放された資本によって再雇用される」という補償理論は誤りである。機械の導入は可変資本を不変資本に変換し、資本を労働力との交換から引き離すため、労働者を路頭に迷わせるだけであり、補償は生じない。
  - Proponents: カール・マルクス（反論対象：ジェームズ・ミル、マッカルロックなど）
- **生産的労働と非生産的労働の定義** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - 資本主義生産において、生産的労働とは剰余価値を生み出し、資本の自己増殖に貢献する労働のみを指す。単に使用価値を生産するだけでなく、資本家に対して剰余労働を提供することが本質的条件である。
  - Proponents: カール・マルクス
- **勞動力的價值與工資的形式** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - 資本主義生產關係中，勞動力（labor-power）作為商品出售，其價值由再生產勞動力所需的生活資料價值決定。然而，在市場表象上，這呈現為「勞動的價格」或「工資」。這種形式掩蓋了必要勞動與剩餘勞動、有酬勞動與無酬勞動的區別，使全部勞動看起來都是有酬的，從而將資本對工人的剝削關係神秘化。
  - Proponents: 馬克思 (Karl Marx)
- **資本積累的歷史趨勢與辯證法** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - 資本積累不僅是財富在資本家階級一極的累積，同時也是貧困、苦難和奴役在工人階級一極的累積。隨著資本積累，資本有機構成提高，導致對勞動力的相對需求減少，從而產生相對過剩人口（產業後備軍）。這種過剩人口既是資本積累的產物，又是資本積累的條件，它壓低了在職工人的工資並強化了資本對勞動的統治。
  - Proponents: 馬克思 (Karl Marx)
- **計件工資與時間工資的本質** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - 計件工資是時間工資的轉化形式，兩者本質上都支付的是勞動力的價值而非勞動創造的價值。計件工資特別有利於資本家監督勞動強度，並成為降低工資和進行資本主義欺騙的源泉。它激發工人之間的競爭，並促使工人自願延長工作日和加強勞動強度，從而為資本家創造更多剩餘價值。
  - Proponents: 馬克思 (Karl Marx)
- **農業無產階級的貧困化與相對剩餘人口的形成** (Capital_Vol1_Marx_chunk005 (chunk 5/6))
  - 資本主義生產方式在農業中的發展，導致土地集中、小農被剝奪、以及農業勞動者被驅逐。這不僅創造了工業所需的自由勞動力和國內市場，也造成了農業地區持續的「相對剩餘人口」。這種剩餘人口壓低了工資，使農業工人陷入極度貧困和依賴狀態，甚至低於維持生存的水平。
  - Proponents: 卡爾·馬克思
- **原始積累的暴力本質** (Capital_Vol1_Marx_chunk005 (chunk 5/6))
  - 資本主義積累的歷史基礎並非通過勤儉節約，而是通過對直接生產者的強制剝奪（如圈地運動、剝奪公地、殖民掠奪、奴隸貿易）實現的。這是一個充滿暴力、征服、奴役和屠殺的過程，其目的是將社會生產資料轉化為資本，並將生產者轉化為僱傭勞工。
  - Proponents: 卡爾·馬克思
- **系統性殖民理論（沃克菲爾德）** (Capital_Vol1_Marx_chunk005 (chunk 5/6))
  - 愛德華·吉本·沃克菲爾德指出，在殖民地，如果土地便宜且人人可獲得土地，勞工就會迅速變成獨立農民，導致資本家無法獲得廉價勞動力。因此，他主張通過政府人為抬高土地價格（「足夠價格」），強制移民先成為僱傭勞工，從而為資本積累創造條件。這揭示了資本主義關係在殖民地是通過國家權力人工製造的。
  - Proponents: 愛德華·吉本·沃克菲爾德 (E.G. Wakefield)
- **投機即商業 (Speculation as a Business)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
  - 投機不應被視為賭博，而應被視為一項嚴肅的商業活動。成功的投機者必須像經營企業一樣，建立規則、記錄數據、控制風險，並保持紀律。市場從不犯錯，錯誤往往來自個人的觀點或情緒。
  - Proponents: Jesse L. Livermore
- **時間與價格結合理論 (Time and Price Combination)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
  - 這是利弗莫爾方法的核心。單純的價格分析是不夠的，必須將「時間元素」納入考量。通過記錄價格隨時間的變化，識別出關鍵的「樞軸點」（Pivotal Points），從而預測重大趨勢的開始和結束。
  - Proponents: Jesse L. Livermore
- **順勢交易與關鍵價格 (Trend Following & Key Price)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
  - 交易者應跟隨市場領導股（Leaders）的趨勢。為了確認趨勢的真實性，不應僅依賴單一股票，而應觀察同一群組中兩隻主要股票的綜合表現，這被稱為「關鍵價格」（Key Price）。只有當關鍵價格確認趨勢時，才進行操作。
  - Proponents: Jesse L. Livermore
- **Scarcity and Choice** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - Economics is the study of how humans make decisions in the face of scarcity, where human wants exceed available resources. This necessitates trade-offs and the consideration of opportunity costs.
  - Proponents: Adam Smith, Lionel Robbins
- **Division and Specialization of Labor** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - Breaking production into discrete tasks allows workers to focus on areas of advantage, learn faster, and achieve economies of scale, thereby increasing total production and mitigating scarcity.
  - Proponents: Adam Smith
- **Law of Diminishing Marginal Utility** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - As a person consumes more units of a good, the additional (marginal) utility derived from each successive unit declines. This explains why consumers rarely make all-or-nothing choices.
  - Proponents: Not explicitly named in this chunk, but foundational to microeconomic theory
- **Law of Increasing Opportunity Cost** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - As production of a good increases, the marginal opportunity cost of producing it also increases because resources are not equally efficient in producing all goods. This results in a bowed-out Production Possibilities Frontier (PPF).
  - Proponents: Not explicitly named, but derived from PPF analysis
- **Comparative Advantage** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - A country has a comparative advantage in producing a good if it can produce it at a lower opportunity cost than another country. Specialization based on comparative advantage allows for mutually beneficial trade.
  - Proponents: David Ricardo (implied context), though text focuses on application via PPF
- **Invisible Hand** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - Individuals pursuing their own self-interest often promote the public interest more effectively than when they intentionally try to do so, due to market mechanisms.
  - Proponents: Adam Smith
- **供需模型在金融市場與勞動市場的應用** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 將供需分析框架應用於金融資本市場（價格為利率）和勞動市場（價格為工資）。金融資本的供給受儲蓄意願、投資風險與回報影響；需求受商業信心影響。美國作為全球借款者，外資流入減少會導致資本供給曲線左移，推高均衡利率並減少投資量。
  - Proponents: 傳統經濟學理論
- **價格管制與市場均衡** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 分析價格上限（如高利貸法/usury laws）對金融市場的影響。當價格上限低於均衡利率時，會導致信貸短缺（需求量大於供給量）。價格機制被視為傳遞稀缺性資訊的高效機制，干預價格會導致資源錯配。
  - Proponents: 傳統經濟學理論
- **彈性理論 (Elasticity)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 衡量變數之間響應程度的概念，特別是價格彈性。包括需求價格彈性、供給價格彈性、所得彈性與交叉價格彈性。彈性決定企業定價策略、稅負分攤（稅收歸宿）以及長期與短期市場調整。
  - Proponents: Alfred Marshall (隱含)
- **消費者選擇與效用最大化** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 消費者在預算約束下追求總效用最大化。基於邊際效用遞減規律，消費者會分配預算以使每單位貨幣的邊際效用相等。收入與價格變化通過替代效應和所得效應影響消費決策。
  - Proponents: Jeremy Bentham, John Stuart Mill (隱含)
- **生產與成本理論** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 區分短期與長期生產函數。短期存在固定投入與邊際報酬遞減；長期所有投入均可變，涉及規模報酬（規模經濟、規模不經濟）。成本分為顯性與隱性成本，經濟利潤需扣除兩者。
  - Proponents: Alfred Marshall, Frank Knight (隱含)
- **完全競爭市場均衡** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 在完全競爭市場中，企業是價格接受者。短期利潤最大化條件為邊際收益等於邊際成本（MR=MC）。長期中，自由進出使經濟利潤趨於零，實現生產效率與配置效率。
  - Proponents: Adam Smith, Leon Walras (隱含)
- **壟斷的形成與進入障礙 (Monopoly Formation and Barriers to Entry)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 壟斷市場由進入障礙保護，這些障礙包括規模經濟導致的自然壟斷、對實體資源的控制、法律限制（如專利）、以及通過掠奪性定價嚇阻競爭等策略。
  - Proponents: 文本未提及特定單一提出者，但引用了John Hicks關於壟斷利潤的觀點。
- **獨佔廠商的利潤最大化決策 (Profit Maximization by Monopolists)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 獨佔廠商面臨向下傾斜的需求曲線，其邊際收益小於價格。廠商通過在邊際收益等於邊際成本（MR=MC）的產量水平進行生產，並根據需求曲線確定價格，以實現利潤最大化。
  - Proponents: 標準微觀經濟學理論
- **寡頭壟斷與囚徒困境 (Oligopoly and Prisoner's Dilemma)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 寡頭市場中少數幾家企業相互依賴。雖然企業有動機勾結以獲取壟斷利潤，但每個企業都有個別增加產量的誘因，導致非合作均衡（類似囚徒困境），通常產出高於合謀水平，價格低於壟斷水平。
  - Proponents: Game Theory (博弈論)
- **外部性與市場失靈 (Externalities and Market Failure)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 當市場交易影響到第三方且未反映在價格中時，就會產生外部性。負外部性（如污染）導致社會成本高於私人成本，造成市場失靈和過度生產；正外部性導致社會利益高於私人利益，造成生產不足。
  - Proponents: Ronald Coase (科斯定理)
- **Theory of Labor Markets (Marginal Productivity)** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - Firms demand labor based on the value of the worker's marginal productivity. In perfectly competitive markets, firms hire up to the point where the market wage equals the Value of the Marginal Product of Labor (VMPL). In imperfectly competitive marke
  - Proponents: John Bates Clark, Joan Robinson
- **Monopsony Theory** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - Describes a labor market with a single employer (or significant market power). The monopsonist faces an upward-sloping labor supply curve, meaning the Marginal Cost of Labor (MCL) exceeds the wage rate. To maximize profit, they hire fewer workers and
  - Proponents: Joan Robinson
- **Bilateral Monopoly** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - A labor market structure where a union (monopoly supplier of labor) negotiates with a monopsony (monopoly buyer of labor). Employment is lower than in a competitive market, but the equilibrium wage is indeterminate and depends on the relative bargain
  - Proponents: Standard Microeconomic Theory
- **Poverty Trap** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - A situation where government assistance programs are structured such that earning additional income leads to a proportional or greater loss in benefits. This eliminates or severely reduces the financial incentive to work, potentially trapping individ
  - Proponents: Standard Welfare Economics
- **Lorenz Curve and Income Inequality** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - A graphical representation of income distribution. The curve plots the cumulative percentage of total income against the cumulative percentage of recipients. Deviation from the line of perfect equality indicates inequality. Causes include changes in 
  - Proponents: Max O. Lorenz
- **理性無知理論 (Rational Ignorance)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 經濟學觀點認為，由於單一票決對選舉結果影響極小，且獲取政治資訊的成本高昂，理性的選民會選擇不投票或不了解議題。
  - Proponents: Anthony Downs
- **中位選民定理 (Median Voter Theory)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 在兩黨或多黨競爭的民主制度中，候選人為了贏得多數選票，其政策主張往往會向選民偏好分佈的中間位置靠攏。
  - Proponents: Hotelling-Downs Model
- **隨機漫步理論 (Random Walk Theory)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 股價變動主要受未來不可預測的新聞和預期影響，因此短期內股價走勢類似隨機漫步，長期則呈現上升趨勢。這意味著難以透過選股來持續擊敗市場。
  - Proponents: E.F. Fama (隱含)
- **經濟收斂理論 (Economic Convergence)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 低收入國家若能投資於人力資本、物質資本並採用現有技術，其經濟增長率可能高於高收入國家，從而逐漸追趕上發達國家的生活水平。
  - Proponents: Robert Solow, Alexander Gerschenkron
- **自然失業率理論 (Natural Rate of Unemployment)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 即使在經濟健康增長時，失業率也不會為零。它由摩擦性失業和結構性失業組成，反映了勞動市場中工人與職位匹配所需的時間以及技能錯配。
  - Proponents: 多位經濟學家共同發展，文中未特別指定單一提出者，但歸屬於宏觀經濟學標準模型。
- **薩伊定律 (Say's Law)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 「供給創造其自身的總需求」。強調長期來看，生產活動產生的收入足以購買生產出的商品。主要適用於長期分析。
  - Proponents: 讓-巴蒂斯特·薩伊 (Jean-Baptiste Say)
- **凱恩斯定律 (Keynes' Law)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 「需求創造其自身的總供給」。強調短期內，總需求水平決定經濟產出和就業水平，特別是當存在閒置資源時。
  - Proponents: 約翰·梅納德·凱恩斯 (John Maynard Keynes)
- **總供給-總需求模型 (AS-AD Model)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 結合總供給 (AS) 和總需求 (AD) 來解釋物價水平和實際國內生產總值 (Real GDP) 的決定因素，以及經濟波動、增長和失業的原因。
  - Proponents: 現代宏觀經濟學綜合模型
- **Keynesian Sticky Wages and Prices** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - Wages and prices do not adjust immediately to changes in supply and demand due to 'menu costs' and institutional factors. This stickiness causes recessions to persist through unemployment and excess supply rather than immediate price drops.
  - Proponents: John Maynard Keynes
- **Expenditure Multiplier** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - The principle that an initial change in autonomous spending leads to a more than proportionate change in real GDP, as one person's spending becomes another's income, triggering further spending.
  - Proponents: John Maynard Keynes
- **Phillips Curve (Short-Run)** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - A theoretical tradeoff between unemployment and inflation in the short run, where lower unemployment is associated with higher inflation and vice versa.
  - Proponents: A.W. Phillips
- **Neoclassical Long-Run Adjustment** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - The theory that in the long run, wages and prices are flexible, causing the economy to self-correct back to potential GDP (full employment) regardless of aggregate demand shifts, which only affect the price level in the long run.
  - Proponents: Milton Friedman, Neoclassical Economists
- **Rational vs. Adaptive Expectations** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - Theories on how agents form expectations: Rational Expectations posits agents use all available info to predict future accurately and instantly, while Adaptive Expectations suggests agents adjust beliefs gradually based on past experience.
  - Proponents: Rational Expectations: Lucas/Sargent; Adaptive: Traditional Keynesians
- **比較優位説 (Theory of Comparative Advantage)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - 一国が他の財を生産するために放棄しなければならない財の量（機会費用）が他国よりも低い場合、その財において比較優位を持つ。貿易は絶対的な生産性の優劣に関わらず、比較優位に基づく専門化と交換によって双方に利益をもたらす。
  - Proponents: デヴィッド・リカード (David Ricardo)
- **規模の経済と産業内貿易 (Economies of Scale and Intra-industry Trade)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - 類似した所得水準の国々の間で行われる、同一産業内の財の相互輸出入。これは学習効果による技能の向上、バリューチェーンの分業化、および生産規模の拡大に伴う平均コストの低下（規模の経済）によって生じる利益に基づいている。
  - Proponents: ポール・クルーグマン (Paul Krugman) など新貿易理論の提唱者
- **リカード等価定理 (Ricardian Equivalence)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - 合理的な家計は、政府の財政赤字（借入）が将来の増税を意味すると予想し、それを見越して私的貯蓄を増やすため、政府の借入が民間投資や貿易収支に影響を与えないとする理論。ただし、実証的には完全には成立しない。
  - Proponents: デヴィッド・リカード (David Ricardo)
- **保護主義的間接補貼理論 (Protectionism as an Indirect Subsidy)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 貿易壁壘（關稅、配額、非關稅壁壘）本質上是要求國內消費者支付更高價格，從而將財富從消費者轉移給受保護的國內生產者。這種政策導致社會總剩餘減少，產生無謂損失。
  - Proponents: 經濟學界共識 (Consensus among economists)
- **比較優勢與貿易利益 (Comparative Advantage and Gains from Trade)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 國際貿易允許各國專注於其具有比較優勢的產品，從而提高全球總產出和平均工資水平。雖然貿易會導致收入分配變化（某些行業受益，某些受損），但整體上國家福利增加。
  - Proponents: 大衛·李嘉圖 (David Ricardo), 赫克歇爾-俄林模型 (Heckscher-Ohlin Model)
- **幼稚產業論 (Infant Industry Argument)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 主張對新興國內產業提供暫時性保護，使其有時間發展規模經濟、技術和管理能力，最終能在國際市場上競爭。然而，實踐中往往難以撤銷保護，且可能導致效率低下。
  - Proponents: 亞歷山大·漢密爾頓 (Alexander Hamilton), 弗里德里希·李斯特 (Friedrich List)
- **貧困陷阱與所得再分配理論 (Poverty Trap and Redistribution)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 探討政府福利政策（如所得稅抵減 EITC、TANF）如何影響工作誘因。當福利隨收入增加而減少時，可能形成「貧困陷阱」，抑制工作意願。同時討論經濟成長（輸出）與平等之間的生產可能性邊界（PPF）關係，指出極端再分配可能降低產出，但某些社會安全網政策可能透過鼓勵創新和市場自由運作來促進成長。
  - Proponents: OpenStax Economics Textbook Authors
- **資訊不對稱與訊號理論 (Asymmetric Information and Signaling)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 在勞動市場中，僱主無法完全觀察員工特質，因此依賴學歷、成績等作為「訊號」來篩選候選人。此外，討論了金融市場中的資訊問題，如風險與報酬的關係，以及高風險投資通常伴隨高預期報酬的原理。
  - Proponents: OpenStax Economics Textbook Authors
- **總體經濟均衡與預期理論 (Macroeconomic Equilibrium and Expectations)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 涵蓋凱因斯主義與新古典學派的觀點。凱因斯主義強調總需求（AD）對產出的影響及工資價格粘性；新古典學派則強調總供給（AS）及市場快速調整。引入理性預期（Rational Expectations）與適應性預期（Adaptive Expectations），說明政策效果取決於公眾對未來的預測能力。
  - Proponents: John Maynard Keynes, Milton Friedman, OpenStax Economics Textbook Authors
- **Division of Labor and Specialization** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - Dividing production into discrete tasks allows workers to focus on areas of advantage, learn faster, and achieve economies of scale, thereby increasing total output and overcoming scarcity.
  - Proponents: Adam Smith
- **Opportunity Cost and Marginal Analysis** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - The cost of any action is the value of the next best alternative forgone. Rational decisions are made at the margin, comparing additional benefits to additional costs, while ignoring sunk costs.
  - Proponents: Lionel Robbins
- **Supply and Demand Equilibrium** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - Market prices and quantities are determined by the intersection of supply and demand curves. Deviations from equilibrium create surpluses or shortages that exert pressure to restore balance.
  - Proponents: Alfred Marshall
- **供需模型與價格控制** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 利用供給與需求模型分析市場均衡。當政府實施價格上限（如信用卡利率上限或高利貸法）且低於均衡利率時，會導致需求量超過供給量，從而產生信用短缺。價格作為傳遞市場資訊的機制，價格管制會阻礙市場達到均衡並導致資源錯配。
  - Proponents: 經濟學通用理論
- **市場系統作為資訊傳遞機制** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 價格不僅是交換媒介，更是收集、結合和傳遞有關供需關係資訊的社會機制。消費者與生產者根據價格變化調整行為，無需中央計劃即可實現資源配置。價格管制被比喻為「殺死信使」，會隱藏真實的稀缺性資訊。
  - Proponents: 經濟學通用理論
- **國內生產毛額 (GDP) 核算** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - GDP 是衡量一國境內生產的所有最終商品與服務價值的指標。可從支出面（消費、投資、政府購買、淨出口）或生產面計算。需區分名目 GDP（未調整通膨）與實質 GDP（已調整通膨），並使用 GDP 平減指數進行轉換。
  - Proponents: Simon Kuznets
- **長期經濟增長理論** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 長期經濟增長主要來自勞動生產率的提高，而生產率取決於人力資本、物質資本深化以及技術進步。複利效應顯示，微小的年增長率在長期中會產生巨大的差異。經濟趨同理論探討低收入國家是否會趕上高收入國家。
  - Proponents: 新古典增長理論學者
- **失業分類與自然失業率** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 失業分為摩擦性（職涯轉換）、結構性（技能不匹配）與循環性（經濟週期波動）。即使在經濟健康時也存在自然失業率。短期失業受工資剛性（sticky wages）影響，長期則受結構性因素與政策影響。
  - Proponents: 勞動經濟學理論
- **凱因斯主義視角 (The Keynesian Perspective)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 認為總需求是短期經濟波動（如衰退）的主要原因，且工資和物價具有黏性（sticky），導致市場無法迅速出清。因此，政府應透過擴張性或緊縮性財政政策來調節總需求，以穩定經濟。
  - Proponents: 約翰·梅納德·凱恩斯 (John Maynard Keynes)
- **新古典主義視角 (The Neoclassical Perspective)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 認為在長期中，經濟會自動調整至潛在國內生產毛額（Potential GDP），長期總供給曲線為垂直線。工資和物價在長期中具有靈活性，因此貨幣政策或財政政策在長期中僅影響價格水準，不影響產出。強調長期成長而非短期穩定。
  - Proponents: 米爾頓·傅利曼 (Milton Friedman), 芝加哥學派學者
- **理性預期理論 (Rational Expectations Theory)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 認為人們會利用所有可用資訊對未來形成最準確的預期。若大眾具備理性預期，經濟調整可能非常迅速，政策效果可能僅反映在價格變動上，而非產出變動。
  - Proponents: 罗伯特·盧卡斯 (Robert Lucas) 等
- **適應性預期理論 (Adaptive Expectations Theory)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 認為人們根據過去的經驗逐漸調整其信念和行為，而非完美預測未來。這意味著從短期到長期的經濟調整可能需要較長時間。
  - Proponents: 傳統新古典及混合模型學者
- **國家儲蓄與投資恆等式 (National Saving and Investment Identity)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 該理論指出，金融資本市場的供給量必須等於需求量。當政府預算赤字改變時，私人儲蓄、實體資本投資或貿易餘額（淨出口）中至少有一項必須相應調整以維持平衡。公式為：S_private + (T - G) + (M - X) = I。
  - Proponents: 宏觀經濟學標準模型
- **李嘉圖等效理論 (Ricardian Equivalence)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 該理論認為，理性的私人家庭會預期政府當前的借款（赤字）意味著未來的稅收增加，因此他們會增加私人儲蓄以抵消政府的借貸，從而使政府舉債對總需求和投資沒有實質影響。
  - Proponents: 大衛·李嘉圖 (David Ricardo)
- **比較優勢理論 (Theory of Comparative Advantage)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 即使一個國家在所有商品的生產上都具有絕對優勢（效率更高），只要各國專注於生產其機會成本較低的商品並進行貿易，雙方仍能從中獲利。貿易的基礎在於機會成本的差異而非絕對生產力的差異。
  - Proponents: 大衛·李嘉圖 (David Ricardo)
- **規模經濟與產業內貿易 (Economies of Scale and Intra-industry Trade)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 解釋了為何相似的高收入國家之間會進行同類產品的貿易。通過專業化分工和價值鏈拆分，企業可以利用規模經濟降低平均成本，同時提供多樣化的產品選擇，增強競爭。
  - Proponents: 現代貿易理論學家
- **保護主義作為間接補貼理論 (Protectionism as an Indirect Subsidy)** (OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))
  - 保護主義政策（如關稅或配額）本質上是要求國內消費者支付更高價格，從而將財富從消費者轉移給受保護的國內生產者。這是一種間接補貼，因為資金來自於消費者支付的高價，而非直接來自納稅人的稅收。
  - Proponents: 經濟學界共識 (Textbook Analysis)
- **比較優勢與貿易利得理論 (Comparative Advantage and Gains from Trade)** (OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))
  - 國際貿易允許各國專注於其具有比較優勢的產品，從而提高整體生產效率和平均工資水平。保護主義雖然可能在特定行業保留就業，但會導致整體社會剩餘減少，並使經濟失去透過專業化學習和規模經濟獲得的利益。
  - Proponents: 大衛·李嘉圖 (David Ricardo), 現代宏觀經濟學家
- **凱因斯主義經濟學 (Keynesian Economics)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - 強調總體需求對產出和就業的影響，認為在短期內工資和物價具有粘性，市場可能無法自動達到充分就業均衡。
  - Proponents: John Maynard Keynes
- **薩伊法則 (Say's Law)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - 古典經濟學觀點，認為「供給創造其自身的 demanda」，即生產過程本身會產生足夠的收入來購買所生產的產品，長期來看經濟傾向於充分就業。
  - Proponents: Jean-Baptiste Say, Neoclassical economists
- **理性預期理論 (Rational Expectations)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - 假設經濟主體會利用所有可用資訊（包括政策規則）來預測未來經濟變數，使得系統性的貨幣政策在長期內對實際變數無效。
  - Proponents: Milton Friedman, Robert Shiller
- **Law of Demand and Supply** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - The law of demand states that as price increases, quantity demanded decreases (inverse relationship). The law of supply states that as price increases, quantity supplied increases (direct relationship). Equilibrium occurs where these intersect.
  - Proponents: General Economic Consensus
- **市場機制作為資訊傳遞系統** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 價格在商品、勞務、勞動力和金融資本市場中扮演關鍵角色，作為收集、結合和傳遞供需相關資訊的社會機制。價格變動向買家和賣家發送訊號，引導他們根據偏好和預算做出反應，而無需政府干預。價格管制會阻礙這一過程，導致資源錯配。
  - Proponents: Adam Smith (隱喻性的「無形之手」概念), OpenStax 作者群
- **彈性理論 (Elasticity Theory)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 衡量一個變數對另一個變數變動的回應程度。主要包含需求價格彈性、供給價格彈性、所得彈性及交叉價格彈性。彈性大於1為富有彈性，小於1為缺乏彈性，等於1為單位彈性。彈性影響定價策略、稅負分攤（租稅歸宿）以及長期與短期市場調整。
  - Proponents: Alfred Marshall (歷史背景), OpenStax 作者群
- **消費者選擇理論與效用最大化** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 消費者在預算限制下追求總效用最大化。基於邊際效用遞減法則，消費者會分配預算直到每種商品的邊際效用與價格之比相等（MU/P）。收入或價格變化會產生替代效應和所得效應，影響消費組合。
  - Proponents: Jeremy Bentham (效用概念), John Stuart Mill, OpenStax 作者群
- **生產理論與成本結構** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 企業透過結合投入要素（勞動、資本、土地等）進行生產。短期中存在固定成本和變動成本，並受邊際報酬遞減法則影響；長期中所有要素皆可變動，企業可選擇最佳生產規模以實現規模經濟、規模報酬不變或規模不經濟。利潤最大化條件為邊際收益等於邊際成本（MR=MC）。
  - Proponents: Alfred Marshall, OpenStax 作者群
- **壟斷市場結構與邊際收益** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 壟斷廠商面臨向下傾斜的需求曲線，因此邊際收益（MR）低於價格（P）。廠商通過在邊際收益等於邊際成本（MR=MC）處決定產量，並根據需求曲線定價。由於缺乏競爭，壟斷導致配置效率低下（P > MC），但可能因專利保護而激勵創新。
  - Proponents: John Hicks (提及靜態生活與利潤)
- **獨佔性競爭理論** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 市場中存在許多廠商銷售差異化產品。短期內廠商可獲得經濟利潤或虧損，但長期進入和退出機制會使經濟利潤趨於零。與完全競爭相比，獨佔性競爭缺乏生產效率和配置效率，但提供了產品多樣性和創新激勵。
  - Proponents: Edward Chamberlin, Joan Robinson
- **寡頭理論與囚徒困境** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 少數大廠商主導市場，存在相互依賴性。廠商面臨合謀（像壟斷一樣行動以獲取最大利潤）與競爭（各自為政）的兩難選擇。囚徒困境模型解釋了為何即使合作對整體有利，個別廠商仍有動機作弊（增加產量），導致納什均衡下的次優結果。
  - Proponents: Adam Smith (早期觀察), Game Theory Practitioners
- **外部性與公共財理論** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 當市場交易影響到第三方時產生外部性。負外部性（如污染）導致社會成本高於私人成本，造成市場失靈；正外部性（如技術創新、教育）導致社會收益高於私人收益，造成供給不足。公共財具有非排他性和非竞争性，導致搭便車問題，通常需政府提供。
  - Proponents: Ronald Coase (產權理論)
- **勞動市場理論 (Theory of Labor Markets)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 企業對勞動的需求取決於勞動的邊際生產力。在完全競爭的產品市場中，勞動需求等於邊際產品價值（VMPL）；在不完全競爭市場中，勞動需求等於邊際收益產品（MRP）。利潤最大化企業會僱用勞動直到市場工資等於其邊際產品價值或邊際收益產品。
  - Proponents: John Bates Clark, Joan Robinson
- **單買方壟斷理論 (Monopsony Theory)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 當勞動市場中只有一個或少數幾個雇主時，雇主擁有市場權力。為了雇用更多工人，雇主必須提高所有工人的工資，導致勞動的邊際成本（MCL）高於工資率。單買方壟斷者會在 MCL 等於勞動需求曲線的點僱用較少工人並支付較低工資，從而造成無效率。
  - Proponents: Joan Robinson
- **工會與集體談判理論 (Union and Collective Bargaining Theory)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 工會作為勞動供給方的壟斷者，通過集體談判提高工資。這通常導致就業量低於競爭均衡水平，並產生勞動過剩。雙邊壟斷（Bilateral Monopoly）結合了單買方壟斷和工會，其最終工資和就業量取決於雙方的談判力量。
  - Proponents: Economic historians and labor economists
- **貧困陷阱理論 (Poverty Trap Theory)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 當政府福利計劃隨著受助者收入增加而迅速減少福利時，會產生高邊際稅率，削弱人們工作的誘因。如果每賺一元就失去近一元的福利，工作帶來的淨收益極小，從而將人困在貧困中。
  - Proponents: Public policy economists
- **資訊不對稱理論 (Asymmetric Information Theory)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 市場參與者之間資訊不均等導致市場失靈。包括「逆向選擇」（高風險者更傾向購買保險）和「道德風險」（獲得保險後採取更冒險的行為）。此外還有「檸檬市場」問題，即買家因無法區分品質而壓低價格，導致高品質商品退出市場。
  - Proponents: George Akerlof (implied via 'Lemons'), Michael Spence, Joseph Stiglitz (implied context)
- **特殊利益集團政治 (Special Interest Politics)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 小型且組織良好的群體（特殊利益集團）能更有效地遊說立法者以獲取集中利益，而成本分散於廣大公眾身上的政策往往難以阻擋。這導致政策可能偏向少數人而非社會整體福利。
  - Proponents: Mancur Olson (1965)
- **投票循環 (Voting Cycle)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 當存在三個或多個選項時，多數決原則可能無法產生穩定的結果，出現選項A勝B、B勝C、C勝A的循環情況，使得最終結果取決於議程順序而非真正的多數偏好。
  - Proponents: 經濟學理論共識
- **比較優勢理論 (Comparative Advantage)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 即使一國在所有產品的生產上都具有絕對優勢（或劣勢），只要各國專注於生產其機會成本較低的產品並進行貿易，雙方都能從中獲益。
  - Proponents: David Ricardo (1817)
- **產業內貿易理論 (Intra-industry Trade)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 相似的高收入國家之間大量貿易同一類產品（如汽車交換汽車），這是基於規模經濟、專業化學習以及價值鏈拆分所帶來的效率提升，而非單純的資源稟賦差異。
  - Proponents: 現代貿易經濟學家
- **無差異曲線理論 (Indifference Curve Theory)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - 一種描述消費者偏好的框架，無需對效用進行數值測量。無差異曲線顯示能提供相同效用水平的商品組合。其特徵為向右下方傾斜（為了保持效用不變，增加一種商品的消費必須減少另一種），且凸向原點（由於邊際效用遞減，邊際替代率遞減）。較高的無差異曲線代表較高的效用水平。
  - Proponents: 經濟學界通用模型（文本未指定單一提出者，但基於希克斯與阿林·揚格等人的發展）
- **替代效應與所得效應 (Substitution and Income Effects)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - 當價格變動時，消費者行為的變化可分解為兩個部分：替代效應是指相對價格變化導致消費者轉向較便宜的商品；所得效應是指價格變化改變了實際購買力（實質所得），從而影響對正常財或劣等財的消費量。這兩種效應共同決定了需求曲線的形狀。
  - Proponents: 新古典經濟學標準分析框架
- **現值折現理論 (Present Discounted Value Theory)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - 用於評估未來現金流在當前價值的方法。通過將未來的預期支付（如股息、債券利息和本金）按照特定的利率進行折現，計算出當前願意支付的價格。這解釋了股票和債券定價的基本邏輯，以及資本投資決策中成本與收益的時間價值比較。
  - Proponents: 金融經濟學基礎理論

### === KEY CONCEPTS (TEXTBOOKS) ===
- **使用價值** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - 商品滿足人類某種需要的屬性，由其物理性質決定，是交換價值的物質承擔者。
- **交換價值** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - 價值現象上的表現形式，表現為一種使用價值與另一種使用價值相交換的量的比例關係。
- **抽象勞動** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - 撇開勞動具體形式的無差別的一般人類勞動力的耗費，它是形成商品價值的實體。
- **具體勞動** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - 在特定目的下進行的有用勞動，它創造商品的使用價值。
- **社會必要勞動時間** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - 在現有社會正常的生產條件下，在社會平均的勞動熟練程度和勞動強度下，製造某種使用價值所需要的勞動時間。
- **一般等价物** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - 所有其他商品價值共同表現的材料，具有直接交換一切商品的能力，最終由黃金等貴金屬充當。
- **世界貨幣 (World Money)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 貨幣在世界市場上發揮作用的形態，脫去了國內流通中的價值尺度、鑄幣、符號等形式，恢復為貴金屬塊。它是國際購買手段、國際支付手段和世界財富的物質化身。
- **資本總公式 (General Formula of Capital)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - M-C-M'，即貨幣轉化為商品，商品再轉化為更多貨幣的過程。其核心特徵是價值的自我增殖，終點大於起點。
- **剩餘價值 (Surplus Value)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 在資本循環 M-C-M' 中，最終收回的貨幣量超過最初投入的貨幣量的差額（ΔM）。它是被資本家無償佔有的、由僱傭工人創造的超過勞動力價值的那部分價值。
- **勞動力 (Labour-Power)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 人的身體中存在的、每當人生產某種使用價值時就運用的體力和智力的總和。作為商品，它具有獨特的使用價值，即在消費過程中能創造出大於其自身價值的新價值。
- **必要勞動時間 (Necessary Labour-Time)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 勞動者用於復制其勞動力價值（即賺取工資對應價值）所需的勞動時間。
- **剩餘勞動時間 (Surplus Labour-Time)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 超過必要勞動時間之外，勞動者為資本家無償勞動的時間。這段時間創造了剩餘價值。
- **固定資本與流動資本的區分 (Implicit in Constant/Variable Capital)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - 雖然本章主要引入不變資本與變資本，但提及了生產資料（機器、原料）價值通過勞動過程轉移到產品中，而勞動力價值則通過新勞動創造出來。
- **必要勞動時間 (Necessary Labour-Time)** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 工人用於再生產其勞動力價值（即賺取工資）所需的勞動時間。
- **剩餘勞動時間 (Surplus Labour-Time)** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 超過必要勞動時間之外，為資本家無償勞動的時間，是剩餘價值的源泉。
- **變資本本 (Variable Capital)** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 用於購買勞動力的那部分資本。它在生產過程中不僅保存自身價值，還能創造出比自身價值更大的新價值（即剩餘價值）。
- **接力系統 (System of Relays)** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 工廠主為了規避工廠法對兒童和青少年工時的限制，而採用的一種輪換工作制。通過不斷更換不同組別的工人，使機器連續運轉更長時間，同時表面上遵守法律規定的個人工時上限。
- **工廠法案 (Factory Acts)** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 英國議會通過的限制工作時間的法律。馬克思指出，這些法律並非資本家的恩賜，而是工人階級經過長期鬥爭爭取來的結果，是對資本無限擴張傾向的必要限制。
- **局部工人 (Detail Labourer)** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 在製造業中，終身從事單一簡單操作的工人。他們失去了獨立完成整個產品的能力，變成了機器或資本的附屬品。
- **異質性製造業 vs. 連貫性製造業** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - 異質性製造業（如製錶）由不同獨立工藝組合而成；連貫性製造業（如針製造）將同一產品的生產過程分解為連續的步驟。後者更傾向於發展為現代機械工業。
- **道徳的減価償却 (Moral Depreciation)** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - 機械の物理的な摩耗とは異なり、同じ種類の機械がより安価に生産されたり、より高性能な新機械が登場したりすることで、既存の機械が本来の寿命を残していても交換価値が下落すること。
- **相対的剰余価値 (Relative Surplus-Value)** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - 労働日の長さは変えずに、生活必需品の生産性向上などにより必要労働時間を短縮し、その分剰余労働時間を相対的に延長することで生み出される剰余価値。
- **産業予備軍 (Industrial Reserve Army)** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - 機械の導入や生産効率の向上により不要となった労働者の層。資本家は景気変動に応じてこの予備軍を活用し、賃金圧力や労働規律を維持する。
- **労働の強化 (Intensification of Labour)** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - 単位時間あたりに消費される労働力の密度や緊張度を高めること。労働時間が短縮されても、強度が高まれば総労働量や生産量は維持・増加しうる。
- **資本の有機的構成 (Organic Composition of Capital)** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - 不変資本（機械・原材料）と可変資本（労働力）の比率。機械化の進展に伴い、この比率は上昇し、相対的に可変資本（搾取源）の割合が減少する傾向にある。
- **勞動力的價值 (Value of Labor-Power)** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - 維持和再生產勞動力所必需的生活資料的價值。這取決於工人的身體需要以及歷史和文化發展形成的社會需要。
- **工資形式 (Form of Wages)** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - 勞動力的價值或價格的轉化形式。它表現為「勞動的價格」，從而掩蓋了有酬勞動與無酬勞動的區別，使剝削關係隱蔽起來。
- **產業後備軍 (Industrial Reserve Army)** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - 相對過剩的人口，即超過資本平均積累需求而產生的失業或半失業工人階層。它是資本主義生產方式的必然產物，並為資本積累提供了靈活的勞動供給。
- **資本有機構成 (Organic Composition of Capital)** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - 由資本技術構成決定並反映技術構成變化的資本價值構成，即不變資本（生產資料）與可变資本（勞動力的價值）之間的比率。隨著積累推進，這一比率趨於上升。
- **剩餘價值率 (Rate of Surplus-Value)** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - 剩餘價值與可变資本的比率，反映了資本家對工人的剝削程度。
- **農業幫派制度 (Gang System)** (Capital_Vol1_Marx_chunk005 (chunk 5/6))
  - 在英國東部郡縣盛行的一種勞動組織形式，由「幫派頭目」帶領婦女、兒童和青少年從事農業勞動。這種制度極度壓榨，導致勞動條件惡劣、道德淪喪，並使成年男性勞工失業，是資本主義農場主降低勞動成本的手段。
- **相對剩餘人口 (Relative Surplus Population)** (Capital_Vol1_Marx_chunk005 (chunk 5/6))
  - 由於資本有機構成提高（機械替代人力）或農業結構變化（如耕地轉牧場），導致對勞動力的需求相對減少而形成的失業或半失業群體。它是資本主義積累的必然產物，也是壓低在職工人工資的工具。
- **原始積累 (Primitive Accumulation)** (Capital_Vol1_Marx_chunk005 (chunk 5/6))
  - 資本主義生產方式的前史，指通過暴力手段將生產者與其生產資料分離的過程。它不是資本主義積累的結果，而是其起點。
- **封閉村莊與開放村莊 (Close Villages vs. Open Villages)** (Capital_Vol1_Marx_chunk005 (chunk 5/6))
  - 「封閉村莊」由大地主控制，為了逃避濟貧稅而摧毀勞工住房，迫使勞工遷移；「開放村莊」則接收這些被驅逐者，形成過度擁擠、租金高昂的貧民窟，成為農業無產階級的懲罰性定居點。
- **系統性殖民 (Systematic Colonization)** (Capital_Vol1_Marx_chunk005 (chunk 5/6))
  - 沃克菲爾德提出的理論，主張通過國家干預土地銷售價格來強制創造僱傭勞動市場，以解決殖民地資本積累缺乏勞動力的問題。
- **樞軸點 (Pivotal Point)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
- **自然回調/反彈 (Natural Reaction/Rally)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
- **危險信號 (Danger Signal)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
- **關鍵價格 (Key Price)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
- **攤平虧損 (Averaging Down)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
- **Scarcity** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - The condition where human wants for goods, services, and resources exceed what is available.
- **Opportunity Cost** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - The value of the next best alternative that must be forgone to obtain something; the true cost of a choice.
- **Budget Constraint** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - The limit on the consumption combinations an individual can afford, given their income and the prices of goods.
- **Production Possibilities Frontier (PPF)** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - A diagram showing the maximum combinations of two goods an economy can produce given its resources and technology.
- **Marginal Analysis** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - Examining the benefits and costs of choosing a little more or a little less of a good (decisions on the margin).
- **Sunk Costs** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - Costs incurred in the past that cannot be recovered; these should not affect current decision-making.
- **Productive Efficiency** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - A state where it is impossible to produce more of one good without decreasing the quantity produced of another good (operating on the PPF).
- **Allocative Efficiency** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - A state where the specific mix of goods produced represents the combination that society most desires.
- **Positive vs. Normative Statements** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - Positive statements describe the world as it is (factual/testable); normative statements describe how the world should be (subjective/value-based).
- **Ceteris Paribus** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - Latin for 'other things being equal'; an assumption used to isolate the effect of one variable by holding all other relevant factors constant.
- **利率 (Interest Rate)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 金融市場中借貸的價格，即投資的回報率。
- **邊際效用 (Marginal Utility)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 消費額外一單位商品所帶來的額外滿足感；通常隨消費量增加而遞減。
- **預算約束 (Budget Constraint)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 消費者在有限收入下能購買的商品組合的極限。
- **彈性 (Elasticity)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 一個變數對另一個變數變化響應程度的度量，通常以百分比變化之比表示。
- **規模經濟 (Economies of Scale)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 長期平均成本隨產量增加而下降的現象。
- **顯性成本與隱性成本 (Explicit and Implicit Costs)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 顯性成本是實際支付的金錢支出；隱性成本是使用自有資源的機會成本。
- **經濟利潤 (Economic Profit)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 總收益減去總成本（包含顯性和隱性成本）。
- **停業點 (Shutdown Point)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 價格低於平均可變成本（AVC）最低點的狀態，此時企業應停止短期生產以最小化損失。
- **邊際產品 (Marginal Product)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 增加一單位變動投入所帶來的總產量增加額。
- **稅收歸宿 (Tax Incidence)** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - 稅務負擔在買方和賣方之間的分配，取決於供需彈性。
- **進入障礙 (Barriers to Entry)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 阻止或勸退潛在競爭者進入市場的法律、技術或市場力量，如規模經濟、專利、控制關鍵資源等。
- **自然壟斷 (Natural Monopoly)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 當規模經濟相對於市場需求量非常大時，單一廠商能以最低平均成本滿足整個市場需求的情況，通常發生在固定成本極高的行業（如水電公用事業）。
- **邊際收益 (Marginal Revenue, MR)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 多銷售一單位產品所帶來的總收益變化。對於獨佔廠商，由於必須降低價格才能銷售更多產品，MR總是低於價格。
- **配給效率 (Allocative Efficiency)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 資源配置達到最佳狀態，即社會從額外一單位產品中獲得的邊際效益等於生產該單位的邊際成本（P=MC）。獨佔市場通常無法達到此效率。
- **囚徒困境 (Prisoner's Dilemma)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 一種博弈論情境，其中每個參與者追求自身利益的最大化，導致最終結果對所有參與者來說都比合作結果更差。常用於解釋寡頭企業間的勾結困難。
- **外部性 (Externality)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 市場交易對未直接參與交易的第三方產生的影響，可以是正面的（如技術溢出）或負面的（如污染）。
- **命令與控制監管 (Command-and-Control Regulation)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 政府通過制定具體的污染排放限額或強制使用特定技術來規範環境保護的方法。
- **可交易許可證 (Marketable Permits)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 政府設定總污染上限並發放許可證，允許企業之間買賣這些許可證，從而以最低總成本實現減排目標。
- **赫芬達爾-赫希曼指數 (HHI)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - 衡量市場集中度的指標，計算方法是將市場中每家企業的市場份額平方後相加。用於評估合併對競爭的影響。
- **Value of the Marginal Product of Labor (VMPL)** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - The additional revenue generated by hiring one more unit of labor, calculated as Marginal Product of Labor (MPL) multiplied by the price of the output (P).
- **Marginal Revenue Product (MRP)** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - The additional revenue generated by hiring one more unit of labor in an imperfectly competitive market, calculated as MPL multiplied by Marginal Revenue (MR).
- **Monopsony** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - A market structure where there is only one buyer (employer) of labor, giving them power to set wages below the competitive level.
- **Marginal Cost of Labor (MCL)** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - The additional cost to a firm of hiring one more worker. In a monopsony, MCL is higher than the wage rate because hiring an additional worker requires raising the wage for all existing workers as well.
- **Collective Bargaining** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - The process of negotiation between labor unions and employers regarding wages, working conditions, and other terms of employment.
- **Poverty Line** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - The minimum income level deemed adequate in a particular country, historically based on the cost of a nutritionally adequate diet multiplied by three (Orshansky poverty line).
- **Quintile** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - One of five equal groups into which a population is divided for statistical measurement, often used to analyze income distribution.
- **Safety Net** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - A collection of government programs (e.g., TANF, SNAP, Medicaid, EITC) designed to provide assistance to those below or near the poverty line.
- **特殊利益集團 (Special Interest Groups)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 人數相對較少但組織嚴密、對特定議題高度關注的團體，他們能透過遊說對政策產生不成比例的巨大影響。
- **豬肉桶支出 (Pork-barrel Spending)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 立法者為爭取本選區支持，將聯邦資金用於僅惠及單一選區的項目，成本由全國分攤。
- **交換條件 (Logrolling)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 立法者之間互相支持彼此提出的法案，即使這些法案本身可能並非最佳公共利益。
- **投票循環 (Voting Cycle)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 當存在三個或以上選項時，多數決原則可能導致循環偏好（A勝B，B勝C，C勝A），使得無法確定真正的多數意見。
- **國內生產毛額 (GDP)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 在一定時期內，一國境內生產的所有最終商品與服務的市場價值總和。
- **實質 vs. 名目 (Real vs. Nominal)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 名目值以當前價格計算，未扣除通貨膨脹；實質值則已根據物價指數調整，反映實際產出量的變化。
- **資本深化 (Capital Deepening)** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 人均物質資本或人均人力資本的增加，是提高勞動生產率和經濟增長的關鍵因素。
- **失業率計算基礎** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - 僅計算「勞動力」中無工作且積極尋職者的比例。不在勞動力人口（如退休者、喪志者）不計入失業統計。
- **摩擦性失業 (Frictional Unemployment)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 工人在轉換工作期間產生的暫時性失業，是動態經濟中不可避免的現象，有助於實現更好的勞動力市場匹配。
- **結構性失業 (Structural Unemployment)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 由於工人缺乏雇主所需技能，或需求從某些行業轉向其他行業而導致的長期失業。
- **潛在國內生產總值 (Potential GDP)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 經濟在充分就業（即自然失業率水平）下所能生產的最大產出量。
- **總需求 (Aggregate Demand, AD)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 經濟體對國內生產的商品和服務的總支出，包括消費 (C)、投資 (I)、政府支出 (G) 和淨出口 (X-M)。
- **總供給 (Aggregate Supply, AS)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 企業在各物價水平下願意生產並銷售的商品和服務總量。分為短期總供給 (SRAS) 和長期總供給 (LRAS)。
- **凱恩斯區間 (Keynesian Zone)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - SRAS曲線左側平坦的部分，此時經濟遠低於潛在產出，總需求增加會顯著提高產出而不引起通脹。
- **新古典區間 (Neoclassical Zone)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - SRAS曲線右側陡峭或垂直的部分，此時經濟接近或達到潛在產出，總需求增加主要導致物價上漲而非產出增加。
- **滯脹 (Stagflation)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 經濟停滯（高失業、低增長）與高通脹同時發生的現象，通常由總供給向左移動（如輸入價格上漲）引起。
- **財富效應 (Wealth Effect)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 物價水平上升會降低貨幣購買力，從而減少消費支出，導致總需求下降。
- **利率效應 (Interest Rate Effect)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 物價水平上升会增加對貨幣的需求，推高利率，從而抑制投資和消費支出。
- **外匯價格效應 (Foreign Price Effect)** (OpenStax_Economics_3e_chunk005 (chunk 5/10))
  - 國內物價上升使國內商品相對國外商品更昂貴，導致出口減少、進口增加，從而降低淨出口。
- **Menu Costs** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - The costs firms incur when changing prices, such as printing new menus or updating systems, which contribute to price stickiness.
- **Macroeconomic Externality** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - A situation where the aggregate outcome differs from individual microeconomic behaviors; e.g., while one firm cutting prices helps sales, if all firms cut prices, aggregate demand may not rise enough to clear the market due to sticky prices.
- **Potential GDP** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - The level of output an economy can achieve when all resources (labor, capital, etc.) are fully employed, corresponding to the natural rate of unemployment.
- **Natural Rate of Unemployment** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - The unemployment rate that exists when the economy is at potential GDP, consisting only of frictional and structural unemployment, with zero cyclical unemployment.
- **Stagflation** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - An economic condition characterized by simultaneous high inflation and high unemployment, which challenges the short-run Phillips curve tradeoff.
- **Long-Run Aggregate Supply (LRAS)** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - In the neoclassical view, a vertical curve at Potential GDP, indicating that output is determined by supply-side factors (capital, labor, technology) in the long run, not by aggregate demand.
- **Fiat Money** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - Money that has no intrinsic value but is declared legal tender by the government.
- **Financial Intermediary** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - An institution (like a bank) that stands between savers and borrowers, lowering transaction costs and facilitating the flow of funds.
- **Money Multiplier** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - The factor by which the banking system can expand the money supply through lending, calculated as 1/reserve ratio.
- **Open Market Operations** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - The buying and selling of government bonds by the central bank to influence bank reserves and interest rates, the primary tool of monetary policy.
- **Quantitative Easing (QE)** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - An unconventional monetary policy where the central bank purchases long-term securities to lower long-term interest rates and increase the money supply when short-term rates are near zero.
- **Velocity of Money** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - The frequency at which one unit of currency is used to purchase domestically-produced goods and services within a given time period.
- **Floating Exchange Rate** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - An exchange rate regime where the currency's value is determined by the foreign exchange market.
- **Purchasing Power Parity (PPP)** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - A theory suggesting that exchange rates should adjust so that identical goods cost the same in different countries when priced in a common currency.
- **絶対優位 (Absolute Advantage)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - ある財を生産する際に、他国よりも少ない資源（労働時間など）で生産できる能力。
- **機会費用 (Opportunity Cost)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - ある財を生産するために放棄しなければならない他の財の量。比較優位の決定要因となる。
- **産業内貿易 (Intra-industry Trade)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - 同じ産業に属する財の相互輸出入（例：自動車と自動車の取引）。類似した先進国間の貿易で一般的。
- **バリューチェーンの分割 (Splitting up the Value Chain)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - 製品の生産工程を地理的に分散させ、各国が自国の比較優位のある段階に特化させること。
- **財政赤字と貿易赤字の二重赤字 (Twin Deficits)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - 政府の財政赤字が拡大すると、為替レートの上昇や金利上昇を通じて輸入が増加し、結果として貿易赤字も拡大する可能性のある現象。
- **クラウディングアウト (Crowding Out)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - 政府の借入増加が金融資本市場での資金需要を増やし、金利を上昇させることで、民間の物理資本への投資を減少させる現象。
- **ルール・オブ・セブンティーツー (Rule of 72)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - 所得が倍増するまでの年数を概算するための法則。72を年間成長率で割ることで求められる。
- **保護主義 (Protectionism)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 政府立法減少或阻止國際貿易的政策，旨在保護國內生產者和工人免受外國競爭。
- **關稅 (Tariffs)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 政府對進口商品徵收的稅收，使進口商品對消費者來說更昂貴，從而鼓勵購買國內產品。
- **進口配額 (Import Quotas)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 對可以進口的產品數量設定的數值限制。
- **非關稅壁壘 (Nontariff Barriers)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 通過規則、法規、檢查和文件程序使進口變得昂貴或困難的其他措施，例如安全標準或原產地規則。
- **傾銷 (Dumping)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 以低於生產成本或低於國內市場價格的價格在國際市場上銷售商品。
- **消費者剩餘與生產者剩餘 (Consumer and Producer Surplus)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 分別衡量消費者願意支付的金額與實際支付金額之差，以及生產者獲得的價格與其成本之間之差。貿易壁壘通常減少消費者剩餘並增加生產者剩餘，但淨效應為負。
- **世界貿易組織 (WTO)** (OpenStax_Economics_3e_chunk008 (chunk 8/10))
  - 取代關稅及貿易總協定 (GATT) 的國際組織，負責談判貿易規則、解決貿易糾紛並監督全球貿易自由化。
- **Earned Income Tax Credit (EITC)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 一種基於工作的稅收抵減政策，旨在減輕貧困陷阱，鼓勵低收入家庭工作。隨著收入增加，抵減額先增加後逐漸減少。
- **TANF (Temporary Assistance for Needy Families)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 美國福利改革法案，要求受助者工作或接受教育以領取補助，並設有領取補助的時間限制，旨在鬆綁貧困陷阱。
- **Poverty Trap (貧困陷阱)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 當福利制度設計使得增加工作收入會導致福利大幅減少，從而降低淨所得增長，進而削弱人們工作的誘因。
- **Production Possibility Frontier (PPF) of Equality and Output** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 描述經濟平等與經濟產出之間權衡關係的曲線。極端再分配可能使曲線向下傾斜（權衡），而某些機會梯子政策可能使曲線初期向上（雙贏）。
- **Signaling (訊號)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 在資訊不對稱市場中，擁有私人資訊的一方（如求職者）透過可觀察的特徵（如學位）向另一方（僱主）傳遞其質量的行為。
- **Rational Expectations (理性預期)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 一種經濟理論，認為個體會利用所有可用資訊（包括過去經驗和政策規則）來準確預測未來經濟變數，而非僅被動適應過去趨勢。
- **Adaptive Expectations (適應性預期)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 人們根據過去的經驗和錯誤來調整對未來的預期，是一種向後看的預測方式。
- **Inflationary Gap (通膨缺口)** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - 當總需求超過潛在產出時產生的缺口，導致物價上漲但實際產出不增加。
- **Scarcity** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - The fundamental problem where human wants for goods, services, and resources exceed what is available.
- **Opportunity Cost** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - The value of the next best alternative that must be given up to pursue a certain action.
- **Budget Constraint** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - The limit on the consumption bundles that a consumer can afford, determined by income and prices.
- **Production Possibilities Frontier (PPF)** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - A curve depicting all maximum output possibilities for two goods, given a set of inputs, illustrating trade-offs, opportunity costs, and efficiency.
- **Marginal Analysis** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - Examining the benefits and costs of choosing a little more or a little less of a good, rather than all-or-nothing decisions.
- **Law of Diminishing Marginal Utility** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - As a person consumes more units of a good, the additional satisfaction (utility) from each successive unit declines.
- **Sunk Cost** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - A cost that has already been incurred and cannot be recovered; it should not influence current or future economic decisions.
- **Ceteris Paribus** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - A Latin phrase meaning 'other things being equal,' used to isolate the effect of one variable by holding all others constant.
- **Equilibrium** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - The state where quantity demanded equals quantity supplied, resulting in no inherent pressure for price or quantity to change.
- **Price Ceiling/Floor** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - Government-imposed limits on how low (floor) or high (ceiling) a price can go, often leading to shortages or surpluses if set away from equilibrium.
- **Consumer/Producer Surplus** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - The difference between what consumers are willing to pay and what they actually pay (consumer surplus), or the difference between the price producers receive and their minimum acceptable price (producer surplus).
- **Deadweight Loss** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - The loss of economic efficiency that occurs when the equilibrium quantity is not produced, often due to price controls or taxes.
- **價格上限 (Price Ceiling)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 政府設定的最高合法價格，若低於均衡價格則具有約束力，導致短缺。
- **高利貸法 (Usury Laws)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 規定貸款人可收取的最高利息率的法律，是一種針對金融市場的價格上限。
- **彈性 (Elasticity)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 衡量變數之間百分比變動的敏感度，通常指數量對價格變動的反應。
- **中點法 (Midpoint Method)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 計算彈性的一種方法，使用變動前後的平均值作為基數，確保無論價格上升或下降，計算出的彈性值相同。
- **稅收歸宿 (Tax Incidence)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 描述稅務負擔如何在買方與賣方之間分攤的機制。負擔通常落在彈性較小（較不敏感）的一方。
- **國內生產毛額 (GDP)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 在一定時期內，一國境內生產的所有最終商品與服務的市場價值總和。
- **名目 GDP vs. 實質 GDP** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 名目 GDP 按當前價格計算；實質 GDP 按基期價格計算，消除了通膨影響，反映實際產出變化。
- **GDP 平減指數 (GDP Deflator)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 衡量整體物價水平的指數，用於將名目 GDP 轉換為實質 GDP。
- **資本深化 (Capital Deepening)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 每個工人擁有的物質資本或人力資本數量增加，有助於提高生產率和經濟增長。
- **經濟趨同 (Economic Convergence)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 低收入經濟體的增長速度快於高收入經濟體，從而縮小兩者之間人均收入差距的現象。
- **自然失業率 (Natural Rate of Unemployment)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 在沒有循環性失業的情況下，經濟處於充分就業時的失業率，由摩擦性和結構性失業組成。
- **工資剛性 (Sticky Wages)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - 工資水平不易向下調整的特性，是導致短期內出現非自願失業的主要原因之一。
- **潛在國內生產毛額 (Potential GDP)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 當所有資源（土地、勞動力、資本、創業精神）都被充分就業時，經濟所能達到的產出水準。在長期中，實際GDP會圍繞此水準波動。
- **自然失業率 (Natural Rate of Unemployment)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 當經濟處於充分就業（即無週期性失業）時的失業率，僅包含摩擦性失業和結構性失業。
- **長期總供給曲線 (Long-Run Aggregate Supply, LRAS)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 在新古典模型中，LRAS是一條位於潛在GDP水平的垂直線，表示長期產出不受價格水準影響。
- **菲利普斯曲線 (Phillips Curve)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 描述失業率與通貨膨脹率之間權衡關係的曲線。短期內向下傾斜（負相關），長期內則為垂直線（無權衡關係）。
- **菜單成本 (Menu Costs)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 企業改變價格所面臨的成本，包括標籤、記錄保存、會計以及向顧客溝通價格變動的費用，這是物價黏性的原因之一。
- **宏觀經濟外部性 (Macroeconomic Externality)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 當宏觀層面的結果不同於且劣於微觀層面結果時發生。例如，個別廠商面對向上傾斜的供給曲線，但整體經濟的總供給曲線在短期內可能是平坦的，導致價格無法下降以刺激需求。
- **擴張性/緊縮性財政政策 (Expansionary/Contractionary Fiscal Policy)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 擴張性政策指減稅或增加政府支出以刺激總需求；緊縮性政策指增稅或減少政府支出以降低總需求和通膨壓力。
- **支出乘數 (Expenditure Multiplier)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 凱因斯主義概念，指自主支出的變化會引起實質GDP更大比例的變化。
- **貨幣供應量 M1 與 M2 (M1 and M2 Money Supply)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - M1包含現金、活期存款和儲蓄存款（流動性高）；M2包含M1加上貨幣市場基金、定期存款和其他時間存款（流動性較低）。
- **準備金率 (Reserve Requirement)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 銀行必須持有的存款百分比，不得貸出。中央銀行可透過調整此比率來影響貨幣創造能力。
- **公開市場操作 (Open Market Operations)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 中央銀行購買或出售國庫券以影響銀行準備金量和利率的主要貨幣政策工具。
- **量化寬鬆 (Quantitative Easing, QE)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 當短期利率接近零時，中央銀行購買長期政府債券和私人抵押擔保證券，以增加信貸供應並刺激總需求的非傳統貨幣政策。
- **匯率 (Exchange Rate)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 一種貨幣相對於另一種貨幣的價格。升值（Appreciating）指貨幣價值上升，貶值（Depreciating）指貨幣價值下降。
- **購買力平價 (Purchasing Power Parity, PPP)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 一種匯率，能使國際間可貿易商品的價格在各國相等。長期而言，市場匯率傾向於趨近於PPP匯率。
- **浮動匯率 vs. 固定匯率 (Floating vs. Pegged Exchange Rates)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - 浮動匯率由市場供需決定；固定匯率（硬釘住）由政府設定固定值；軟釘住則允許小幅波動但政府會干預以防止劇烈變動。
- **擠出效應 (Crowding Out)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 當政府為了彌補預算赤字而大量借款時，會推高金融資本市場的需求和利率，從而減少私人部門用於實體資本投資的资金和意願。
- **雙重赤字 (Twin Deficits)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 指一國同時出現預算赤字（政府支出超過收入）和貿易赤字（進口超過出口）的現象，兩者常因外資流入和匯率變動而相關聯。
- **絕對優勢 (Absolute Advantage)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 當一個國家使用比另一個國家更少的資源（如勞動時間）來生產某種商品時，即擁有該商品的絕對優勢。
- **機會成本 (Opportunity Cost)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 為了生產某一單位商品而必須放棄的其他商品的數量。它是決定比較優勢的關鍵指標。
- **產業內貿易 (Intra-industry Trade)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 兩個國家之間相互進出口同一行業內不同品種或類型的商品（例如美國既出口汽車也進口汽車）。
- **價值鏈拆分 (Splitting up the Value Chain)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 將產品的生產過程分解為多個階段，並在不同國家進行，以利用各地的比較優勢和規模經濟。
- **收斂經濟體 (Converging Economy)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - 指那些通過投資實體資本和人力資本，有能力追趕技術領先國家的經濟體。
- **消費者剩餘與生產者剩餘 (Consumer and Producer Surplus)** (OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))
  - 消費者剩餘是消費者願意支付的價格與實際支付價格之間的差額；生產者剩餘是生產者實際獲得的價格與生產成本之間的差額。貿易壁壘通常導致消費者剩餘大幅減少，超過生產者剩餘的增加量，造成淨福利損失。
- **傾銷 (Dumping)** (OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))
  - 外國廠商以低於其生產成本的價格出口商品。反傾銷法旨在通過徵收關稅將進口價格提高到成本水平，但常被批評為保護主義的藉口。
- **向下競爭 (Race to the Bottom)** (OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))
  - 一種假設情景，認為為了吸引外資，國家可能會不斷降低環境標準或勞工標準。文本指出，由於環境規避成本在總成本中佔比小，且跨國公司擔心聲譽風險，這種情況在現實中並不常見。
- **破壞性市場變化 (Disruptive Market Change)** (OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))
  - 指新技術或國際貿易帶來的競爭，導致現有企業虧損或破產，同時創新者獲利。文本將貿易視為一種創新技術，認為其造成的市場干擾是經濟進步的必要成本。
- **世界貿易組織 (WTO)** (OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))
  - 成立於1995年，前身是關稅與貿易總協定 (GATT)。其職責是談判降低貿易壁壘、解決貿易糾紛，並監督國際貿易規則的執行。
- **潛在國內生產毛額 (Potential GDP)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - 經濟在充分就業狀態下所能生產的產出水平，對應於長期總供給曲線 (LRAS)。
- **衰退性缺口 (Recessionary Gap)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - 當實際 GDP 低於潛在 GDP 時出現的情況，表示經濟資源未充分利用，存在失業。
- **自然失業率 (Natural Rate of Unemployment)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - 經濟在長期均衡時的失業率，僅包含摩擦性失業和結構性失業，不包括周期性失業。
- **菲利普斯曲線 (Phillips Curve)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - 描述失業率與通貨膨脹率之間短期權衡關係的曲線。
- **物價彈性 (Price Elasticity)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - 衡量價格變動對需求量或供給量變動敏感程度的指標，包括完全彈性、完全無彈性及單位彈性。
- **流動性陷阱 (Liquidity Trap)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - 當利率極低時，貨幣需求變得無限大，貨幣政策失效，無法進一步刺激經濟。
- **Scarcity** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - The condition where human wants for goods, services, and resources exceed what is available.
- **Opportunity Cost** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - The value of the next best alternative that must be forgone to pursue a certain action; what is given up to obtain something else.
- **Budget Constraint** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - The limit on the consumption bundles that a consumer can afford, determined by income and prices.
- **Production Possibilities Frontier (PPF)** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - A graph showing the combinations of two goods that an economy can produce given its available resources and technology.
- **Marginal Analysis** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - Examining the benefits and costs of choosing a little more or a little less of a good (decisions on the margin).
- **Ceteris Paribus** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - A Latin phrase meaning 'other things being equal'; an assumption that no other relevant economic factors are changing when analyzing the relationship between two variables.
- **Equilibrium** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - The state where quantity demanded equals quantity supplied; the point where supply and demand curves intersect.
- **Price Ceiling** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - A legal maximum price that can be charged for a good, often leading to shortages if set below equilibrium.
- **Price Floor** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - A legal minimum price that can be charged for a good, often leading to surpluses if set above equilibrium.
- **Consumer Surplus** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - The difference between what consumers are willing to pay and what they actually pay.
- **Deadweight Loss** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - The loss in social surplus that occurs when the economy produces at an inefficient quantity, often due to price controls.
- **價格上限與價格下限 (Price Ceilings and Floors)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 政府法規設定的價格限制。價格上限低於均衡價格時會造成短缺；價格下限高於均衡價格時會造成剩餘。這些措施會干擾市場資訊傳遞，導致資源錯配。
- **彈性 (Elasticity)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 衡量數量對價格、所得或其他變數變動的敏感度。包括需求價格彈性、供給價格彈性、所得彈性、交叉價格彈性、勞動供給工資彈性及儲蓄利率彈性。
- **中點法 (Midpoint Method)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 計算彈性的一種方法，使用變動前後的平均值作為基數，確保無論價格上升或下降，計算出的彈性數值一致。
- **租稅歸宿 (Tax Incidence)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 描述稅收負擔如何在買方和賣方之間分攤的機制。負擔傾向於落在彈性較小（較不敏感）的一方。
- **總效用與邊際效用 (Total and Marginal Utility)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 總效用是從消費商品中獲得的滿足感總和；邊際效用是消費額外一單位商品所增加的效用。邊際效用通常隨消費量增加而遞減。
- **預算限制 (Budget Constraint)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 顯示消費者在既定收入和價格下所能購買的商品組合的線。消費者在此線上尋找能帶來最大效用的點。
- **顯性成本與隱性成本 (Explicit and Implicit Costs)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 顯性成本是直接貨幣支付；隱性成本是使用自有資源的機會成本。會計利潤僅扣除顯性成本，經濟利潤則扣除兩者。
- **規模經濟與規模不經濟 (Economies and Diseconomies of Scale)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 長期平均成本隨產量增加而下降稱為規模經濟；隨產量增加而上升稱為規模不經濟；保持不變則為規模報酬不變。
- **完全競爭 (Perfect Competition)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 市場結構特徵：許多買方和賣方、同質產品、自由進出、資訊充分。企業為價格接受者。
- **停業點 (Shutdown Point)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - 當價格低於平均變動成本（AVC）時，企業在短期內應停止生產以避免更大損失的臨界點。
- **進入壁壘 (Barriers to Entry)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 阻止潛在競爭者進入市場的法律、技術或市場力量，包括自然壟斷、資源控制、法律特許、知識產權和掠奪性定價。
- **自然壟斷 (Natural Monopoly)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 當規模經濟相對於市場需求量非常大時，單一廠商能以最低平均成本滿足整個市場需求的情況，通常發生在高固定成本的公用事業行業。
- **知識產權 (Intellectual Property)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 保護思想、概念或圖像的法律體系，包括專利（發明）、商標（品牌標識）、版權（原創作品）和商業秘密。
- **邊際收益小於價格 (MR < P)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 壟斷廠商必須降低所有單位的價格才能銷售額外單位，因此新增單位的收益低於該單位的售價。
- **產品差異化 (Product Differentiation)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 通過物理特性、位置、無形屬性或消費者感知使產品區別於競爭對手，是獨佔性競爭的核心特徵。
- **合謀與卡爾特 (Collusion & Cartel)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 寡頭廠商之間協調產量和價格以最大化聯合利潤的行為。正式協議稱為卡爾特，隱性理解稱為合謀，通常在大多數國家違法。
- **彎曲的需求曲線 (Kinked Demand Curve)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 寡頭市場中的一種現象，假設競爭對手會跟隨降價但不跟隨漲價，導致價格剛性。
- **外部性 (Externality)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 市場交易對未參與交易的第三方產生的影響，分為正外部性（受益）和負外部性（受損）。
- **公共財 (Public Good)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 同時具有非排他性（無法排除他人使用）和非竞争性（一人使用不減少他人可用性）的商品，如國防。
- **搭便車問題 (Free Rider Problem)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 個人從公共財中受益卻不願支付成本，導致市場無法有效提供公共財。
- **命令與控制監管 (Command-and-Control Regulation)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 政府直接規定污染限量或強制使用特定技術的環境監管方式。
- **市場導向環境工具 (Market-Oriented Environmental Tools)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - 利用經濟激勵來減少污染的機制，包括污染稅（收費）、可交易許可證和明確產權。
- **邊際產品價值 (Value of Marginal Product, VMPL)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 在完全競爭市場中，額外雇用一名工人所帶來的額外收益，計算方式為邊際產量乘以產品價格（MPL x P）。
- **邊際收益產品 (Marginal Revenue Product, MRP)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 在不完全競爭市場中，額外雇用一名工人所帶來的額外收益，計算方式為邊際產量乘以邊際收益（MPL x MR）。
- **單買方 (Monopsony)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 勞動市場中唯一的買方（雇主），擁有設定工資的市場權力。
- **勞動邊際成本 (Marginal Cost of Labor, MCL)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 雇用額外一名工人所增加的總成本。在單買方情況下，由於必須提高所有現有工人的工資，MCL 高於工資率。
- **集體談判 (Collective Bargaining)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 工會代表員工與雇主協商工資和工作條件的過程。
- **雙邊壟斷 (Bilateral Monopoly)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 勞動市場中同時存在單買方壟斷（單一雇主）和壟斷性供給（單一工會）的情況。
- **貧困陷阱 (Poverty Trap)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 福利制度設計導致低收入者增加工作收入時，福利減少的幅度接近或超過其新增收入，從而缺乏工作誘因。
- **安全網 (Safety Net)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 政府提供的一系列援助計劃，如 TANF、EITC、SNAP 和 Medicaid，旨在幫助貧困人口。
- **洛倫茲曲線 (Lorenz Curve)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 用於圖示收入分配不平等的曲線，橫軸為累積人口百分比，縱軸為累積收入百分比。越遠離對角線表示不平等程度越高。
- **逆向選擇 (Adverse Selection)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 在保險市場中，由於資訊不對稱，高風險個體更傾向於購買保險，導致保險池平均風險升高。
- **道德風險 (Moral Hazard)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 個體在獲得保險保障後，改變行為模式以承擔更大風險或減少預防措施，因為損失由保險公司承擔。
- **精算公平 (Actuarially Fair)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - 保險保費等於預期賠付金額的情況，即保費準確反映了該風險群體的預期損失。
- **理性無知 (Rational Ignorance)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 個人認為獲取資訊的成本超過其潛在收益，因此選擇不獲取資訊的理性行為。
- **特殊利益集團 (Special Interest Groups)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 人數相對較少但組織嚴密、對特定議題高度關注的群體，能對政治決策產生不成比例的影響。
- **豬肉桶支出 (Pork-barrel Spending)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 立法者為了贏得選區支持，將聯邦資金用於主要惠及單一選區但成本由全國分攤的項目。
- **中位選民理論 (Median Voter Theory)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 理論認為政治家會調整政策以迎合中間選民的偏好，但在特殊利益干擾下未必成立。
- **絕對優勢 (Absolute Advantage)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 使用較少資源生產某產品的能力。
- **機會成本 (Opportunity Cost)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 為生產某種產品所放棄的其他產品的數量，是決定比較優勢的關鍵。
- **規模經濟 (Economies of Scale)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 隨著產量增加，平均生產成本下降的現象，是產業內貿易的重要動力。
- **價值鏈拆分 (Splitting up the Value Chain)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 將產品的不同生產階段分配給不同國家或地區，以利用各地的比較優勢和專業知識。
- **保護主義 (Protectionism)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 政府通過關稅、配額或非關稅壁壘限制進口，以保護國內產業的政策。
- **傾銷 (Dumping)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 以低於生產成本或國內市場價格出口產品的行為。
- **向下競爭 (Race to the Bottom)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - 擔心各國為吸引投資而不斷降低環境標準或勞工標準的假設情境。
- **無差異曲線 (Indifference Curve)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - 一條連接所有能提供給消費者相同效用水平的不同商品組合點的曲線。
- **邊際替代率 (Marginal Rate of Substitution, MRS)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - 消費者在保持效用不變的情況下，願意用一種商品交換另一種商品的比率。它等於無差異曲線斜率的絕對值，並隨著消費量的變化而遞減。
- **預算約束線 (Budget Constraint Line)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - 顯示消費者在既定收入和商品價格下，能夠負擔的所有商品組合的直線。效用最大化的選擇發生在預算線與最高可能無差異曲線的切點。
- **勞動-閒暇選擇 (Labor-Leisure Choice)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - 應用無差異曲線分析個人如何在賺取收入（工作）和享受閒暇之間進行權衡。工資變化會產生替代效應（閒暇變貴，減少閒暇）和所得效應（變得更富有，增加閒暇）。
- **跨期選擇 (Intertemporal Choice)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - 個人在今日消費與未來消費之間的權衡。利率變化會影響這兩者：利率上升使未來消費相對便宜（替代效應增加儲蓄），但也增加了現有財富的價值（所得效應可能減少儲蓄）。
- **現值 (Present Value / PDV)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - 未來一筆金額在當前時間點的價值，通過扣除利息（折現）計算得出。公式為：PV = FV / (1 + r)^n。

### === ACTIONABLE INSIGHTS (TEXTBOOKS) ===
- 理解商品的本質必須區分其使用價值和價值兩個因素，這是分析政治經濟學的起點。 _(source: 《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))_
- 認識到價格波動背後隱藏著價值規律，即價值量由社會必要勞動時間決定，並隨勞動生產力的變化而反方向變化。 _(source: 《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))_
- 分析貨幣起源時，應追溯其從簡單價值形式到貨幣形式的邏輯演進，而非將其視為單純的技術發明或協議。 _(source: 《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))_
- 批判庸俗經濟學時，需指出其混淆了價值本身與價值的表現形式（交換價值或價格），並忽視了價值形式背後的社會關係。 _(source: 《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))_
- 區分「勞動」與「勞動力」：資本家購買的是勞動力（工作能力），而非勞動本身。勞動是勞動力的使用過程。 _(source: Capital_Vol1_Marx_chunk001 (chunk 1/6))_
- 理解資本的本質不是物，而是社會關係：貨幣只有當它帶來剩餘價值時才成為資本。 _(source: Capital_Vol1_Marx_chunk001 (chunk 1/6))_
- 識別剝削機制：剝削隱藏在「公平交換」的表面之下。資本家按價值購買勞動力，並按價值出售產品，但在生產過程中延長了勞動時間，從而佔有了剩餘勞動。 _(source: Capital_Vol1_Marx_chunk001 (chunk 1/6))_
- 認識工作日的界限鬥爭：工作日的長度不是固定的，而是資本追求無限增殖的本性與勞動力生理道德限制之間的鬥爭結果。 _(source: Capital_Vol1_Marx_chunk001 (chunk 1/6))_
- 區分使用價值與交換價值在資本循環中的地位：對於資本家而言，商品的具體使用價值只是交換價值的載體，其唯一目的是價值的增殖。 _(source: Capital_Vol1_Marx_chunk001 (chunk 1/6))_
- 資本家會利用法律條文的模糊性和執行漏洞（如「接力系統」）來規避勞動保護法規，因此必須建立嚴格的官方監督機制（如工廠督導員）才能有效執法。 _(source: Capital_Vol1_Marx_chunk002 (chunk 2/6))_
- 提高勞動生產率是資本增加相對剩餘價值的關鍵手段，但這需要對生產技術和社會組織進行根本性的革命，而不僅僅是延長勞動時間。 _(source: Capital_Vol1_Marx_chunk002 (chunk 2/6))_
- 將婦女和兒童強制納入勞動市場是資本抵消男性工人抵抗、降低整體工資水平並擴大剝削範圍的有效策略。 _(source: Capital_Vol1_Marx_chunk002 (chunk 2/6))_
- 勞動分工在提高生產效率的同時，會導致勞動者的智力和身體發展受到侷限和扭曲，使其依附於資本。 _(source: Capital_Vol1_Marx_chunk002 (chunk 2/6))_
- 國家立法限制工作日是階級鬥爭的結果，而非資本家道德覺醒的產物；資本本能地傾向於將工作日延長到生理和道德極限之上。 _(source: Capital_Vol1_Marx_chunk002 (chunk 2/6))_
- 資本家は固定資本の投資効率を最大化するため、可能な限り長い労働時間を設定しようとする動機を持つ。 _(source: Capital_Vol1_Marx_chunk003 (chunk 3/6))_
- 労働時間規制（工場法など）が導入されると、資本家は物理的な労働時間の延長ではなく、機械の速度向上や労働強度の増大によって利益を回復しようとする。 _(source: Capital_Vol1_Marx_chunk003 (chunk 3/6))_
- 技術革新は短期的には特定の業界で莫大な利潤をもたらすが、普及すると社会的価値が個別価値に収束し、競争優位性は失われる。 _(source: Capital_Vol1_Marx_chunk003 (chunk 3/6))_
- 小規模な手工業や家庭内工業は、機械化と労働時間規制の影響を受け、最終的には大規模な工場システムへ統合または淘汰される。 _(source: Capital_Vol1_Marx_chunk003 (chunk 3/6))_
- 資本家通過將工資從計時改為計件，可以將勞動強度的監督責任部分轉嫁給工人自身，利用工人對增加收入的渴望來自動延長工作日和提高勞動強度。 _(source: Capital_Vol1_Marx_chunk004 (chunk 4/6))_
- 相對過剩人口的存在是調節工資水平的機制：當資本積累加速時，對勞動需求增加，工資上升，但同時會刺激人口增長或吸收後備軍，最終導致勞動供給超過需求，工資回落，從而確保剝削率維持在有利於資本的範圍內。 _(source: Capital_Vol1_Marx_chunk004 (chunk 4/6))_
- 技術進步和生產力提高雖然增加了社會總財富，但在資本主義條件下，它往往導致不變資本比重增加，從而相對減少對勞動力的需求，加劇工人的不穩定性和貧困化。 _(source: Capital_Vol1_Marx_chunk004 (chunk 4/6))_
- 資本積累的過程具有內在的矛盾性：它不斷地再生產出資本關係本身，即一極是支配生產資料的資本家，另一極是除了勞動力之外一無所有的僱傭工人。 _(source: Capital_Vol1_Marx_chunk004 (chunk 4/6))_
- 資本主義在農業中的擴張伴隨著對小農和農業工人的系統性驅逐，導致農村人口向城市遷移或淪為赤貧。 _(source: Capital_Vol1_Marx_chunk005 (chunk 5/6))_
- 地主和農場主通過摧毀勞工住房、提高租金和剝奪公地使用权，刻意製造勞動力的供過於求，以維持低工資水平。 _(source: Capital_Vol1_Marx_chunk005 (chunk 5/6))_
- 國家立法（如濟貧法、定居法）在歷史上起到了協助資本積累、限制勞工流動和壓低工資的作用。 _(source: Capital_Vol1_Marx_chunk005 (chunk 5/6))_
- 在殖民地，資本積累無法自然發生，必須依靠國家權力人為製造勞動與生產資料的分離（如沃克菲爾德方案）。 _(source: Capital_Vol1_Marx_chunk005 (chunk 5/6))_
- 永遠不要攤平虧損（Never average losses）。如果第一筆交易虧損，說明判斷錯誤，應立即出場，而不是加碼。 _(source: How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))_
- 只在價格創新高（上漲趨勢）或創新低（下跌趨勢）時進場。不要在回調時買入，也不要在反彈時做空。 _(source: How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))_
- 利潤會自己照顧自己，但虧損不會。如果交易一開始就顯示虧損，必須立即止損；如果顯示盈利，則應讓利潤奔跑，直到出現危險信號。 _(source: How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))_
- 不要試圖預測市場的所有波動。一年中只有少數幾個時間點（約四到五次）適合進行重大投機操作，其餘時間應保持觀望。 _(source: How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))_
- 建立自己的記錄系統，結合時間和價格數據。不要依賴他人的建議或內部消息，必須親自研究並得出結論。 _(source: How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))_
- 獲利後，應提取一半利潤存入保險箱，將其視為「真實資金」，以維持心理平衡並保護資本。 _(source: How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))_
- 關注市場領導股（Leaders）。如果無法從活躍的龍頭股中獲利，就很難從整體市場獲利。 _(source: How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))_
- 當市場行為與你的觀點不符時，承認錯誤並退出。市場從不犯錯，錯誤在於你的觀點。 _(source: How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))_
- When making decisions, ignore sunk costs and focus only on marginal benefits and marginal costs. _(source: OpenStax_Economics_3e_chunk000 (chunk 0/10))_
- Use the 'ceteris paribus' assumption to analyze economic changes one factor at a time to understand cause and effect. _(source: OpenStax_Economics_3e_chunk000 (chunk 0/10))_
- Recognize that opportunity cost includes not just monetary price but also time and foregone alternatives. _(source: OpenStax_Economics_3e_chunk000 (chunk 0/10))_
- Understand that trade-offs exist in all choices due to scarcity; getting more of one thing requires giving up something else. _(source: OpenStax_Economics_3e_chunk000 (chunk 0/10))_
- Distinguish between positive analysis (what is) and normative analysis (what ought to be) to avoid confusing facts with opinions. _(source: OpenStax_Economics_3e_chunk000 (chunk 0/10))_
- 企業應根據邊際收益等於邊際成本（MR=MC）的原則來確定利潤最大化的產出水平。 _(source: OpenStax_Economics_3e_chunk001 (chunk 1/10))_
- 在短期內，若價格高於平均可變成本（AVC），即使虧損，企業也應繼續生產以覆蓋部分固定成本；若價格低於 AVC，則應立即停業。 _(source: OpenStax_Economics_3e_chunk001 (chunk 1/10))_
- 在長期內，完全競爭市場中的企業將通過進入或退出市場，使價格等於最低平均總成本，從而獲得零經濟利潤。 _(source: OpenStax_Economics_3e_chunk001 (chunk 1/10))_
- 對於需求缺乏彈性的商品（如必需品），提高價格可以增加總收益；對於需求富有彈性的商品，降低價格可以增加總收益。 _(source: OpenStax_Economics_3e_chunk001 (chunk 1/10))_
- 政府在實施價格管制（如租金管制或利率上限）時，需預期其可能導致短缺或剩餘，並造成資源配置效率低下。 _(source: OpenStax_Economics_3e_chunk001 (chunk 1/10))_
- 消費者在分配預算時，應確保最後一美元花在每種商品上的邊際效用相等，以實現效用最大化。 _(source: OpenStax_Economics_3e_chunk001 (chunk 1/10))_
- 獨佔廠商應持續擴大產出直到邊際收益等於邊際成本（MR=MC），然後根據需求曲線設定相應的價格。 _(source: OpenStax_Economics_3e_chunk002 (chunk 2/10))_
- 若邊際收益大於邊際成本，廠商應增加產出以增加利潤；若邊際成本大於邊際收益，廠商應減少產出。 _(source: OpenStax_Economics_3e_chunk002 (chunk 2/10))_
- 政策制定者在評估企業合併時，應計算赫芬達爾-赫希曼指數（HHI）以判斷市場集中度是否會顯著提高，從而損害競爭。 _(source: OpenStax_Economics_3e_chunk002 (chunk 2/10))_
- 為了解決負外部性問題，政府可採用庇古稅（污染費）或可交易許可證制度，讓污染者內部化其社會成本。 _(source: OpenStax_Economics_3e_chunk002 (chunk 2/10))_
- 在寡頭市場中，企業若希望維持高利潤，需克服個別擴張產出的誘因，這通常需要隱性或顯性的協調機制，但往往因「作弊」誘因而難以長期維持。 _(source: OpenStax_Economics_3e_chunk002 (chunk 2/10))_
- 對於具有自然壟斷特徵的公用事業，政府應考慮價格上限監管或成本加成監管，以防止壟斷定價並確保服務供應。 _(source: OpenStax_Economics_3e_chunk002 (chunk 2/10))_
- Firms maximize profit by hiring labor up to the point where the cost of the worker (wage) equals the value they generate (VMPL or MRP). _(source: OpenStax_Economics_3e_chunk003 (chunk 3/10))_
- Employers with market power (monopsony) can suppress wages and reduce employment levels compared to competitive markets. _(source: OpenStax_Economics_3e_chunk003 (chunk 3/10))_
- Unions can raise wages for members but may reduce the total quantity of labor hired by firms. _(source: OpenStax_Economics_3e_chunk003 (chunk 3/10))_
- Antipoverty programs that phase out benefits too quickly (e.g., losing $1 for every $1 earned) create disincentives to work; slower phase-outs (e.g., losing $0.50 for every $1 earned) preserve work incentives. _(source: OpenStax_Economics_3e_chunk003 (chunk 3/10))_
- Income inequality can be measured and visualized using quintile distributions and Lorenz curves to track societal wealth distribution over time. _(source: OpenStax_Economics_3e_chunk003 (chunk 3/10))_
- Policies like the Earned Income Tax Credit (EITC) are designed to supplement wages for low-income workers while maintaining the incentive to work. _(source: OpenStax_Economics_3e_chunk003 (chunk 3/10))_
- 個人財富累積最可靠的方法是接受更多教育以提高收入潛力，並尽早開始儲蓄以利用複利效應。 _(source: OpenStax_Economics_3e_chunk004 (chunk 4/10))_
- 投資者應避免試圖擇時選股，因為市場難以預測；分散投資（如透過指數型基金）是降低風險的有效策略。 _(source: OpenStax_Economics_3e_chunk004 (chunk 4/10))_
- 在評估經濟表現時，必須使用實質數據（如實質GDP）而非名目數據，以剔除通貨膨脹的干擾。 _(source: OpenStax_Economics_3e_chunk004 (chunk 4/10))_
- 對於低收入國家而言，引進成熟技術和增加資本投資比發明新技術更容易實現快速經濟成長（後進優勢）。 _(source: OpenStax_Economics_3e_chunk004 (chunk 4/10))_
- 理解失業率數據的局限性：它不包含喪志工人和隱藏性失業，因此不能完全反映勞動市場的真實健康狀況。 _(source: OpenStax_Economics_3e_chunk004 (chunk 4/10))_
- 理解自然失業率的存在意味著政策目標不應是零失業，而是通過改善勞動力市場信息流動和教育培訓來降低摩擦性和結構性失業。 _(source: OpenStax_Economics_3e_chunk005 (chunk 5/10))_
- 在短期經濟衰退中（凱恩斯區間），政府應通過財政政策（增加支出或減稅）或貨幣政策刺激總需求，以恢復產出和就業。 _(source: OpenStax_Economics_3e_chunk005 (chunk 5/10))_
- 在長期或經濟過熱時（新古典區間），應關注提高生產率（技術進步、資本積累）以推動長期總供給向右移動，從而實現可持續增長。 _(source: OpenStax_Economics_3e_chunk005 (chunk 5/10))_
- 政策制定者需警惕供給衝擊（如能源價格飆升）可能導致的滯脹，這需要同時應對產出下降和物價上漲。 _(source: OpenStax_Economics_3e_chunk005 (chunk 5/10))_
- 分析經濟狀況時，應區分短期波動（主要由需求驅動）和長期趨勢（主要由供給驅動）。 _(source: OpenStax_Economics_3e_chunk005 (chunk 5/10))_
- To combat recession, Keynesian policy recommends expansionary fiscal policy (tax cuts or increased government spending) to shift Aggregate Demand right. _(source: OpenStax_Economics_3e_chunk006 (chunk 6/10))_
- To combat inflation, Keynesian policy recommends contractionary fiscal policy (tax increases or spending cuts) to shift Aggregate Demand left. _(source: OpenStax_Economics_3e_chunk006 (chunk 6/10))_
- Central banks use expansionary monetary policy (lowering interest rates via open market operations) to stimulate investment and consumption during recessions. _(source: OpenStax_Economics_3e_chunk006 (chunk 6/10))_
- Central banks use contractionary monetary policy (raising interest rates) to reduce inflationary pressures when the economy overheats. _(source: OpenStax_Economics_3e_chunk006 (chunk 6/10))_
- In the long run, governments should focus on policies that increase Potential GDP (human capital, physical capital, technology) rather than trying to fine-tune short-term demand, as per the Neoclassical view. _(source: OpenStax_Economics_3e_chunk006 (chunk 6/10))_
- Banks can mitigate risk by diversifying loans across different industries and geographic regions to avoid correlated defaults. _(source: OpenStax_Economics_3e_chunk006 (chunk 6/10))_
- Investors should consider exchange rate expectations and relative interest rates when making international portfolio investments. _(source: OpenStax_Economics_3e_chunk006 (chunk 6/10))_
- Policymakers must account for time lags in monetary policy, as effects on GDP and inflation may take 1-3 years to materialize. _(source: OpenStax_Economics_3e_chunk006 (chunk 6/10))_
- 貿易政策においては、保護主義よりも自由貿易が全体の厚生を高めるため、関税引き下げなどの障壁撤廃が推奨される。 _(source: OpenStax_Economics_3e_chunk007 (chunk 7/10))_
- 発展途上国は、物理資本だけでなく、教育や技術導入を通じて人的資本を蓄積し、比較優位を動的に変化させることが重要である。 _(source: OpenStax_Economics_3e_chunk007 (chunk 7/10))_
- 政府は財政赤字を拡大する場合、金利上昇による民間投資の押し下げ（クラウディングアウト）効果を考慮し、金融政策との調整が必要である。 _(source: OpenStax_Economics_3e_chunk007 (chunk 7/10))_
- 低所得国は、外国援助に依存するだけでなく、貿易参加と直接投資の誘致を通じて資本蓄積を図る方が持続可能な成長につながる可能性がある。 _(source: OpenStax_Economics_3e_chunk007 (chunk 7/10))_
- 分析貿易政策時，應同時考慮受益者（受保護的生產者）和受害者（支付更高價格的消費者及失去出口機會的外國生產者）。 _(source: OpenStax_Economics_3e_chunk008 (chunk 8/10))_
- 評估「拯救就業」的成本：保護主義雖然能保留特定行業的工作崗位，但對消費者而言，每個被拯救的工作崗位成本遠高於該工人的工資（例如紡織業每拯救一個工作崗位成本約為19.9萬美元）。 _(source: OpenStax_Economics_3e_chunk008 (chunk 8/10))_
- 區分道德上不可接受的勞動實踐（如童工、奴隸勞動）與單純的低工資或較差的條件；後者往往是發展中國家相對於其他替代方案的較優選擇。 _(source: OpenStax_Economics_3e_chunk008 (chunk 8/10))_
- 在評估環境保護論據時，注意「逐底競爭」（Race to the Bottom）並非必然發生，因為環境合規成本通常只佔工業總成本的1-2%，其他因素（如勞動力、基礎設施）對廠址選擇影響更大。 _(source: OpenStax_Economics_3e_chunk008 (chunk 8/10))_
- 理解區域貿易協定（如EU, USMCA）與多邊貿易體系（WTO）之間的互動，國家簽署國際協議有時是為了約束國內特殊利益集團的遊說壓力。 _(source: OpenStax_Economics_3e_chunk008 (chunk 8/10))_
- 分析福利政策時，需計算邊際有效稅率，評估政策是否會產生過強的「貧困陷阱」效應，從而抑制勞動供給。 _(source: OpenStax_Economics_3e_chunk009 (chunk 9/10))_
- 對於企業或投資者而言，理解風險與報酬的正相關性是必要的：高風險投資必須提供較高的預期報酬才能吸引資金。 _(source: OpenStax_Economics_3e_chunk009 (chunk 9/10))_
- 在制定宏觀經濟政策時，應考慮公眾的預期類型。若公眾具備理性預期，預期的政策變化可能會迅速反映在工資和物價上，削弱政策效果。 _(source: OpenStax_Economics_3e_chunk009 (chunk 9/10))_
- 政府應區分「純再分配」與「機會梯子」政策。後者（如教育投資）可能在不犧牲產出的情況下促進平等，優於前者。 _(source: OpenStax_Economics_3e_chunk009 (chunk 9/10))_
- 在勞動市場篩選中，僱主應善用學歷、證書等訊號來降低資訊不對稱帶來的招聘風險。 _(source: OpenStax_Economics_3e_chunk009 (chunk 9/10))_
- When analyzing economic decisions, always identify the opportunity cost, which includes both explicit monetary costs and implicit costs like time. _(source: OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))_
- Ignore sunk costs when making current or future decisions; focus only on marginal benefits and marginal costs. _(source: OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))_
- Use the 'Four-Step Process' to analyze market changes: 1) Draw initial equilibrium, 2) Determine if supply or demand shifts, 3) Determine direction of shift, 4) Find new equilibrium. _(source: OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))_
- Distinguish between a 'change in quantity demanded/supplied' (movement along the curve due to price) and a 'shift in demand/supply' (change due to external factors like income or technology). _(source: OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))_
- Recognize that price controls (ceilings and floors) typically create inefficiencies such as shortages, surpluses, and deadweight loss, transferring surplus between parties but reducing total social welfare. _(source: OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))_
- Apply the concept of comparative advantage to understand why trade is beneficial even if one party is more efficient at producing everything. _(source: OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))_
- 在分析市場干預時，應先確定價格管制（如利率上限）是否低於均衡價格，若是則預期會出現短缺。 _(source: OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))_
- 企業定價策略應考慮需求彈性：若需求缺乏彈性（<1），提高價格可增加總收益；若需求富有彈性（>1），降低價格可增加總收益。 _(source: OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))_
- 評估經濟成長時，必須使用實質 GDP 而非名目 GDP，以排除通貨膨脹的干擾，才能真實反映產出變化。 _(source: OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))_
- 政策制定者在設計稅收時，應意識到稅負最終將主要由彈性較小的一方承擔，這對於預測政策效果至關重要。 _(source: OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))_
- 理解長期經濟增長的關鍵在於提升勞動生產率，這需要持續投資於教育（人力資本）、設備（物質資本）和技術創新。 _(source: OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))_
- 在比較不同國家的生活水準時，應使用購買力平價（PPP）調整後的匯率及人均 GDP，而非僅看總量或市場匯率。 _(source: OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))_
- 分析失業問題時，需區分短期週期性失業與長期結構性失業，前者需總體需求管理，後者需技能培訓與市場改革。 _(source: OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))_
- Policy makers must distinguish between cyclical and structural unemployment to apply appropriate remedies (fiscal stimulus vs. labor market deregulation/training). _(source: OpenStax Principles of Macroeconomics, Chapters 8 and 9 (chunk 0/1))_
- Generous unemployment benefits and strict firing regulations can raise the natural rate of unemployment by discouraging hiring. _(source: OpenStax Principles of Macroeconomics, Chapters 8 and 9 (chunk 0/1))_
- Central banks often monitor core inflation rather than headline CPI to avoid reacting to temporary supply shocks. _(source: OpenStax Principles of Macroeconomics, Chapters 8 and 9 (chunk 0/1))_
- Individuals should be aware that fixed-income investments lose real value during periods of unexpected inflation. _(source: OpenStax Principles of Macroeconomics, Chapters 8 and 9 (chunk 0/1))_
- Governments should index tax brackets and social security benefits to prevent 'bracket creep' and erosion of purchasing power. _(source: OpenStax Principles of Macroeconomics, Chapters 8 and 9 (chunk 0/1))_
- 理解經濟週期的短長期差異：在短期（2-5年內）使用凱因斯主義框架分析總需求衝擊和失業問題；在長期（5年以上）使用新古典主義框架關注潛在GDP成長和價格水準。 _(source: OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))_
- 政策制定者應意識到財政政策的時滯（Time Lags）：立法和實施過程緩慢，可能在經濟已經復甦時才生效，從而加劇商業週期波動。 _(source: OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))_
- 央行在面對「零利率下限」（Zero Lower Bound）時，傳統降息工具失效，需轉向量化寬鬆（QE）等非傳統工具來刺激經濟。 _(source: OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))_
- 投資決策需考慮匯率風險：出口商在貨幣升值時利潤受損，進口商受益；反之亦然。企業可使用避險（Hedging）策略來管理貨幣波動風險。 _(source: OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))_
- 監控通貨膨脹預期：通膨預期會影響名目利率和實際經濟行為。若預期通膨上升，央行可能需採取緊縮政策以防通膨失控。 _(source: OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))_
- 銀行業需保持資產多樣化以避免系統性風險：過度集中於特定行業或地區貸款會增加銀行在經濟下行時的破產風險。 _(source: OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))_
- 評估貨幣政策有效性時，需考慮貨幣流通速度（Velocity of Money）的不穩定性：若流通速度不可預測，單純控制貨幣供應量可能無法達到預期的GDP目標。 _(source: OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))_
- 政策制定者應意識到，持續的大型預算赤字可能通過提高利率和匯率升值，導致貿易赤字擴大，進而使經濟面臨國際資本突然撤出的風險。 _(source: OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))_
- 在評估財政政策時，需考慮「擠出效應」：政府借貸可能會排擠私人投資，從而長期抑制經濟增長潛力。 _(source: OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))_
- 對於發展中國家而言，單純依賴外援往往效果有限甚至有害；建立穩定的市場導向制度和吸引長期直接投資（FDI）比短期資本流入更能促進可持續增長。 _(source: OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))_
- 高收入國家應關注通過研發和教育投資來維持技術領先地位，而中等收入國家則應致力於提升人力資本和接軌全球市場以實現經濟收斂。 _(source: OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))_
- 理解貿易保護主義（如關稅和配額）雖然能暫時保護特定國內產業，但會增加消費者成本並可能引發貿易夥伴的反報復，最終損害整體福利。 _(source: OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))_
- 評估保護主義時，應考慮其對整體社會剩餘的負面影響，而非僅關注受保護行業的就業數據。 _(source: OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))_
- 對於幼稚產業保護，應設定明確的退出機制和績效指標（如出口增長），以避免保護措施長期化。 _(source: OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))_
- 在處理傾銷指控時，需區分市場供需導致的低價與惡意的掠奪性定價，並警惕政治遊說對貿易政策的干擾。 _(source: OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))_
- 理解貿易對工資的影響具有異質性：高技能工人可能受益，而低技能工人可能面臨競爭壓力，但整體平均工資傾向於上升。 _(source: OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))_
- 政府應透過再培訓計劃或社會安全網來緩解貿易帶來的分配不均，而非通過限制貿易來應對。 _(source: OpenStax_Macroeconomics_3e_chunk005 (chunk 5/7))_
- 在分析經濟週期時，應區分短期（凱因斯主義區間，SRAS 平坦）與長期（古典區間，LRAS 垂直）的不同政策效應。 _(source: OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))_
- 評估通膨壓力時，需關注生產者物價指數 (PPI) 與消費者物價指數 (CPI) 的差異，並注意 CPI 計算中的替代偏差。 _(source: OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))_
- 制定財政政策時，需考慮政策時滯（認識時滯、立法時滯），這可能導致政策在經濟狀況改變後才生效。 _(source: OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))_
- 理解貨幣乘數公式對於預測中央銀行公開市場操作對貨幣供應量的擴張或收縮效果至關重要。 _(source: OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))_
- To analyze market changes, use the four-step process: 1) Draw initial supply/demand model, 2) Determine if the event affects supply or demand, 3) Determine direction of shift (left/right), 4) Identify new equilibrium compared to old. _(source: OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))_
- Distinguish between a 'shift in the curve' (caused by non-price factors like income or technology) and a 'movement along the curve' (caused by a change in the good's own price). _(source: OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))_
- When evaluating costs, ignore sunk costs (past, unrecoverable costs) and focus on marginal costs and benefits of future actions. _(source: OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))_
- Recognize that price controls (ceilings/floors) create inefficiencies (shortages/surpluses) and deadweight loss, transferring surplus between buyers and sellers but reducing total social welfare. _(source: OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))_
- Understand that labor demand is a 'derived demand,' meaning it depends on the demand for the final product the labor produces. _(source: OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))_
- 分析市場變動時，先確定是需求曲線還是供給曲線移動，以及移動的方向，再判斷對均衡價格和數量的影響。 _(source: OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))_
- 企業定價策略應考慮需求彈性：若需求缺乏彈性，提高價格可增加總收益；若需求富有彈性，降低價格可增加總收益。 _(source: OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))_
- 預測稅負分攤時，觀察供需雙方的相對彈性：彈性較小的一方承擔較多的稅務負擔。 _(source: OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))_
- 消費者在預算有限下，應將資金分配至邊際效用與價格比率最高的商品，直至各商品的 MU/P 相等。 _(source: OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))_
- 企業在短期內若價格高於平均變動成本但低於平均總成本，應繼續生產以覆蓋部分固定成本；若價格低於平均變動成本，應立即停業。 _(source: OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))_
- 長期規劃中，企業應根據技術和要素價格選擇最便宜的生產方式，並評估規模經濟以確定最佳生產規模。 _(source: OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))_
- 理解長期與短期的區別：短期內至少有一種生產要素固定，長期內所有要素均可調整，這影響了供給彈性和成本結構。 _(source: OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))_
- 壟斷廠商應持續擴大產量直到邊際收益等於邊際成本（MR=MC），然後根據需求曲線確定最高可行價格。 _(source: OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))_
- 獨佔性競爭廠商在短期內可通過差異化產品獲取利潤，但長期需預期新進入者會稀釋需求，最終利潤趨零。 _(source: OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))_
- 寡頭廠商若希望維持高利潤，需建立可信的懲罰機制以防止成員作弊（如彎曲需求曲線策略），但法律通常禁止此類合謀。 _(source: OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))_
- 面對負外部性（如污染），政策制定者應優先考慮市場導向工具（如庇古稅或可交易許可證），因其比命令與控制監管更具成本效益和靈活性。 _(source: OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))_
- 對於正外部性（如研發、教育），政府應通過補貼或專利保護來內部化社會收益，以糾正市場供給不足。 _(source: OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))_
- 企業在評估合併時，應計算赫芬達爾-赫希曼指數（HHI）以評估市場集中度變化，HHI超過1800通常會引發嚴格審查。 _(source: OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))_
- 對於追求利潤最大化的企業，應根據勞動的邊際產品價值（完全競爭）或邊際收益產品（不完全競爭）來決定僱用人數，確保最後一名僱員帶來的收益等於其工資成本。 _(source: OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))_
- 政策制定者在設計福利計劃時，應避免過於陡峭的福利遞減率，以防止製造「貧困陷阱」，鼓勵受助者透過工作改善生活。 _(source: OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))_
- 保險公司應透過免賠額（deductibles）、共付額（copayments）和共同保險（coinsurance）等機制來緩解道德風險問題。 _(source: OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))_
- 為解決逆向選擇，保險市場可採用強制投保（如汽車保險或 ACA 的個人強制條款）或仔細進行風險分組定價。 _(source: OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))_
- 消費者在面對資訊不對稱市場（如二手車或珠寶）時，應依賴信譽、保證書、保修服務或第三方認證來降低購買劣質產品的風險。 _(source: OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))_
- 理解政治決策時，應意識到組織良好的小團體往往比分散的大眾擁有更大的政策影響力。 _(source: OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))_
- 在評估貿易政策時，需區分短期內的產業保護利益與長期內的消費者損失及整體經濟效率下降。 _(source: OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))_
- 對於新興產業，若主張保護主義，應設定明確的退出機制並與出口績效掛鉤，以避免產業長期依賴保護而缺乏競爭力。 _(source: OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))_
- 個人累積財富的最可靠途徑並非試圖預測股市走勢（隨機漫步理論指出這極難做到），而是接受高等教育並尽早開始儲蓄，利用複利效應。 _(source: OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))_
- 在分析國際貿易時，不僅要看絕對生產率，更要計算機會成本，因為比較優勢才是貿易利益的來源。 _(source: OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))_
- 在閱讀圖表時，應警惕軸線起點、比例尺選擇及數據範圍截取對視覺印象的影響，避免被單一的視覺呈現誤導。 _(source: OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))_
- 分析消費者選擇時，利用無差異曲線與預算線的切點來確定效用最大化點，而非依賴具體的效用數值。 _(source: OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))_
- 當面對價格變動時，分別考慮替代效應（相對價格變化）和所得效應（購買力變化）以預測消費量的總體變化方向。 _(source: OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))_
- 在評估長期投資（如股票、債券或資本項目）時，務必使用現值折現法將未來收益轉化為當前價值，並考慮風險溢價對折現率的影響。 _(source: OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))_
- 理解工資上漲對勞動供給的影響取決於替代效應與所得效應的強度對比：若所得效應主導，工資上漲可能導致勞動供給減少（後彎的勞動供給曲線）。 _(source: OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))_

### === PRACTICAL FORMULAS (TEXTBOOKS) ===
- **相對價值形式方程** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - Formula: x量商品A = y量商品B
  - 表示商品A的價值通過商品B的使用價值表現出來。例如：20碼麻布 = 1件上衣。
- **價值量決定公式** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - Formula: 商品價值量 ∝ 社會必要勞動時間
  - 商品中包含的社會必要勞動時間越多，其價值量越大；反之則越小。
- **勞動生產力與價值關係** (《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1))
  - Formula: 單位商品價值量 ∝ 1 / 勞動生產力
  - 勞動生產力提高，單位時間內生產的使用價值量增加，但總價值量不變，因此分摊到每件商品上的價值量減少。
- **資本循環公式** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - Formula: M - C ... P ... C' - M'
  - 貨幣(M)購買商品(C，包括生產資料和勞動力)，進入生產過程(P)，產出包含剩餘價值的商品(C')，最後出售換回更多貨幣(M')。簡化為 M-C-M'。
- **剩餘價值率 (Rate of Surplus Value)** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - Formula: m' = s / v = 剩餘勞動 / 必要勞動
  - 剩餘價值(m或s)與變資本(v)的比率，準確反映了資本對勞動的剝削程度。
- **商品價值構成** (Capital_Vol1_Marx_chunk001 (chunk 1/6))
  - Formula: W = c + v + s
  - 商品總價值(W)等於不變資本(c，轉移的生產資料價值)加上變資本(v，復制的勞動力價值)加上剩餘價值(s)。
- **剩餘價值量公式** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - Formula: S = s * n = V * (s/v)
  - S 為總剩餘價值量，s 為每個工人產生的剩餘價值，n 為僱傭工人數量，V 為總變資本，s/v 為剩餘價值率。這表明剩餘價值的總量取決於剝削程度和同時被剝削的工人數量。
- **必要勞動與剩餘勞動的關係** (Capital_Vol1_Marx_chunk002 (chunk 2/6))
  - Formula: 工作日長度 = 必要勞動時間 + 剩餘勞動時間
  - 在必要勞動時間固定的情況下，剩餘勞動時間的增加只能通過延長工作日（絕對剩餘價值）來實現；在工作日長度固定的情況下，剩餘勞動時間的增加必須通過縮短必要勞動時間（相對剩餘價值）來實現。
- **剰余価値率の公式** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - Formula: m' = s / v = 剰余労働時間 / 必要労働時間
  - 剰余価値(m')は、剰余価値(s)と可変資本(v)の比率、あるいは剰余労働時間と必要労働時間の比率として表される。これは労働搾取の程度を示す指標である。
- **利潤率の公式（言及のみ）** (Capital_Vol1_Marx_chunk003 (chunk 3/6))
  - Formula: p' = s / (c + v)
  - 利潤率(p')は、剰余価値(s)を総先進資本（不変資本c＋可変資本v）で割ったもの。マルクスはリカード学派が剰余価値率と利潤率を混同していることを批判している。
- **勞動小時的價格** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - Formula: 勞動小時價格 = 每日勞動力價值 / 平均工作日小時數
  - 用於計算計時工資制度下，單位時間勞動力的貨幣表現。例如，若每日勞動力價值為3先令，工作日為12小時，則每小時勞動價格為3便士。
- **計件工資單價** (Capital_Vol1_Marx_chunk004 (chunk 4/6))
  - Formula: 計件單價 = (每日勞動力價值 / 每日平均產量) × 價值轉換係數
  - 計件工資是時間工資的轉化。如果工人12小時生產24件產品，每日勞動力價值為3先令，則每件產品的工資基礎為3便士（假設無剩餘價值轉移的簡化情況，實際需考慮產品中包含的舊價值轉移）。
- **關鍵價格計算 (Key Price Calculation)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
  - Formula: Key Price Movement = Stock A Movement + Stock B Movement
  - 為了確認趨勢，需觀察同一群組內兩隻領先股的綜合走勢。例如，若設定單股自然反應為6點，則關鍵價格需達到12點（6+6）才能確認趨勢的反轉或延續。
- **樞軸點突破確認 (Pivotal Point Confirmation)** (How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1))
  - Formula: Trend Continuation = Price breaks Pivotal Point by >= 3 points (individual stock) or >= 6 points (Key Price)
  - 當價格突破樞軸點後，若要確認趨勢繼續，價格必須向有利方向移動至少3個點（單股）或6個點（關鍵價格）。若未能達到此幅度，則視為危險信號，趨勢可能已結束。
- **Budget Constraint Equation** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - Formula: P_x * Q_x + P_y * Q_y = Budget
  - The total expenditure on good X (price Px times quantity Qx) plus the total expenditure on good Y (price Py times quantity Qy) must equal the consumer's total budget.
- **Slope of Budget Constraint** (OpenStax_Economics_3e_chunk000 (chunk 0/10))
  - Formula: Slope = - (P_x / P_y)
  - The slope represents the opportunity cost of the good on the horizontal axis (X) in terms of the good on the vertical axis (Y). It indicates how much of Y must be given up to get one more unit of X.
- **中點法彈性公式** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - Formula: Elasticity = [(Q2 - Q1) / ((Q2 + Q1) / 2)] / [(P2 - P1) / ((P2 + P1) / 2)]
  - 用於計算兩點之間的需求或供給彈性，避免因起點不同而產生不同的彈性值。
- **邊際效用最大化規則** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - Formula: MUx / Px = MUy / Py
  - 消費者在預算約束下實現效用最大化時，每種商品的邊際效用與價格之比應相等。
- **經濟利潤** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - Formula: Economic Profit = Total Revenue - (Explicit Costs + Implicit Costs)
  - 扣除所有機會成本後的真實利潤，用於評估企業長期生存能力。
- **邊際成本** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - Formula: MC = ΔTC / ΔQ
  - 每多生產一單位產品所增加的總成本。
- **平均總成本** (OpenStax_Economics_3e_chunk001 (chunk 1/10))
  - Formula: ATC = TC / Q
  - 生產每單位產品的平均成本，用於判斷企業是否盈利。
- **利潤最大化條件** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - Formula: MR = MC
  - 無論是完全競爭還是獨佔市場，廠商利潤最大化的產量決策點均位於邊際收益等於邊際成本之處。對於獨佔廠商，此時價格 P > MR = MC。
- **赫芬達爾-赫希曼指數 (HHI)** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - Formula: HHI = Σ(si)^2
  - 其中 si 為市場中第 i 家企業的市場份額（以百分比表示）。例如，若三家企業分別佔有 40%、30%、30% 的市場，HHI = 40^2 + 30^2 + 30^2 = 1600 + 900 + 900 = 3400。
- **邊際收益計算** (OpenStax_Economics_3e_chunk002 (chunk 2/10))
  - Formula: MR = ΔTR / ΔQ
  - 邊際收益等於總收益的變化量除以產量的變化量。由於獨佔廠商面臨向下傾斜的需求曲線，增加銷量必須降低價格，因此 MR 小於價格。
- **Value of Marginal Product of Labor (Perfect Competition)** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - Formula: VMPL = MPL × P
  - Where MPL is the Marginal Product of Labor and P is the market price of the output. This represents the demand for labor in competitive markets.
- **Marginal Revenue Product (Imperfect Competition)** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - Formula: MRP = MPL × MR
  - Where MR is the Marginal Revenue. This represents the demand for labor when the firm has market power in the product market.
- **Marginal Cost of Labor (Monopsony)** (OpenStax_Economics_3e_chunk003 (chunk 3/10))
  - Formula: MCL = Δ(Total Labor Cost) / Δ(Labor Quantity)
  - The change in total labor cost divided by the change in the number of workers. In monopsony, MCL > Wage.
- **實質GDP計算公式** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - Formula: 實質GDP = (名目GDP / GDP平減指數) × 100
  - 用於將當前價格下的GDP轉換為固定基期價格下的GDP，以消除物價上漲的影響。
- **失業率計算公式** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - Formula: 失業率 = (失業人數 / 勞動力總數) × 100
  - 勞動力總數等於就業人數加上失業人數。注意：不在勞動力人口不計入分母。
- **複利增長公式** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - Formula: 未來價值 = 現值 × (1 + 增長率)^年數
  - 用於計算經濟增長或投資回報隨時間複利累積的效果，顯示微小增長率在長期的巨大差異。
- **人均GDP計算公式** (OpenStax_Economics_3e_chunk004 (chunk 4/10))
  - Formula: 人均GDP = GDP總量 / 總人口數
  - 用於比較不同規模國家的生活標準或經濟發展水平。
- **Money Multiplier** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - Formula: Multiplier = 1 / Reserve Ratio
  - Calculates the maximum amount of new money the banking system can create from each dollar of excess reserves.
- **Basic Quantity Equation of Money** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - Formula: M × V = P × Q
  - M is Money Supply, V is Velocity of Money, P is Price Level, and Q is Real Output (GDP). Used to analyze inflation and economic growth relationships.
- **Velocity of Money** (OpenStax_Economics_3e_chunk006 (chunk 6/10))
  - Formula: V = Nominal GDP / Money Supply
  - Measures how quickly money circulates through the economy.
- **ルール・オブ・72 (Rule of 72)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - Formula: 所得倍増年数 ≈ 72 / 年間成長率 (%)
  - 経済成長率が一定の場合、一人当たりGDPが2倍になるのに要するおおよその年数を計算する近似式。
- **国民貯蓄・投資恒等式 (National Saving and Investment Identity)** (OpenStax_Economics_3e_chunk007 (chunk 7/10))
  - Formula: S_private + (T - G) + (M - X) = I
  - 民間貯蓄、公的貯蓄（税収G支出）、および海外からの資金流入（貿易赤字 M-X）の合計は、民間投資 I に等しい。
- **所得五等分百分比計算** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - Formula: Quintile Share = (Total Income of Specific Quintile / Total National Income) * 100%
  - 用於計算每個收入階層（五等分）佔總所得的比例，以衡量所得分配的不平等程度。
- **複利計算公式** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - Formula: Future Value = Principal * (1 + interest rate)^time
  - 用於計算投資在特定時間後的價值，考慮複利效應。例如：$1,000(1+0.02)^5 = $1,104.08。
- **簡單利息計算** (OpenStax_Economics_3e_chunk009 (chunk 9/10))
  - Formula: Total Amount = Principal + (Principal * Rate * Time)
  - 用於計算不複利的貸款或存款總額。
- **Budget Constraint Equation** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - Formula: P_x * Q_x + P_y * Q_y = Budget
  - Represents the total expenditure on two goods (X and Y) equaling the consumer's total budget, where P is price and Q is quantity.
- **Slope of Budget Constraint** (OpenStax_Macroeconomics_3e_chunk000 (chunk 0/7))
  - Formula: Slope = - (P_x / P_y)
  - The slope represents the opportunity cost of the good on the horizontal axis (X) in terms of the good on the vertical axis (Y).
- **需求價格彈性 (中點法)** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - Formula: Ed = | [(Q2 - Q1) / ((Q1 + Q2) / 2)] / [(P2 - P1) / ((P1 + P2) / 2)] |
  - 計算需求量變動百分比除以價格變動百分比，使用中點作為基準以避免方向性偏差，結果取絕對值。
- **實質 GDP 計算** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - Formula: 實質 GDP = 名目 GDP / (GDP 平減指數 / 100)
  - 將名目 GDP 除以物價指數（以基期為100），以消除通膨影響，得出以基期價格計量的實際產出價值。
- **失業率** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - Formula: 失業率 = (失業人數 / 勞動力總數) × 100%
  - 勞動力總數等於就業人數加上失業人數。此公式衡量勞動力中尋找工作但找不到工作的人的比例。
- **勞動力參與率** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - Formula: 勞動力參與率 = (勞動力總數 / 成年人口總數) × 100%
  - 衡量成年人口中實際參與勞動市場（就業或積極尋職）的比例。
- **複利增長公式** (OpenStax_Macroeconomics_3e_chunk001 (chunk 1/7))
  - Formula: 未來值 = 現值 × (1 + 增長率)^年數
  - 用於計算在固定年增長率下，經過若干年後的人均 GDP 或其他經濟指標的預期規模。
- **貨幣乘數公式 (Money Multiplier Formula)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - Formula: 貨幣乘數 = 1 / 準備金率 (Reserve Ratio)
  - 用於計算銀行體系能從每一單位準備金中創造多少貨幣供應量。例如，若準備金率為10%（0.10），則貨幣乘數為10。
- **貨幣數量方程式 (Quantity Equation of Money)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - Formula: M * V = P * Q
  - M為貨幣供應量，V為貨幣流通速度，P為價格水準，Q為實質產出（GDP）。該方程式表明名目GDP（P*Q）等於貨幣供應量乘以流通速度。
- **貨幣流通速度 (Velocity of Money)** (OpenStax_Macroeconomics_3e_chunk003 (chunk 3/7))
  - Formula: V = 名目GDP / 貨幣供應量 (M)
  - 衡量貨幣在经济中循環的速度。名目GDP除以貨幣供應量（如M1或M2）得出每年每單位貨幣平均用於購買最終產品的次數。
- **72法則 (Rule of 72)** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - Formula: doubling_time_years ≈ 72 / annual_growth_rate_percent
  - 用於估算收入或經濟規模翻倍所需的年數。例如，若年均增長率為6%，則收入約需12年翻倍。
- **國家儲蓄與投資恆等式** (OpenStax_Macroeconomics_3e_chunk004 (chunk 4/7))
  - Formula: I = S_private + (T - G) + (M - X)
  - 表示私人投資 (I) 等於私人儲蓄 (S_private) 加上公共儲蓄 (T-G，即稅收減支出) 加上來自外國的儲蓄流入 (M-X，即進口減出口)。
- **貨幣乘數公式 (Money Multiplier Formula)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - Formula: Money Multiplier = 1 / Reserve Requirement
  - 用於計算銀行體系在準備金制度下，基礎貨幣能擴張為貨幣供應量的倍數。
- **中點公式 (Midpoint Formula)** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - Formula: % Change = [(New - Old) / ((New + Old) / 2)] * 100
  - 用於計算價格彈性或數量變動的百分比變化，以消除起點不同導致的誤差。
- **邊際消費傾向與邊際儲蓄傾向關係** (OpenStax_Macroeconomics_3e_chunk006 (chunk 6/7))
  - Formula: MPC + MPS = 1
  - 在凱因斯模型中，額外收入中用於消費的比例 (MPC) 與用於儲蓄的比例 (MPS) 之和等於 1。
- **Budget Constraint Equation** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - Formula: P_x * Q_x + P_y * Q_y = Budget
  - The total expenditure on good X (price Px times quantity Qx) plus total expenditure on good Y (price Py times quantity Qy) must equal the consumer's total budget.
- **Slope of Budget Constraint** (OpenStax_Microeconomics_3e_chunk000 (chunk 0/6))
  - Formula: Slope = - (P_x / P_y)
  - The slope represents the opportunity cost of the good on the horizontal axis (X) in terms of the good on the vertical axis (Y).
- **需求價格彈性 (中點法)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - Formula: Ed = |(Q2 - Q1) / [(Q2 + Q1) / 2]| / |(P2 - P1) / [(P2 + P1) / 2]|
  - 計算需求量變動百分比除以價格變動百分比，使用中點作為基準以避免方向性偏差。
- **供給價格彈性 (中點法)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - Formula: Es = |(Qs2 - Qs1) / [(Qs2 + Qs1) / 2]| / |(P2 - P1) / [(P2 + P1) / 2]|
  - 計算供給量變動百分比除以價格變動百分比。
- **邊際效用** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - Formula: MU = ΔTU / ΔQ
  - 總效用的變動量除以消費量的變動量。
- **效用最大化條件** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - Formula: MUx / Px = MUy / Py
  - 兩種商品的邊際效用與價格之比相等時，消費者達到效用最大化。
- **利潤最大化條件 (完全競爭)** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - Formula: MR = MC 或 P = MC
  - 企業應生產至邊際收益等於邊際成本的產量水平。在完全競爭市場中，邊際收益等於價格。
- **會計利潤** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - Formula: 會計利潤 = 總收益 - 顯性成本
  - 財務報表上顯示的利潤，僅扣除實際支付的費用。
- **經濟利潤** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - Formula: 經濟利潤 = 總收益 - (顯性成本 + 隱性成本)
  - 考慮機會成本後的真實利潤，用於評估資源配置的效率。
- **平均總成本** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - Formula: ATC = TC / Q
  - 總成本除以產量，代表每單位產品的平均成本。
- **邊際成本** (OpenStax_Microeconomics_3e_chunk001 (chunk 1/6))
  - Formula: MC = ΔTC / ΔQ
  - 總成本的變動量除以產量的變動量，代表多生產一單位產品的額外成本。
- **利潤最大化條件** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - Formula: MR = MC
  - 無論是完全競爭、壟斷還是獨佔性競爭，廠商實現利潤最大化的產量均位於邊際收益等於邊際成本之處。
- **邊際收益 (Monopoly)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - Formula: MR = ΔTR / ΔQ
  - 壟斷廠商的邊際收益是總收益的變化量除以產量的變化量，且由於價格必須下降才能多賣，MR < P。
- **四廠商集中率** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - Formula: CR4 = S1 + S2 + S3 + S4
  - 市場中最大的四個廠商的市場份額之和，用於衡量市場集中度。
- **赫芬達爾-赫希曼指數 (HHI)** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - Formula: HHI = Σ(Si^2)
  - 市場中所有廠商市場份額（百分比）的平方和。該指數對大廠商賦予更大權重，能更敏感地反映市場集中度和合併影響。
- **社會成本** (OpenStax_Microeconomics_3e_chunk002 (chunk 2/6))
  - Formula: Social Cost = Private Cost + External Cost
  - 在存在負外部性的情況下，生產的真實社會成本等於廠商的私人成本加上對第三方造成的外部成本。
- **邊際產品價值 (VMPL)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - Formula: VMPL = MPL × P
  - 其中 MPL 為勞動的邊際產量，P 為產品市場價格。適用於完全競爭產品市場的企業勞動需求決策。
- **邊際收益產品 (MRP)** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - Formula: MRP = MPL × MR
  - 其中 MPL 為勞動的邊際產量，MR 為邊際收益。適用於具有市場力量的企業（如壟斷或寡頭）勞動需求決策。
- **精算公平保費** (OpenStax_Microeconomics_3e_chunk003 (chunk 3/6))
  - Formula: Premium = Expected Loss
  - 在精算公平的保險中，收取的保費等於該風險群體預期發生的損失金額。
- **簡單利息 (Simple Interest)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - Formula: Interest = Principal × Rate × Time
  - 僅對本金計算利息，不考慮利息再投資。例如：$100本金，5%利率，1年利息為$5。
- **複利 (Compound Interest)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - Formula: Future Value = Principal × (1 + Rate)^Time
  - 利息加入本金重新計算利息。例如：$100本金，5%利率，3年後總值約為$115.76。
- **增長率 (Growth Rate)** (OpenStax_Microeconomics_3e_chunk004 (chunk 4/6))
  - Formula: Growth Rate = (New Value - Old Value) / Old Value
  - 用於計算百分比變化。對於跨期數據，有時使用平均值作為分母以提高準確性。
- **現值折現公式 (Present Discounted Value Formula)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - Formula: PV = FV / (1 + r)^n
  - PV為現值，FV為未來價值（Future Value），r為折現率（利率），n為期數（年數）。用於計算未來現金流的當前價值。
- **複利終值公式 (Compound Interest Formula)** (OpenStax_Microeconomics_3e_chunk005 (chunk 5/6))
  - Formula: FV = PV * (1 + r)^n
  - 用於計算當前本金在特定利率和時間後的未來價值，是現值公式的逆運算。

### === KEY QUOTES (TEXTBOOKS) ===
- "資產階級的財富被呈現為一個巨大的商品彙集，而單一的商品則是其基本單位。因此，我們的調查必須從分析商品開始。" — 《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1)
- "商品形式的奧祕不過是：人們自己勞動的社會規定性反映為勞動產品本身的自然屬性，從而反映為這些產品的社會屬性。" — 《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1)
- "價值形式，或其充分發展的形態，即貨幣形式，是非常簡單和原始的。然而，人類思維在兩千多年的時間裡徒勞地試圖揭開它的底細。" — 《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1)
- "一個商品對另一個商品的價值關係，是將該商品作為抽象人類勞動的凝結來表現，同時將另一個商品作為這種勞動的可感知的體現。" — 《資本論》第一卷（卡爾·馬克思著，恩格斯編輯，1926年芝加哥版） (chunk 0/1)
- "「資本是自發地增殖的價值。它是死勞動，像吸血鬼一樣，只有靠吸吮活勞動才能存活，而且吸吮得越多，就越活躍。」" — Capital_Vol1_Marx_chunk001 (chunk 1/6)
- "「勞動力的買主消費了勞動力的使用價值，而賣方則實現了其交換價值。勞動力的消費過程，即勞動過程，同時也是價值形成過程和剩餘價值創造過程。」" — Capital_Vol1_Marx_chunk001 (chunk 1/6)
- "「自由、平等、所有權和邊沁！自由，因為買賣雙方都只受自己的自由意志支配……平等，因為他們雙方都作為商品所有者發生關係……所有權，因為每個人都只處置自己的東西……邊沁，因為每個人都只考慮自己。」" — Capital_Vol1_Marx_chunk001 (chunk 1/6)
- "「資本來到世間，從頭到腳，每個毛孔都滴著血和骯髒的東西。」" — Capital_Vol1_Marx_chunk002 (chunk 2/6)
- "「自由契約只是幻象。工人出賣勞動力時看似自由的主人，實際上他已經是資本的附屬物。資本就像吸血鬼，只有吸吮活勞動才能生存，而且吸吮得越多，生命越旺盛。」" — Capital_Vol1_Marx_chunk002 (chunk 2/6)
- "「機器本身是人類勞動的產物，但在資本主義應用中，機器成為壓迫勞動者的工具。它不僅取代了成年男性工人，還將婦女和兒童捲入資本的統治之下，從而瓦解了工人階級的抵抗力量。」" — Capital_Vol1_Marx_chunk002 (chunk 2/6)
- "「最も強力な労働時間短縮の手段が、労働者とその家族の全時間を資本家の価値増殖のために利用するための最も確実な手段となる。」" — Capital_Vol1_Marx_chunk003 (chunk 3/6)
- "「手工芸や製造業では、労働者が道具を使うが、工場では、機械が労働者を使う。そこでは労働過程の運動が労働者から生じるのではなく、機械から生じる。」" — Capital_Vol1_Marx_chunk003 (chunk 3/6)
- "「補償理論家たちは、機械が労働者を解雇すると同時に、その労働者を雇用するのに十分な資本を解放すると信じている。しかし実際には、可変資本は不変資本に変換され、労働力との交換から引き離される。」" — Capital_Vol1_Marx_chunk003 (chunk 3/6)
- "「工資的形式消滅了工作日的全部劃分為必要勞動和剩餘勞動、有酬勞動和無酬勞動的一切痕跡。」" — Capital_Vol1_Marx_chunk004 (chunk 4/6)
- "「資本主義積累的法則是：同資本力量增長相比，工人階級的不幸增長更快；同壓迫工人的勞動手段的增長相比，工人階級的依賴性增長更快。」" — Capital_Vol1_Marx_chunk004 (chunk 4/6)
- "「在一極是財富的積累，在另一極則是苦難、奴役、無知、粗野和道德墮落的積累，即與資本積累相應的一極的無產階級的奴役。」" — Capital_Vol1_Marx_chunk004 (chunk 4/6)
- "所謂原始積累，不過是直接生產者與其生產資料分離的歷史過程。它看起來之所以是原始的，因為它構成了資本及對應於此種生產方式的前史。" — Capital_Vol1_Marx_chunk005 (chunk 5/6)
- "資本來到世間，頭頂上流著油，帶著肉，從每一個毛孔裡流著血和骯髒東西。" — Capital_Vol1_Marx_chunk005 (chunk 5/6)
- "在英國，只有這裡，這種剝奪人民土地的歷史，是用血腥的立法來促進的，是把被暴力驅逐的人民轉化為僱傭勞工的鞭子。" — Capital_Vol1_Marx_chunk005 (chunk 5/6)
- "沃克菲爾德發現，在殖民地，貨幣、生活資料、機器和其他生產資料並不就是資本……它們不能成為資本，除非同時存在著與之相對立的、被迫出賣自己的勞動力的僱傭工人。" — Capital_Vol1_Marx_chunk005 (chunk 5/6)
- "「市場從不犯錯，錯誤往往來自個人的觀點。」(Markets are never wrong—opinions often are.)" — How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1)
- "「利潤會自己照顧自己，但虧損不會。」(Profits always take care of themselves, but losses never do.)" — How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1)
- "「投機是一門生意，必須像經營企業一樣對待它，而不能將其視為純粹的賭博。」(Anyone who is inclined to speculate should look at speculation as a business and treat it as such and not regard it as a pure gamble...)" — How_to_Trade_in_Stocks_Livermore_chunk000 (chunk 0/1)
- ""Economics is the study of how humans make decisions in the face of scarcity."" — OpenStax_Economics_3e_chunk000 (chunk 0/10)
- ""The time at our disposal is limited... Everywhere we turn, if we choose one thing we must relinquish others which, in different circumstances, we would wish not to have relinquished."" — OpenStax_Economics_3e_chunk000 (chunk 0/10)
- ""[Economics] is a method rather than a doctrine, an apparatus of the mind, a technique of thinking, which helps its possessor to draw correct conclusions."" — OpenStax_Economics_3e_chunk000 (chunk 0/10)
- "「不要殺死信使。」（Don't kill the messenger.）價格是傳遞市場稀缺性資訊的信使，價格管制試圖抑制這種資訊，但無法消除潛在的供需力量，反而會導致資源錯配。" — OpenStax_Economics_3e_chunk001 (chunk 1/10)
- "「彈性是衡量一個變數對另一個變數變化響應程度的經濟學概念。」" — OpenStax_Economics_3e_chunk001 (chunk 1/10)
- "「在完全競爭市場中，長期均衡意味著沒有新企業願意進入，現有企業也不願離開，因為經濟利潤已降至零。」" — OpenStax_Economics_3e_chunk001 (chunk 1/10)
- "「壟斷利潤中最好的一種，就是安靜的生活。」（John Hicks）" — OpenStax_Economics_3e_chunk002 (chunk 2/10)
- "「外部性是指市場交易對未直接參與交易的第三方產生的影響。」" — OpenStax_Economics_3e_chunk002 (chunk 2/10)
- "「在囚徒困境中，如果兩個囚犯都能合作保持沉默，他們總共只會被判刑四年；但如果他們都追求個人利益而供認，他們總共將被判刑十年。」" — OpenStax_Economics_3e_chunk002 (chunk 2/10)
- ""The key insight in paying for public goods is to find a way of assuring that everyone will make a contribution and to prevent free riders."" — OpenStax_Economics_3e_chunk003 (chunk 3/10)
- ""If a firm wants to maximize profits, it will never pay more (in terms of wages and benefits) for a worker than the value of their marginal productivity to the firm."" — OpenStax_Economics_3e_chunk003 (chunk 3/10)
